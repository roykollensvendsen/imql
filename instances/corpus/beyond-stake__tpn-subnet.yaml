    - claim_field: "/weight_setting/on_chain_call"
      source_path: "sybil/base/validator.py"
      line_ref: "276-284"
      quote: >-
        response = self.subtensor.set_weights( wallet=self.wallet,
        netuid=self.config.netuid, uids=uint_uids, weights=uint_weights ...
    - claim_field: "/weight_setting/cadence"
      source_path: "sybil/base/neuron.py"
      line_ref: "168-171"
      quote: >-
        return ( (self.block - self.metagraph.last_update[self.uid]) >
        self.config.neuron.epoch_length and self.neuron_type != "MinerNeuron" )
    - claim_field: "/ground_truth_sources/0/description"
      source_path: "federated-container/modules/scoring/score_workers.js"
      line_ref: "235-247"
      quote: >-
        const wireguard_validation = await test_wireguard_connection(...) ; ...
        const status_from_failure_code = failure_code => failure_code ==
        'egress_ip_mismatch' ? 'cheat' : 'down'
    - claim_field: "/ground_truth_sources/1/description"
      source_path: "README.md"
      line_ref: "125-126"
