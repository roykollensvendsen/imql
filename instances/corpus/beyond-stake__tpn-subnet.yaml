    - claim_field: "/per_miner_state/status_values"
      source_path: "federated-container/modules/scoring/score_workers.js"
      line_ref: "237-275"
      quote: >-
        failure_code == 'egress_ip_mismatch' ? 'cheat' : 'down' ... test_result.status = 'up'
    - claim_field: "/per_miner_state/reset_policy"
      source_path: "sybil/base/validator.py"
      line_ref: "313-315"
      quote: >-
        for uid, hotkey in enumerate(self.hotkeys): if hotkey !=
        self.metagraph.hotkeys[uid]: self.scores[uid] = 0  # hotkey has been
        replaced
    - claim_field: "/subnet/implementation_lang"
      source_path: "README.md"
      line_ref: "188-193"
      quote: >-
        The miner consists out of two components: 1. A miner docker container
        that is managed through `docker` 2. A miner neuron that is managed
        through `pm2`
  unresolved:
    - >-
      /aggregation/method: no top-level enum cleanly matches "L1-normalised
      proportional share of a multiplicative composite"; 'proportional' chosen
      as nearest fit. The true cross-miner allocation is L1 normalisation of EMA
      scores.
    - >-
      /scoring_signals/*/weight: signals combine multiplicatively (size *
      perf_frac * sqrt(geo_frac) * stability_frac), so no additive per-signal
      weight exists; all left null.
    - >-
      /aggregation/burn_allocation: whether the 80% burn is currently live on
      netuid 65 in production cannot be confirmed from source alone; the constant
      BURN_WEIGHT=0.8 is the only evidence. mechanism_status set to partial_burn
      on that basis.

composition:
  shape: multiplicative
  overlays: [burn, guards, state]
  extern_count: 0   # provisional; coverage.py recomputes
