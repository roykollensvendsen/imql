    - claim_field: "/aggregation/notes"
      source_path: "sybil/base/validator.py"
      line_ref: "236-243"
      quote: >-
        norm = np.linalg.norm(self.scores, ord=1, axis=0, keepdims=True) ...
        raw_weights = self.scores / norm
    - claim_field: "/aggregation/burn_allocation/fraction"
      source_path: "sybil/base/consts.py"
      line_ref: "1-2"
      quote: "BURN_UID = 0\nBURN_WEIGHT = 0.8"
    - claim_field: "/aggregation/burn_allocation/enabled"
      source_path: "sybil/base/validator.py"
      line_ref: "256-258"
      quote: "burn_uid=BURN_UID,\n            burn_weight=BURN_WEIGHT,"
    - claim_field: "/aggregation/burn_allocation/notes"
      source_path: "sybil/base/utils/weight_utils.py"
      line_ref: "250-253"
      quote: >-
        final_weights = normalized_weights * (1 - burn_weight) ; final_weights =
        np.append(final_weights, burn_weight) ; final_weight_uids =
        np.append(non_zero_weight_uids, burn_uid)
    - claim_field: "/weight_setting/smoothing/alpha"
      source_path: "sybil/base/validator.py"
      line_ref: "414-417"
      quote: >-
