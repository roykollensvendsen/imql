schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  A fixed 80% of emission is burned to UID 0 on every weight-set
  (BURN_WEIGHT = 0.8, BURN_UID = 0, applied in process_weights_for_netuid).
  The remaining 20% is distributed across mining pools by the composite
  worker-pool score computed in the JS validator container.

subnet:
  name: "TPN - Tao Private Network"
  owner_repo: "beyond-stake__tpn-subnet"
  netuid: 65
  implementation_lang: mixed   # python neuron + javascript scoring container

task:
  summary: >-
    Miners run "mining pools" that coordinate worker nodes offering WireGuard /
    SOCKS5 VPN connections across many geographic locations. The validator
    samples a pool's workers, validates each WireGuard and SOCKS5 connection
    (egress IP must match the claimed worker IP), measures response latency, and
    geolocates the egress. A mining pool is rewarded linearly on pool size,
    multiplied by stability (up fraction), performance (latency), and the square
    root of geographic completeness. Workers themselves run no Bittensor neuron;
    only mining-pool miners receive emissions and distribute them to workers as
    they see fit.
  submission_format: [compute_service]

scoring_signals:
  - name: size_score
    metric_kind: volume
    direction: higher_is_better
    weight: null            # multiplicative factor in the composite, not additive
    normalization: none
    notes: >-
      workers.length * stability_fraction — number of up workers in the pool,
      already penalised by the stability fraction.
  - name: stability_score
    metric_kind: uptime
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      stability_fraction = successes.length / selected_workers.length; entered
      into the composite as stability_fraction (a 0..1 multiplier).
  - name: performance_score
    metric_kind: latency
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      performance_score = min(100 / (median_test_length_s / 20), 100); enters
      composite as performance_fraction = performance_score / 100. 20s is
      treated as a "good" test length (s_considered_good = 20).
  - name: geo_score
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      geo_completeness_fraction = countries_in_pool / total_unique_countries
      across all pools; enters composite as sqrt(geo_completeness_fraction).
      metric_kind 'similarity' chosen as nearest fit for "geographic diversity
      / completeness fraction"; no exact enum exists.

ground_truth_sources:
  - kind: hardware_probe
    description: >-
      Validator actively probes each sampled worker: tests its WireGuard tunnel
      and SOCKS5 proxy by checking the observed egress IP matches the claimed
      worker IP (mismatch => status 'cheat'), and times the round trip.
    source_identifier: "validate_and_annotate_workers (score_workers.js)"
    trust_model: adversarial
    notes: >-
      Egress IP mismatch is explicitly flagged as 'cheat'; outdated node
      versions and pool-membership mismatches cause failure.
  - kind: other
    kind_other: ip_geolocation_database
    description: >-
      Worker country_code is resolved via IP geolocation (IP2Location LITE and
      MaxMind, configured via IP2LOCATION_DOWNLOAD_TOKEN and a MaxMind license
      key) to compute geographic completeness.
    source_identifier: "ip_geodata (geolocation/helpers.js); README setup"
    trust_model: oracle
    notes: >-
      External geolocation providers; used for geo_score country attribution.

aggregation:
  method: proportional
  composition: multiplicative
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 0.8
    dynamic: false
    notes: >-
      BURN_WEIGHT = 0.8 assigned to BURN_UID = 0 inside
      process_weights_for_netuid; remaining 0.2 distributed across pools.
  notes: >-
    Per-pool composite: score = size_score * performance_fraction *
    sqrt(geo_completeness_fraction) * stability_fraction (multiplicative).
    The validator neuron then L1-normalises the EMA scores
    (raw_weights = self.scores / ||scores||_1) and emits via
    process_weights_for_netuid, which removes UID 0, scales the normalised
    weights by (1 - 0.8) and appends burn_weight 0.8 to UID 0.

weight_setting:
  cadence: per_epoch
  method: >-
    EMA scores are L1-normalised, processed through process_weights_for_netuid
    (burn carve-out + max-weight normalisation), converted to uint16 and set on
    chain. Retried up to 20 times on failure.
  on_chain_call: set_weights
  tempo_or_interval: "360 blocks"   # neuron.epoch_length default
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores: self.scores = alpha * scattered_rewards + (1 - alpha) *
      self.scores, with alpha = config.neuron.moving_average_alpha (default 0.1).

anti_gaming:
  - kind: liveness_check
    enforcement: penalty
    description: >-
      Each sampled worker must pass an active WireGuard + SOCKS5 connectivity
      test; failures mark the worker 'down', lowering stability_fraction and
      size_score.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Egress IP must match claimed worker IP; on egress_ip_mismatch the worker
      is marked 'cheat' (status_from_failure_code). Worker must also broadcast
      the expected mining-pool URL or it fails the membership check.
  - kind: code_inspection
    enforcement: rejection
    description: >-
      score_node_version checks both pools and workers run a current version;
      an outdated version throws and excludes the pool/worker from scoring
      (partnered pools exempt).
  - kind: other
    kind_other: random_sampling
    enforcement: other
    enforcement_other: statistical_sampling
    description: >-
      Workers are randomly subsampled per Cochran's formula
      (cochrane_sample_size, 99% confidence, 5% margin) so a pool cannot game by
      showing only its best workers.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum]
  status_values: [up, down, cheat]
  reset_policy: >-
    On hotkey replacement at a UID the validator zeroes that UID's score
    (resync_metagraph). Worker-level status (up/down/cheat) is annotated per
    validation run.
  notes: >-
    Validator keeps a per-UID EMA score (self.scores) persisted to state.npz.
    Worker test_result.status takes up | down | cheat.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "federated-container/SPECIFICATION.md"
    - "federated-container/modules/scoring/score_mining_pools.js"
  completeness: medium

