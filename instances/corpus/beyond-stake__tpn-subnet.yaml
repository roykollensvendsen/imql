    - claim_field: "/scoring_signals/0/notes"
      source_path: "federated-container/modules/scoring/score_mining_pools.js"
      line_ref: "258"
      quote: "const size_score = workers.length * stability_fraction"
    - claim_field: "/scoring_signals/1/notes"
      source_path: "federated-container/modules/scoring/score_mining_pools.js"
      line_ref: "253-255"
      quote: >-
        let stability_fraction = 0 ... stability_fraction = successes.length /
        selected_workers.length ... const stability_score = stability_fraction *
        100
    - claim_field: "/scoring_signals/2/notes"
      source_path: "federated-container/modules/scoring/score_mining_pools.js"
      line_ref: "283-285"
      quote: >-
        const s_considered_good = 20 ; const performance_score = Math.min( 100 /
        ( median_test_length_s / s_considered_good ), 100 ) ; const
        performance_fraction = performance_score / 100
    - claim_field: "/scoring_signals/3/notes"
      source_path: "federated-container/modules/scoring/score_mining_pools.js"
      line_ref: "291-293"
      quote: >-
        const geo_completeness_fraction = round_number_to_decimals(
        countries_in_pool.length / total_countries, 4 ) ; const geo_score =
