schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Live king-of-the-hill emission. Per service.py the default
  MULTI_KING_PAYOUT_ENABLED=1 splits emission equally across up to 5 most-recent
  distinct kings; with that env unset it falls back to strict winner-take-all
  (king=1.0). No documented burn allocation.

subnet:
  name: "Distil — SN97 (GLM-5 / Kimi-K2.6 distillation)"
  owner_repo: "unarbos__distil"
  netuid: 97
  implementation_lang: python

task:
  summary: >-
    Miners distill the teacher model (moonshotai/Kimi-K2.6, ~1T total / ~32B
    active MoE) into a smaller student (<=33B total params, Kimi-family
    DeepseekV3 architecture, vocab 163,840), upload it to HuggingFace, and
    commit the repo link on-chain (one permanent commitment per hotkey).
    Validators score every committed model on a multi-axis composite
    (composite.final = alpha*worst_K_mean + (1-alpha)*weighted) anchored on
    procedurally-generated v31 axes plus distillation/judge/discipline tiers,
    crown the highest composite.final as "king", and set on-chain weights to
    that king (winner-take-all, optionally split across recent kings).
  submission_format: [model_weights, commitment_hash]

scoring_signals:
  - name: composite_final
    metric_kind: composite
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Ranking key. composite.final = COMPOSITE_FINAL_BOTTOM_WEIGHT*worst_K_mean
      + (1-COMPOSITE_FINAL_BOTTOM_WEIGHT)*weighted. Code default alpha=0.85,
      K (WORST_3_MEAN_K) default 3; README states live values alpha=0.85, K=5
      (env-overridden).
  - name: worst_K_mean
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Mean of the bottom-K non-broken per-axis values (K default 3). Anti-Goodhart
      pressure; dominates final via alpha=0.85. Surfaced as worst_3_mean in API.
  - name: weighted
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Convex combination Sum(w_i*axis_i)/Sum(w_i) over AXIS_WEIGHTS and tier
      weights. Each axis normalized to [0,1].
  - name: kl_divergence
    metric_kind: loss
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      One distillation axis (top-20 sparse KL vs teacher); KL > maxKlThreshold
      (2.0) disqualifies. KL alone never crowns; reward=exp(-kl) only in the
      legacy distillation/validator/reward.py path.
  - name: on_policy_rkl
    metric_kind: loss
    direction: lower_is_better
    weight: null
    normalization: none
    notes: "Distillation tier axis, AXIS_WEIGHTS weight 0.30 (highest single axis weight)."
  - name: judge_probe
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: "Quality tier; AXIS_WEIGHTS judge_probe 0.20 per README."

ground_truth_sources:
  - kind: reference_model
    description: >-
      Teacher model moonshotai/Kimi-K2.6 (multimodal wrapper, DeepSeek-V3 MoE
      inner). Teacher logprobs/continuations are the distillation target; top-20
      sparse logprobs returned per position.
    source_identifier: "moonshotai/Kimi-K2.6"
    trust_model: trusted
    notes: "subnet-config.json teacher.model; vocabSize 163840, served via OpenRouter per README."
  - kind: deterministic_dataset
    description: >-
      Block-hash-seeded prompts drawn from ClimbMix-400B and 11 procedurally
      generated v31 axes (math/code/reasoning/long-context/knowledge/etc.);
      every item regenerated per round from the on-chain block seed.
    source_identifier: "karpathy/climbmix-400b-shuffle"
    trust_model: trusted
    notes: "evalPromptsH2h 300 / evalPromptsFull 60; no static answer key (anti-Goodhart)."
  - kind: reference_model
    description: >-
      Always-in reference baseline (UID -1, Qwen/Qwen3.5-4B) run every round so
      the asymmetric reference-broken-axes filter can drop axes the base model
      cannot pass.
    source_identifier: "Qwen/Qwen3.5-4B"
    trust_model: trusted
    notes: "subnet-config.json validator.referenceModel / referenceUid=-1."

aggregation:
  method: winner_take_all
  composition: hybrid
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn allocation found in source."
  notes: >-
    King = highest composite.final from state/composite_scores.json. Emission
    weight is winner-take-all (king=1.0) unless MULTI_KING_PAYOUT_ENABLED (default
    1) splits 1.0/N equally across up to RECENT_KINGS_MAX=5 most-recent distinct
    kings. Dethronement requires challenger.final > incumbent.final*(1+margin),
    SINGLE_EVAL_DETHRONE_MARGIN default 0.03 (README states 5% live). Composition
    is hybrid: signals combine additively within the composite but the final
    on-chain allocation is a winner/recent-kings selection, and a per-axis
    quality floor (KL>2.0, axis==0) gates to score 0.

weight_setting:
  cadence: per_epoch
  method: >-
    Each epoch (~10 min / tempo default 360s) the validator computes the
    composite for newly-evaluated commitments (single-eval per commitment, king
    re-evaluated every round), selects the king, builds the emission-weight
    vector (winner-take-all or recent-kings split), and calls set_weights
    on-chain immediately.
  on_chain_call: set_weights
  tempo_or_interval: "360"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      eval/scoring.py docstring: "No EMA — models are permanently committed,
      scores converge naturally". README step 8: "Raw scores, no EMA smoothing".
      The legacy distillation/base/validator.py update_scores path does apply an
      EMA (moving_average_alpha default 0.1) but is not the operative v31.2 path.

anti_gaming:
  - kind: deduplication
    enforcement: rejection
    description: >-
      SHA256 hash of safetensors weights; identical weights to an existing model
      are blacklisted (COPY DQ) for that commitment. Earlier commitment by block
      number owns the hash.
  - kind: plagiarism_detection
    enforcement: rejection
    description: >-
      Logit/activation fingerprinting: models with cosine similarity > 0.99999
      (activationCopyThreshold) on per-position vectors over the first 2 prompts
      are flagged as functional copies even when hashes differ.
  - kind: data_augmentation
    enforcement: barrier
    description: >-
      Block-hash-seeded procedural v31 axes (no static answer key), Isomorphic
      Perturbation Testing (name rotation in v31_consistency_paraphrase), and
      GSM-NoOp topical-distractor injection (v31_math_robustness) defeat memorised
      canonical wordings.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Architecture/integrity precheck (no GPU): <=33B total params (MoE-aware
      counting), Kimi tokenizer vocab 163840, no quantization (GPTQ/AWQ/FP8
      rejected), model must stay public and unchanged on HuggingFace
      (revision-pinned git-SHA integrity); failure = INVALID/REMOVED DQ.
  - kind: liveness_check
    enforcement: penalty
    description: >-
      Per-UID failure counts (failures.json); is_stale at max_failures default 3.
      thinking_collapse_probe / reasoning_density axis penalise models that loop
      without answering.

sub_competitions:
  structure: tournament
  stages:
    - name: precheck
      role: qualifier
      advancement_rule: >-
        No-GPU architecture/integrity/duplicate checks every epoch; models that
        fail are never sent to GPU.
    - name: per_uid_composite_eval
      role: main
      advancement_rule: >-
        Single-eval per commitment (FIFO by commit_block, capped at
        SINGLE_EVAL_MAX_PER_ROUND default 10) plus always-in reference baseline;
        compute composite.final.
    - name: king_dethronement
      role: boss
      advancement_rule: >-
        King = max composite.final; challenger dethrones only if
        challenger.final > incumbent.final*(1+SINGLE_EVAL_DETHRONE_MARGIN)
        (default 0.03; README 5%). King re-evaluated every round for paired
        fairness.
  count: null
  notes: "King-of-the-hill architecture."

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum, cooldown]
  status_values: [COPY, REMOVED, INVALID]
  reset_policy: >-
    DQ is per-hotkey (since 2026-05-04): once a hotkey is DQ'd a new on-chain
    commit on the same hotkey does not clear it; the miner must register a new
    hotkey. Failure counts reset on a successful eval (reset_failures) or model
    update. README also describes per-commit DQ keyed hotkey:commit_block.
  notes: >-
    State persisted to ./state/ (scores.json, disqualified.json, failures.json,
    composite_scores.json, score_history.json, recent_kings). recent_kings queue
    (max 5) drives multi-king emission split.

