schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Operative scoring runs through coding/finetune (SWE-Bench competition). The
  template files coding/validator/reward.py and coding/rewards/reward.py contain
  dummy "response == query*2" logic and are NOT the live mechanism. Live weights
  come from update_scores() (top-10 finetune trackers) and set_weights()
  (winner-take-all on top 10 with score_spreading). No explicit emission burn
  found in source.

subnet:
  name: "SWE-Rizzo (Gen42 / Code)"
  owner_repo: "brokespace__code"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners develop SWE (software engineering) pipelines / "logic" — Python code that
    takes a repository and a GitHub issue and returns a patch. The logic is served
    by the miner over a LogicSynapse, transferred into a Docker container with the
    target repo + issue, executed, and the resulting patch is evaluated by the
    SWE-Bench harness (resolved tests pass/fail). Score is the average resolution
    rate across SWE-Bench tasks, adjusted down by LLM API cost.
  submission_format: [source_code]

scoring_signals:
  - name: swebench_resolution
    metric_kind: accuracy
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Per-task binary: SWEBenchTask.score returns 1 if the SWE-Bench eval report
      marks the instance "resolved", else 0 (score_patch). A patch that touches a
      test file scores 0. tracker.raw_score = mean of per-task scores.
  - name: llm_cost_penalty
    metric_kind: other
    metric_kind_other: api_cost_penalty
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      adjust_score_by_cost: if avg LLM cost per task <= ideal_cost (0.5) no penalty;
      otherwise penalty_factor = 1.0 - min(0.9, (llm_cost - 0.5)/0.5) multiplies the
      raw score. Multiplicative gate, not an additive signal.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      SWE-Bench tasks generated from SWEFullDataset; each task runs the SWE-Bench
      eval harness (make_test_spec / get_eval_report) inside a per-instance Docker
      image to determine whether the miner's patch resolves the issue.
    source_identifier: "SWEFullDataset / swebench harness; coding/datasets/swefull.py"
    trust_model: trusted
    notes: >-
      Tasks rotate: every ~1.5 days (10800 blocks) 50 of 100 tasks are replaced
      (FinetunePipeline.update_tasks).

aggregation:
  method: winner_take_all
  composition: gated
  normalization: sum_to_one
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No emission-burn allocation found in source. Blacklisted coldkeys are zeroed
      (set_weights), and all-but-top-10 scores are set to 0, but emissions are not
      routed to a burn UID in the read code.
  notes: >-
    update_scores selects trackers from the latest competition: top 10 by score
    (rest 0); if more than 10 tie at max_score, distribute across distinct-logic
    groups. Scores within max_score-0.17 are kept, all below threshold set to 0
    (finetune_scores[finetune_scores < threshold] = 0). set_weights then normalizes
    self.scores to sum to 1 (np.divide by sum), applies score_spreading, and keeps
    only the top-10 uids (all others zeroed) before process_weights_for_netuid.

weight_setting:
  cadence: continuous
  method: >-
    Validator run loop calls forward() each step (with a 5-min sleep), then sync()
    which may call set_weights(). set_weights normalizes self.scores to sum-to-one,
    passes through score_spreading(scores, divisions, 0.002, 0.0025,
    kurtosis_factor=0.5, divisions=randint(2,9)), zeroes all but top-10 uids, then
    process_weights_for_netuid + convert_weights_and_uids_for_emit.
  on_chain_call: set_weights
  tempo_or_interval: null
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      update_scores docstring says "exponential moving average" but the
      implementation overwrites self.scores = finetune_scores each cycle (no EMA
      alpha blend); prior scores are reused only via stored tracker state. No EMA
      alpha constant present in source.

anti_gaming:
  - kind: code_inspection
    enforcement: rejection
    description: >-
      Miner logic runs in a sandboxed Docker container restricted to an import
      allowlist (ALLOWED_MODULES, ALLOWED_IMPORTS), a disallowed list
      (DISALLOWED_IMPORTS = ["zlib"]) and a character cap
      (NUM_ALLOWED_CHARACTERS = 1000000). Invalid models/logic get score 0.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Patches that touch any file with "test" in its name score 0
      (SWEBenchTask.score) — prevents miners from editing the test suite to pass.
  - kind: deduplication
    enforcement: penalty
    description: >-
      logic_similar dedup: trackers whose logic matches an already-graded logic
      reuse the previous score rather than being re-evaluated; in update_scores,
      when >10 trackers tie at max_score, duplicates of the same logic are grouped
      and only a subset get max_score, the rest get score - 0.01.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      BLACKLISTED_COLDKEYS (one hard-coded coldkey "blacklisted for repeatedly
      exploiting") are excluded from logic gathering and have their scores set to 0
      in set_weights.
  - kind: rate_limit
    enforcement: rejection
    description: >-
      should_evaluate: a tracker is skipped if it already has >=6 evaluations in
      the last 7 days (blocks_in_7_days = 7*24*60*60//12), limiting re-grading
      frequency.

sub_competitions:
  structure: single
  stages: []
  count: 1
  notes: >-
    Single SWE-Bench competition keyed by COMPETITION_ID = 7 (constants.py), with
    a COMPETITION_END_DATE = "2025-01-29". Trackers/tasks are namespaced per
    competition id.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger, status_enum]
  status_values: ["valid", "invalid", "scoring_in_progress", "scoring_in_queue"]
  reset_policy: >-
    Tracker state persisted in trackers_{COMPETITION_ID}.pkl and validator
    state.npz (scores, finetune_results). Models/trackers cleared every
    14400*3 blocks (~5 days) in forward(); score=0 forces re-evaluation. On hotkey
    replacement (resync_metagraph) the uid's score is zeroed.
  notes: >-
    TrackingInfo carries hotkey, uid, logic, score, raw_score, avg_cost,
    score_timestamps, block. ModelStore tracks per-logic validity and scoring
    status flags.

documentation:
  status: docs_and_code
  source_version: "COMPETITION_ID 7; IMAGE_VERSION 2.0; COMPETITION_END_DATE 2025-01-29"
  primary_docs:
    - "README.md"
    - "docs/validators/swe.md"
    - "docs/validators/quickstart.md"
  completeness: medium

