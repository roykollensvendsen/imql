schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Validator (babelbit/cli/validate.py) fetches per-miner scores from the
  Babelbit-operated submit API and splits emissions between a Qualifying
  (main) tier paid proportionally to scores and a winner-take-all Arena tier.
  Default split is 80% arena / 20% main (BB_ARENA_INCENTIVE_PERCENT=80.0).
  When no scores are available the validator reuses last weights and, after
  BB_MAX_SKIPPED_WEIGHT_EPOCHS rounds, falls back to a single default/burn UID
  (BB_DEFAULT_FALLBACK_UID=248) — a degenerate-state burn, not a steady-state
  one. The reference scorer (score_dialogue.py) lives in-repo but the
  authoritative scoring is performed by Babelbit-operated services and only
  the resulting scores are consumed here.

subnet:
  name: "Babelbit"
  owner_repo: "babelbit__babelbit_subnet"
  netuid: 59
  implementation_lang: python

task:
  summary: >-
    Miners run low-latency predictive-translation models that predict the
    completion of an utterance step-by-step as it is revealed. Each prediction
    is scored against the revealed ground-truth utterance by a blend of
    lexical (edit-distance) and calibrated semantic (sentence-embedding cosine)
    similarity, multiplied by an earliness factor that rewards getting the
    meaning right before the utterance is finished. The dialogue score is the
    mean over utterances of the best earliness-weighted similarity achieved.
    Miners compete in a 20% Qualifying tier (paid proportionally) and an 80%
    winner-take-all Arena tier.
  submission_format: [api_response, model_weights]
  # miners expose a POST /predict endpoint (api_response) and also submit a
  # Docker image + Hugging Face model repo (model_weights) for managed flows.

scoring_signals:
  - name: semantic_similarity
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: min_max
    notes: >-
      Calibrated semantic similarity s = clamp01((cos_raw - b)/(1 - b)) where
      cos_raw is the cosine between normalized prediction and ground-truth
      embeddings (mxbai-embed-large-v1 truncated to EMBED_DIM) and b is a
      baseline cosine estimated from random GT pairs. Combined with lexical via
      weight (1 - lex_weight); not an independent additive weight, hence null.
  - name: lexical_similarity
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: min_max
    notes: >-
      Character-level similarity 1 - edit_distance/max(len). Combined with
      semantic via lex_weight (CLI default 0.5; score_jsonl default 0.0).
      U_step = (lex*lex_weight + sem*(1-lex_weight)) * earliness.
  - name: earliness
    metric_kind: latency
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      earliness_s = 1.0/(s+1) for step index s; multiplicative gate on the
      similarity blend so earlier correct predictions score higher. Per-utterance
      score is the max U_step over steps; dialogue score is the mean of those.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Revealed ground-truth utterance text for each utterance/step, emitted as
      'revealed' / 'utterance_complete' events in the dialogue JSONL log; the
      last 'complete' event's 'ground_truth' field (EOF-stripped) is the target.
    source_identifier: "dialogue_run_*.jsonl ('ground_truth' field)"
    trust_model: trusted
    notes: >-
      Challenges are served by the Babelbit utterance engine
      (BB_UTTERANCE_ENGINE_URL, default https://api.babelbit.ai).
  - kind: reference_model
    description: >-
      Sentence-transformer embedding model used to compute semantic cosine
      similarity for scoring.
    source_identifier: "mixedbread-ai/mxbai-embed-large-v1"
    trust_model: trusted
    notes: "EMBEDDER_NAME default; truncate_dim=EMBED_DIM (default 64)."

aggregation:
  method: proportional
  composition: hybrid
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "248"
    fraction: null
    dynamic: true
    notes: >-
      No steady-state burn fraction. compute_weights routes the main share to
      burn_uid only if there are no positive main scores, and falls back to
      [1.0]->burn_uid when no scores are available after MAX_NO_SCORE_ROUNDS.
      Default burn/fallback UID is BB_DEFAULT_FALLBACK_UID=248.
  notes: >-
    compute_weights: main_fraction = 1 - arena_fraction distributed
    proportionally to positive main scores; arena_fraction assigned entirely to
    the arena winner UID (winner-take-all). Final vector renormalized to sum 1
    (_normalize_weight_vector). arena_fraction default 0.8 (main 0.2).

weight_setting:
  cadence: per_epoch
  method: >-
    Validator loop runs only when block % tempo == 0. It fetches main and arena
    scores from the submit API (/v1/get_scores), picks the max-score hotkey per
    mode, and calls compute_weights to build the (uids, weights) vector, then
    submits via retry_set_weights (signer HTTP /set_weights, falling back to a
    subtensor-gateway set_weights_and_confirm).
  on_chain_call: set_weights
  tempo_or_interval: 100
  smoothing:
    kind: other
    alpha: null
    window: null
    notes: >-
      No EMA/SMA of the reward. The only temporal carry-over is reuse of the
      previous weight vector (last_weights) on rounds where the API returns no
      scores; otherwise weights are recomputed fresh each epoch.

anti_gaming:
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Arena eligibility is gated: a miner must have won at least one qualifying
      challenge in the last 7 days (rolling 7x24h window). There are 7 arena
      slots ordered by number of wins then by score. (README 5.2; eligibility
      computed by Babelbit-operated services, not in this repo.)
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Validator requests to the submit API and miners are Bittensor-signed
      (sign_message / bt_header_* headers); set_weights submissions go through a
      signer service. Miners self-reported as cheating are excluded from the
      qualifying share (README 4).

sub_competitions:
  structure: tiered
  stages:
    - name: "Qualifying (main / round1)"
      role: qualifier
      advancement_rule: "win >=1 qualifying challenge in rolling 7-day window; top 7 by wins then score advance to Arena"
    - name: "Arena (round2)"
      role: final
      advancement_rule: "winner_take_all_per_challenge"
  count: 2
  notes: >-
    Split controlled by BB_ARENA_INCENTIVE_PERCENT (default 80.0). 'round1'
    normalizes to 'main'/'qualifying'; 'round2' to 'arena'.

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cumulative_score]
  status_values: []
  reset_policy: >-
    Arena eligibility uses a rolling 7-day (7x24h) window of qualifying wins;
    validator's no_score_rounds counter resets when the active challenge UID
    changes.
  notes: >-
    Win history and per-miner scores are persisted/aggregated by Babelbit
    services (Postgres-backed) and exposed to the validator via the submit API;
    this repo only reads the resulting scores.

documentation:
  status: docs_and_code
  source_version: "0.1.0"
  primary_docs: ["README.md"]
  completeness: medium

