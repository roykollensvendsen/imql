schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  The UID-0 burn override in set_weights() is commented out (lines 303-309 of
  base_validator.py), so weights are emitted from real competition scores. Rewards
  are distributed to the top-10 miners per competition via SCORE_DISTRIBUTION with
  minimal participation rewards beyond rank 10.

subnet:
  name: "SAFE SCAN (cancer-ai)"
  owner_repo: "safe-scan-ai__cancer-ai"
  netuid: 76
  implementation_lang: python

task:
  summary: >-
    Miners submit ONNX cancer-detection (skin lesion classification) models referenced
    on-chain; validators download each model and evaluate it on a held-out dataset
    pushed to HuggingFace. Models are scored by classification quality (accuracy +
    risk-category-weighted F1) plus a model-size efficiency term. Per competition,
    the top-10 miners (ranked by moving-average score) receive a fixed reward split,
    and the winner is the highest moving-average model.
  submission_format: [model_weights]

scoring_signals:
  - name: prediction_quality
    metric_kind: composite
    direction: higher_is_better
    weight: 0.9
    normalization: none
    notes: >-
      prediction_score = ACCURACY_WEIGHT*accuracy + WEIGHTED_F1_WEIGHT*weighted_f1
      with ACCURACY_WEIGHT=0.5 and WEIGHTED_F1_WEIGHT=0.5; contributes to final score
      with PREDICTION_WEIGHT=0.9. weighted_f1 is computed over risk categories with
      CATEGORY_WEIGHTS HIGH_RISK=3.0, MEDIUM_RISK=2.0, BENIGN=1.0.
  - name: efficiency
    metric_kind: composite
    direction: higher_is_better
    weight: 0.1
    normalization: min_max
    notes: >-
      efficiency_score linearly interpolated from model size in MB: 1.0 at
      MIN_MODEL_SIZE_MB=50, 0.0 at MAX_MODEL_SIZE_MB=150; contributes with
      EFFICIENCY_WEIGHT=0.1. final_score = 0.9*prediction_score + 0.1*efficiency_score.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Held-out labeled skin-lesion image dataset (with age/gender/location metadata)
      released by organizations to HuggingFace and detected by the validator's
      monitor_datasets loop; evaluation is deterministic (rounded metrics, fixed
      preprocessing).
    source_identifier: "HuggingFace dataset repos (data_package.dataset_hf_repo / dataset_hf_filename)"
    trust_model: trusted
    notes: "competition_id e.g. tricorder-3; datasets pushed for evaluation."

aggregation:
  method: rank_based
  composition: weighted_sum
  normalization: none
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      A UID-0 burn block exists in set_weights() but is fully commented out
      (raw_weights[0]=1.0; raw_weights[1:]=0.0), so no burn is applied.
  notes: >-
    Per competition, hotkeys are ranked by average score (descending); top-10 get
    fixed fractions from SCORE_DISTRIBUTION (1st 0.50, 2nd 0.17, 3rd 0.10, 4th 0.07,
    5th 0.05, 6th 0.04, 7th 0.03, 8th 0.02, 9th 0.01, 10th 0.005) scaled by the
    per-competition weight; miners beyond top-10 share BEYOND_TOP_10_TOTAL_SCORE=0.005
    via a linear-rank formula. Competition weights come from a competition_weights.yml
    file on HuggingFace.

weight_setting:
  cadence: per_epoch
  method: >-
    self.scores accumulated across competitions in update_scores(); set_weights()
    L1-normalizes scores (raw_weights = scores/norm), processes via
    process_weights_for_netuid, then calls subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "180 blocks"
  smoothing:
    kind: sma
    alpha: null
    window: 5
    notes: >-
      Per-competition per-hotkey score is a moving average over the last
      MOVING_AVERAGE_LENGTH=5 scores (update_average_score); score history capped at
      HISTORY_LENGTH=10. epoch length default 180 blocks (config neuron.epoch_length).

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Dataset/metadata validation in BaseTricorderCompetitionHandler: if more than
      MAX_INVALID_ENTRIES=2 entries are invalid the competition is cancelled
      (raise ValueError). Metrics rounded to 6 decimals and preprocessing fixed for
      deterministic scoring across hardware.
  - kind: deduplication
    enforcement: penalty
    description: >-
      get_comparable_result builds a sha256 signature over sampled top-class/prob
      predictions to group duplicate model submissions (anti-copy of predictions).

sub_competitions:
  structure: multi_mechanism
  stages: []
  count: null
  notes: >-
    Multiple independent competitions run concurrently, each keyed by competition_id
    (e.g. tricorder-3); per-competition weights are read from competition_weights.yml.
    Reward pool per competition = total miner emission divided by number of
    competitions (per README).

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    Per-hotkey score history kept to last HISTORY_LENGTH=10 entries; dead hotkeys
    (not in metagraph) removed via delete_dead_hotkeys; replaced hotkeys zeroed in
    resync_metagraph.
  notes: >-
    CompetitionResultsStore holds score_map {competition_id:{hotkey:[ModelScore]}},
    average_scores, and current_top_hotkeys; persisted to state.json.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs: ["README.md", "DOCS/COMPETITIONS.md"]
  completeness: medium

