schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: full_burn
mechanism_status_notes: >-
  The documented scoring pipeline (base reward + reasoning f_score bonus + verified-proof /
  rarity / consensus multipliers, EMA over scores) is fully implemented and live, but
  EMISSION_CONTROL_ENABLED=True with EMISSION_CONTROL_RATE=1.0 routes 100% of emission
  weight to EMISSION_CONTROL_TARGET_UID=0 inside emission_control_scores() before weights
  are normalized and set on chain. Net effect at the captured constants: full burn to UID 0.

subnet:
  name: "Bitrecs"
  owner_repo: "bitrecs__bitrecs-subnet"
  netuid: 122
  implementation_lang: python

task:
  summary: >-
    Miners are e-commerce recommenders: given an input SKU, a store catalog, and the
    validator's prompt, a miner returns an array of recommended product SKUs (with name,
    price, reason) drawn from the store catalog. Validators score each response for
    validity and quality (signed/timely response, SKUs in catalog, no dupes/query leakage,
    correct count, latency above r_limit), then award a base reward modulated by an optional
    reasoning f_score bonus, an optional verified-inference proof bonus, a model-rarity
    bonus, and a per-round consensus bonus for the elected miner.
  submission_format: [api_response]

scoring_signals:
  - name: response_validity
    metric_kind: other
    metric_kind_other: deterministic_validity_gate
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      A long sequence of pass/fail gates in reward(); any failure returns score 0.0
      (e.g. Invalid_Validator_Hotkey, Timeout, Invalid_Signature, Invalid_SKU,
      Duplicate_Results, Query_In_Results, Invalid_Num_Results, Invalid_Axon_Time).
  - name: base_reward
    metric_kind: reward
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: "Flat BASE_REWARD = 0.80 awarded once all validity gates pass."
  - name: reasoning_f_score
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      When REASONING_SCORING_ENABLED, f_score (capped at max_f_score) is added to BASE_REWARD
      and the sum multiplied by REASONING_BONUS_MULTIPLIER=1.025. Missing report => BASE_REWARD/4;
      f_score<=0 => BASE_REWARD/2. f_score/rank come from an external ReasoningReport synced
      from the verified-inference server.
  - name: verified_proof_bonus
    metric_kind: other
    metric_kind_other: cryptographic_proof_of_inference
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      If a valid verified_proof is present and verifies (Ed25519 + SKU/hash/TTL checks via
      verify_proof_with_recs), score is multiplied by VERIFIED_BONUS_MULTIPLIER=1.15.
  - name: model_rarity_bonus
    metric_kind: other
    metric_kind_other: model_rarity_multiplier
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      On verified proof, if the model's RarityReport.bonus >= 1.0 the verified multiplier is
      further multiplied by that bonus value (bonus is an external server-supplied float).
  - name: consensus_bonus
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Per round, top responses are sorted and the most-similar top_k examined; if entity and
      model diversity thresholds are met, a winner is chosen via secrets.choice and its reward
      multiplied by CONSENSUS_BONUS_MULTIPLIER=1.05 (single elected miner per request).

ground_truth_sources:
  - kind: other
    kind_other: validator_constructed_query_plus_catalog
    description: >-
      The validator supplies the ground-truth BitrecsRequest (query SKU, num_results, and the
      store catalog parsed from context) against which each miner response is validated.
    source_identifier: "ground_truth: BitrecsRequest"
    trust_model: trusted
    notes: "Catalog SKUs (CatalogValidator) are the authority for valid recommendations."
  - kind: other
    kind_other: external_reasoning_and_rarity_server
    description: >-
      ReasoningReport (f_score, rank) and RarityReport (rarity, tier, bonus) are fetched from
      the Bitrecs verified-inference server (VERIFIED_INFERENCE_URL).
    source_identifier: "https://verified.bitrecs.ai"
    trust_model: oracle
    notes: "Off-chain server supplies the bonus multipliers and reasoning f_scores."

aggregation:
  method: weighted_average
  composition: multiplicative
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 1.0
    dynamic: false
    notes: >-
      emission_control_scores(target_uid=0) sets new_target_score = EMISSION_CONTROL_RATE *
      total_score with EMISSION_CONTROL_RATE=1.0, giving UID 0 all weight and scaling every
      other UID's residual to (1-1.0)=0. Applied in set_weights when EMISSION_CONTROL_ENABLED.
  notes: >-
    Per-response score is built multiplicatively (base reward * reasoning/verified/rarity/
    consensus multipliers), optionally scaled by a difficulty_decay in [0.9,1.0] when
    DIFFICULTY_SCORING_ENABLED (currently False). Scores are EMA-accumulated per UID, then in
    set_weights emission control is applied and the score vector is L1-normalized into raw_weights.

weight_setting:
  cadence: per_epoch
  method: >-
    set_weights() applies emission control, computes L1 norm of the per-UID EMA score vector
    to get raw_weights, runs process_weights_for_netuid + convert_weights_and_uids_for_emit,
    and calls subtensor.set_weights with version_key=spec_version. Triggered when
    (block - last_update[uid]) > neuron.epoch_length (should_set_weights), plus a backup
    weights_sync every BACKUP_WEIGHT_SYNC_INTERVAL=7200s.
  on_chain_call: set_weights
  tempo_or_interval: "epoch_length blocks (default 100); EPOCH_TEMPO=360"
  smoothing:
    kind: ema
    alpha: 0.2
    window: null
    notes: >-
      update_scores uses default_alpha = neuron.moving_average_alpha (default 0.2):
      score = alpha*reward + (1-alpha)*score for non-zero rewards; for zero rewards a gentle
      decay (1-low_alpha)*score with low_alpha = default_alpha/2 = 0.1.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      reward() enforces signature validity, validator/miner hotkey match, response success,
      timestamp freshness (verify_time, PERMITTED_CLOCK_DIFF_SECONDS=300), exactly one model,
      correct rec count, empty context, schema validity, SKUs in catalog, no duplicate SKUs,
      and that the query SKU is not echoed in results. Any failure => 0.0 reward.
  - kind: liveness_check
    enforcement: rejection
    description: >-
      Axon and dendrite process_time must each be >= r_limit (default 1.0s); too-fast
      responses are rejected (Invalid_Axon_Time / Invalid_Dendrite_Time).
  - kind: other
    kind_other: ip_entity_throttling
    enforcement: penalty
    description: >-
      get_rewards counts responses per axon IP; if max IP share >= BATCH_ENTITY_THRESHOLD=0.20
      those IPs are flagged as entities. When REWARD_ENTITIES is False they get 0 reward
      (Entity_No_Reward). REWARD_ENTITIES is currently True so the zeroing is disabled.
  - kind: other
    kind_other: suspect_miner_decay
    enforcement: penalty
    description: >-
      decay_suspects multiplies each suspect miner's score by SUSPECT_MINER_DECAY=0.980 each
      update when that uid was not in the current batch.
  - kind: commit_reveal
    enforcement: rejection
    description: >-
      Verified inference proofs are Ed25519-signed and bound to a response hash and TTL;
      verify_proof_with_recs rejects expired/mismatched/invalid-signature proofs.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: >-
    Optional reasoning, verified-inference, and difficulty subsystems are feature-flagged in
    constants (REASONING_SCORING_ENABLED=True, DIFFICULTY_SCORING_ENABLED=False,
    CONVERSION_SCORING_ENABLED=False) but are bonuses within one mechanism, not separate
    competitions.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum]
  status_values: ["suspect_miner"]
  reset_policy: >-
    On hotkey replacement (resync_metagraph) the UID's EMA score is zeroed; metagraph growth
    extends the score array with zeros. No explicit clearing of suspect_miners shown.
  notes: >-
    self.scores is a per-UID EMA vector persisted to state.npz. suspect_miners is a tracked
    set whose members are decayed by SUSPECT_MINER_DECAY when not queried in a batch.

