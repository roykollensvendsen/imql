schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Live scoring is implemented and wired into weight-setting: update_total_scores combines a
  train.score (OpenSkill-rated loss improvement) and an all_reduce.score, normalises, and feeds
  total.score into update_scores -> set_weights. No burn allocation or weight-copying short-circuit
  found in the source.

subnet:
  name: "Distributed Training Subnet"
  owner_repo: "KMFODA__DistributedTraining"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners collaboratively pre-train a shared LLM (default global_model_name "llama-4b-ws-4"): each
    miner runs inner training steps and uploads a pseudo-gradient (gradients.pt) to a Cloudflare R2
    bucket. Validators score a miner by applying that miner's pseudo-gradient to the shared model and
    measuring the loss improvement on random unseen data and on the miner's assigned data, plus whether
    the miner participated successfully in the periodic all-reduce round.
  submission_format: [model_weights]
  # miners submit pseudo-gradient tensors (gradients.pt) for the shared model; closest schema enum is model_weights

scoring_signals:
  - name: train_random_loss_improvement
    metric_kind: loss
    direction: higher_is_better
    weight: 0.75
    normalization: rank
    notes: >-
      Relative loss improvement (before-after)/before from applying the miner's pseudo-gradient on a
      random unseen evaluation block, fed into an OpenSkill PlackettLuce rating; train.random.score is
      the OpenSkill ordinal. Part of train.score which carries TRAIN_SCORE_WEIGHT = 0.75 in
      update_total_scores. weight reflects TRAIN_SCORE_WEIGHT (combined train signal).
  - name: train_assigned_loss_gate
    metric_kind: loss
    direction: higher_is_better
    weight: null
    normalization: ema
    notes: >-
      Binary indicator (assigned.absolute > random.absolute) smoothed by an EMA with
      assigned_loss_score_moving_average_alpha = 0.05. train.score = max(0, random.score *
      assigned.score), so this acts multiplicatively (gate) rather than additively -> weight null.
  - name: all_reduce_participation
    metric_kind: uptime
    direction: higher_is_better
    weight: 0.25
    normalization: rank
    notes: >-
      all_reduce.score = 1 if the miner's allreduce_status_dict entry is SUCCESS or NON_PARTICIPATING,
      else 0. Carries ALL_REDUCE_SCORE_WEIGHT = 0.25 in update_total_scores. normalization rank is the
      closest enum to the L1-norm normalisation applied across all miners.
  - name: repo_validity
    metric_kind: uptime
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      train.is_valid (score_repo) checks that the miner's R2 gradients.pt manifest exists and its age
      is below max_upload_interval (MAX_UPLOAD_INTERVAL = 4800 s). total.score is multiplied by
      repo_valid_score, so it is a 0/1 gate -> weight null.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Evaluation data fetched via DatasetLoader.next_pages over fineweb-style pages, seeded by block /
      uid; loss is computed by the shared model with labels=inputs (next-token LM loss).
    source_identifier: "DatasetLoader (distributed_training/data/dataset.py)"
    trust_model: trusted
    notes: >-
      Both 'random' unseen blocks and the miner's 'assigned' blocks are drawn deterministically from
      the dataset/block seeds; the shared global model provides the reference loss.

aggregation:
  method: weighted_average
  composition: hybrid
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn allocation found in reward.py or set_weights."
  notes: >-
    update_total_scores: normalized_train_score = (0.75 * train.score)/L1(train_scores),
    normalized_all_reduce_score = (0.25 * all_reduce.score)/L1(all_reduce_scores), and
    total.score = (normalized_train_score + normalized_all_reduce_score) * repo_valid_score. Hybrid:
    train and all_reduce combine additively (weighted), while repo_valid acts as a multiplicative gate
    and the assigned-loss signal gates train.score.

weight_setting:
  cadence: per_epoch
  method: >-
    set_weights normalises self.scores by its L1 norm to raw_weights, runs process_weights_for_netuid
    (quantile exclusion + normalize_max_weight), converts to uint16 and calls subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "epoch_length (default 160 blocks)"
  smoothing:
    kind: ema
    alpha: 0.6
    window: null
    notes: >-
      update_scores applies self.scores = alpha*scattered_rewards + (1-alpha)*self.scores with
      alpha = moving_average_alpha (default 0.6) on total.score before weights are set.

anti_gaming:
  - kind: liveness_check
    enforcement: penalty
    description: >-
      score_repo / benchmark_uids require a recent R2 gradients.pt manifest (age < MAX_UPLOAD_INTERVAL
      = 4800 s); stale or missing manifest sets train.is_valid False, zeroing total.score.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      score_uids resets a UID's train.random/train.assigned scores to 0 (reset_uid_train_scores) on any
      evaluation error, on a revision with 0 inner steps, or if the score_status all-reduce across
      ranks does not equal world_size.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      vpermit_tao_limit (default 40960) caps the TAO a vpermit validator may be queried with;
      failed_is_alive_counter above threshold zeroes a UID's score in update_scores.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [reputation, cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    UidTracker reset on hotkey replacement / metagraph growth (resync_metagraph); per-round train
    scores reset to 0 on evaluation failure (reset_uid_train_scores).
  notes: >-
    Per-UID UidTracker holds train (random/assigned scores, openskill_rating mu/sigma, is_valid,
    revision), all_reduce (score, count) and total.score. OpenSkill PlackettLuce ratings
    (beta=7, tau=0.1) persist per UID across rounds.

documentation:
  status: code_authoritative
  source_version: null
  primary_docs: ["README.md"]
  completeness: low

