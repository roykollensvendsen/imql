schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: full_burn
mechanism_status_notes: >-
  The validator does not score miners at all. It forces 100% of weight onto a single
  hardcoded treasury hotkey every epoch, directing all miner emissions to the Treasury
  Wallet. Miner code is explicitly deprecated. There is no per-miner scoring/reward path.

subnet:
  name: "Enigma"
  owner_repo: "qbittensor-labs__enigma"
  netuid: 63
  implementation_lang: python

task:
  summary: >-
    Enigma is a decentralized challenge platform: participants compete to break cryptographic
    systems, AI safeguards, and post-quantum protocols, submitting verified exploit solutions
    (code + exploits) for funded prize pools. However, the on-chain incentive code rewards no
    miners: the validator is a "constant-weight" validator that always assigns 100% weight to a
    single treasury hotkey, and miner code is deprecated. Challenge prizes and rewards are paid
    off-chain/via treasury governance (validator proposals and votes), not via subnet scoring.
  submission_format: [source_code]

scoring_signals: []

ground_truth_sources: []

aggregation:
  method: winner_take_all
  composition: other
  composition_other: >-
    No per-miner aggregation. Scores vector is zeroed and a single entry (the treasury UID) is
    set to 1.0, then L1-normalized to weights.
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "5DCLafsAKaLeZwm9hjMHvrQNjtucSwBhKyTLYnYmMvhxF2Uc"
    fraction: 1.0
    dynamic: false
    notes: >-
      100% of weight is forced onto the treasury hotkey UID. All miner emissions are directed
      to the Treasury Wallet, which accumulates SN63 Alpha tokens.
  notes: >-
    self.scores = np.zeros(metagraph.n); self.scores[uid] = 1.0 where uid is the treasury hotkey
    index. Base set_weights then L1-normalizes (norm = ||scores||_1) so the single non-zero entry
    becomes weight 1.0.

weight_setting:
  cadence: per_epoch
  method: >-
    Constant-weight validator: every epoch it locates the treasury hotkey in the metagraph,
    zeros the score vector, sets that single UID to 1.0, and calls the base set_weights. If the
    treasury hotkey is None (passive mode) or not yet in the metagraph, no weights are set.
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks (epoch_length default; 12s blocks)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      The base update_scores EMA (moving_average_alpha default 0.1) exists in the inherited code
      but is unused: the constant-weight validator overrides set_weights to overwrite self.scores
      directly each epoch rather than accumulating an EMA over rewards.

anti_gaming: []

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: >-
    Documentation describes multiple challenges (Treasury Wallet, Q-Day cryptography, AI security)
    but these are off-chain prize challenges, not encoded sub-competitions in the incentive code.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    The validator persists step/scores/hotkeys to state.npz, but scores are overwritten to a fixed
    one-hot treasury vector each epoch, so no meaningful per-miner state is maintained.

