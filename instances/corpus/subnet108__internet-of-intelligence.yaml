schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  The live validator scores miners on GPU hardware inventory and container uptime
  (a proof-of-resources mechanism) in evaluate_miners.get_rewards, normalizes to
  sum=1, and EMAs into on-chain weights. The README markets an aspirational "AI
  Agent Launchpad / TAOPump" economy with agent tokens, creators and users, but
  none of that scoring is present in code — only hardware/uptime scoring is
  implemented. No burn UID is present.

subnet:
  name: "SN108 Internet of Intelligence (Agent Launchpad)"
  owner_repo: "subnet108__internet-of-intelligence"
  netuid: 108
  implementation_lang: python

task:
  summary: >-
    A miner runs a server (queried at the config endpoint) that reports its GPU
    inventory and the uptime/status of its running containers ("pods"). The
    validator queries a random sample of miners, verifies the reported identity
    (ip/port/coldkey/hotkey/nonce/signature/timestamp), then scores each miner on
    (a) its share of total GPUs, (b) its share of total container uptime, and (c)
    a bonus for long-running containers, all multiplied by a GPU-model rarity
    weight. There is no AI/agent task being evaluated in code; reward is hardware
    capacity and liveness.
  submission_format: [compute_service, api_response]

scoring_signals:
  - name: gpu_count_share
    metric_kind: hardware_spec
    direction: higher_is_better
    weight: 0.5
    normalization: min_max
    notes: >-
      score_a = len(r["gpu"]) / total_gpus across all valid responses; weighted by
      GPU_CORES_SCORE = 0.5.
  - name: container_uptime_share
    metric_kind: uptime
    direction: higher_is_better
    weight: 0.3
    normalization: min_max
    notes: >-
      score_b = sum of uptimes of containers with status==1, divided by total
      uptime across all valid responses; weighted by POD_RUN_TIME_SCORE = 0.3.
  - name: long_running_bonus
    metric_kind: uptime
    direction: higher_is_better
    weight: 0.1
    normalization: none
    notes: >-
      score_c = 1/total_long_run if a miner's average container uptime exceeds
      POD_RUN_TIME_AVG_DAY (604800s = 7 days); weighted by POD_RUN_TIME_AVG_SCORE
      = 0.1.
  - name: gpu_model_rarity_multiplier
    metric_kind: hardware_spec
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      gpu_weight = sum of GPU_MODEL_RATES per GPU model; applied as a
      multiplicative (1 + gpu_weight) factor on the additive score, not an
      additive term. Rates literal in const.py (e.g. H100 80GB HBM3 = .10).

ground_truth_sources:
  - kind: hardware_probe
    description: >-
      Self-reported GPU inventory and container uptime returned by the miner's
      local server, attested with an Ed25519/RSA-style signature verified against
      a baked-in public.key plus identity checks (ip/port/coldkey/hotkey, nonce,
      timestamp freshness within 10s).
    source_identifier: "neurons/validator/src/config/public.key"
    trust_model: adversarial
    notes: >-
      Values are self-reported by miners; validator only verifies signature and
      identity fields, not the actual presence of the hardware.

aggregation:
  method: proportional
  composition: multiplicative
  normalization: sum_to_one
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn UID or burn fraction present in code."
  notes: >-
    total_score = (0.5*score_a + 0.3*score_b + 0.1*score_c) * (1 + gpu_weight);
    then scores_result = scores_result / total_sum so the vector sums to 1.

weight_setting:
  cadence: per_epoch
  method: >-
    update_scores EMAs the per-step normalized rewards into self.scores
    (alpha*new + (1-alpha)*old); set_weights L1-normalizes self.scores, runs
    process_weights_for_netuid (quantile/max-weight-limit clamp), converts to
    uint16 and calls subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks (neuron.epoch_length default)"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      moving_average_alpha default 0.1 in add_validator_args; applied in
      update_scores as alpha*scattered_rewards + (1-alpha)*self.scores.

anti_gaming:
  - kind: liveness_check
    enforcement: rejection
    description: >-
      Responses are dropped (scored 0) unless status is true and the reported
      ip/port/coldkey/hotkey match the metagraph axon, nonce matches, signature
      verifies against public.key, and timestamp is within 10000 ms of now.
  - kind: deduplication
    enforcement: rejection
    description: >-
      If more than one active axon shares the same IP (active_ip_count[ip] > 1),
      that miner's response is invalidated (set to None / score 0).
  - kind: hardware_validation
    enforcement: barrier
    description: >-
      GPU_MODEL_RATES whitelists rewarded GPU models; unknown models contribute 0
      to gpu_weight. Only containers with status==1 count toward uptime.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    On resync_metagraph, scores[uid] is zeroed when a hotkey is replaced; scores
    persisted to state.npz and reloaded on start.
  notes: >-
    self.scores is an EMA moving average per uid (cumulative_score); no debt
    ledger or status enum.

documentation:
  status: sparse
  source_version: null
  primary_docs:
    - "README.md"
    - "neurons/validator/README.md"
    - "neurons/miner/README.md"
  completeness: low

