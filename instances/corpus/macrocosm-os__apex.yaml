schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Per-miner weights are computed by an off-chain orchestrator API
  (apex.api.macrocosmos.ai /validator/global_miner_scores); the validator in this
  repo only relays them to chain via set_weights. A per-competition burn_factor
  reduces emissions to miners (effective miner emission = (1 - burn_factor) *
  incentive_weight per the CLI dashboard), with DEFAULT_BASE_BURN_RATE = 0.9. The
  actual scoring/burn computation lives server-side and is NOT in this repository,
  so the live split is only partially observable here.

subnet:
  name: "Apex (Subnet 1)"
  owner_repo: "macrocosm-os__apex"
  netuid: 1
  implementation_lang: python

task:
  summary: >-
    Miners compete within Competitions, each made of multiple Rounds, by submitting
    Python-based algorithms through the Apex CLI. Validators (via an off-chain
    orchestrator) evaluate each submission against per-competition benchmarks /
    baseline scores and reward miners whose solutions perform best. Concrete
    competitions present in the repo include RL Battleship, Iota Simulator, energy
    arbitrage, matrix compression, and tron.
  submission_format: [source_code]

scoring_signals:
  - name: competition_benchmark_score
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: other
    normalization_other: >-
      Per-competition score relative to a baseline_score / score_to_beat,
      computed off-chain by the orchestrator; exact transform not present in repo.
    notes: >-
      Each CompetitionRecord carries baseline_score, baseline_raw_score,
      score_to_beat and top_score_value. The mapping from these to per-miner
      weights is computed server-side and not in this repository.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Per-competition benchmark / simulation environment that scores a miner's
      submitted Python algorithm (e.g. energy arbitrage simulation with fixed
      physical constants, RL battleship game environment, iota distributed-training
      simulator).
    source_identifier: "shared/competition/src/competition/*"
    trust_model: trusted
    notes: >-
      Scoring is executed by the orchestrator against these task definitions;
      submissions are graded vs a baseline_score and score_to_beat.

aggregation:
  method: undocumented
  composition: other
  composition_other: >-
    Off-chain: per-competition top-score-relative scoring combined with a
    per-competition incentive_weight allocation and a burn_factor; the combination
    formula is not present in this repo.
  normalization: other
  normalization_other: >-
    Validator passes raw orchestrator weights through
    bt.utils.weight_utils.process_weights_for_netuid before set_weights;
    final normalization is bittensor-default.
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: null
    fraction: null
    dynamic: true
    notes: >-
      Each competition has a burn_factor (Optional, set by orchestrator) and a
      base_burn_rate defaulting to DEFAULT_BASE_BURN_RATE = 0.9. CLI computes
      miner emissions as (1 - burn_factor) * incentive_weight, so burn_factor is
      a dynamic per-competition residual computed off-chain; the literal live
      value is not in this repo (only the 0.9 default floor).
  notes: >-
    OWNER_UID = 248 is defined in common settings. Validators that receive no
    orchestrator weights fall back to copy_weights_from_chain (stake-weighted
    average of existing chain weights).

weight_setting:
  cadence: rate_limited
  method: >-
    weight_loop fetches per-miner weights from the orchestrator
    (/validator/global_miner_scores), converts MinerScore.weight by uid, runs
    process_weights_for_netuid, and calls subtensor.set_weights. On empty/failed
    fetch it copies stake-weighted weights from chain instead.
  on_chain_call: set_weights
  tempo_or_interval: "WEIGHT_SUBMIT_INTERVAL = 60*21 seconds (21 minutes) on mainnet"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA on the final reward in this repo; the validator relays orchestrator
      weights verbatim (after process_weights_for_netuid). Any smoothing would be
      server-side.

anti_gaming:
  - kind: rate_limit
    enforcement: barrier
    description: >-
      SCORE_THRESHOLD = 0.01 in common settings gates low scores. Submissions
      carry a submission_fee_usd (Decimal) paid to SUBMISSION_FEE_ADDRESS, a fixed
      coldkey, verified on-chain — a monetary barrier to spam submissions.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Fallback copy_weights_from_chain weights chain weights by validator stake
      (normalized_stakes dot valid_weights) restricted to validator_permit holders.

sub_competitions:
  structure: multi_mechanism
  stages: []
  count: null
  notes: >-
    The subnet is organized as multiple independent Competitions, each with its
    own incentive_weight (direct decimal emission allocation 0.0-1.0), baseline,
    burn_factor and multiple Rounds. Competition task packages present in repo:
    battleship, rl_battleship, iota_simulator, energy_arbitrage, matrix_compression,
    tron. The set and weighting of active competitions is managed off-chain.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum]
  status_values: []
  reset_policy: >-
    burn_factor_reset_at marks when a competition's burn factor / top scorer was
    last reset (age of top scorer).
  notes: >-
    Per-competition top score (top_score_value, top_scorer_hotkey, score_to_beat)
    and round state are tracked off-chain; this repo only models the API responses
    (CompetitionRecord / CompetitionDetailsResponse).

documentation:
  status: sparse
  source_version: null
  primary_docs:
