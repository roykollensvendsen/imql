schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: dormant
mechanism_status_notes: >-
  The README documents a quality (LLM-judge) + response-time scoring mechanism, and the
  scoring code exists (evals/eval.py judge, forward.py per-miner score computation). But in
  the live forward() path the score-update call is commented out (forward.py lines 292-295)
  and immediately overridden by hardcoded reward_scores=[1], rewarded_miner_ids=[0] which is
  passed to update_scores. The result is that only UID 0 receives reward every step; the
  documented per-miner scoring never reaches the on-chain weights. Treated as dormant: the
  scoring code is present but the invoked path does not run it.

subnet:
  name: "BetterTherapy"
  owner_repo: "BetterTherapy__BetterTherapy-Subnet"
  netuid: 102
  implementation_lang: python

task:
  summary: >-
    Miners run an LLM ("AI Doctor Twin" / therapist) that answers mental-health prompts.
    A validator generates a mental-health question and a base answer from Llama-3.1-8B-Instruct,
    queries miners via an InferenceSynapse, and (as documented) scores each miner's text response
    on quality (GPT-4 LLM-as-judge, 0-1) plus a response-time bonus. The documented total score is
    0.7*quality + 0.3*time-bonus, but the live code bypasses this and rewards only UID 0.
  submission_format: [api_response]

scoring_signals:
  - name: response_quality
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.7
    normalization: none
    notes: >-
      GPT-4 LLM-as-judge scores each therapist response 0-1 vs a base response; "A score of 0.7
      means the response is as good as the base response." Clamped to [0,1], scaled *100, weighted
      0.7. quality_score = reward*100*0.7. DOCUMENTED ONLY; not applied in the live weight path.
  - name: response_time
    metric_kind: latency
    direction: lower_is_better
    weight: 0.3
    normalization: none
    notes: >-
      Bucketed time bonus, gated on quality > 0.2: <10s=>100, <20s=>50, <30s=>20, else 0; weighted
      0.3. DOCUMENTED ONLY; not applied in the live weight path.

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      GPT-4 used as judge ("strict and fair judge for therapy responses") to score miner responses
      against a base answer generated by the validator's local Llama-3.1-8B-Instruct model.
    source_identifier: "gpt-4"
    trust_model: oracle
    notes: >-
      Both batch (evals/batch.py) and synchronous (evals/eval.py) judge paths use judge_model="gpt-4".
      Base response produced by --model.name default meta-llama/Llama-3.1-8B-Instruct.

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: "0"
    fraction: null
    dynamic: false
    notes: >-
      Not a chain burn UID per se, but the live forward() hardcodes all reward to UID 0
      (rewarded_miner_ids=[0], reward_scores=[1]), so post-L1-normalization effectively the
      entire weight vector concentrates on UID 0. Documented additive scoring (0.7 quality + 0.3
      time) is bypassed.
  notes: >-
    set_weights normalizes raw scores by their L1 norm (np.linalg.norm ord=1) then passes through
    process_weights_for_netuid. Documented per-miner total_score = bounded_score*100*0.7 +
    response_time_score*0.3 is summed per miner in forward.py but the update_scores call using it is
    commented out.

weight_setting:
  cadence: per_epoch
  method: >-
    EMA of per-miner scores (alpha=0.1) maintained in self.scores; at sync/epoch boundary set_weights
    L1-normalizes self.scores, runs process_weights_for_netuid, converts to uint16 and calls
    subtensor.set_weights with version_key=spec_version.
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores: scores = alpha*scattered_rewards + (1-alpha)*scores, alpha =
      config.neuron.moving_average_alpha (default 0.1). epoch_length default 100 (12s blocks).

anti_gaming:
  - kind: rate_limit
    enforcement: barrier
    description: >-
      filter_uids caps miners per coldkey and per IP at max_per_key=15, dedups ip:port, and
      excludes axons not serving. Limits sybil concentration when querying.
  - kind: honeypot
    enforcement: elimination
    description: >-
      A judge score of -1 for a miner triggers blacklist_hotkey (coldkey+hotkey) against the pool
      mining backend, removing that miner. Blacklisted hotkeys are filtered out in filter_uids.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, reputation]
  status_values: []
  reset_policy: >-
    On resync_metagraph, scores for replaced hotkeys are zeroed (self.scores[uid]=0). State (step,
    scores, hotkeys) persisted to state.npz via save_state/load_state.
  notes: >-
    self.scores is an EMA moving average over metagraph.n. Blacklist of misbehaving coldkeys/hotkeys
    is maintained via the external pool-mining backend (get_blacklisted_hotkeys).

