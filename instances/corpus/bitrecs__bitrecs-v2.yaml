schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Only a single winner-take-all miner ever receives non-burn weight, and even that miner's
  weight is capped at MINER_EMISSION_PORTION (0.10) times a time-decay factor; the remaining
  burn_weight = 1 - miner_weight is assigned to uid 0. With MINER_EMISSION_PORTION = 0.10 at
  least 90% of emission is burned each epoch, and decay only increases the burn fraction over
  time. A dedicated set_weights_burn_only() path (uids=[0], weights=[1.0]) fires when
  MINER_EMISSION_PORTION <= 0.

subnet:
  name: "Bitrecs V2"
  owner_repo: "bitrecs__bitrecs-v2"
  netuid: 296
  implementation_lang: python

task:
  summary: >-
    Bitrecs V2 is a prompt-evolution subnet. A miner produces an artifact.yaml (a system prompt,
    user prompt, model, provider and sampling temperature) submitted as a single GitHub gist plus
    an on-chain commitment. The artifact is run against a rotating set of ecommerce recommendation
    evaluations in a sandboxed Affine/Docker environment; each run yields a success-rate score per
    environment. Rewards flow to the single miner whose artifact non-dominantly leads the
    epsilon-Pareto frontier under winner-take-all subset scoring.
  submission_format: [content_link, commitment_hash]

scoring_signals:
  - name: environment_success_rate
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Per evaluation environment, the eval container returns a `score` (success rate in [0,1]) and a
      `sample_size`. df_to_miner_scores aggregates by taking the max score per hotkey+task_name
      (best of retries). These per-environment scores feed Pareto dominance and WTA subset scoring;
      they are not additively weighted, so weight is null.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Rotating set of challenging ecommerce evaluation problems (SKU/recommendation tasks). The
      validator pulls the current evaluation set via get_current_eval_set_id() and runs the miner
      artifact against problem environments inside the bitrecs-evals Docker container, which returns
      a per-task success-rate score. SKUs are injected dynamically at test time.
    source_identifier: "ghcr.io/bitrecs/bitrecs-evals:main (EVAL_CONTAINER_TAG); evaluation set served by BITRECS_PLATFORM_URL"
    trust_model: trusted
    notes: >-
      Scores are produced by a centralized off-chain platform/eval container, not reproducible
      on-chain. The eval set rotates and is held by the platform.

aggregation:
  method: winner_take_all
  composition: rank
  normalization: sum_to_one
  temperature: 1.0
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      burn_weight = 1 - miner_weight, where miner_weight = MINER_EMISSION_PORTION (0.10) *
      decay_factor for the single WTA winner; uids=[0, winner], weights=[burn_weight, miner_weight].
      The burn fraction is therefore a dynamic residual (>= 0.90, rising as decay shrinks
      miner_weight). When MINER_EMISSION_PORTION <= 0 the validator sets uids=[0], weights=[1.0]
      (full burn).
  notes: >-
    Pipeline (scoring/engine.calculate_scores -> scoring/wta + scoring/pareto): (1) compute_pareto_frontier
    keeps only epsilon-non-dominated miners (epsilon = 2*std-error per env, clamped MIN_EPSILON 0.005..
    MAX_EPSILON 0.05); (2) compute_subset_scores_with_priority awards each non-empty environment subset
    to one winner (LINEAR subset_weight = |subset|) using score-first ranking with first-commit tie-break
    against per-miner thresholds; (3) scores_to_weights applies softmax (temperature 1.0, min_weight 0.0);
    (4) only the single max-weight UID is taken on chain. softmax is computed but only the argmax UID is used.

weight_setting:
  cadence: per_epoch
  method: >-
    calculate_scores_loop polls every SET_WEIGHTS_INTERVAL_SECONDS (300s) and sets weights once per
    epoch when blocks_until_next_epoch <= BLOCKS_BEFORE_EPOCH_TO_SET_WEIGHTS (30 blocks, ~6 min) and
    the epoch has not yet been set. set_weights_onchain assigns uids=[0, winner_uid] with
    weights=[burn_weight, MINER_EMISSION_PORTION*decay_factor], retrying up to 3 times.
  on_chain_call: set_weights
  tempo_or_interval: "30 blocks before epoch (~6 min); poll every 300s"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the final reward in this code: weights are recomputed and set fresh
      each epoch via subtensor.set_weights. Temporal effects come only from the per-miner age decay
      factor, not from reward smoothing.

anti_gaming:
  - kind: deduplication
    enforcement: barrier
    description: >-
      epsilon-Pareto dominance: a copy ties (no dominance either way) and cannot enter/displace the
      frontier; a miner must strictly improve beyond epsilon on at least one environment (and be no
      worse within epsilon on all) to dominate. Designed so copying earns nothing.
  - kind: code_inspection
    enforcement: elimination
    description: >-
      Artifact policy forbids hardcoding evaluation-set SKUs/item names/descriptions into the prompt;
      violations result in a hotkey ban ("revoke your hotkey and rewards"). Only select jinja
      {{varname}} variables permitted; system/user prompt token caps (5000 / 10000).
  - kind: rate_limit
    enforcement: rejection
    description: >-
      One submission per hotkey; gists must have a single commit and be < 24 hours old or they are
      rejected. Miners make an on-chain commitment to begin evaluation. Miners use a fresh hotkey.
  - kind: deterministic_check
    enforcement: barrier
    description: >-
      Two-stage screener pipeline (screener_1, screener_2) gates artifacts before they reach the
      validator set group, with SCREENER_1_THRESHOLD / SCREENER_2_THRESHOLD / PRUNE_THRESHOLD score
      gates (threshold values are environment-configured, not hardcoded).

sub_competitions:
  structure: tiered
  stages:
    - name: screener_1
      role: qualifier
      advancement_rule: "pass SCREENER_1_THRESHOLD"
    - name: screener_2
      role: qualifier
      advancement_rule: "pass SCREENER_2_THRESHOLD"
    - name: validator
      role: main
      advancement_rule: "winner-take-all over epsilon-Pareto frontier; PRUNE_THRESHOLD removes weak artifacts"
  count: 3
  notes: >-
    EvaluationSetGroup (screener_1, screener_2, validator) forms a tiered evaluation pipeline:
    artifacts pass two screener stages (basic evals + thresholds) before entering the validator set
    group whose WTA result drives on-chain weights. Set group is derived from the validator hotkey.

per_miner_state:
  tracked: true
  state_kinds: [status_enum, registration_age]
  status_values: [screening_1, screener_2, validator]
  reset_policy: ""
  notes: >-
    Each miner artifact carries a status and progresses through evaluation_set_group stages. Per-miner
    first_block (registration age) drives the emission decay factor: full emission within a 3-day
    grace period, then 5% reduction per day past grace down to a 25% floor (calculate_decay_factor with
    GRACE_PERIOD_DAYS=3, DECAY_FACTOR=0.05, DECAY_FLOOR=0.25). first_block also breaks WTA ties in
    favor of the earlier committer.

