schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Validator computes per-hotkey ratings from Kaspa pool metrics and sets them as
  on-chain weights every set_weights_interval (default 60 min). No emission burn
  in the weight-setting path. The README describes an off-chain Alpha buyback-and-burn
  funded by pool fees (manual, announced on X), which is an economic mechanism on the
  Alpha token, not an emission/weight burn.

subnet:
  name: "HashTensor (Subnet 16)"
  owner_repo: "HashTensor__HashTensor_Subnet"
  netuid: 16
  implementation_lang: python

task:
  summary: >-
    Miners contribute hashrate to HashTensor's Kaspa (PoW) mining pool via the Kaspa
    Stratum Bridge. The pool exports per-worker Prometheus metrics (valid shares, share
    difficulty, uptime). Miners register a Bittensor hotkey -> Kaspa worker mapping with a
    signature. Validators score each hotkey on "Proof of Effective Work" (valid_shares x
    difficulty) penalized by uptime, and set on-chain weights accordingly.
  submission_format: [compute_service]

scoring_signals:
  - name: effective_work
    metric_kind: throughput
    direction: higher_is_better
    weight: 1.0
    normalization: min_max
    notes: >-
      Per worker: valid_shares * min(difficulty, max_difficulty) * difficulty_penalty *
      share_penalty, summed over a hotkey's workers (compute_effective_work). Normalized by
      dividing by the max effective_work across all hotkeys (work[hotkey]/max_work).
      difficulty_penalty = exp(-(difficulty-max_difficulty)/max_difficulty) when difficulty
      exceeds max_difficulty (default 16384.0). share_penalty = exp(-excess/allowed_shares)
      when valid_shares exceed allowed (shares_per_minute=20 over the window).
  - name: average_uptime
    metric_kind: uptime
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Average fractional uptime across a hotkey's workers (uptime_seconds/window_seconds,
      clamped to [0,1]). Applied multiplicatively as (avg_uptime ** uptime_alpha) with
      uptime_alpha default 2.0, gating the normalized effective_work score. Final score
      clamped to [0.0, 1.0].

ground_truth_sources:
  - kind: hardware_probe
    description: >-
      Prometheus endpoint of the HashTensor Kaspa pool (default
      http://pool.hashtensor.com:9090) exporting Kaspa Stratum Bridge counters:
      ks_valid_share_counter, ks_invalid_share_counter, ks_valid_share_diff_counter,
      ks_miner_uptime_seconds, ks_miner_work_seconds_total, keyed by (wallet, worker).
    source_identifier: "http://pool.hashtensor.com:9090"
    trust_model: trusted
    notes: >-
      Centralized pool-owned Prometheus; metrics filtered to the pool owner wallet
      (kaspa_pool_owner_wallet). Validators trust the pool's reported share/uptime data.

aggregation:
  method: weighted_average
  composition: multiplicative
  normalization: min_max
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No emission/weight burn in code. README describes an off-chain Alpha buyback-and-burn
      (target 90% of each buyback) funded by KAS pool fees, executed manually via Bittensor's
      native burn extrinsic. Not represented in weight setting.
  notes: >-
    Final rating = clamp(normalized_effective_work * avg_uptime^alpha, 0, 1). Normalization
    is max-scaling (divide by max work across hotkeys), not sum-to-one; the chain (Yuma)
    normalizes the submitted weights.

weight_setting:
  cadence: rate_limited
  method: >-
    set_weights_task runs on a schedule; skips if now - last_set < set_weights_interval
    (default 60 min). Computes ratings via Validator.compute_ratings, then calls set_weights,
    which maps hotkey ratings to node weights (0 for unrated nodes) and calls
    weights.set_node_weights via fiber.
  on_chain_call: set_weights
  tempo_or_interval: "3600 seconds (set_weights_interval default 60 min)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA on the final reward. The scoring window is a rolling 60-minute Prometheus
      window (config.window default timedelta(minutes=60)); each cycle recomputes from scratch.

anti_gaming:
  - kind: commit_reveal
    enforcement: rejection
    description: >-
      Hotkey<->worker registration requires a signature; verify_signature(hotkey, worker,
      signature) uses Keypair.verify and rejects invalid signatures (config.verify_signature
      default True). Registration also checked against registration_time_tolerance (default 1 min).
  - kind: rate_limit
    enforcement: penalty
    description: >-
      Share-rate penalty: if valid_shares exceed allowed_shares (window_minutes *
      shares_per_minute, shares_per_minute=20), an exponential penalty
      exp(-excess/allowed_shares) is applied to that worker's effective work.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Difficulty cap: difficulty clamped to max_difficulty (default 16384.0) and an
      exponential penalty exp(-(difficulty-max_difficulty)/max_difficulty) applied when a
      worker reports difficulty above the cap.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: >-
    Single PoW network (Kaspa) at present; README states support for additional PoW coins
    is planned but not implemented in code.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    Ratings recomputed each cycle from a rolling metrics window; no persistent per-miner
    score/reputation ledger in the rating path. A hotkey<->worker mapping DB is maintained,
    but it is identity mapping, not scoring state.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/validating.md"
    - "docs/mining.md"
  completeness: high

