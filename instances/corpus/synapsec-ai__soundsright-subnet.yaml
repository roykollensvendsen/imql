schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Live scoring path runs each competition: determine_competition_scores -> calculate_overall_scores
  -> commit_weights -> subtensor.set_weights. No burn allocation present in code. Winner-takes-all per
  competition with a smaller proportional 'remainder' pool split among non-winning models.

subnet:
  name: "SoundsRight"
  owner_repo: "synapsec-ai__soundsright-subnet"
  netuid: 105
  implementation_lang: python

task:
  summary: >-
    Miners fine-tune speech-enhancement models (denoising and dereverberation, at 16 kHz and 48 kHz)
    and upload them to HuggingFace. Validators download each model, run it on a freshly generated TTS +
    noise/reverb dataset, and benchmark output quality with metrics (PESQ, ESTOI, SI_SDR, SI_SIR,
    SI_SAR). Each competition is winner-takes-all: the best-performing model for a given competition/
    metric receives the competition score, with a smaller remainder pool distributed proportionally to
    the other valid models by performance ratio.
  submission_format: [model_weights]

scoring_signals:
  - name: PESQ
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.6
    normalization: none
    notes: >-
      Perceptual quality metric. Weight 0.6 within DENOISING_16000HZ and DEREVERBERATION_16000HZ
      competitions via metric_proportions. Higher average is better (best model selected by highest
      average).
  - name: ESTOI
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.4
    normalization: none
    notes: >-
      Intelligibility metric. Weight 0.4 in 16 kHz competitions, 0.4 in DENOISING_48000HZ, 0.6 in
      DEREVERBERATION_48000HZ via metric_proportions.
  - name: SI_SDR
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Scale-invariant signal-to-distortion ratio. metric_proportions weight differs per competition
      (0.2 DENOISING_48000HZ, 0.4 DEREVERBERATION_48000HZ); per-signal additive weight not single-valued.
  - name: SI_SIR
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.2
    normalization: none
    notes: "Scale-invariant signal-to-interference ratio. Weight 0.2 in DENOISING_48000HZ."
  - name: SI_SAR
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.2
    normalization: none
    notes: "Scale-invariant signal-to-artifact ratio. Weight 0.2 in DENOISING_48000HZ."

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Validator generates a fresh TTS dataset (ElevenLabs) each competition and mixes with WHAM noise
      and Arni RIR reverb, seeded deterministically from a block-extrinsics hash. SGMSE+ is benchmarked
      as a reference/exclusion baseline so models cannot just reproduce its output.
    source_identifier: "ElevenLabs TTS + WHAM noise + Arni RIR; SGMSE+ baseline"
    trust_model: trusted
    notes: >-
      Seed derived from sha256 of extrinsics of a block divisible by seed_interval (100), making the
      dataset hard to predict. sgmse_value excluded in get_best_current_model_from_list.

aggregation:
  method: winner_take_all
  composition: weighted_sum
  normalization: other
  normalization_other: >-
    Final self.scores divided by max(weights) in normalize_weights_list before set_weights (peak
    normalized to 1.0, not sum-to-one). Per-competition scores are summed across competitions first.
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn allocation in scoring or weight-setting code."
  notes: >-
    Per competition/metric, competition_metric_score = competition_max_scores[competition] *
    metric_proportions[competition][metric] is assigned to the single best model. A separate
    '_remainder' pool (competition_max_scores[<comp>_remainder]) is split proportionally among other
    valid models by performance_ratio (model_avg/best_avg) in assign_remainder_scores. Overall score =
    sum of competition_scores across all competitions. competition_max_scores: DENOISING_16000HZ=10,
    DEREVERBERATION_16000HZ=10, DENOISING_48000HZ=45, DEREVERBERATION_48000HZ=20; remainder pools 3/2/5/5.

weight_setting:
  cadence: rate_limited
  method: >-
    handle_weight_setting triggers commit_weights when current_block >= last_updated_block + 350.
    weights = self.scores; negative weights clamped to 0; normalized so peak = max_weight_limit;
    optionally mutated by anti-weight-copying algorithm (softmax / power-scaling / identity) when
    wc_prevention_protcool is enabled.
  on_chain_call: set_weights
  tempo_or_interval: "350 blocks (last_updated_block + 350)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      Scores fully recomputed (init_default_scores then determine_competition_scores) each competition;
      no EMA over the final reward. Competitions recur every period_days at 09:00 GMT.

anti_gaming:
  - kind: deduplication
    enforcement: rejection
    description: >-
      filter_models_with_same_hash, filter_models_with_same_ckpt_hash and
      filter_models_with_same_metadata remove duplicate models (same directory hash, checkpoint hash,
      or namespace/name/revision), keeping the model uploaded to chain first (lowest block).
  - kind: deterministic_check
    enforcement: barrier
    description: >-
      A new model must beat the current best historical model by an improvement_factor (linear-decay
      from 0.0035 to 0.0015 over 50400 blocks) to take the win; otherwise the historical winner keeps
      the score (new_model_surpasses_historical_model).
  - kind: data_augmentation
    enforcement: barrier
    description: >-
      Dataset regenerated each competition with a seed derived from a sha256 hash of block extrinsics
      (block divisible by seed_interval=100), so miners cannot precompute outputs for a known dataset.
  - kind: code_inspection
    enforcement: penalty
    description: >-
      Anti weight-copying (wc_prevention) protocol: validator commits a trusted-validator bitmap to
      chain and mutates its own weight vector via softmax (alg1), power-scaling (alg2, power=0.63), or
      identity (alg3) chosen from aggregated miner nonces.

sub_competitions:
  structure: per_task_type
  stages:
    - name: DENOISING_16000HZ
      role: main
      advancement_rule: "best avg metric (PESQ 0.6 / ESTOI 0.4) wins; max score 10, remainder 3"
    - name: DEREVERBERATION_16000HZ
      role: main
      advancement_rule: "best avg metric (PESQ 0.6 / ESTOI 0.4) wins; max score 10, remainder 2"
    - name: DENOISING_48000HZ
      role: main
      advancement_rule: "best avg metric (ESTOI 0.4 / SI_SDR 0.2 / SI_SIR 0.2 / SI_SAR 0.2) wins; max score 45, remainder 5"
    - name: DEREVERBERATION_48000HZ
      role: main
      advancement_rule: "best avg metric (ESTOI 0.6 / SI_SDR 0.4) wins; max score 20, remainder 5"
  count: 4
  notes: >-
    Four parallel competitions (task x sample rate). Scores summed across all to form overall score.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    Scores reset each new competition (init_default_scores) then recomputed. best_miner_models tracks
    the prior competition's winner per competition (carried via pickle state). Per-hotkey score reset to
    0.0 when a hotkey is replaced in the metagraph (check_hotkeys / reset_hotkey_scores).
  notes: >-
    best_miner_models and miner_models persisted in pickle files; blacklisted_miner_models tracked but
    no status enum.

