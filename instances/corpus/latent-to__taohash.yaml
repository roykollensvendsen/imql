schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Scoring is active: validators rank miners by the USD-denominated value of the BTC
  shares they contributed in each evaluation window. However weight distribution is
  capped by the alpha actually available to distribute, and any residual weight (and
  the full weight when no miners are mining) is assigned to the subnet-owner burn UID.
  In practice emissions are largely burned unless miners contribute enough share value.

subnet:
  name: "TAOHash"
  owner_repo: "latent-to__taohash"
  netuid: 14
  implementation_lang: python

task:
  summary: >-
    Miners contribute Bitcoin (and Bitcoin Cash) proof-of-work mining hashrate to the
    subnet's unified pool. A validator-side proxy records each miner's submitted shares;
    validators score a miner by the fiat (USD) value of the BTC/BCH block-reward share
    those shares represent over each evaluation window. Higher total share value over the
    period yields a higher on-chain weight (and thus more alpha emission). Miners also
    earn direct BTC payouts off-chain via the TIDES protocol, independent of weights.
  submission_format: [compute_service]

scoring_signals:
  - name: share_value_fiat
    metric_kind: throughput
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Per miner, per coin: share_value_fiat = (share_value / coin_difficulty) *
      block_reward * coin_price. share_value is the difficulty-weighted work the pool
      recorded for that worker; block_reward is BLOCK_REWARDS[coin] (3.125 for btc and
      bch); coin_price is the CoinGecko USD price. Summed across the window via add_score,
      then multiplied by the coin payout_factor (PAYOUT_FACTOR=0.015) in
      get_weighted_scores, then summed across coins (btc, bch) into final_scores.

ground_truth_sources:
  - kind: hardware_probe
    description: >-
      Miner mining contributions (shares / share_value / hashrate) for a time range,
      retrieved from the subnet's mining-pool proxy API (ProxyPool) rather than directly
      from miners. Coin price from CoinGecko; network difficulty from a network-stats
      lookup.
    source_identifier: "ProxyPool.get_miner_contributions_timerange; CoinPriceAPI('coingecko'); get_current_difficulty"
    trust_model: trusted
    notes: >-
      The proxy pool API is operated by the subnet; validators need proxy credentials
      from subnet staff. Share values are taken as authoritative (already computed by
      the pool from actual work done).

aggregation:
  method: proportional
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "burn_uid (SubnetOwnerHotkey UID)"
    fraction: null
    dynamic: true
    notes: >-
      If total miner value is zero, weights[burn_uid]=1.0 (full burn). Otherwise weights
      are score/total_value, but if total_value <= value_to_dist (the alpha available to
      distribute = blocks_to_set_for * (1 - OWNER_TAKE=0.18) * SPLIT_WITH_MINERS=0.5 *
      alpha_price) each weight is scaled down by total_value/value_to_dist and the
      remaining (1 - sum_weights) is added to weights[burn_uid]. Burn fraction is a
      computed residual, not a fixed constant.
  notes: >-
    final_scores[uid] = sum over coins of (raw_score[uid] * payout_factor). Weights are
    proportional to final_scores, capped by value_to_dist, normalized so weights sum to 1
    (residual to burn UID; if sum exceeds 1 weights are renormalized).

weight_setting:
  cadence: per_epoch
  method: >-
    Each weights_interval (== subnet tempo), set_weights consolidates per-coin weighted
    scores into final_scores, computes proportional weights capped by distributable alpha
    with residual to the burn UID, calls subtensor.set_weights, then resets per-coin
    scores for the next cycle. Evaluation of share value polls roughly every 10 minutes
    (eval_interval = 25 blocks).
  on_chain_call: set_weights
  tempo_or_interval: "weights_interval = tempo; eval_interval = 25 blocks"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      Scores are reset every cycle (reset_scores after each successful set_weights), so no
      EMA/SMA of the final reward is applied across cycles. A field self.alpha = 0.8 is
      assigned in the validator __init__ but is never referenced anywhere in the
      weight/score code (dead variable); not treated as an active smoothing constant.

anti_gaming:
  - kind: proof_of_work
    enforcement: barrier
    description: >-
      Reward is grounded in actual Bitcoin/Bitcoin-Cash proof-of-work shares recorded by
      the pool proxy; value scales with real difficulty-weighted work done, so claiming
      reward requires real hashrate.
  - kind: deduplication
    enforcement: rejection
    description: >-
      In get_metrics_timerange, when two hotkeys map to the same pool worker_id, only the
      hotkey with the earlier block_at_registration keeps the worker's contributions; the
      later duplicate is dropped.
  - kind: other
    kind_other: coldkey_blocklist
    enforcement: penalty
    description: >-
      A hardcoded BAD_COLDKEYS list zeroes a miner's scores across all coins on state
      restore (and replaced/duplicate hotkeys have their scores reset to 0.0).

sub_competitions:
  structure: multi_asset
  stages: []
  count: 2
  notes: >-
    Two coins are scored in parallel (SUPPORTED_COINS = ['btc', 'bch']); each has its own
    EvaluationMetrics with a per-coin payout_factor, and the per-coin weighted scores are
    summed into a single final score before weighting.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, registration_age]
  status_values: []
  reset_policy: >-
    Per-coin scores accumulate within an evaluation window and are reset to zero after
    each successful set_weights. Scores are also zeroed on hotkey replacement, on
    duplicate-worker resolution (loser dropped), and for BAD_COLDKEYS on state restore.
  notes: >-
    block_at_registration is tracked per hotkey and used to resolve duplicate pool workers
    (earlier registration wins).

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/tides_faq.md"
    - "docs/running_validator.md"
  completeness: medium

