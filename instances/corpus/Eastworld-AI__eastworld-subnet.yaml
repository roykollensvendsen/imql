schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: unknown
mechanism_status_notes: >-
  The miner-scoring logic is NOT in this repo. The validator fetches per-UID scores from the
  Eastworld server's Leaderboard API (GET /sn/score) and emits them as L1-normalized chain
  weights. The actual reward computation (how an agent's actions in the virtual world become a
  numeric score) lives server-side and is not visible in the source tree, so the operative
  on-chain reality (active distribution vs. burn) cannot be confirmed from code. The on-chain
  weight-setting path itself is a straightforward proportional distribution of server scores,
  not a burn, but the upstream scoring is opaque.

subnet:
  name: "Eastworld"
  owner_repo: "Eastworld-AI__eastworld-subnet"
  netuid: 94
  implementation_lang: python

task:
  summary: >-
    Miners run embodied AI agents in Eastworld's virtual world (SN94). Each validator step the
    validator fetches an observation/context for one miner UID from the Eastworld server,
    builds a Synapse (sensor + LLM-summarized perception + inventory + action space), queries
    the miner's axon for an action (a function call), and submits that action back to the
    Eastworld server. Agents must perceive, remember, ground goals, plan, and reflect to
    complete quests (e.g. collecting ship components, delivering batteries, multi-NPC missions).
    Scoring is computed server-side; the validator only retrieves cumulative per-miner scores
    from the Eastworld Leaderboard API and turns them into chain weights.
  submission_format: [api_response]

scoring_signals:
  - name: server_score
    metric_kind: reward
    direction: higher_is_better
    weight: 1.0
    normalization: other
    normalization_other: l1
    notes: >-
      A single opaque per-UID score returned by the Eastworld server (GET /sn/score, field
      "score" per UID). The validator does not compute it; it only fetches it. The validator
      L1-normalizes the score vector before setting weights. The Synapse context also carries a
      per-agent "reward: float" field (EWContext.reward) passed through to the miner, described
      as the "Agent's weighted score", but this is informational input to the miner, not a
      validator-side scoring computation.

ground_truth_sources:
  - kind: other
    kind_other: server_side_leaderboard_api
    description: >-
      The Eastworld server (mainnet.eastworld.ai / testnet.eastworld.ai) is the sole authority
      for miner scores. It runs the virtual-world simulation, evaluates agent actions, and
      exposes cumulative scores via the /sn/score Leaderboard endpoint. Authentication is HTTP
      Basic Auth signed with the validator hotkey.
    source_identifier: "https://mainnet.eastworld.ai (/sn/score)"
    trust_model: oracle
    notes: >-
      Trusted centralized oracle; the scoring algorithm is not in the open-source repo.

aggregation:
  method: proportional
  composition: weighted_sum
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No burn logic in the repo. Weights are the server scores divided by their L1 norm.
  notes: >-
    raw_weights = self.scores / ||self.scores||_1, where self.scores is the per-UID score vector
    fetched from the Eastworld server (scattered by UID). If the L1 norm is 0 or NaN it is
    replaced by 1 to avoid division by zero. The result is passed to
    process_weights_for_netuid / convert_weights_and_uids_for_emit (standard bittensor subnet
    limit processing) and emitted via subtensor.set_weights. There is a single signal, so
    aggregation is just proportional normalization of one server score per miner.

weight_setting:
  cadence: per_epoch
  method: >-
    Every epoch (block - last_set_weights_block > neuron.epoch_length) the validator L1-normalizes
    the fetched server-score vector and calls subtensor.set_weights with version_key=spec_version.
    Scores themselves are refreshed each concurrent_forward via fetch_and_update_scores (GET
    /sn/score), which OVERWRITES self.scores wholesale (no smoothing applied in the live path).
  on_chain_call: set_weights
  tempo_or_interval: "neuron.epoch_length blocks (default 100)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      The BaseValidatorNeuron.update_scores method implements an EMA with
      neuron.moving_average_alpha (default 0.1), but the Eastworld Validator does NOT call it.
      Instead fetch_and_update_scores replaces self.scores directly with the server-provided
      scores each step, so no EMA smoothing is applied to the final weights in this subnet.

anti_gaming:
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Before a miner UID returned by the server is queried, check_uid_availability validates the
      UID against the metagraph and the vpermit_tao_limit (neuron.vpermit_tao_limit, default
      409600), and the validator verifies the API-provided hotkey matches the metagraph hotkey
      for that UID before sending the synapse.
  - kind: liveness_check
    enforcement: penalty
    description: >-
      On test/local networks, miners that fail or return no action are added to inactive_miners
      and skipped for an increasing interval (interval += 180s up to 1800s). This is a
      validator-local skip, not a chain-weight penalty, and is gated to test/local networks only.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: >-
    Multiple quest scenarios exist in the virtual world (docs/agent_quest.md) but they are not
    modeled as separate on-chain competitions; all resolve into a single server score per miner.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    self.scores for a UID is zeroed when its metagraph hotkey changes (resync_metagraph). The
    server-side cumulative score reset policy is not visible in the repo.
  notes: >-
    The validator keeps self.scores (a per-UID vector) but overwrites it each step from the
    server. It is the server that maintains cumulative per-miner achievement; the docs describe
    a "longitudinal, multidimensional" evaluation and "cumulative miner achievements".

