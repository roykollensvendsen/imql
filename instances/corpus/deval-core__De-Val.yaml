schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Contest-based subnet. Validators evaluate miner-submitted LLM models across four
  RAG-evaluation tasks, compute EMA scores, then rank miners into reward tiers and set
  weights via a winner-take-most tiered distribution. No burn/null-UID allocation is
  present in the code path; all distributed weight goes to ranked miners.

subnet:
  name: "de_val"
  owner_repo: "deval-core__De-Val"
  netuid: 15
  implementation_lang: python

task:
  summary: >-
    Miners fine-tune their own LLM evaluator models offline and upload them (plus pipeline
    code) to HuggingFace, committing the model id/hash on chain. Validators download each
    model, run it inside a Docker container, and send predefined RAG-evaluation prompts
    across four task families (relevancy, hallucination, summary completeness, misattribution).
    Each model returns a numeric score (0-1) and a list of extracted mistakes, which are
    compared against reference values.
  submission_format:
    - model_weights
    - source_code

scoring_signals:
  # Per-task reward models (reward_definition). Weights are per-task; values shown are the
  # specific literal weights used by each task base class.
  - name: "float_diff (score accuracy)"
    metric_kind: regression_error
    direction: higher_is_better
    weight: 0.6
    normalization: none
    notes: >-
      Used by hallucination, completeness, and attribution reward_definition with weight 0.6.
      Score = 1 - clipped abs(reference - prediction); returns 0 if pred outside [0,1].
  - name: "exact_match (mistakes)"
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.4
    normalization: none
    notes: >-
      Used by hallucination and attribution reward_definition with weight 0.4. ROUGE-L f-score
      match of extracted mistakes against reference with exact_match_threshold = 0.85.
  - name: "rouge (mistakes)"
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.2
    normalization: none
    notes: "Used by completeness reward_definition with weight 0.2. ROUGE-L f-score."
  - name: "relevance (mistakes embedding)"
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.2
    normalization: none
    notes: >-
      Used by completeness reward_definition with weight 0.2. Cosine similarity of UAE-Large-V1
      embeddings, baseline-subtracted and clipped to [0,1].
  - name: "ordinal (score)"
    metric_kind: regression_error
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Sole reward model for the relevancy task (weight 1.0). Binary ordinal score over classes
      [1.0, 0.0].
  - name: "dist_penalty (score)"
    metric_kind: regression_error
    direction: lower_is_better
    weight: 0.35
    normalization: none
    notes: >-
      Penalty model applied multiplicatively (penalty_definition weight 0.35) for hallucination,
      completeness, attribution. Bucketed distance reward over categories [(0,.1),(.1,.2),(.2,.4),(.4,1.0001)].
  - name: "exact_match (penalty)"
    metric_kind: similarity
    direction: lower_is_better
    weight: 0.5
    normalization: none
    notes: "penalty_definition weight 0.5 for hallucination and attribution (multiplicative)."
  - name: "rouge (penalty)"
    metric_kind: similarity
    direction: lower_is_better
    weight: 0.125
    normalization: none
    notes: "penalty_definition weight 0.125 for completeness (multiplicative)."
  - name: "relevance (penalty)"
    metric_kind: similarity
    direction: lower_is_better
    weight: 0.125
    normalization: none
    notes: "penalty_definition weight 0.125 for completeness (multiplicative)."

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      Reference scores and reference mistakes are generated synthetically by the validator's own
      LLM pipeline (OpenAI / AWS Bedrock supported models) when constructing each task. Miner
      outputs are scored against these generated references.
    source_identifier: "SUPPORTED_MODELS (OpenAI, AWS Bedrock); validator-generated tasks"
    trust_model: trusted
    notes: >-
      Each task generates a context plus reference score / reference_mistakes / reference_true_values.
      Tasks draw context from WikiDataset, GenericDataset, AttributionDataset.

aggregation:
  method: winner_take_all
  composition: multiplicative
  normalization: other
  normalization_other: >-
    Within-tier exponential decay weights normalized to sum to 1, scaled by each tier's
    incentive pool; tiers themselves are a fixed schedule (not summed-to-one in code unless
    _adjust_tiers re-normalizes when fewer tiers than the schedule are populated).
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No burn / null-UID routing in the weight-setting path. rank_and_select_winners distributes
      all weight across ranked miners via tier incentive pools.
  notes: >-
    Per response, total_reward = sum(weight * reward) over reward models, then multiplied by
    (1 - weight*penalty) over penalty models. Per-uid task scores are averaged over total task
    count (denom), EMA-smoothed (alpha=0.8) with a constant decay (alpha_decay=0.02, clamped >=0),
    then ranked. Ranked miners are grouped into tiers when a higher score exceeds the next by a
    factor > tier_improvement_threshold (1.08). Tier incentive pools are {0:0.5, 1:0.3, 2:0.125,
    3:0.05, 4:0.025}; within each tier, np.exp(-arange) decay (by earliest submit block) is
    normalized and scaled by the pool. This is a winner-take-most / contest structure.

weight_setting:
  cadence: per_epoch
  method: >-
    Once per forward/epoch (after evaluating candidate uids), update_scores computes EMA scores
    and rank_and_select_winners produces (uid, weight) pairs; set_weights then calls
    process_weights_for_netuid and subtensor.set_weights (up to 3 attempts).
  on_chain_call: set_weights
  tempo_or_interval: "neuron.epoch_length default 100 (12-second blocks); forward_max_time 64800s"
  smoothing:
    kind: ema
    alpha: 0.8
    window: null
    notes: >-
      EMA via constants.alpha (0.8): scores = alpha*new + (1-alpha)*old, followed by a constant
      subtractive decay constants.alpha_decay (0.02) clamped at min 0. Note: config.py also defines
      unused argparse defaults neuron.moving_average_alpha=0.1 and neuron.decay_alpha=0.001, but the
      live code path uses the constants module values.

anti_gaming:
  - kind: deduplication
    enforcement: elimination
    description: >-
      validate_model computes a safetensors model hash; duplicate models are detected and the
      later-submitted (higher block) duplicate is treated as INVALID, while the earlier submitter's
      rewards are kept (the other's are popped/zeroed).
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      validate_model rejects a model if the on-chain committed model hash does not match the
      HuggingFace model hash, or if the model coldkey does not match the miner's coldkey, or if the
      chain commit metadata is missing.
  - kind: challenge_period
    enforcement: rejection
    description: >-
      A model whose last commit date is after the validator's epoch start time is rejected
      (start_time_datetime < last_commit_date returns False), preventing mid-contest submissions.
  - kind: code_inspection
    enforcement: rejection
    description: >-
      Container size limit: models whose Docker container exceeds max_model_size_gbs (18, +2 slack)
      are rejected; run_step also breaks out if container size grows beyond the limit mid-evaluation.

sub_competitions:
  structure: tiered
  stages: []
  count: 5
  notes: >-
    Five reward tiers with a fixed incentive-pool schedule {0:0.5, 1:0.3, 2:0.125, 3:0.05, 4:0.025}.
    Miners are partitioned into tiers by relative score gaps (tier_improvement_threshold=1.08);
    _adjust_tiers re-normalizes the schedule when fewer than five tiers are populated. Also four
    parallel task families (relevancy, hallucination, completeness, attribution) each with their own
    reward/penalty definitions, summed into one per-miner score.

per_miner_state:
  tracked: true
  state_kinds:
    - cumulative_score
    - registration_age
  status_values: []
  reset_policy: >-
    EMA scores (self.scores) persist across epochs and are loaded from weights.pt when within 72h;
    queried_uids and task_repo are reset each epoch (start_over). Submit block (registration/commit
    age) breaks ties within a tier via exponential decay favoring earlier submitters.
  notes: >-
    self.scores is the persisted EMA moving average; self.weights persisted up to 72h. Replaced
    hotkeys are zeroed in resync_metagraph.

