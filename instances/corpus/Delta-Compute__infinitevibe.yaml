schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Two validator implementations coexist. The base tensorflix/validator.py scores by raw
  engagement rate over the top-5 miners. The operative path is enhanced_validator_v2.py
  (launched by start_growth_validator.sh and described in README.md), which overrides
  calculate_and_set_weights to use the multiplicative growth x engagement formula in
  new_growth_scoring.py. No emission burn is present; weights are normalized over the top-5
  positive-scoring miners. Documented and invoked scoring match, so status is active.

subnet:
  name: "InfiniteVibe (TensorFlix)"
  owner_repo: "Delta-Compute__infinitevibe"
  netuid: 89
  implementation_lang: python

task:
  summary: >-
    Miners promote the subnet by publishing social-media content (Instagram posts/reels,
    historically YouTube videos) that carries a per-hotkey signature tag, then commit a gist
    listing their content submissions on-chain. Validators fetch each post's engagement and
    follower metrics via a platform-tracker service, run AI-content and bot detection, and
    reward authentic follower growth combined with genuine engagement. Miners are scored on
    growth x engagement and only the top-5 receive weight.
  submission_format: [content_link, commitment_hash]

scoring_signals:
  - name: authentic_follower_growth
    metric_kind: engagement
    direction: higher_is_better
    weight: 0.7
    normalization: other
    normalization_other: >-
      Hourly follower growth rate capped at 1% (max_hourly_growth_rate=0.01); positive growth
      passed through log10(1+growth_percentage)*100, negative growth multiplied by 5 as penalty;
      result scaled by growth_weight=0.7.
    notes: >-
      From new_growth_scoring.py: growth_score requires >=500 followers and >=12h of history,
      else final_score=0. growth_weight=0.7 of the combined score.
  - name: engagement_multiplier
    metric_kind: engagement
    direction: higher_is_better
    weight: null
    normalization: min_max
    notes: >-
      engagement_rate=((likes+comments)/current_followers)*100, capped at 8.0; mapped to a
      0.5x-2.0x multiplier (min_multiplier=0.5, max_multiplier=2.0). Multiplies the growth
      score; if authentic_growth_score<=0 final_score=0 (gated on growth).
  - name: bot_authenticity_multiplier
    metric_kind: engagement
    direction: higher_is_better
    weight: null
    normalization: other
    normalization_other: >-
      If bot_probability>0.6 (bot_threshold) and bot_confidence>0.5, authenticity_multiplier =
      max(1.0-0.9, 1.0-bot_probability*0.9); else 1.0. max_bot_penalty=0.9 (up to 90% reduction).
    notes: Multiplies the growth score (anti-bot penalty) in new_growth_scoring.py.

ground_truth_sources:
  - kind: real_engagement
    description: >-
      Per-post engagement and follower counts (like_count, comment_count, owner_follower_count)
      fetched from an external platform-tracker microservice that scrapes Instagram/YouTube
      (via Apify per README).
    source_identifier: "service_platform_tracker_url (/get_metrics); Apify"
    trust_model: adversarial
    notes: >-
      Metrics fetched over HTTP from CONFIG.service_platform_tracker_url. AI-generation score
      obtained from a separate ai-detector service (service_ai_detector_url).
  - kind: llm_judgment
    description: >-
      AI-generated-content detector service scores each video; metric.ai_score must exceed
      CONFIG.ai_generated_score_threshold (0.3) for the content to count.
    source_identifier: "service_ai_detector_url (/detect, mean_ai_generated)"
    trust_model: oracle
    notes: kind 'llm_judgment' used as the closest fit for an automated AI-detection model verdict.

aggregation:
  method: winner_take_all
  composition: multiplicative
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: No burn UID or burn fraction present in the weight-setting code.
  notes: >-
    enhanced_validator_v2.calculate_and_set_weights sorts miners by growth score, keeps the
    top-5 with positive scores, zeros all others, then L1-normalizes (weights_array/=sum).
    Per-miner score itself is multiplicative (growth x engagement x bot-authenticity). If the
    normalized integer weights sum to zero, top-5 hotkeys are each set to the max int weight
    65535 (equal weights fallback).

weight_setting:
  cadence: rate_limited
  method: >-
    Async _periodical_task loop calls calculate_and_set_weights every set_weights_interval
    (60*20 = 1200s) and submits via subtensor.set_weights with version_key from CONFIG.
  on_chain_call: set_weights
  tempo_or_interval: "set_weights_interval = 1200 seconds (60*20)"
  smoothing:
    kind: ema
    alpha: 0.95
    window: null
    notes: >-
      Per-content EMA in protocol.py Performance.get_score (alpha=0.95) scores incremental
      improvement between intervals; a failed signature/AI check resets the EMA chain to 0.
      NOTE: this get_score path feeds _hotkey_scores, used by the BASE validator's weights; the
      operative enhanced_validator_v2 recomputes scores from follower-growth history instead and
      does not EMA-smooth the final reward.

anti_gaming:
  - kind: honeypot
    enforcement: rejection
    description: >-
      check_signature requires the post caption to contain a per-hotkey signature
      'Made with @infinitevibe.ai on #bittensor --- <last5 of hotkey>'
      (CONFIG.get_signature_post). Content without the tag is not counted.
  - kind: plagiarism_detection
    enforcement: rejection
    description: >-
      AI-content gate: metric.ai_score must exceed CONFIG.ai_generated_score_threshold (0.3)
      via the ai-detector service, else the content is treated as invalid and skipped.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      max_hourly_growth_rate=0.01 caps follower growth at 1%/hour to blunt bot-purchase spikes;
      capped_engagement caps engagement_rate at 8.0 to limit engagement gaming.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Bot follower analysis (ValidatorBotDetector / Apify): bot_probability>0.6 with
      confidence>0.5 applies up to a 90% authenticity penalty (max_bot_penalty=0.9).
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Eligibility barriers: min_followers_threshold=500 and min_analysis_period_hours=12; also
      max_submissions_per_hotkey=5 caps submissions counted per miner.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger]
  status_values: []
  reset_policy: >-
    Follower-count history persisted per hotkey in MongoDB (follower_history collection) and
    used for 12h growth deltas. Per-content EMA score chain resets to 0 on any failed
    signature/AI validation interval.
  notes: >-
    Submissions and performance metrics stored in MongoDB collections keyed by config version
    (submissions-/performances-{CONFIG.version}). enhanced_validator_v2 adds a follower_history
    time-series collection.

