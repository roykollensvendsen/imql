schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Validators compute per-miner rewards from a crown-time event replay each scoring
  window; any undistributed pool is recycled to RECYCLE_UID (subnet owner UID 53).
  Recycling is a residual-of-distribution, not a fixed burn fraction; during a
  contract halt the full pool recycles. So this is "active" scoring with a
  dynamic owner-recycle residual rather than a fixed burn.

subnet:
  name: "Allways"
  owner_repo: "entrius__allways"
  netuid: 7
  implementation_lang: python

task:
  summary: >-
    Miners are cross-chain swap market-makers. They post exchange-rate pairs
    (currently BTC <-> TAO) and collateral, then fulfill swap orders natively on
    each chain. Per direction, the miner posting the best rate for the swapper
    (highest TAO/BTC in the canonical btc->tao direction, lowest in the reverse)
    holds the "crown" for that interval and earns reward proportional to how many
    blocks they held the crown over the scoring window, scaled by their all-time
    swap success rate. Validators independently verify fulfillments and vote
    outcomes through a smart contract that enforces collateral and slashing.
  submission_format: [signals, commitment_hash]

scoring_signals:
  - name: crown_time_share
    metric_kind: volume
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Per direction-pool, a miner's share = (crown blocks held) / (total crown
      blocks). Crown is held by the miner posting the best rate at each instant,
      provided they are on the metagraph, active, not busy, and rate > 0; ties at
      the same rate split credit evenly. reward[uid] += pool * share *
      success_rate**SUCCESS_EXPONENT. (scoring.py:120-122)
  - name: success_rate
    metric_kind: win_rate
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      All-time completed/(completed+timed_out) over the credibility window
      (~30 days). Zero-outcome miners default to 1.0 (optimistic). Applied
      multiplicatively as success_rate ** SUCCESS_EXPONENT (exponent literal = 3),
      a gating/penalty factor not an additive weight. (scoring.py:136-144)

ground_truth_sources:
  - kind: market_data
    description: >-
      Miner-committed exchange rate pairs (rate_events) posted on chain and stored
      by the validator; the best rate per direction determines crown holding.
    source_identifier: "rate_events (validator state.db); commitments on chain"
    trust_model: adversarial
    notes: >-
      Rates are normalized to RATE_SIG_FIGS=5 significant figures at post and parse
      so scoring buckets and consensus hashes agree. (constants.py:28-30)
  - kind: commit_reveal
    description: >-
      Swap fulfillment outcomes (completed vs timed_out) verified end-to-end by
      validators against both chains and voted through the smart contract; these
      form the swap_outcomes credibility ledger feeding success_rate.
    source_identifier: "swap_outcomes (validator state.db); contract votes"
    trust_model: adversarial
    notes: >-
      Validators verify FULFILLED swaps and vote confirm_swap; the contract
      enforces collateral and slashing. (forward.py:76-80; README Architecture)

aggregation:
  method: proportional
  composition: multiplicative
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "53"
    fraction: null
    dynamic: true
    notes: >-
      Undistributed pool recycles to RECYCLE_UID (53, "Subnet owner UID"):
      rewards[recycle_uid] += max(0.0, 1.0 - distributed). On a contract halt the
      full pool recycles (build_halted_rewards sets rewards[recycle_uid]=1.0).
      Not a fixed fraction — it is the residual of what crown-time scoring
      distributed. (scoring.py:124-126, 55-64; constants.py:63)
  notes: >-
    Per direction-pool reward = pool * share * success_rate**SUCCESS_EXPONENT,
    summed across both direction pools (DIRECTION_POOLS each 0.04). pool and share
    combine multiplicatively with the success_rate gate; shares sum to the pool,
    and the residual recycles to the owner UID. (scoring.py:102-126; constants.py:55-60)

weight_setting:
  cadence: per_epoch
  method: >-
    Final self.scores (built from crown-time rewards) are L1-normalized
    (scores / ||scores||_1), then process_weights_for_netuid + emit. If scores are
    empty/NaN (cold start, RPC failure, all dereg'd) the full pool is routed to
    RECYCLE_UID instead of bittensor's uniform 1/n fallback. set_weights is called
    from neuron.sync() when should_set_weights() is true.
  on_chain_call: set_weights
  tempo_or_interval: "epoch_length blocks (config.neuron.epoch_length)"
  smoothing:
    kind: ema
    alpha: 1.0
    window: null
    notes: >-
      update_scores does scores = alpha*new + (1-alpha)*old with alpha =
      config.neuron.moving_average_alpha, defaulting to SCORING_EMA_ALPHA = 1.0
      (instantaneous, no smoothing across passes). (validator.py:275-276;
      config.py:94-99; constants.py:53). Note scoring itself runs every
      SCORING_WINDOW_BLOCKS=1200 (~4h) inside forward (forward.py:85-86).

anti_gaming:
  - kind: collateral
    enforcement: barrier
    description: >-
      Miners post collateral; the smart contract manages collateral and slashing.
      Below-floor miners get auto-deactivated on chain (fee/slash paths) or kicked
      via vote_deactivate; collateral-floor invariants are trusted to the contract's
      active flag. (scoring.py:90-94, 322-325; README Architecture)
  - kind: liveness_check
    enforcement: penalty
    description: >-
      Crown is only credited while a miner is active and not busy per the
      per-block event replay; busy (reserved) miners do not earn a new interval.
      Failed swaps reduce success_rate, which is cubed (exponent 3) into reward.
      (scoring.py:231-247, 136-144)
  - kind: rate_limit
    enforcement: penalty
    description: >-
      Failed reservations trigger a cooldown (RESERVATION_COOLDOWN_BLOCKS=150,
      multiplier 2) and MAX_RESERVATIONS_PER_ADDRESS=1. (constants.py:66-68)

sub_competitions:
  structure: multi_asset
  stages: []
  count: 2
  notes: >-
    Two direction pools scored independently then summed: ('tao','btc') and
    ('btc','tao'), each with pool fraction 0.04. Crown direction sort flips
    (lower_rate_wins) for the reverse direction. (constants.py:55-58;
    scoring.py:102-122, 253-257)

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, status_enum]
  status_values: ["active", "busy", "halted"]
  reset_policy: >-
    rate_events pruned older than SCORING_WINDOW_BLOCKS; swap_outcomes (all-time
    credibility ledger) pruned older than CREDIBILITY_WINDOW_BLOCKS (~30 days) and
    persisted across restarts. (scoring.py:67-76; constants.py:52-54; README)
  notes: >-
    swap_outcomes is the all-time credibility ledger driving success_rate; active
    and busy flags are reconstructed per-block from contract events during replay.
    (scoring.py:99-100, 182-201; README Validator Storage Layout)

documentation:
  status: code_authoritative
  source_version: null
  primary_docs: ["README.md"]
  completeness: medium

