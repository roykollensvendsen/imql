schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  The validator hardcodes burner_uid=0 and burner_weight=0.9, so 90% of emission is
  routed to UID 0 and only the remaining 0.1 is distributed proportionally among miners
  according to their off-subnet emission value.

subnet:
  name: "Rich Kids of TAO"
  owner_repo: "Rich-Kids-of-TAO__rkt-subnet"
  netuid: 110
  implementation_lang: python

task:
  summary: >-
    Miners simply register a hotkey to the subnet (no code to run). Validators measure each
    miner hotkey's emission across a set of community-voted external subnets, multiply emission
    by the subnet's alpha price and the community-voted subnet weight, sum these across all voted
    subnets to get a total emission value, normalize values by the maximum, smooth with an EMA,
    and set on-chain weights — rewarding miners proportionally to their "wealth"/emissions
    elsewhere in the Bittensor ecosystem.
  submission_format: [other]
  submission_format_other: >-
    No submission; reward is derived from the miner hotkey's on-chain emissions on other subnets.
    Registration of the hotkey to netuid 110 is the only action required.

scoring_signals:
  - name: cross_subnet_emission_value
    metric_kind: other
    metric_kind_other: >-
      Total emission value across voted external subnets: sum(emission * alpha_price * subnet_weight).
    direction: higher_is_better
    weight: 1.0
    normalization: min_max
    notes: >-
      Per voted subnet: emission_value = emission * price * subnet_weight (check_hotkey_emissions).
      Summed across subnets, then normalized by the maximum across miners
      (get_rewards_from_emissions divides by max). The validator's own subnet is skipped.

ground_truth_sources:
  - kind: other
    kind_other: on-chain subnet emission/price metagraph data plus a centralized voting API
    description: >-
      Per-subnet metagraph emission values (metagraph.E[uid]) and subnet alpha prices
      (subtensor.get_subnet_price) read from chain, combined with per-subnet community-voted
      weights fetched from a centralized API.
    source_identifier: "https://richkidsoftao.com/api/subnets"
    trust_model: oracle
    notes: >-
      Subnet weights are fetched from a centralized API endpoint
      (fetch_subnet_weights_from_api); falls back to empty/hardcoded if the API fails. Alpha
      holders sign votes off-chain and the API averages them.

aggregation:
  method: proportional
  composition: weighted_sum
  normalization: min_max
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 0.9
    dynamic: false
    notes: >-
      burner_uid=0 receives burner_weight=0.9; remaining_weight=1.0-burner_weight=0.1 is split
      among miners proportionally to their normalized score.
  notes: >-
    Rewards are emission_value normalized by the max across miners; if all emission values are
    zero, rewards default to a uniform 1/N. Final weights = burner gets 0.9, others get
    (score/total_other_scores)*0.1.

weight_setting:
  cadence: per_epoch
  method: >-
    EMA-smoothed normalized scores converted to weights with 0.9 reserved for the burner UID 0
    and 0.1 distributed proportionally; pushed via subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: 360
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores: scores = moving_average_alpha*scattered_rewards + (1-moving_average_alpha)*scores,
      with moving_average_alpha=0.1.

anti_gaming:
  - kind: deduplication
    enforcement: penalty
    description: >-
      Duplicate hotkeys are processed only once; subsequent UIDs sharing an already-seen hotkey
      are assigned emission 0.0 (processed_hotkeys set in check_metagraph_emissions).
  - kind: stake_weighting
    enforcement: rejection
    description: >-
      check_uid_availability excludes UIDs holding a validator_permit with stake above
      vpermit_tao_limit (1024), so high-stake validators are not scored as miners.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: ""
  notes: >-
    self.scores is a per-UID EMA vector updated each evaluation round (moving_average_alpha=0.1).
    No documented reset policy.

