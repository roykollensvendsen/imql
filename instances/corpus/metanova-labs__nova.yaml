schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  A fixed burn_rate of 0.722 is assigned to UID 0 every epoch; the remaining
  ~0.278 of emission is split between the molecule winner and nanobody winner
  (nanobody_weight = 0.6). When no valid winner exists for a category, that
  category's incentive is also routed to the burn UID 0. An emission-override
  path can instead route the non-burn weight entirely to a configured UID
  (override_uid = 61) while paying winners off-chain via bounty payouts.

subnet:
  name: "NOVA"
  owner_repo: "metanova-labs__nova"
  netuid: 68
  implementation_lang: python

task:
  summary: >-
    NOVA (SN68) is an ML-driven drug-discovery competition. Each epoch the
    validator derives a small-molecule protein target and a nanobody protein
    target from the start block hash. Miners submit (via GitHub commitments,
    timelock-encrypted) candidate small molecules (SMILES) and/or nanobody
    sequences. Validators validate submissions against physicochemical/structural
    requirements, then score molecules with the Boltz2 model (binding affinity
    metrics) and nanobodies with the BoltzGen model (confidence / physical
    interaction / developability metrics). For each of the two categories the
    rank-1 (best) UID is the winner and receives that category's share of the
    non-burned emission; everything else and any empty category goes to burn.
  submission_format: [commitment_hash, source_code]
  extensions:
    notes: >-
      Submissions are GitHub repos referenced by encrypted on-chain commitments
      (gather_and_decrypt_commitments); content is SMILES strings (molecules)
      and amino-acid sequences (nanobodies).

scoring_signals:
  - name: boltz_affinity
    metric_kind: regression_error
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Small-molecule score. boltz_metric = ["affinity_probability_binary",
      "affinity_pred_value"], combination_strategy = "heavy_atom_normalization",
      boltz_mode = "max". Per-target scores are averaged then summed into
      final_molecule_score; ranking uses boltz_mode (max = higher is better).
  - name: boltzgen_nanobody_score
    metric_kind: composite
    direction: lower_is_better
    weight: null
    normalization: rank
    notes: >-
      Nanobody score from BoltzGen, ranked with boltzgen_rank_mode = "min" and
      boltzgen_rank_by = "rank_sum". Built from category metrics: confidence
      (design_iiptm, design_ptm, design_to_target_iptm, min_design_to_target_pae,
      interaction_pae), physical_interaction (plip_hbonds_refolded,
      plip_saltbridge_refolded, delta_sasa_refolded) and developability
      (liability_score, liability_num_violations). Tie-breaks: confidence ->
      physical_interaction -> developability rank sums -> block_submitted ->
      push_time -> uid.

ground_truth_sources:
  - kind: reference_model
    description: >-
      Boltz2 structure/affinity prediction model used to score small-molecule
      binding to the epoch's protein target.
    source_identifier: "boltz (external_tools/boltz)"
    trust_model: trusted
    notes: "boltz_metric affinity_probability_binary / affinity_pred_value."
  - kind: reference_model
    description: >-
      BoltzGen model used to fold/analyze nanobody designs against the target
      and produce confidence / physical-interaction / developability metrics.
    source_identifier: "boltzgen (external_tools/boltzgen)"
    trust_model: trusted
    notes: "per_nanobody_components rank sums per category."

aggregation:
  method: winner_take_all
  composition: hybrid
  normalization: none
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 0.722
    dynamic: false
    notes: >-
      weights[0] = burn_rate = 0.722 set unconditionally each epoch. The
      remaining 1.0 - burn_rate is split: molecule_incentive =
      (1.0-burn_rate)*(1.0-nanobody_weight); nanobody_incentive =
      (1.0-burn_rate)*nanobody_weight, with nanobody_weight = 0.6. A category's
      incentive is added back to weights[0] (burn) if that category has no
      winner.
  notes: >-
    Two independent winner-take-all competitions (molecule, nanobody). Only the
    rank-1 UID per category receives weight; no gradient over runners-up. Ranking
    per category is by summed/averaged model scores with deterministic tie-breaks.

weight_setting:
  cadence: per_epoch
  method: >-
    At each epoch boundary (current_block % epoch_length == 0) the validator
    scores submissions, picks rank-1 winners for molecules and nanobodies, builds
    a weight vector with weights[0]=0.722 and the per-category incentives on the
    winning UIDs, and calls subtensor.set_weights with retry (max 10 attempts,
    12s apart).
  on_chain_call: set_weights
  tempo_or_interval: "epoch_length blocks (config.epoch_length, default 361)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: "Weights recomputed fresh each epoch; no EMA/SMA over the final reward."
  extensions:
    emission_override: >-
      If emission_override_enabled (payout.enabled), the entire 1.0-burn_rate is
      assigned to emission_override_uid (override_uid = 61) and the actual
      winners are paid off-chain via dispatch_bounty_payouts instead of on-chain
      weight.

anti_gaming:
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      Submissions are timelock-encrypted GitHub commitments decrypted by the
      validator (QuicknetBittensorDrandTimelock / gather_and_decrypt_commitments),
      preventing copying before reveal.
  - kind: rate_limit
    enforcement: rejection
    description: >-
      no_submission_blocks = 10: submissions within the last no_submission_blocks
      before epoch end are excluded (max_block = current_block -
      config.no_submission_blocks).
  - kind: deduplication
    enforcement: rejection
    description: >-
      Duplicate molecules within a submission and chemically identical molecules
      (same InChIKey) are rejected; nanobody submissions are checked for duplicate
      sequences and near-identical prior submissions (whole-sequence / CDR3
      identity tiers via is_duplicate). max_similarity_score = 0.95 vs top
      sequences.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Molecule requirements (min_heavy_atoms=10, rotatable bonds 1..10,
      banned_atom_types Se/Na/Fe/Zn, allowed reaction per epoch) and nanobody
      requirements (length 90..150, cysteine pairing, homopolymer/di-repeat
      limits, signal-peptide rejection, nativeness>=0.45, human framework>=0.75,
      VHH hallmark residues) gate validity before scoring.

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: small_molecule
      role: main
      advancement_rule: "rank-1 by Boltz2 affinity (boltz_mode=max) wins molecule share"
    - name: nanobody
      role: main
      advancement_rule: "rank-1 by BoltzGen rank_sum (rank_mode=min) wins nanobody share"
  count: 2
  notes: >-
    Two parallel categories run each epoch with split incentive: molecule share
    = 1 - nanobody_weight = 0.4 of the non-burn pool, nanobody share =
    nanobody_weight = 0.6.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    Scoring is recomputed per epoch from current submissions; no persistent
    per-miner ledger/reputation observed in the weight path. block_submitted /
    push_time are used only as within-epoch tie-breakers.

documentation:
  status: code_authoritative
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/VALIDATOR.md"
    - "docs/nanobody_stragegy_guide.md"
    - "config/config.yaml"
  completeness: medium

