schema_version: "1.2.0"
instance_kind: extracted

# This repo is a MASTER/ORCHESTRATION platform, not a single scored task. The master collects
# `get_weights` (hotkey -> weight) from independent challenge containers, normalizes each
# challenge, weights by a fixed per-challenge emission percentage, maps hotkeys to UIDs, and
# submits final weights. The actual miner scoring logic lives in each challenge's own repo
# (out of this tree), so the per-signal scoring is not knowable here.
mechanism_status: active
mechanism_status_notes: >-
  The master orchestrator computes and submits weights on-chain every epoch
  (run_epoch -> aggregate_challenge_weights -> weight_setter.set_weights). The miner-facing
  scoring that produces each challenge's hotkey weights is delegated to per-challenge
  containers in separate repositories and is therefore out of tree.

subnet:
  name: "Platform (PlatformNetwork)"
  owner_repo: "PlatformNetwork__platform"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    The repo itself defines no single miner task. It is a multi-challenge Bittensor validator
    platform: a master validator orchestrates independent challenge containers, each of which
    owns its own logic, submissions, and scoring. Each challenge exposes a standard
    GET /internal/v1/get_weights returning a hotkey -> weight map. The master normalizes each
    challenge's weights, applies fixed per-challenge emission percentages, maps hotkeys to UIDs,
    and submits final aggregated weights to Bittensor. What a miner produces and what is rewarded
    depends on the specific challenge.
  submission_format: [api_response, other]
  submission_format_other: >-
    Per-challenge; the master only consumes a hotkey->weight map returned by each challenge's
    internal get_weights API. The underlying miner submission type is defined by each challenge
    repo (out of tree).

scoring_signals:
  - name: challenge_hotkey_weight
    metric_kind: other
    metric_kind_other: >-
      Opaque per-hotkey weight returned by each challenge's get_weights endpoint; the master
      does not know how it was computed (challenge-internal scoring lives out of tree).
    direction: higher_is_better
    weight: null
    normalization: min_max
    normalization_other: ""
    notes: >-
      Within a challenge the raw hotkey weights are sum-normalized to one (normalize_weights:
      value/total over finite, strictly-positive weights). Non-finite and non-positive weights
      are dropped.
  - name: challenge_emission_percent
    metric_kind: other
    metric_kind_other: >-
      Fixed per-challenge emission share (Decimal, >= 0) configured at challenge registration;
      determines how much of total emission each challenge's normalized weights contribute.
    direction: higher_is_better
    weight: null
    normalization: min_max
    normalization_other: ""
    notes: >-
      normalize_emissions: emission_percent of each OK challenge is clamped to >=0 and divided
      by the sum across active challenges; a failed challenge contributes nothing.

ground_truth_sources:
  - kind: other
    kind_other: >-
      Per-challenge internal API (GET /internal/v1/get_weights) returning trusted hotkey weights;
      the ground truth that produced them is challenge-specific and out of this tree.
    description: >-
      The master treats each challenge's get_weights response as authoritative for that challenge.
      Responses are authenticated with a per-challenge bearer token; the master ignores unknown
      hotkeys and zeroes a challenge that fails.
    source_identifier: "GET {internal_base_url}/internal/v1/get_weights"
    trust_model: trusted
    notes: >-
      ChallengeClient retries (default 3) with backoff and a 10s timeout; on failure the
      challenge result is marked ok=False (and optionally served from a signed fallback store).

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: sum_to_one
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No burn/UID-zero allocation found in the master aggregator. Emission for a failed
      challenge is simply excluded from the normalized emission split.
  notes: >-
    aggregate_challenge_weights: for each OK challenge, hotkey_scores[hotkey] +=
    emission_share * normalized_challenge_weight. Hotkeys not present in the metagraph
    hotkey->uid map are dropped. uid_scores are then divided by their total so final
    weights sum to one. UIDs are emitted sorted ascending.

weight_setting:
  cadence: per_epoch
  method: >-
    MasterWeightService.run_epoch refreshes the hotkey->uid metagraph cache, collects per-challenge
    weights, aggregates them, and calls WeightSetter.set_weights with the final uid/weight lists.
  on_chain_call: set_weights
  tempo_or_interval: 360
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the final reward found in the master. epoch_interval_seconds
      default is 360 and metagraph_cache_ttl_seconds default is 300.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      _clean_weights drops any challenge-reported weight that is non-finite or <= 0 before
      normalization, so negative/NaN/Inf weights cannot influence the result.
  - kind: other
    kind_other: capability_check_and_failure_isolation
    enforcement: rejection
    description: >-
      A challenge that fails its capability check or whose get_weights call errors (and has no
      valid signed fallback) is marked ok=False and contributes zero to both the emission split
      and the hotkey scores, isolating its failure.
  - kind: other
    kind_other: unknown_hotkey_filtering
    enforcement: rejection
    description: >-
      Hotkeys returned by a challenge that are not present in the metagraph hotkey->uid map are
      ignored when accumulating uid scores.
  - kind: commit_reveal
    enforcement: rejection
    description: >-
      Fallback weights are served as an HMAC-SHA256-signed payload; FallbackWeightClient rejects
      payloads with an invalid signature or older than max_age_seconds (default 600).

sub_competitions:
  structure: multi_mechanism
  stages: []
  count: null
  notes: >-
    Each registered challenge is an independent mechanism with its own repo, Docker image, SQLite
    state, public routes, and a fixed emission_percent share of total emission. The master
    aggregates across all active challenges. The number of challenges is dynamic (registry-driven),
    not a fixed constant in this repo.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    The master keeps no per-miner ledger; it consumes a fresh hotkey->weight map from each
    challenge per epoch. Any per-miner state lives inside individual challenge repos (out of tree).

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/architecture.md"
    - "docs/challenges.md"
    - "docs/validator.md"
  completeness: medium

