schema_version: "1.0.0"
instance_kind: extracted

# The documented mechanism is a sophisticated risk-adjusted trading-strategy ranking
# (Calmar-like: weighted daily returns / decayed max drawdown). But the live
# validator_forward path computes those rewards only for logging, then discards them
# and assigns 100% weight to owner_uid 161 — an explicit full burn of miner emissions.
mechanism_status: full_burn
mechanism_status_notes: >-
  core/validator_forward.py computes per-miner rewards via get_rewards() and logs them,
  but the final action is validator.update_scores(np.array([1.0]), [161]) under a comment
  "Burn 100% of the miner's emissions." set_weights() L1-normalizes scores, so a single
  uid 161 with score 1.0 receives all weight. The documented scoring model (core/ranking_model.py)
  is therefore dormant on-chain despite still being executed.

subnet:
  name: "EfficientFrontier-SignalPlus"
  owner_repo: "EfficientFrontier-SignalPlus__EfficientFrontier"
  netuid: 53
  implementation_lang: python

task:
  summary: >-
    Miners link a real CEX trading account through the SignalPlus platform and run live
    trading strategies. A miner node calls the SignalPlus API to fetch account metadata
    (balance, equity, PnL, drawdown), signs it, and returns it to the validator. The
    documented reward favors strategies with consistently positive, time-weighted daily
    returns and minimal decayed drawdown (a Calmar-like ranking), subject to numerous
    zero-score violation rules. In the live code path, however, all miner emission is
    burned to the owner UID.
  submission_format: [signals, api_response]

scoring_signals:
  - name: strategy_score
    metric_kind: risk_adjusted_ratio
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Documented daily Strategy Score = (Weighted Daily % Returns / Maximum Decayed Drawdown)
      * Risk Factor * 10, capped via day_pnl factor. Computed in ScoreModel.calculate_score
      (core/ranking_model.py) and returned by reward() as score_model.score. NOT used to set
      on-chain weights in the live path (burned). Weight is null because it is a single composite
      magnitude, not an additively weighted signal.
  - name: exponentially_weighted_daily_returns
    metric_kind: pnl
    direction: higher_is_better
    weight: null
    normalization: ema
    notes: >-
      Numerator of the score: exponentially day-weighted, AUM-multiplied, qualification-gated
      sum of daily return ratios / sum of day weights (calculate_exponentially_weighed_daily_returns).
  - name: max_decayed_drawdown
    metric_kind: regression_error
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      Denominator of the score: worst peak-to-trough drawdown, decayed, used as
      abs(measure_day_detail.decayedDrawDown) divisor in calculate_score.

ground_truth_sources:
  - kind: market_data
    description: >-
      Real CEX trading-account performance (balance, equity, PnL, drawdown) sourced from the
      SignalPlus platform via its public API, which acts as a trusted intermediary verifying
      exchange trade authenticity.
    source_identifier: "t.signalplus.com / SignalPlus API (ReportDataHandler)"
    trust_model: trusted
    notes: >-
      Miner fetches from SignalPlus API; data signed (verify256) so the validator can confirm
      it is untampered. README: "SignalPlus will act as a trusted intermediary".

aggregation:
  method: proportional
  composition: gated
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "161"
    fraction: 1.0
    dynamic: false
    notes: >-
      validator_forward.py: owner_uid = 161; validator.update_scores(np.array([1.0]), [owner_uid])
      under comment "Burn 100% of the miner's emissions." Only uid 161 receives a non-zero
      score, so after L1 normalization in set_weights it holds 100% of the weight.
  notes: >-
    Documented reward share is proportional: Strategy Reward = Strategy Daily Score /
    Total Daily Score of Top-50 Strategies * Total Daily Reward Pool. Composition is gated
    because many violation conditions (min balance, qualification, mmr, observation period)
    multiply the magnitude to zero. The on-chain aggregation is overridden by the full burn.

weight_setting:
  cadence: rate_limited
  method: >-
    scores normalized to weights via L1 norm (raw_weights = self.scores / norm), then
    process_weights_for_netuid + convert_weights_and_uids_for_emit before subtensor.set_weights.
    In the live path scores = a single 1.0 on uid 161, so 100% weight goes to the owner.
  on_chain_call: set_weights
  tempo_or_interval: "sleeps 10 minutes after a successful set_weights; loop gated by should_set_weights()"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      update_scores directly overwrites score with the latest reward ("Directly update score
      with the latest reward"), no EMA/moving-average smoothing.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Validator verifies an asymmetric signature on miner-reported data (verify256 over
      rawData + signature) in reward(); failure returns 0. Also checks the reported
      hotkey/coldkey match the metagraph for the uid (returns 0 on mismatch).
  - kind: liveness_check
    enforcement: rejection
    description: >-
      is_measure_time_expired: reported measureTime older than 25 hours returns score 0;
      empty response returns 0.
  - kind: risk_limit
    enforcement: penalty
    description: >-
      Documented MMR / excessive-risk adjustment: margin usage > 0.8 discounts score *0.5,
      > 0.5 discounts *0.8 (core/ranking_model.py calculate_score mmrEnd branches). Documented
      whitelisted-asset, wash-trade, net-withdrawal and min-volume rules zero the day's positive
      return (RankingRulesEN.md section 3.3).
  - kind: collateral
    enforcement: barrier
    description: >-
      Registration fee (documented ~1 TAO / $500 USD) and a minimum 10,000 USDT account equity
      to qualify; 14-day observation period before a strategy is eligible for ranking.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: >-
    Documented "Top-50" reward eligibility and per-strategy ranking, but no distinct
    sub-competition tracks in code. Not modeled as sub_competitions.

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, registration_age, status_enum]
  status_values: []
  reset_policy: >-
    Life-to-date records capped at 90 days (documented LTD <= 90 days). Subnet-init period of
    14 days from subNetCreateTime gives flat scores (0.01 or 1.0).
  notes: >-
    ScoreModel carries a per-day performance ledger (list of DayDetailDTO with equity, drawdown,
    index values), an inception/observation age (inTopRank, is_sub_net_init, inObserveTime), and
    a quit flag. This state lives in miner-reported data scored centrally, not in validator-persisted
    state (save_state/load_state are no-ops).

