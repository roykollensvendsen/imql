schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Active per-submission scoring pipeline (Cobb-Douglas SkillScore over 5 pillars)
  feeds on-chain weights. Burn allocation is configurable: the live set_weights.py
  path reads burn_rate from scoring_params.py where the default is 0.0 (no burn),
  but the ledger compute_weights.py and auditor weight_verification.py paths default
  burn_rate to 0.9 (90% to subnet owner). When all miner scores are zero, 100% is
  allocated to the burn hotkey. Hence the operative burn fraction depends on which
  code path / config is live and cannot be pinned to a single value from source.

subnet:
  name: "Sparket Subnet"
  owner_repo: "sparket-ai__sparket-ai"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners submit sports-betting odds and event outcomes. Two task tracks: Odds
    Origination (miner decimal odds / implied probabilities scored against a
    consensus closing line via CLV, CLE, MES) and Outcome Verification (miner
    probabilities scored against the realized result via Brier, LogLoss, PSS).
    Per-submission metrics are aggregated over a rolling window with time decay
    and shrinkage, then combined into a multiplicative Cobb-Douglas SkillScore
    across five pillars (Accuracy, Edge, Timeliness, Uniqueness, Marginal).
  submission_format: [signals]

scoring_signals:
  - name: forecast_quality
    metric_kind: probabilistic_forecast
    direction: higher_is_better
    weight: 0.6
    normalization: min_max
    notes: >-
      FQ = 1 - 2*brier_mean, mapped [-1,1] -> [0,1] via (FQ+1)/2. Combined with
      calibration into ForecastDim (Accuracy pillar). w_fq default 0.6.
  - name: calibration
    metric_kind: probabilistic_forecast
    direction: higher_is_better
    weight: 0.4
    normalization: none
    notes: >-
      CAL = 1 / (1 + |b-1| + |a|) from logit regression fit; clipped to [0,1].
      w_cal default 0.4. ForecastDim = w_fq*FQ_norm + w_cal*CAL.
  - name: economic_edge
    metric_kind: pnl
    direction: higher_is_better
    weight: 0.7
    normalization: zscore
    notes: >-
      ES_adj = es_mean/es_std (Sharpe-like, from CLE = O_miner*p_close - 1),
      normalized via zscore_logistic (or percentile when <10 miners). w_edge 0.7.
  - name: market_efficiency
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.3
    normalization: none
    notes: >-
      MES = 1 - min(1, |CLV_prob|); clipped to [0,1]. w_mes default 0.3.
      EconDim = w_edge*ES_norm + w_mes*MES (Edge pillar).
  - name: relative_skill_pss
    metric_kind: probabilistic_forecast
    direction: higher_is_better
    weight: null
    normalization: zscore
    notes: >-
      PSS = 1 - (miner_score/baseline_score), time-adjusted, normalized via
      zscore_logistic. Feeds SkillDim and Timeliness pillar (0.5*SkillDim + 0.5*LEAD).
  - name: lead_ratio
    metric_kind: predictive_contribution
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      LEAD = Moves_led / Moves_matched; clipped [0,1]. Feeds Timeliness pillar
      (0.5*SkillDim + 0.5*lead_norm).
  - name: uniqueness
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Uniqueness pillar. Composite SOS (market+crowd+cluster) from Shapley/correlation
      jobs, with bootstrap fallback SOS = 1 - |correlation|. Cobb-Douglas exponent 1.5
      (highest, strong anti-sybil incentive).
  - name: marginal_contribution
    metric_kind: predictive_contribution
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Marginal pillar = leave-one-out Shapley contribution to crowd forecast;
      bootstrap fallback 0.5 (neutral). Cobb-Douglas exponent 1.0.

ground_truth_sources:
  - kind: market_data
    description: >-
      Consensus closing line per market and side, built from ingested provider
      (sportsbook) odds via inverse-variance weighting with bias adjustment.
      Benchmark for both economic edge and outcome-relative (PSS) scoring.
    source_identifier: "sparket/providers (sportsdataio); consensus closing line"
    trust_model: oracle
    notes: >-
      min_books_for_consensus default 2; time-matched snapshots every
      snapshot_interval_hours (default 6).
  - kind: real_engagement
    description: >-
      Realized settled event outcomes (one-hot y_k) recorded when events settle,
      used for Brier / LogLoss / PSS outcome accuracy scoring.
    source_identifier: "settled event outcomes"
    trust_model: oracle
    notes: "Outcome accuracy track."

aggregation:
  method: weighted_average
  composition: hybrid
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "subnet owner / burn hotkey UID (get_subnet_owner_hotkey)"
    fraction: null
    dynamic: true
    notes: >-
      burn_rate default differs by code path: scoring_params.WeightEmissionParams
      default 0.0 (live set_weights.py); ledger/compute_weights.py and auditor
      weight_verification.py default 0.9. burn_rate fraction goes to burn_uid,
      remaining (1-burn_rate) scaled across miners. If all scores zero -> 100% burn.
  notes: >-
    Per-submission metrics aggregated over rolling window (default 30 days) with
    exponential time decay (half_life default 10 days; w_i = exp(ln(0.5)*age/half_life))
    and Bayesian shrinkage toward population mean (k default 200). Within-dimension
    combination is additive (weighted_average); across-pillar combination is
    multiplicative Cobb-Douglas: SkillScore = Accuracy^0.5 * Edge^1.0 * Timeliness^0.5
    * Uniqueness^1.5 * Marginal^1.0. Pillars clamped to [epsilon=0.01, 1.0]. Final
    SkillScores are L1-normalized across miners before chain emission.

weight_setting:
  cadence: per_epoch
  method: >-
    Load latest per-miner skill_score from miner_rolling_score DB table, fill score
    array by UID (zeros for missing), replace NaN with 0, L1-normalize, apply burn_rate
    redistribution, process_weights_for_netuid (max_weight_limit / min_allowed_weights),
    convert to uint16, subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: null
  smoothing:
    kind: ema
    alpha: null
    window: 30
    notes: >-
      No EMA on the final emitted weight itself; temporal smoothing is upstream via
      exponential time-decayed rolling aggregates over rolling_window_days (default 30)
      with half_life_days (default 10). alpha not expressed as a literal constant.

anti_gaming:
  - kind: deterministic_check
    enforcement: elimination
    description: >-
      Hard accuracy floor: SkillScore set to 0 if brier_mean > floor_threshold
      (default 0.30), regardless of other pillars.
  - kind: deduplication
    enforcement: rejection
    description: >-
      Cluster/sub-window correlation detection penalizes near-identical (sybil /
      copy-trading) submissions via the Uniqueness pillar (composite SOS with
      cluster_correlation_threshold default 0.85). Super-linear exponent (1.5)
      makes low uniqueness collapse the total score.
  - kind: rate_limit
    enforcement: rejection
    description: >-
      Per-miner daily submission caps: max_submissions_per_market_day default 200,
      max_outcomes_per_event_day default 50; odds/outcome time-bucket dedup.
  - kind: risk_limit
    enforcement: penalty
    description: >-
      Time-to-close weighting: late correct predictions get reduced credit
      (floor_factor default 0.1), early bad predictions clipped (early_penalty_clip
      default 0.7) to discourage last-minute copy-trading.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Security bounds reject invalid inputs: odds in (1.01, 1000], probabilities in
      [0.001, 0.999], CLE clamped, max_odds_ratio_for_cle default 2.0 excludes
      extreme-odds gaming from economic edge.

sub_competitions:
  structure: per_task_type
  stages: []
  count: 2
  notes: >-
    Two task tracks: Odds Origination (vs closing line) and Outcome Verification
    (vs realized result). Both feed the same composite SkillScore rather than
    separate weight pools.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: "Rolling window (default 30 days) with exponential time decay; old submissions decay out."
  notes: >-
    Per-miner rolling aggregates stored in miner_rolling_score (skill_score and
    component dimensions, score_version). Effective sample size n_eff tracked;
    metrics shrunk toward population mean for low-sample miners.

