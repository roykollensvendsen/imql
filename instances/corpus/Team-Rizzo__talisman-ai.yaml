schema_version: "1.1.0"
instance_kind: extracted

# Live validators compute a USD-pegged points->weight allocation and redirect ALL
# un-earned emission to BURN_UID (189) via weights[BURN_UID] = 1 - min(total_percent,100)/100.
# Miner points are real (+1 per accepted tweet/telegram message), but unless the
# subnet's total earned points are large, the dominant share of emission is burned.
mechanism_status: partial_burn
mechanism_status_notes: >-
  Earned weight per miner is derived from points converted to a USD-pegged fraction of
  miner alpha emission (get_percent_needed_to_equal_points). The residual fraction
  (1 - min(total_percent_needed,100)/100) is assigned to BURN_UID=189 in
  calculate_weights(). The legacy BaseValidatorNeuron.set_weights() burn_modifier
  (burn_modifier=0.9 -> burn_uid 189) is commented out and not used; burn instead
  happens dynamically inside calculate_weights via the residual.

subnet:
  name: "Talisman AI (SN45) — Perception Subnet for On-Chain Trading Insights"
  owner_repo: "Team-Rizzo__talisman-ai"
  netuid: 45
  implementation_lang: python

task:
  summary: >-
    Miners receive batches of X (Twitter) posts and Telegram messages from validators over
    Bittensor (TweetBatch / TelegramBatch synapses) and return an LLM classification for each
    item: subnet_id (which Bittensor subnet it is about), sentiment, content_type,
    technical_quality, market_analysis, and impact_potential. Validators re-run their own
    analyzer on a sampled item and require an EXACT match on those categorical fields; a fully
    matching batch earns +1 point per item, a mismatch penalizes the miner for the epoch.
  submission_format: [api_response, signals]

scoring_signals:
  - name: classification_exact_match
    metric_kind: accuracy
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Binary per-batch acceptance. validate_miner_batch samples sample_size=1 item and requires
      m_subnet/sentiment/content_type/technical_quality/market_analysis/impact_potential to match
      the validator's re-classification (case-insensitive for strings). is_valid only when
      matches == sample_size and zero discrepancies. Accepted batches reward +1 per item.
  - name: batch_completeness
    metric_kind: other
    metric_kind_other: returned_batch_size_equals_sent
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Gate: miner must return exactly what was sent (len(tweet_batch) == len(sent_batch)); a size
      mismatch adds a penalty and resets the items, bypassing the classification check.

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      The validator's own SubnetRelevanceAnalyzer / TelegramRelevanceAnalyzer re-classifies a
      sampled post/message with the configured LLM (e.g. Qwen/Qwen3-32B via LLM_BASE) and treats
      its output as ground truth for the exact-match comparison.
    source_identifier: "talisman_ai/analyzer/scoring.py (validate_miner_batch / validate_miner_telegram_batch)"
    trust_model: oracle
    notes: >-
      X API validation (post existence, author/timestamp/metric checks) is stated to be performed
      API-side before items reach validators; validators only do LLM analysis re-checking.

aggregation:
  method: proportional
  composition: gated
  normalization: l1
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: 0.003
  burn_allocation:
    enabled: true
    address_or_uid: "189"
    fraction: null
    dynamic: true
    notes: >-
      weights[config.BURN_UID] = (1 - (min(total_percent_needed, 100) / 100)) in
      calculate_weights(); BURN_UID defaults to 189. The burned fraction is the residual of the
      total USD-pegged percent earned by all miners, so it is computed, not fixed.
  notes: >-
    Per-miner weight = percent_needed_to_equal_points(points) (USD-pegged via TAO/alpha price and
    USD_PRICE_PER_POINT=0.040), floored at MIN_PERCENT_PER_POINT=0.003 per point, scaled to <=100%
    total, then converted to fraction. update_scores() then OVERWRITES self.scores with these
    weights (no EMA: self.scores = scattered_rewards). BaseValidatorNeuron.set_weights() L1-normalizes
    self.scores (norm = ||scores||_1) before process_weights_for_netuid.

weight_setting:
  cadence: per_epoch
  method: >-
    ValidationClient.run() aggregates local + validator-broadcast points for target_epoch =
    current_epoch - 2 (delayed E-2 window), zeroes a UID's reward when penalized by >=2 validators
    or when penalties >= rewards, calls calculate_weights() (which assigns the residual to BURN_UID),
    then update_scores(weights, uids). BaseNeuron.sync() calls set_weights() when block - last_update
    > neuron.epoch_length (default 100 blocks). set_weights() L1-normalizes scores and emits via
    subtensor.set_weights().
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks (neuron.epoch_length default)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      update_scores() sets self.scores = scattered_rewards directly (the EMA comment is vestigial;
      no moving average is applied). MinerReward keeps points bucketed per epoch (last 10 epochs).

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Anti-cherry-picking: the validator rebuilds the original sent batch from its local store and
      requires the returned batch size to equal it; mismatch -> penalty + reset (forward_tweets /
      _handle_miner_batch_response in neurons/validator.py).
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Re-classification exact-match: validator re-runs its analyzer on a sampled item and penalizes
      (+1 penalty, items reset to unprocessed) if any of the 6 categorical fields disagree.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Penalties only zero a miner's reward when >=2 validators (local + broadcast) penalized that UID
      in the target epoch (uid_validator_counts[uid] >= 2 in validation_client.py).
  - kind: rate_limit
    enforcement: penalty
    description: >-
      Idempotent reward: each tweet_id / message_id is rewarded at most once (is_rewarded /
      mark_rewarded guards in neurons/validator.py).

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: x_tweets
      role: main
      advancement_rule: "exact-match accept -> +1 point per tweet (validate_miner_batch, SubnetRelevanceAnalyzer)"
    - name: telegram_messages
      role: main
      advancement_rule: "exact-match accept -> +1 point per message (validate_miner_telegram_batch, TelegramRelevanceAnalyzer)"
  count: 2
  notes: >-
    Two parallel data-source pipelines (X posts and Telegram messages) share the same +1-per-item
    points scheme and the same calculate_weights burn allocation.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    MinerReward / MinerPenalty store epoch -> {hotkey: points}; only the last 10 epochs are kept
    (max_epochs = 10, delete_oldest_epoch). Rewards/penalties are applied for the delayed epoch
    E-2; per-item rewards are one-shot (idempotent via tweet/message store flags).
  notes: >-
    Tracked as epoch-bucketed integer points (MinerReward.add_reward adds +1) and epoch-bucketed
    penalties (MinerPenalty.add_penalty). Validators also broadcast compact epoch snapshots to
    other validators (RewardBroadcastStore / PenaltyBroadcastStore).

