schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  The validator forward() loads a `burner_config` from GitHub and reallocates
  `burner_reward_percentage` (default 0.95, fallback 0.90) of the total batch reward to a
  designated burner miner UID, leaving the documented InfoNCE text-embedding scoring to
  distribute only the remaining fraction (~5%) among real miners. The documented per-miner
  scoring still runs, so this is a partial burn rather than a full burn or fully dormant
  mechanism.

subnet:
  name: "OpenKaito (Decentralized Embedding, Bittensor SN5)"
  owner_repo: "OpenKaito__openkaito"
  netuid: 5
  implementation_lang: python

task:
  summary: >-
    Miners serve a text-embedding model. Each step the validator generates a batch of texts
    composed of relevant (positive) pairs drawn from a corpus and asks miners to embed all
    texts into vectors of a requested dimension (1024). Validators evaluate the returned
    embeddings with the InfoNCE contrastive loss over the known positive pairs; lower loss
    (better separation of positive vs negative pairs) yields a higher score. Legacy/inactive
    paths also support semantic search and Discord search tasks, but the live forward sends
    the text-embedding task with ~100% probability.
  submission_format: [signals]

scoring_signals:
  - name: infonce_embedding_loss
    metric_kind: loss
    direction: lower_is_better
    weight: 1.0
    normalization: none
    notes: >-
      In evaluate_text_embedding, the validator computes loss = info_nce_loss(q_embeddings,
      a_embeddings) and converts it to a score as scores[i] = min(100.0, 1 / loss.item()).
      Lower InfoNCE loss => higher score. top1/top3 recall are also computed but only logged
      to wandb, not used for the on-chain reward.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Relevant (positive) text pairs are generated from a configured corpus via
      generate_relevant_pairs / generate_text_embedding_synapse; the validator holds the
      pairwise relevance (q_indices, a_indices) used as ground truth for the InfoNCE loss.
    source_identifier: "text_embedding_datasets (cached_datasets_from_config(branch='main'))"
    trust_model: trusted
    notes: >-
      The validator knows which texts are positive pairs because it constructs the batch,
      so the relevance labels are trusted ground truth held by the validator.

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "5FHsM8ywifUgtSXbDQaSD9zzDYq76RqAvf9PnaSVg5q3Lc8G"
    fraction: 0.95
    dynamic: false
    notes: >-
      burner_reward_percentage of the total batch reward is assigned to the burner miner UID
      (rewards[burner_idx] = total_reward * burner_reward_percentage). Default fallback value
      in burner_config.fetch_config is 0.95; if the GitHub config fetch fails entirely the
      forward() except-branch defaults to 0.90. Remaining (1 - burner_reward_percentage) is
      split among real miners proportionally to their normalized rewards. The fraction and
      address are fetched from an external GitHub burner_config.json at runtime and may differ
      from these source defaults.
  notes: >-
    Per step, raw scores are normalized by rewards = rewards / (rewards.max() + 1e-5), then
    the burner split is applied, then update_scores applies an EMA. set_weights L1-normalizes
    the EMA scores (torch.nn.functional.normalize(self.scores, p=1, dim=0)) before on-chain
    emit.

weight_setting:
  cadence: per_epoch
  method: >-
    EMA scores are L1-normalized into raw_weights, passed through
    bt.utils.weight_utils.process_weights_for_netuid and convert_weights_and_uids_for_emit,
    then emitted via subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks (neuron.epoch_length default; 12s blocks)"
  smoothing:
    kind: ema
    alpha: 0.2
    window: null
    notes: >-
      update_scores does self.scores = alpha * scattered_rewards + (1 - alpha) * self.scores,
      with alpha = config.neuron.moving_average_alpha (default 0.2).

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      In evaluate_text_embedding, responses whose embedding tensor cannot be parsed, whose row
      count != number of query texts, or whose dimension != query.dimensions are given NaN loss
      / skipped (effectively zero score). Other task evaluators (evaluate, evaluate_discord_query_search)
      apply integrity/uniqueness checks (zero_score_mask) but are not on the live path.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: >-
    The codebase contains multiple task evaluators (text embedding, keyword/structured search,
    semantic search, Discord search) but the live validator forward sends the text-embedding
    task with ~100% probability (random_number < 1 + 1e-5), so only one mechanism is active.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    Scores are persisted to state.pt and reset to 0 for a UID when its hotkey is replaced in
    resync_metagraph.
  notes: >-
    self.scores is a per-UID EMA moving average maintained across steps (the only persistent
    per-miner state).

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "quickstart.md"
    - "docs/query_and_response_api.md"
  completeness: medium

