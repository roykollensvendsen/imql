schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Live validator scores miners each session and sets weights on-chain (L1-normalized
  winner-take-all). No burn UID is allocated in code. Only AccuracyChallenge and
  BalancedChallenge are in the rotation; SeoChallenge and QualityChallenge classes exist
  but are not used by query_miners.

subnet:
  name: "WebGenieAI"
  owner_repo: "web-genie-ai__web-genie-ai"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners receive an image (screenshot of a ground-truth webpage) and must generate HTML
    that visually and structurally reproduces it. Submissions are revealed via a hash
    commit-reveal scheme. Validators score each submission on three metrics (visual
    accuracy, Lighthouse SEO, and code quality) and pick a per-session winner.
  submission_format: [source_code, commitment_hash]

scoring_signals:
  - name: Accuracy
    metric_kind: vlm_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      VisualReward: visual similarity between rendered miner HTML screenshot and ground-truth
      image. Combines high-level matching (CLIP) and low-level element matching as
      high_level_scores*0.3 + low_level_scores*0.7. Low-level itself is
      button*0.25 + input*0.25 + text*0.25 + anchor*0.25. Weight is null because the
      additive weight depends on the active challenge type (0.9 in Accuracy, 0.8 in Balanced)
      and it also acts as a gate (>0.85) in the Seo/Quality challenge variants.
  - name: Seo
    metric_kind: composite
    direction: higher_is_better
    weight: null
    notes: >-
      LighthouseReward: Google Lighthouse score of the miner HTML, served via a local
      lighthouse server. Contributes 0.1 weight only in BalancedChallenge; in (unused)
      SeoChallenge it is gated by accuracy>0.85.
    normalization: none
  - name: Quality
    metric_kind: composite
    direction: higher_is_better
    weight: null
    notes: >-
      QualityReward: code-quality score of the generated HTML. Contributes 0.1 weight in both
      Accuracy and Balanced challenges; in (unused) QualityChallenge it is gated by accuracy>0.85.
    normalization: none

ground_truth_sources:
  - kind: reference_model
    description: >-
      Ground-truth HTML pages are drawn from CentralDataset (the WebGenieAI central dataset,
      authenticated by validator wallet signature). The ground-truth HTML is rendered to a
      screenshot which becomes the task prompt; the same HTML is the reference for scoring.
    source_identifier: "CentralDataset"
    trust_model: trusted
    notes: >-
      Other datasets (RandomWebsiteDataset, SyntheticDataset, HuggingfaceDataset
      SALT-NLP/Design2Code-hf) are present but commented out; only CentralDataset is active.

aggregation:
  method: winner_take_all
  composition: hybrid
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn UID or burn fraction allocated in the weight-setting code."
  notes: >-
    Per challenge, aggregated_scores combine the metrics linearly (AccuracyChallenge:
    accuracy*0.9 + quality*0.1; BalancedChallenge: accuracy*0.8 + quality*0.1 + seo*0.1).
    Across a session these per-task scores accumulate; a single winner (argmax of average
    score, requiring solved_tasks >= number_of_tasks - MAX_UNANSWERED_TASKS) is chosen.
    get_scores then assigns the current session's winner big_weight=1.0 and earlier session
    winners (within CONSIDERING_SESSION_COUNTS=8) tiny_weight=1/128; the resulting score
    vector is L1-normalized (scores / norm with ord=1) into raw weights.

weight_setting:
  cadence: per_round
  method: >-
    Set once per session boundary. set_weights() runs in sync_loop (every BLOCK_IN_SECONDS*10
    seconds), but skips unless a new session has started (last_set_weights_session ==
    current_session - 1 guard). A session = block // SESSION_WINDOW_BLOCKS where
    SESSION_WINDOW_BLOCKS = EPOCH_BLOCKS(361) * 5.
  on_chain_call: set_weights
  tempo_or_interval: "SESSION_WINDOW_BLOCKS = 1805 blocks (EPOCH_BLOCKS 361 * 5)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA on the final reward. Scores are accumulated within a session and reset on each
      new session (update_scores zeroes total_scores when current_session != session). Past
      session winners only contribute the fixed tiny_weight 1/128.

anti_gaming:
  - kind: commit_reveal
    enforcement: rejection
    description: >-
      Two-phase query: miners first return an html_hash, then after TASK_REVEAL_TIME the HTML
      is revealed. checked_synapse calls verify_answer_hash(synapse); mismatching hash =>
      solution dropped.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      checked_synapse rejects solutions with dendrite status_code != 200, with nonce !=
      miner_uid, and HTML that fails preprocess_html / is_valid_resources validity checks.
  - kind: other
    kind_other: "hardcoded coldkey blacklist"
    enforcement: elimination
    enforcement_other: "hardcoded coldkey blacklist"
    description: >-
      is_blacklisted() skips any UID whose coldkey is in a hardcoded blacklist
      (["5G9yTkkDd39chZiyvKwNsQvzqbbPgdiLtdb4sCR743f4MuRY"]) when selecting the session winner.
  - kind: liveness_check
    enforcement: penalty
    description: >-
      A miner is only eligible to win if it answered at least
      number_of_tasks - MAX_UNANSWERED_TASKS (MAX_UNANSWERED_TASKS=4) tasks in the session;
      otherwise its average score is forced to 0.

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: AccuracyChallenge
      role: main
      advancement_rule: "aggregated = accuracy*0.9 + quality*0.1"
      multipliers: {accuracy: 0.9, quality: 0.1}
    - name: BalancedChallenge
      role: main
      advancement_rule: "aggregated = accuracy*0.8 + quality*0.1 + seo*0.1"
      multipliers: {accuracy: 0.8, quality: 0.1, seo: 0.1}
  count: 2
  notes: >-
    Challenge class for a session = available_challenges_classes[session % 4] where the list is
    [AccuracyChallenge, BalancedChallenge, AccuracyChallenge, BalancedChallenge]. SeoChallenge
    and QualityChallenge classes are defined (gated by accuracy>0.85) but not in the rotation.
    RESERVED_WEIGHTS dict (ACCURACY:70, BALANCED:10, SEO:10, QUALITY:10) exists but is only used
    in the commented-out get_scores branch.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    total_scores and solved_tasks are accumulated per session and reset to zeros at each new
    session. session_results older than session - CONSIDERING_SESSION_COUNTS*2 are pruned.
    Scores for a UID are zeroed when its hotkey changes (set_new_hotkeys).
  notes: >-
    Persisted to state.npz: total_scores_{__STATE_VERSION__}, solved_tasks, number_of_tasks,
    session_results, last_set_weights_session, current_session.

documentation:
  status: docs_and_code
  source_version: "webgenie __VERSION__ = 1.3.4"
  primary_docs: ["README.md", "docs/validator.md", "docs/miner.md"]
  completeness: medium

