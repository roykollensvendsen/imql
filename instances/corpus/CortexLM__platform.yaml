schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  This repo is a multi-challenge MASTER orchestrator only. It does not itself score
  miners: each challenge runs in its own external Docker image/repo (not in this tree)
  and exposes GET /internal/v1/get_weights returning hotkey->weight. The master
  normalizes each challenge's weights, applies fixed per-challenge emission percentages,
  aggregates a weighted sum, maps hotkeys to UIDs, and calls set_weights. No burn logic
  exists. The actual scoring signals / ground truth are delegated to challenge repos
  that are not part of this codebase, so the operative scoring is undocumented here.

subnet:
  name: "Platform (PlatformNetwork multi-challenge)"
  owner_repo: "CortexLM__platform"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners submit to one or more independent challenges, each of which lives in its own
    repository and Docker image and owns its scoring logic, submissions, and SQLite state.
    Each challenge returns per-hotkey weights via a standard internal get_weights contract.
    The master platform aggregates these across active challenges using fixed emission
    percentages and submits final per-UID weights to Bittensor. What a miner produces and
    how it is scored is defined entirely by each external challenge, not by this repo.
  submission_format: [other]
  submission_format_other: >-
    Per-challenge / challenge-defined. The master is challenge-agnostic; each external
    challenge image defines its own submission type and scoring.

scoring_signals:
  - name: per_challenge_hotkey_weight
    metric_kind: other
    metric_kind_other: >-
      Opaque per-hotkey weight emitted by each external challenge's GET
      /internal/v1/get_weights; the underlying metric is challenge-defined and not visible
      in this repo.
    direction: higher_is_better
    weight: null
    normalization: other
    normalization_other: "l1 / sum-to-one across the challenge's hotkeys (value / total)"
    notes: >-
      Each challenge's raw weights are L1-normalized (sum-to-one) by normalize_weights in
      master/aggregator.py before being scaled by the challenge emission share. Non-finite
      and non-positive weights are dropped by _clean_weights.

ground_truth_sources:
  - kind: other
    kind_other: >-
      External challenge container. Ground truth/scoring is owned by each independent
      challenge repo+image and is not present in this codebase; the master only consumes
      the get_weights output over an authenticated internal HTTP contract.
    description: >-
      "A challenge is an independent repository and Docker image. It owns its logic, public
      routes, submissions, scoring data, and SQLite schema."
    source_identifier: "GET /internal/v1/get_weights"
    trust_model: unknown
    notes: >-
      Per-challenge shared token authenticates the internal endpoint. A signed-weights
      fallback (HMAC-SHA256) can supply cached weights when a challenge is unavailable.

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn / no emission-to-owner logic anywhere in the master pipeline."
  notes: >-
    aggregate_challenge_weights: emissions = normalize_emissions (each active challenge's
    emission_percent divided by total active emission_percent); for each ok challenge,
    hotkey_scores[hotkey] += emission * normalized_weight. Hotkeys with no UID in the
    metagraph are dropped, then uid_scores are L1-normalized to sum to one. A challenge
    whose get_weights fails (and has no usable fallback) is skipped (contributes zero).

weight_setting:
  cadence: per_epoch
  method: >-
    MasterWeightService.run_epoch: read metagraph hotkey->uid cache, collect get_weights
    from each active challenge (with capability check and optional signed fallback),
    aggregate, then WeightSetter.set_weights(final.uids, final.weights). Empty weights are
    skipped; with no subtensor it is a dry run.
  on_chain_call: set_weights
  tempo_or_interval: "360 seconds (master.epoch_interval_seconds default)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No temporal smoothing/EMA of the final weights in the master; weights are recomputed
      fresh each epoch from current challenge get_weights output.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      _clean_weights drops any hotkey weight that is non-finite or <= 0 before
      normalization; unknown hotkeys (not in metagraph hotkey_to_uid) are ignored when
      mapping to UIDs.
  - kind: other
    kind_other: >-
      Per-challenge shared-token authentication on the internal get_weights endpoint plus
      HMAC-SHA256 signed-weights fallback with max-age expiry; protects weight provenance
      rather than miner-side gaming.
    enforcement: rejection
    description: >-
      FallbackWeightClient verifies the HMAC signature of cached weights and rejects
      payloads older than max_age_seconds; the master blocks /internal/* from the public
      proxy.

sub_competitions:
  structure: multi_mechanism
  stages: []
  count: null
  notes: >-
    Multiple independent challenges run concurrently, each its own scoring mechanism with a
    fixed emission_percent share; the master blends their normalized weights. Number of
    challenges is registry-driven (not a fixed constant in this repo).

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    The master holds no per-miner ledger; it recomputes from challenge get_weights each
    epoch. Any per-miner state lives inside each external challenge's SQLite, outside this
    repo.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/architecture.md"
    - "docs/validator.md"
    - "docs/challenges.md"
  completeness: medium

