schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Validators burn a fixed 80% of weight to UID 0 (BURN_UID=0, BURN_WEIGHT=0.8) on every
  set_weights call; the remaining 20% is distributed across mining pools according to the
  composite mining-pool score computed in the federated container.

subnet:
  name: "TPN - Tao Private Network"
  owner_repo: "taofu-labs__tpn-subnet"
  netuid: 65
  implementation_lang: mixed

task:
  summary: >-
    Miners run "mining pools" that aggregate easy-to-run "worker" nodes offering VPN
    connections across diverse geographic locations. Validators sample a pool's workers,
    test that they respond, measure response speed and geographic/country coverage, and
    compute a composite mining-pool score from pool size, stability (up fraction),
    performance (response speed) and geographic uniqueness. Emissions are intended to be
    proportional to worker pool size * geographic diversity * slowness penalty.
  submission_format: [compute_service]

scoring_signals:
  - name: size_score
    metric_kind: volume
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      workers.length * stability_fraction — number of up workers, penalised by stability.
      Enters the composite multiplicatively.
  - name: stability_score
    metric_kind: uptime
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      stability_fraction = successes.length / selected_workers.length, times 100. The
      fraction is applied again in the composite product.
  - name: performance_score
    metric_kind: latency
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Math.min( 100 / ( median_test_length_s / s_considered_good ), 100 ) with
      s_considered_good = 20. Enters composite as performance_fraction = performance_score/100.
  - name: geo_score
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      geo_completeness_fraction = countries_in_pool / total_countries_across_all_pools.
      Enters composite as sqrt(geo_completeness_fraction).

ground_truth_sources:
  - kind: hardware_probe
    description: >-
      Validator samples workers (Cochrane sample size) and actively tests each via fetched
      wireguard/socks5 configs, recording success/failure and test_duration_s.
    source_identifier: "federated-container/modules/scoring/score_mining_pools.js"
    trust_model: adversarial
    notes: "Validators independently measure worker liveness and speed; pools cannot self-report."
  - kind: organic_traffic
    description: >-
      Geolocation of worker IPs (country) via ip2location / maxmind to compute geographic
      completeness across all pools.
    source_identifier: "federated-container/modules/geolocation"
    trust_model: oracle
    notes: ""

aggregation:
  method: weighted_average
  composition: multiplicative
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 0.8
    dynamic: false
    notes: >-
      BURN_UID=0, BURN_WEIGHT=0.8. In process_weights_for_netuid the burn_uid is removed,
      remaining weights normalized and scaled by (1 - burn_weight), then burn_weight is
      assigned to burn_uid.
  notes: >-
    Composite mining-pool score: score = size_score * performance_fraction *
    Math.sqrt( geo_completeness_fraction ) * stability_fraction. Python validator pulls
    these scores per UID over HTTP, EMA-smooths them into self.scores, then L1-normalizes
    (norm = ||scores||_1) into raw_weights before the burn split.

weight_setting:
  cadence: per_epoch
  method: >-
    Validator forward() fetches per-pool composite scores from the federated container
    (/validator/score/mining_pools), EMA-updates self.scores, then set_weights() L1-normalizes
    scores into raw_weights, calls process_weights_for_netuid with burn_uid=0/burn_weight=0.8,
    and emits on chain via subtensor.set_weights (retried up to 20 times).
  on_chain_call: set_weights
  tempo_or_interval: null
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      self.scores = alpha * scattered_rewards + (1 - alpha) * self.scores, with
      moving_average_alpha default 0.1.

anti_gaming:
  - kind: liveness_check
    enforcement: penalty
    description: >-
      Workers are randomly sampled and actively tested; only successes count toward stability,
      and the stability fraction multiplies the whole composite score, heavily penalising
      unstable pools.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Non-partnered mining pools must pass a node version check (score_node_version); pools
      running an outdated version throw and are not scored.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      80% of emission weight is burned to UID 0, capping the share distributable to miners
      regardless of scores.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    On metagraph resync, scores[uid] is zeroed when the hotkey at that uid changes
    (deregistration/replacement).
  notes: >-
    Validator maintains EMA self.scores per uid, persisted to state.npz across restarts.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs: ["README.md", "LITEPAPER.md", "federated-container/SPECIFICATION.md"]
  completeness: medium

