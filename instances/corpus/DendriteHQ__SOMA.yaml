    - "Exact per-level compression weighting w(b)=1/sqrt(b) and the S(b) aggregation are documented in docs/miner/context-compression.md but the actual implementation lives in the platform/sandbox layer (compression-ratio handling and screener selection) not present as runnable scoring code in this repo."
