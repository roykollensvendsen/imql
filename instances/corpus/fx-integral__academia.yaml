schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: unknown
mechanism_status_notes: >-
  The repo contains only a README and a ROADMAP (plus a logo). No validator, scoring,
  or weight-setting code exists, and no netuid is documented. The mechanism is purely
  aspirational/planned for 2026; nothing about live emissions, burn, or scoring can be
  determined from the source. Status is therefore 'unknown'.

subnet:
  name: "Academia"
  owner_repo: "fx-integral__academia"
  netuid: null
  implementation_lang: none_docs_only

task:
  summary: >-
    Academia is described as a Bittensor subnet "incubation academy": builders submit ideas,
    research, prototypes, or problem statements through a website, and an "AI Agent Team"
    plus a human "Project Review Board" evaluate, score, and rank them. Two planned mechanisms
    are named: Mechanism 0 (Research & Design — subnet theses, incentive designs, benchmark
    suites, exploit analysis) and Mechanism 1 (Prototype & Arena — working implementations,
    benchmark competition, mainnet-tested prototypes). Projects are said to "earn emissions
    based on real performance" and the strongest "graduate into their own dedicated subnets."
    No concrete miner output format, scoring function, or reward formula is specified in the source.
  submission_format: [content_link, source_code]

scoring_signals: []

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      An "AI agent evaluation system" / "Academia AI Agent Team" is said to handle intake,
      scoring, classification, ranking, and readiness scoring of candidate projects, reinforced
      by a human Project Review Board. The actual model, rubric values, and scoring procedure
      are not specified in the source.
    source_identifier: ""
    trust_model: unknown
    notes: >-
      Described only at the vision level (README "An AI agent evaluation system handles intake,
      scoring, and candidate ranking at scale"; ROADMAP "Academia AI Agent Team"). No
      implementation present.

