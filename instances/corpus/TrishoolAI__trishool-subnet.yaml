schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  On-chain weights are not computed locally from miner scores. The validator fetches a precomputed
  weight vector from a centralized platform API (GET /api/v1/validator/weights), overwrites
  self.scores with it, and calls set_weights() (L1-normalized). Local Petri scoring exists and runs in
  sandboxes, but its output is submitted back to the platform (submit_petri_output); the actual
  ranking/weighting logic lives off-chain on the platform and is not in this repository. The base
  EMA (moving_average_alpha=0.1) and update_scores() are present but never invoked in the validator
  flow.

subnet:
  name: "Trishool Subnet"
  owner_repo: "TrishoolAI__trishool-subnet"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners submit seed instructions (prompts, max 2500 characters / 200 words) via the platform REST
    API to probe target LLMs for problematic behavioral traits (deception, sycophancy, manipulation,
    overconfidence, power-seeking). Validators fetch a PetriConfig built from each submission, run the
    Petri alignment-auditing agent in a Docker sandbox against target/auditor/judge models, extract a
    score from the Petri output JSON, and submit the result back to the platform. The platform then
    computes weights that validators fetch and set on chain.
  submission_format: [signals, api_response]

scoring_signals:
  - name: petri_mean_score
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 1.0
    normalization: min_max
    notes: >-
      Extracted from Petri output summary.overall_metrics: prefers mean_score, then final_score, then
      score; else averages per-result scores. Clamped to [0.0, 1.0]. README also describes a binary
      variant ('Returns 1.0 if correct model selected, 0.0 otherwise'). This local score is submitted
      to the platform, not used directly to set on-chain weights by this validator.

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      Petri alignment-auditing agent (astro-petri, branch 'alignet') runs auditor and judge models
      against target models inside a Docker sandbox; the judge produces behavioral-trait scores in the
      Petri output JSON.
    source_identifier: "github.com/AstrowareAI/astro-petri (branch alignet)"
    trust_model: oracle
    notes: >-
      Auditor and judge models are LLMs (e.g. Qwen via chutes/openai-api). Final on-chain weights are
      determined by the off-chain platform, not reproduced here.

aggregation:
  method: undocumented
  composition: other
  composition_other: >-
    Weights are not aggregated locally. The validator fetches a precomputed per-UID weight dict from the
    platform API and applies it directly; the aggregation logic is off-chain and not in this repo.
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No burn logic in this repository. Whether the platform allocates emissions to a burn UID is not
      observable from the source.
  notes: >-
    set_weights() computes raw_weights = self.scores / L1-norm(self.scores), then
    process_weights_for_netuid + convert_weights_and_uids_for_emit before subtensor.set_weights. But
    self.scores is set entirely from platform_weights via _apply_platform_weights_to_scores (fill 0.0,
    then scores[uid]=weight), so the L1 normalization is the only local transform applied to
    platform-supplied weights.

weight_setting:
  cadence: rate_limited
  method: >-
    Background loop (_weight_update_loop) runs every update_weights_interval seconds (default 120 / 2
    min): resync_metagraph(), fetch platform weights via get_weights(), map by UID into self.scores,
    then set_weights() (L1-normalize + emit on chain).
  on_chain_call: set_weights
  tempo_or_interval: "120 seconds (update_weights_interval)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      The base class exposes update_scores() with an EMA (moving_average_alpha default 0.1), but the
      Trishool validator never calls it; weights are overwritten wholesale from the platform each cycle.

anti_gaming:
  - kind: deduplication
    enforcement: rejection
    description: >-
      Platform checks seed instructions for similarity against existing submissions (duplicate
      detection); README states an LLM judge checks for similar prompts (<50% variation). Enforced on
      the platform side.
  - kind: rate_limit
    enforcement: rejection
    description: >-
      README 'Submission Limits: 1 submission per miner per day'. Enforced on the platform side.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Validator-side jailbreak/fraud check on submissions (has_fraud / _validate_submission); empty
      seed instructions are rejected. Note: in this repo has_fraud() is stubbed to always return False
      (jailbreak pattern checks are commented out), so the active enforcement is the empty-string check.
  - kind: code_inspection
    enforcement: barrier
    description: >-
      Petri evaluation runs in an isolated Docker sandbox with a timeout (600s default) and resource
      constraints; MAX_CONCURRENT_SANDBOXES limits concurrency.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    Per-submission status enum (SubmissionStatus) is tracked transiently during evaluation, but no
    persistent per-miner ledger/reputation is maintained in this repo; authoritative miner state lives
    on the platform.

documentation:
  status: docs_and_code
  source_version: "1.0.0"
  primary_docs:
    - "README.md"
  completeness: medium

