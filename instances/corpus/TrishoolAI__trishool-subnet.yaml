  extracted_by: "im-extract (Claude Opus 4.8)"
  confidence_overall: medium
  extractor_notes: >-
    Core scoring/weighting authority is off-chain (centralized platform at api.trishool.ai). This repo
    implements only the validator client: it runs Petri, submits scores, and applies platform-supplied
    weights to chain. Numeric constants (alpha 0.1, interval 120s, timeout 600s) are taken verbatim
    from source. No burn fraction or aggregation temperature/decay constants exist in the source.
  evidence:
    - claim_field: "/subnet/implementation_lang"
      source_path: "neurons/validator.py"
      line_ref: "42-47"
      quote: "import bittensor as bt ... from alignet.base.validator import BaseValidatorNeuron"
