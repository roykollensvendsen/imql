schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Two live scoring mechanisms split by a dynamic API-driven ratio [burn, etf, imm]:
  V1 ETF (stake-amount x duration bonus) and V2 IMM (order-fill volume). A burn UID
  (BRN_UID=0) receives an emission share sized by ratio[0]. The repo README states the
  current split as ETF=0.75, IMM=0.25, but the literal burn fraction is fetched at runtime
  from an API (IMM_RATIO), so the live burn fraction is not a source constant. The
  template reward.py (query*2) is unused boilerplate; the real scoring lives in
  ETF/core/functions.py and is wired in via Validator.score overriding self.scores.

subnet:
  name: "HODL - The Alpha Exchange and ETF Subnet"
  owner_repo: "mobiusfund__etf"
  netuid: 118
  implementation_lang: python

task:
  summary: >-
    Zero-code mining. Under V1 (ETF) a miner stakes TAO (via its coldkey) into one of five
    supported TrustedStake alpha indexes; reward grows with stake amount and stake duration,
    incentivizing long-term conviction. Under V2 (IMM) a miner fills buy/sell orders on the
    HODL Exchange and is rewarded by fill volume in a rolling time window. Total emissions are
    split between ETF and IMM by a runtime ratio, with a residual share burned to a burn UID.
  submission_format: [other]
  submission_format_other: >-
    On-chain stake delegation into supported indexes (V1) and order-fill activity on an
    off-chain escrow order book (V2); no axon responses are scored.

scoring_signals:
  - name: etf_stake_conviction
    metric_kind: other
    metric_kind_other: stake_amount_with_duration_bonus
    direction: higher_is_better
    weight: null
    normalization: other
    normalization_other: >-
      Per-coldkey score divided by hotkey count, then per-index rescaled so each index's
      total equals INDEX_RATIO (equal 1/5 split) of the overall ETF score sum.
    notes: >-
      scoring(bal, blk) = bal**GAMMA * (1 + KAPPA*log(1 + min((mg.block-blk)/7200, DMAX)/DNORM)).
      GAMMA=1.00, KAPPA=0.25, DNORM=30, DMAX=36500. bal is coldkey stake value in TAO across
      subnets; (mg.block-blk)/7200 is stake duration in days. Matches README formula
      score = S*(1 + 0.25*ln(1 + D/30)).
  - name: imm_fill_volume
    metric_kind: volume
    direction: higher_is_better
    weight: null
    normalization: other
    normalization_other: >-
      Per-coldkey total fill volume in a rolling window (sell volume capped by coldkey stake
      held), then rescaled so the IMM score sum equals ratio[2]/ratio[1] times the ETF score
      sum; divided by hotkey count.
    notes: >-
      Volume is summed fill 'tao' over IMM_DATA in a rolling window (IMM_WINDOW days, README
      says currently 5). For buy orders (type 2) the counted volume is min(filled, stake still
      held in coldkey). Only coldkeys NOT staked in an ETF index are counted.

ground_truth_sources:
  - kind: market_data
    description: >-
      On-chain stake amounts and durations read from the Bittensor metagraph / subtensor
      ('finney'), priced via subnet alpha prices (nn[s.netuid].price).
    source_identifier: "bt.Subtensor('finney'); st.get_stake_info_for_coldkey; st.all_subnets()"
    trust_model: oracle
    notes: "Stake value = sum(stake * subnet alpha price) per coldkey."
  - kind: organic_traffic
    description: >-
      Order-fill volume and rolling-window data from the HODL Exchange escrow order book,
      fetched from subnet118.com APIs; index membership and blacklist from TrustedStake admin APIs.
    source_identifier: "https://api.subnet118.com/imm/{data,window,ratio}; https://api.app.trustedstake.ai/admin/{blacklist,indexes}"
    trust_model: trusted
    notes: >-
      INDEX_IDS lists the five supported TrustedStake index delegate ss58 addresses;
      COLDKEY_BL is an admin blacklist of coldkeys.

aggregation:
  method: proportional
  composition: hybrid
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      BRN_UID=0 score set to sc['score'].sum()/sum(ratio[1:])*ratio[0] (else 1.0 when
      sum(ratio[1:])==0). ratio=[burn, etf, imm] is fetched from IMM_RATIO at runtime
      (default [1.0,0.0,0.0] on failure -> all miner scores zeroed, full burn). If ratio[1]==0
      ETF scores are zeroed; if ratio[2]==0 IMM scores are zeroed. README states current
      ETF=0.75, IMM=0.25 but the literal burn fraction is API-driven, not a source constant.
  notes: >-
    Final per-UID score = ETF score, overridden by IMM score where a coldkey has IMM activity
    (sc.loc[~sc['score2'].isna(), 'score'] = sc['score2']), plus the BRN_UID burn share.
    Weights are then L1-normalized in BaseValidatorNeuron.set_weights (raw_weights = scores/norm).

weight_setting:
  cadence: rate_limited
  method: >-
    Validator.score() runs only when the wall-clock minute is 20 or 50 (twice hourly) plus a
    random 20-50s jitter, then sets self.scores = fn.score() directly (no moving-average in this
    override path). BaseValidatorNeuron.set_weights L1-normalizes scores and emits.
  on_chain_call: set_weights
  tempo_or_interval: "twice per hour (minute==20 or 50)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      The base template's update_scores EMA (moving_average_alpha) is bypassed: Validator.score
      assigns self.scores = fn.score() directly each cycle. fn.score recomputes from current
      on-chain/API state with no temporal smoothing of the final reward.

anti_gaming:
  - kind: deduplication
    enforcement: penalty
    description: >-
      Per-coldkey score is divided by the number of registered hotkeys (sc['count']), so
      splitting one coldkey across many hotkeys does not increase total reward.
  - kind: other
    kind_other: blacklist_exclusion
    enforcement: rejection
    description: >-
      Coldkeys on the TrustedStake admin blacklist (COLDKEY_BL) are excluded from ETF index
      delegator sets before scoring.
  - kind: other
    kind_other: cross_mechanism_exclusivity
    enforcement: barrier
    description: >-
      A coldkey staked in an ETF index is not counted for IMM (IMM uses only coldkeys with
      index isna()), preventing double counting across V1 and V2.
  - kind: risk_limit
    enforcement: penalty
    description: >-
      For IMM buy orders the counted volume is capped at the stake the coldkey still holds
      (d2['volume'] = min(volume, stake)); assets bought must remain in the coldkey during the
      window to count.
  - kind: other
    kind_other: stake_duration_requirement
    enforcement: barrier
    description: >-
      Stake start block is floored at FIRST_BLOCK; duration = (mg.block - blk)//7200 days,
      rewarding long-held stake. Scores are NaN/zero when mg.block <= blk.

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: ETF
      role: main
    - name: IMM
      role: main
  count: 2
  notes: >-
    Two coexisting mechanisms (V1 ETF, V2 IMM) sharing emissions by the runtime ratio, with a
    burn share to BRN_UID. README roadmap: V1 ETF live, V2 HODL Exchange Q1 2026, V3 futures/options Q3 2026.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    No persistent per-miner ledger in the scoring code; every cycle fn.score() recomputes from
    current chain/API state. Stake duration is derived from on-chain stake start block, not a
    locally maintained ledger.

