schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Storage-miner weights are actively scored on-chain (bandwidth/storage/uptime + family
  aggregation), but a dynamically computed burn_percentage of the 65,535 weight budget is
  routed to UID 0 (the validator) rather than to miners. When alpha emissions exceed storage
  cost, the residual is burned to UID 0; the burn fraction is computed each cycle, not fixed.

subnet:
  name: "Hippius (thebrain / theNerveLab)"
  owner_repo: "thenervelab__thebrain"
  netuid: 75
  implementation_lang: rust

task:
  summary: >-
    A miner runs a Hippius storage node (IPFS-backed) that stores file shards and serves
    bandwidth. Validators report per-node quality metrics (stored bytes, served bandwidth,
    uptime, strikes, integrity failures) on-chain; miners cannot self-report. Only
    StorageMiner-type nodes earn non-zero weight. Per-node scores are aggregated per family
    (SS58 owner + linked child nodes), smoothed, and converted to Bittensor subnet-75 weights.
  submission_format: [compute_service]

scoring_signals:
  - name: bandwidth_served
    metric_kind: throughput
    direction: higher_is_better
    weight: 0.7
    normalization: other
    normalization_other: "log2(1+x) concave fixed-point (8.8) scoring"
    notes: >-
      bw_score = log2(bandwidth_bytes + 1); blended at NodeBandwidthWeightPermille=700 (70%).
  - name: shard_storage
    metric_kind: throughput
    direction: higher_is_better
    weight: 0.3
    normalization: other
    normalization_other: "log2(1+x) concave fixed-point (8.8) scoring"
    notes: >-
      st_score = log2(shard_data_bytes + 1); blended at NodeStorageWeightPermille=300 (30%).
  - name: uptime
    metric_kind: uptime
    direction: higher_is_better
    weight: null
    normalization: other
    normalization_other: "permille multiplier (uptime_permille / 1000)"
    notes: >-
      Multiplicative on the blended score: score *= uptime_permille/1000. Not additive.
  - name: strikes_penalty
    metric_kind: other
    metric_kind_other: "validator-issued strike penalty"
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      Subtracted directly: penalty = strikes * StrikePenalty(50). node_weight = max(0, score - penalty).
  - name: integrity_fails_penalty
    metric_kind: other
    metric_kind_other: "data-integrity failure penalty"
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      Subtracted directly: integrity_fails * IntegrityFailPenalty(100).

ground_truth_sources:
  - kind: hardware_probe
    description: >-
      Validators observe each storage node and submit NodeQuality metrics on-chain via
      submit_node_quality(); miners cannot self-report. Family placement/ping reliability is
      tracked off-chain (miner_ping_stats) for assignment eligibility.
    source_identifier: "submit_node_quality / NodeQuality (pallets/arion-pallet)"
    trust_model: trusted
    notes: >-
      Reported metrics: shard_data_bytes, bandwidth_bytes, uptime_permille, strikes, integrity_fails.

aggregation:
  method: weighted_average
  composition: hybrid
  normalization: other
  normalization_other: >-
    proportional to family share of total active-family weight, scaled into miners_pool
  temperature: null
  decay_rate: 0.8
  min_weight_floor: 10
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      uid_zero_pool = 65535 * burn_percentage, where burn_percentage = max(0, emissions-cost)/emissions
      (defaults to 0.2 if emissions == 0). emissions = alpha_price * EMISSION_PERIOD(50); cost =
      storage_gb * price_per_gb. miners_pool = 65535 - uid_zero_pool. UID 0 weight is capped so total
      <= 65535.
  notes: >-
    Family raw weight = sum over top FamilyTopN(10) node weights with geometric rank decay
    FamilyRankDecayPermille=800 (factor 0.8^rank). Newcomer floor NewcomerFloorWeight=10 applied within
    NewcomerGraceBuckets=24. EMA smoothing FamilyWeightEmaAlphaPermille=300 (30% new, 70% prev), then
    delta clamp +/- MaxFamilyWeightDeltaPerBucket=100. Per-miner weight =
    (family_arion_weight / total_arion_weight) * miners_pool. Caps: MaxNodeWeight=50000,
    MaxFamilyWeight=65535.

weight_setting:
  cadence: continuous
  method: >-
    Validator offchain_worker periodically calls calculate_weights_for_nodes(), saves rankings to the
    ranking pallet (instances 1=storage, 3=validator), then constructs and signs a Bittensor set_weights
    extrinsic submitted to the Finney chain for subnet 75. An external Python submitter
    (vali-weights-submitter/weight_submitter.py) is an alternative path that reads RankedList and submits
    via SubtensorModule.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "BittensorCallSubmission interval (offchain worker); rewards every BlocksPerEra = HOURS*6 (~3600 blocks / 6h)"
  smoothing:
    kind: ema
    alpha: 0.3
    window: null
    notes: >-
      FamilyWeightEmaAlphaPermille=300 => smoothed = prev*0.7 + raw*0.3, applied to family weight before
      delta clamp.

anti_gaming:
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Family diversity: at most one replica per family (family = main_node_id or node_id), so many
      linked nodes in one family cannot multiply rewards. Family weight uses only top-10 nodes with 0.8
      rank decay, favouring few high-quality nodes over many low-quality ones.
  - kind: liveness_check
    enforcement: penalty
    description: >-
      Offline detection: if last heartbeat exceeds the offline buffer, weight is set to 0 (storage
      miners 3000 blocks ~5h; other types 300 blocks ~30min). Ping reliability >= 0.8
      (last10_success_ratio) gates placement eligibility.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Strikes (StrikePenalty=50 each) and integrity failures (IntegrityFailPenalty=100 each) are
      subtracted directly from a node's score. Metrics are validator-reported, not self-reported.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Newcomer/ramp-up controls: new families floored at weight 10 for NewcomerGraceBuckets=24 buckets;
      EMA smoothing + per-bucket delta clamp (+/-100) prevent sudden weight jumps; family age gate
      (>=3 days) and ~7-day age penalty slow new-cluster dominance in placement ranking.

sub_competitions:
  structure: per_task_type
  stages: []
  count: null
  notes: >-
    Weights are computed per miner type via separate functions (storage, storage-S3, validator, GPU,
    compute) and the ranking pallet uses separate instances per type. Only storage (instance 1) and
    validator (instance 3) are Active; compute (2), GPU (4), and storage-S3 (5) instances are disabled
    / commented out.

per_miner_state:
  tracked: true
  state_kinds: [reputation, cumulative_score, registration_age, status_enum, performance_ledger]
  status_values: ["Active", "Inactive"]
  reset_policy: >-
    Inactive miners have ping history purged and miner_ping_stats deleted; pings older than ~7 days
    trimmed. FamilyWeight persists and is EMA-smoothed across buckets.
  notes: >-
    On-chain: NodeWeightByChild, FamilyWeight (EMA-smoothed), FamilyWeightRaw, FamilyFirstSeenBucket
    (registration age for newcomer grace), NodeRankings/RankedList. MIN_BLOCKS_REGISTERED=1000 grace
    (non-storage types reduced 80% for first 1000 blocks).

