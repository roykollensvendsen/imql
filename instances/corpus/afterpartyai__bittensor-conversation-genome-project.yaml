  extracted_by: "im-extract (Claude Opus 4.8)"
  confidence_overall: high
  evidence:
    - claim_field: /subnet/name
      source_path: README.md
      line_ref: "1"
      quote: "# **ReadyAI**"
    - claim_field: /task/summary
      source_path: README.md
      line_ref: "929"
      quote: >-
        Three miners are selected by a validator to receive the same Data Window, which is
        pulled from a larger raw data source. After they generate a set of tags for their
        assigned window, miners are rewarded based on the quality and relevance of their tags
    - claim_field: /scoring_signals/0/weight
      source_path: conversationgenome/validator/evaluator.py
      line_ref: "30-35"
      quote: 'scoring_factors = { "top_3_mean": 0.55, "median_score": 0.1, "mean_score": 0.25, "max_score": 0.1, }'
    - claim_field: /aggregation/notes
      source_path: conversationgenome/validator/evaluator.py
      line_ref: "213-218"
      quote: >-
