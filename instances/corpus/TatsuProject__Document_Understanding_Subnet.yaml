schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  set_weights() always allocates a fixed 1.0 weight to UID 0 (subnet/burn) plus a
  remaining_weight = 1.0 - subnet_weight which evaluates to 0.0 (subnet_weight is
  hard-coded 1.0). With remaining_weight == 0.0, the documented proportional /
  winner-take-all miner reward distribution produces zero effective miner weight, so
  in practice all emission is routed to UID 0. The scoring pipeline (reward.py) is
  fully implemented and runs, but its output cannot reach miners given the constants.

subnet:
  name: "Docs-Insights (Document Understanding Subnet)"
  owner_repo: "TatsuProject__Document_Understanding_Subnet"
  netuid: 84
  implementation_lang: python

task:
  summary: >-
    The validator synthetically generates a document image and its ground-truth label
    for one of five rotating sub-task types (checkbox, doc-class, doc-parse, encircle,
    highlight) and sends the image to miners. Miners run vision models, OCR engines and
    LLMs/VLMs to detect checkboxes+associated text, classify the document, parse it into
    NER sections, or detect highlighted/encircled text, returning structured output. The
    validator rewards each miner by comparing its output to ground truth via bounding-box
    overlap and text-similarity scoring.
  submission_format: [api_response]
  submission_format_other: ""

scoring_signals:
  - name: bounding_box_overlap
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.5
    normalization: none
    notes: >-
      calculate_overlap() computes intersection / max(area1,area2) polygon overlap,
      returns 0 if detected box >= 2x ground-truth area. Thresholded into a box score
      (CBS/HBS/EBS): >0.95 -> 1.0, >0.7 -> graded, else 0. For checkbox/highlight/encircle
      the box score is averaged 50/50 with text similarity.
  - name: text_similarity
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.5
    normalization: none
    notes: >-
      hard_match_strings / hard_match_strings_2 do strict per-character match percentage
      with a 75.0 minimum-match floor; result graded ts>=100 -> 1.0, ts>=30 -> (ts-30)/70,
      else 0. Averaged 50/50 with box score for checkbox/highlight/encircle; used directly
      (/100) for doc-class.
  - name: time_score
    metric_kind: latency
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      time_score_calculation() is computed (1 - linear ramp between 0.01*Tn and 10*Tn,
      Tn=2.0) but final_score_calculation (0.3*time + 0.7*accuracy) is commented out in
      every reward function; the returned score is accuracy only, so time has zero effect.
  - name: doc_parse_composite
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      For the doc-parse sub-task only, the final per-miner reward is
      0.3*classification_score + 0.7*parsing_score, where parsing_score is a recursive
      per-section average (doc_parse_reward / compute_section_score) of basic-unit rewards
      (50/50 text match + bbox overlap).

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Synthetic document images with paired ground-truth JSON generated on the fly by the
      validator (checkbox, document, encircled-text, highlighted-text generators). A task
      type is chosen by cycling through available_tasks; an image+label is produced and the
      label is withheld from the miner.
    source_identifier: "template/validator/data_generation/*"
    trust_model: trusted
    notes: >-
      available_tasks = ["checkbox","doc-class","doc-parse","encircle","highlight"] cycled
      via itertools.cycle in forward.py.

aggregation:
  method: winner_take_all
  composition: hybrid
  normalization: none
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 1.0
    dynamic: false
    notes: >-
      subnet_weight is hard-coded to 1.0 and always assigned to UID 0; remaining_weight =
      1.0 - subnet_weight = 0.0 is what the miner-distribution branches divide up. In the
      winner-take-all fallback, if no miner's score gap exceeds the threshold (or the top
      miner has been top for max_consecutive_rewards tempos) the remaining_weight is also
      added back to UID 0.
  notes: >-
    Per-miner scores feed two branches: (1) if >=2 miners have score >= 0.8, distribute
    remaining_weight proportionally to their scores; (2) otherwise winner-take-all to the
    top miner only if its score gap over second >= top_reward_threshold (0.05). UID 0
    always receives the fixed subnet_weight first.

weight_setting:
  cadence: per_epoch
  method: >-
    set_weights(): allocate fixed subnet_weight=1.0 to UID 0, then distribute
    remaining_weight (=0.0) either proportionally among miners scoring >=0.8 (if 2+) or
    winner-take-all to the top miner when its score gap over the second-best exceeds
    top_reward_threshold=0.05; a top miner that stays top for max_consecutive_rewards=18
    tempos has the remaining weight redirected to UID 0. Weights then pass through
    process_weights_for_netuid and convert_weights_and_uids_for_emit before emit.
  on_chain_call: set_weights
  tempo_or_interval: "100"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores() applies self.scores = alpha*scattered_rewards + (1-alpha)*self.scores
      with alpha = config.neuron.moving_average_alpha (default 0.1).

anti_gaming:
  - kind: rate_limit
    enforcement: barrier
    description: >-
      vpermit_tao_limit default 12000 limits TAO allowed to query a validator with a
      vpermit; sample_size default 50 miners queried per step.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Strictness rules in scoring: calculate_overlap returns 0 if detected box >= 2x
      ground-truth area; accuracy functions return 0 if abs(len(detected)-len(gt)) > 1;
      doc-parse returns 0 if NER section keys differ from ground truth.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      top_miner_history caps consecutive rewards: a miner that is top for
      max_consecutive_rewards=18 consecutive tempos has its remaining emission redirected
      to the subnet (UID 0) and its history reset, preventing indefinite single-miner capture.

sub_competitions:
  structure: per_task_type
  stages: []
  count: 5
  notes: >-
    Five sub-task types rotate via itertools.cycle: checkbox, doc-class, doc-parse,
    encircle, highlight. Each has its own reward function but all feed the same single
    moving-average score array and one set_weights pipeline.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum]
  status_values: []
  reset_policy: >-
    Moving-average scores reset to 0 for a UID whose hotkey is replaced (resync_metagraph).
    top_miner_history is truncated to the last max_consecutive_rewards+1 entries and cleared
    when a miner hits the 18-tempo cap.
  notes: >-
    self.scores holds the EMA score per UID; self.top_miner_history is a list tracking which
    UID was top in recent tempos to enforce the consecutive-reward cap.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/Technical_Guide.md"
  completeness: medium

