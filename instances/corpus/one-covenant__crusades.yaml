schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: full_burn
mechanism_status_notes: >-
  hparams.json ships burn_rate=1.0 and burn_uid=1, so the live validator routes
  100% of emissions to burn_uid; the documented winner-takes-all MFU scoring runs
  (submissions are still evaluated) but receives 0 weight under the shipped config.

subnet:
  name: "Templar Crusades"
  owner_repo: "one-covenant__crusades"
  netuid: 3
  implementation_lang: python

task:
  summary: >-
    Miners host a single train.py at a public URL and commit the URL on-chain
    (timelock-encrypted). Validators download the code, run it inside a Docker/
    Basilica GPU container against a fixed benchmark model and dataset, and score
    it by Model FLOPs Utilization (MFU). The single highest-MFU finished
    submission (leaderboard rank 1, above an adaptive threshold) is rewarded
    winner-takes-all; everything else (and, under the shipped burn_rate, all of it)
    goes to burn_uid.
  submission_format: [source_code, content_link, commitment_hash]

scoring_signals:
  - name: mfu
    metric_kind: throughput
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Model FLOPs Utilization is the primary metric. Per submission, MFU is taken
      as statistics.median_low over the successful evaluation runs. Rejected below
      min_mfu floor and above max_plausible_mfu (anti-cheat) at eval time.
  - name: success_rate_gate
    metric_kind: reward
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Gate, not an additive signal: a submission whose success rate across runs is
      below min_success_rate is marked FAILED_EVALUATION and gets no score.

ground_truth_sources:
  - kind: reference_model
    description: >-
      Fixed benchmark training task: train the benchmark model on the benchmark
      dataset for a set number of steps; correctness verified against a reference
      run via loss comparison and final weight verification.
    source_identifier: "Qwen/Qwen2.5-7B on HuggingFaceFW/fineweb"
    trust_model: trusted
    notes: >-
      benchmark_model_name, benchmark_dataset_name from hparams.json. README top
      line describes Qwen2.5-3B; shipped hparams use Qwen2.5-7B.
  - kind: llm_judgment
    description: >-
      LLM-based exploit detection scans miner code before evaluation; fail-open
      (never blocks on LLM errors).
    source_identifier: "OpenRouter / anthropic/claude-opus-4.6 (EXPLOIT_DETECTION_MODEL)"
    trust_model: adversarial
    notes: "Security/anti-exploit gate, not a scoring oracle."

aggregation:
  method: winner_take_all
  composition: gated
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "1"
    fraction: 1.0
    dynamic: false
    notes: >-
      burn_rate=1.0 in hparams.json => burn_weight=1.0, winner_weight=0.0.
      Code computes winner_weight = 1.0 - burn_rate and burn_weight = burn_rate;
      with no finished/valid winner, 100% goes to burn_uid regardless.
  notes: >-
    Distribution is winner_weight=(1-burn_rate) to leaderboard rank 1 and
    burn_weight=burn_rate to burn_uid. Leaderboard rank-1 selection uses an
    adaptive threshold (base_threshold) that is set to the improvement on a new
    leader and decays decay_percent per decay_interval_blocks toward base.

weight_setting:
  cadence: rate_limited
  method: >-
    Two-UID weight vector [burn_uid, winner_uid] = [burn_rate, 1-burn_rate],
    normalized to sum 1.0. If winner==burn_uid or no valid winner, single UID
    burn_uid gets weight 1.0.
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA on the final reward; weights are recomputed each cycle. The adaptive
      threshold has its own decay but that gates leaderboard membership, not the
      emitted weight vector.

anti_gaming:
  - kind: code_inspection
    enforcement: rejection
    description: >-
      Static security scanner (security_defs.py) blocks forbidden imports,
      monkey-patching, timer tampering, etc.; plus LLM-based exploit detection
      (check_code_for_exploits) marks submissions FAILED_EVALUATION on exploit.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Weight verification against a reference run (weight_relative_error_max),
      loss comparison (max_loss_difference), min_params_changed_ratio, and
      timer_divergence_threshold; MFU floor (min_mfu) and ceiling
      (max_plausible_mfu) reject implausible results.
  - kind: rate_limit
    enforcement: rejection
    description: >-
      min_blocks_between_commits (360) enforced per hotkey; first-committer-wins
      on duplicate code URLs; max_evaluated_urls cap on tracked URLs.
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      Code URL committed timelock-encrypted (set_reveal_commitment, reveal_blocks);
      downloaded code hash must match the committed 32-char SHA256 truncation.
  - kind: collateral
    enforcement: rejection
    description: >-
      Submission payment: miner must transfer_stake fee_rao worth of alpha to
      burn_uid's coldkey and embed the payment extrinsic ref; unverified payment =>
      FAILED_EVALUATION. payment.enabled=true, fee_rao=50000000 in shipped hparams.
  - kind: hardware_validation
    enforcement: rejection
    description: >-
      Evaluation runs in a controlled Docker/Basilica A100 container; SSRF
      protection on code download (private-IP/redirect blocking, size/content checks).

sub_competitions:
  structure: single
  stages: []
  count: null
  notes: >-
    Single MFU competition. Competition version derived from __version__
    (major*100+minor); state resets on version change. Not modeled as distinct
    sub-competitions.

per_miner_state:
  tracked: true
  state_kinds: [status_enum, cumulative_score]
  status_values: [EVALUATING, FINISHED, FAILED_EVALUATION]
  reset_policy: >-
    State (last_processed_block, evaluated_code_urls) reset when COMPETITION_VERSION
    changes. Adaptive threshold + previous_winner tracked in DB across cycles.
  notes: >-
    Per-submission records hold MFU score, tokens/sec, success flag; leaderboard
    winner + adaptive threshold persisted as validator state.

documentation:
  status: docs_and_code
  source_version: "0.19.1"
  primary_docs: ["README.md", "docs/Validator.md"]
  completeness: high

provenance:
  extracted_by: "im-extract / Claude Opus 4.8"
  confidence_overall: high
