schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Validator computes per-platform success-only scores from TEE worker telemetry,
  normalizes per platform, weighted-sums by emission_weight, applies a kurtosis
  curve, and sets weights on-chain via fiber set_node_weights. No burn allocation
  is present in the code.

subnet:
  name: "Subnet 42 (Gopher)"
  owner_repo: "gopher-lab__subnet-42"
  netuid: 42
  implementation_lang: python

task:
  summary: >-
    Miners run a TEE (Intel SGX) job worker that scrapes/indexes data across
    several platforms (Twitter/X, TikTok, web, Reddit, LinkedIn, LLM). The
    validator collects per-source telemetry counters from each worker, computes
    deltas over a time window, and rewards the volume of successful work
    (e.g. returned tweets, transcriptions, videos, pages, items, profiles).
    Errors are not penalized; only success metrics are scored.
  submission_format: [compute_service]

scoring_signals:
  - name: twitter_tweets
    metric_kind: volume
    direction: higher_is_better
    weight: 0.7
    normalization: min_max
    notes: >-
      success_metrics=["tweets"] (raw field twitter_returned_tweets);
      platform emission_weight 0.7. Per-platform raw success summed then
      min-max normalized across nodes.
  - name: twitter_apify_followers
    metric_kind: volume
    direction: higher_is_better
    weight: 0.05
    normalization: min_max
    notes: 'success_metrics=["followers"] (twitter_returned_followers); emission_weight 0.05.'
  - name: tiktok_transcriptions
    metric_kind: volume
    direction: higher_is_better
    weight: 0.05
    normalization: min_max
    notes: 'success_metrics=["transcriptions"] (tiktok_transcription_success); emission_weight 0.05.'
  - name: tiktok_search_videos
    metric_kind: volume
    direction: higher_is_better
    weight: 0.05
    normalization: min_max
    notes: 'success_metrics=["videos"] (tiktok_returned_videos); emission_weight 0.05.'
  - name: web_pages
    metric_kind: volume
    direction: higher_is_better
    weight: 0.05
    normalization: min_max
    notes: 'success_metrics=["pages","scraped_pages"]; emission_weight 0.05.'
  - name: reddit_items
    metric_kind: volume
    direction: higher_is_better
    weight: 0.05
    normalization: min_max
    notes: 'success_metrics=["items"] (reddit_returned_items); emission_weight 0.05.'
  - name: linkedin_profiles
    metric_kind: volume
    direction: higher_is_better
    weight: 0.05
    normalization: min_max
    notes: 'success_metrics=["profiles"] (linkedin_returned_profiles); emission_weight 0.05.'
  - name: llm_processed_items
    metric_kind: volume
    direction: higher_is_better
    weight: 0.0
    normalization: min_max
    notes: >-
      emission_weight=0.0 -- "Not scored currently, but tracked for metrics
      visibility". success_metrics=["processed_items"].

ground_truth_sources:
  - kind: real_engagement
    description: >-
      Per-source success/error counters reported by each miner's TEE job worker,
      fetched over the network via TEETelemetryClient. The active indexer source
      and required worker version are fetched from the MASA TEE API
      (tee-api.masa.ai). Telemetry from unexpected sources/versions is rejected.
    source_identifier: "https://github.com/gopher-lab/tee-worker ; MASA_TEE_API (https://tee-api.masa.ai)"
    trust_model: adversarial
    notes: >-
      Counters are self-reported by the worker; scoring guards against
      multi-source amplification and enforces the active worker version.

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: min_max
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn allocation present in weight calculation."
  notes: >-
    Per platform: raw success score = sum of success_metrics; min-max normalized
    across nodes to [0,1]; multiplied by platform.emission_weight; summed across
    platforms (total_weighted_score). The combined scores are then passed through
    apply_kurtosis_custom (sigmoid on z-scored values with tanh boost, renormalized
    to [0,1]) before being used as on-chain weights. Platform emission_weights are
    validated to sum to 1.0.

weight_setting:
  cadence: rate_limited
  method: >-
    set_weights_loop runs every WEIGHTS_LOOP_CADENCE_SECONDS (half a weight-setting
    period). set_weights checks blocks_since_last_update vs min_interval_to_set_weights
    and waits if the minimum interval has not elapsed; then computes deltas and
    weights and submits up to 3 attempts.
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks (BLOCKS_PER_WEIGHT_SETTING) * 12s; loop cadence = period/2"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the final reward in code; deltas computed over the
      telemetry window (TELEMETRY_EXPIRATION_HOURS default 8h) then scored fresh
      each cycle.

anti_gaming:
  - kind: liveness_check
    enforcement: rejection
    description: >-
      _validate_source_id enforces the active worker version (fail closed if the
      record's worker_version != active_worker_version) and requires the expected
      active indexer source to be present; otherwise the record is skipped.
  - kind: deduplication
    enforcement: rejection
    description: >-
      aggregate_telemetry_stats_without_validation only counts the active indexer
      source; if the active source is unknown it aggregates only when exactly one
      source is present, to avoid multi-source amplification.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Delta calculation clamps per-field deltas to max(0, end-start) and detects
      worker restarts via boot_time changes, splitting into chunks and summing,
      to prevent counter-reset inflation.

sub_competitions:
  structure: multi_mechanism
  stages: []
  count: 8
  notes: >-
    Eight platform configs (twitter, twitter-apify, tiktok-transcription,
    tiktok-search, web, reddit, linkedin, llm) each scored independently and
    combined by emission_weight. llm has emission_weight 0.0 (tracked, not scored).

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger]
  status_values: []
  reset_policy: >-
    Telemetry stored per hotkey in TelemetryStorage; old entries cleaned after
    TELEMETRY_EXPIRATION_HOURS (default 8h). Scoring uses delta between oldest and
    latest records within the retained window each cycle.
  notes: >-
    No persistent score/EMA carried across cycles in code; state is the retained
    raw telemetry counters per hotkey.

