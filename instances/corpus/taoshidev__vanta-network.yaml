schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Debt-based scoring activated (first payouts Dec 2025 for Nov 2025 performance) and pays
  miners proportional to remaining penalty-adjusted PnL debt. When the sum of distributed
  miner weights is < 1.0 the residual (1.0 - sum) is assigned to a dedicated burn UID
  (229 mainnet / 220 testnet), so emissions are partially burned dynamically. Pre-activation
  miners received only minimum dust weights with the remainder burned.

subnet:
  name: "Vanta Network (formerly Proprietary Trading Network / PTN)"
  owner_repo: "taoshidev__vanta-network"
  netuid: 8
  implementation_lang: python

task:
  summary: >-
    Miners submit LONG, SHORT, or FLAT trading signals for Forex, Crypto, and Equities trade
    pairs during market hours. Validators receive and validate signals, track positions and
    portfolio returns with leverage limits, carry fees, spread fees and slippage, and reward
    miners via a debt-based scoring system that pays them proportional to their previous pay
    period's penalty-adjusted realized/unrealized PnL (in USD), with payouts targeting weekly
    completion at midnight Sunday UTC.
  submission_format: [signals]

scoring_signals:
  - name: penalty_adjusted_pnl
    metric_kind: pnl
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      SCORING_PNL_WEIGHT = 1.0; all other component weights (Omega, Sharpe, Sortino,
      statistical confidence, Calmar, return) are set to 0.0 in current config. Per-checkpoint
      penalty-adjusted PnL = sum of HWM-gated realized_pnl deltas * total_penalty plus
      min(0, unrealized_pnl) * total_penalty of the last checkpoint. Realized/unrealized PnL
      are in USD.

ground_truth_sources:
  - kind: market_data
    description: >-
      Real-time market prices used to validate signals and compute position PnL, sourced from
      multiple financial data providers (Polygon, Tiingo, Binance, Bybit, Kraken).
    source_identifier: "data_generator (Polygon, Tiingo, Binance, Bybit, Kraken)"
    trust_model: oracle
    notes: "Validators receive signals and price them against live market data feeds."

aggregation:
  method: proportional
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: 0.075
  min_weight_floor: 1.5e-05
  burn_allocation:
    enabled: true
    address_or_uid: "229"
    fraction: null
    dynamic: true
    notes: >-
      If sum of miner weights < 1.0, burn address (uid 229 mainnet / uid 220 testnet) receives
      the residual (1.0 - sum). If sum >= 1.0, weights are normalized to 1.0 and burn gets 0.
  notes: >-
    Weights are proportional to each miner's remaining_payout_usd (needed cumulative
    penalty-adjusted PnL minus already-paid emissions). Minimum 'dust' floors are applied per
    bucket (CHALLENGE/PLAGIARISM 1x, PROBATION 2x, MAINCOMP 3x, ENTITY 4x, UNKNOWN 0x of the
    static dust value CHALLENGE_PERIOD_MIN_WEIGHT = 1.5e-05), scaled by 30-day PnL within
    bucket. WEIGHTED_AVERAGE_DECAY_RATE = 0.075 emphasizes recent performance over the
    180-day target ledger window.

weight_setting:
  cadence: weekly
  method: >-
    DebtBasedScoring.compute_results produces (hotkey, weight) tuples mapped to UIDs in
    weight_calculator_manager; weights are submitted via subtensor_ops_client.set_weights_rpc.
    Payout periods are weekly, starting and ending at midnight Sunday 00:00:00 UTC; weights are
    refreshed every 5 minutes (SET_WEIGHT_REFRESH_TIME_MS).
  on_chain_call: set_weights
  tempo_or_interval: "SET_WEIGHT_REFRESH_TIME_MS = 60 * 5 * 1000 (5 minutes refresh); weekly payout window"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA on final reward; recency emphasis comes from the weighted-average decay
      (WEIGHTED_AVERAGE_DECAY_RATE = 0.075) over the 180-day ledger window.

anti_gaming:
  - kind: plagiarism_detection
    enforcement: elimination
    description: >-
      Cross-correlation analysis detects order similarity; follower similarity threshold 0.75
      (PLAGIARISM_FOLLOWER_SIMILARITY_THRESHOLD), 10-day lookback (PLAGIARISM_LOOKBACK_RANGE_MS),
      60-max time lags, with a 2-week review period (PLAGIARISM_REVIEW_PERIOD_MS) before
      elimination. Repeated copying eliminates the miner.
  - kind: risk_limit
    enforcement: elimination
    description: >-
      Miners exceeding 10% max drawdown are eliminated (MAX_TOTAL_DRAWDOWN = 0.9, i.e. portfolio
      may not fall below 0.90x peak). Daily drawdown limit MAX_DAILY_DRAWDOWN = 0.95.
  - kind: challenge_period
    enforcement: barrier
    description: >-
      New miners enter a 61-90 day challenge period (CHALLENGE_PERIOD_MINIMUM_DAYS = 61,
      MAXIMUM_DAYS = 90) and must pass the 75th percentile
      (CHALLENGE_PERIOD_PERCENTILE_THRESHOLD = 0.75) to enter the main competition; they receive
      only minimal dust weights until then.
  - kind: other
    kind_other: probation_ranking_elimination
    enforcement: elimination
    description: >-
      Probation: miners scoring below the 15th-highest ranked miner in their asset class enter a
      probationary period (30 days per README) and are eliminated if they fail to outscore the
      lowest-ranked main-competition miner. Eliminated/deregistered hotkeys are permanently
      blacklisted.

sub_competitions:
  structure: multi_asset
  stages: []
  count: null
  notes: >-
    Competition is segmented by asset class: Crypto (6 pairs), Forex (32 pairs grouped G1-G5),
    Equities (7 stocks, currently blocked), plus blocked Indices/Commodities. Rankings and
    probation thresholds are evaluated per asset class.

per_miner_state:
  tracked: true
  state_kinds: [debt_ledger, status_enum, cumulative_score]
  status_values:
    - CHALLENGE
    - PROBATION
    - MAINCOMP
    - PLAGIARISM
    - ENTITY
    - SUBACCOUNT_FUNDED
    - SUBACCOUNT_ALPHA
    - UNKNOWN
  reset_policy: >-
    Cumulative debt tracking from activation (2025-11-01) carries negative PnL forward to offset
    future gains. Eliminated/deregistered hotkeys are permanently blacklisted and cannot
    re-register.
  notes: >-
    Each miner has a DebtLedger of 12-hour DebtCheckpoints recording realized/unrealized PnL,
    penalties, fees and challenge_period_status; only MAINCOMP/PROBATION (and a few subaccount/
    entity) buckets count as earning periods.

