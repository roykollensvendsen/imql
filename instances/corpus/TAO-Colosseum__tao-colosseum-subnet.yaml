schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  The wired validator (validator/validator.py -> forward.py) scores miners by time-decayed
  betting volume and sets weights from those scores. However a separate standalone burn validator
  (burn_code.py / TempValidator) is shipped that sets 100% weight to the subnet owner burn UID, and
  the wired forward() itself routes 100% of reward to UID 0 whenever no miner has betting volume.
  Both burn paths coexist with the documented volume-share scoring, so status is mixed.

subnet:
  name: "TAO Colosseum"
  owner_repo: "TAO-Colosseum__tao-colosseum-subnet"
  netuid: 79
  implementation_lang: python

task:
  summary: >-
    Miners place bets in native TAO on the TAO Colosseum P2P betting smart contract deployed on
    Bittensor EVM, after linking their Bittensor coldkey to an EVM address. Validators query the
    contract for each miner's betting volume over the last 7 days, apply recency time-decay weights,
    and reward miners proportionally to their share of total weighted betting volume.
  submission_format: [other]
  submission_format_other: "on-chain EVM betting transactions (betting volume) on the TAO Colosseum smart contract"

scoring_signals:
  - name: time_decayed_betting_volume
    metric_kind: volume
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      weighted_volume = sum(daily_volume[d] * TIME_DECAY_WEIGHTS[d]) over 7 days
      (today=1.0, yesterday=0.85, ..., 6 days ago=0.10). Reward per miner = raw_volume / total_volume.

ground_truth_sources:
  - kind: market_data
    description: >-
      Per-miner betting volume read from the TAO Colosseum EVM smart contract (bet events over the
      last 7 days), keyed by the miner's coldkey-to-EVM address mapping.
    source_identifier: "TAO_COLOSSEUM_CONTRACT_ADDRESS default 0x2866c1f38629E3391614E54d1b63A7D0d3Ec2cDB on Bittensor EVM"
    trust_model: oracle
    notes: "Volume fetched via client.get_bets_last_7_days(evm_address); EVM mapping registered via POST /api/wallet-mapping with coldkey signature verification."

aggregation:
  method: proportional
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "UID 0 (forward.py fallback); subnet owner hotkey UID (burn_code.py)"
    fraction: 1.0
    dynamic: false
    notes: >-
      forward.py: when active_count==0, reward_array[0]=1.0 routes all weight to UID 0.
      burn_code.py TempValidator: always sets uids=[burn_uid], weights=[1.0] to the subnet owner hotkey UID.
  notes: >-
    Reward proportional to volume share: rewards = raw_volumes / total_volume (calculate_volume_rewards).
    The single time-decayed-volume signal is the only additive component.

weight_setting:
  cadence: per_epoch
  method: >-
    raw_weights = scores / L1-norm(scores), processed via process_weights_for_netuid, emitted as
    uint16 weights+uids through subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "360 blocks"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores applies scores = alpha*scattered_rewards + (1-alpha)*scores with
      neuron.moving_average_alpha default 0.1.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Wallet mappings require cryptographic proof of coldkey ownership (signature verification on
      POST /api/wallet-mapping); on EVM mapping change a UID's stored volume is reset to 0.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Validator permit / vpermit_tao_limit gating in base config (neuron.vpermit_tao_limit default 4096);
      validators require a validator permit to set weights (see burn_code.py ValidatorPermit check).

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    EMA scores persisted to state.npz and SQLite snapshots; scores and volume data zeroed when a
    hotkey is replaced (resync_metagraph) or when a miner's EVM mapping changes (forward.py).
  notes: >-
    Per-UID weighted_volume, 7-day daily_volumes, EVM address, and EMA score tracked in memory and
    SQLite (update_miner_data / save_snapshot).

documentation:
  status: docs_and_code
  source_version: "2.0.0"
  primary_docs: ["README.md", "docs/validator.md", "docs/miner.md"]
  completeness: medium

