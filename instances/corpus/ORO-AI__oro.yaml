schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Emission is structurally split: the designated top miner receives exactly t_top
  (default 0.25) of normalised emission, while burn uid 0 plus the deregistration-
  protection "tail" (top-50% of last-race finishers) together receive t_burn
  (default 0.75). The on-chain weight vector therefore concentrates ~25% on a single
  top hotkey and pins a large burn slot (u16 weight at uid 0). Per-problem scoring
  (ProblemScorer + LLM reasoning judge -> blend_final_score) and the race that ranks
  finishers run off-chain in a Backend; validators only fetch the completed-race
  finishers and the designated top hotkey and emit a deterministic vector. When no
  completed race is available the tick is skipped (no weight set). So: active scoring
  combined with a fixed structural burn — hence "mixed".

subnet:
  name: "ORO"
  owner_repo: "ORO-AI__oro"
  netuid: 15
  implementation_lang: python

task:
  summary: >-
    Miners submit Python shopping agents (defining agent_main()) that are run by
    validators in isolated Docker sandboxes against the ShoppingBench problem suite
    (product / shop / voucher tasks over 2.5M real products). Each problem is scored
    for ground-truth accuracy, format compliance, and field matching, then a final
    outcome score is multiplied by a reasoning-quality coefficient from an LLM judge.
    Agents compete in periodic "races"; the best agent earns the top emission slot.
  submission_format: [source_code]

scoring_signals:
  - name: rule_score
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      rule_score_reward over the recommended product vs ground truth; the success
      gate uses rule >= 1 (plus shop>=1 or budget>=1 for shop/voucher tasks). Feeds
      success_rate; aggregated as a rate over total_problems, not additively weighted.
  - name: ground_truth_match
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      ground_truth_reward (gt). compute_aggregate counts gt>=1 into ground_truth_rate.
      A reported signal but not what drives the success gate.
  - name: format_score
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Per-step format_reward (PRM) averaged over output steps, with a
      TIMESTAMP_MISSING_PENALTY=0.5 multiplier on steps lacking a valid extra_info
      timestamp. Reported as format_score; not part of the success gate.
  - name: reasoning_quality
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      LLM judge rates each trajectory on a strict 5-bin decision tree {0.1,0.3,0.5,0.7,0.9}
      detecting genuine reasoning vs regex/pattern-matching. Averaged, then mapped to a
      multiplicative coefficient in [COEFF_FLOOR=0.3, 1.0] (1.0 at quality>=0.80) and
      multiplied into success_rate to form the final score (blend_final_score).

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      ShoppingBench problem suite (product/shop/voucher tasks) backed by a search
      server over ~2.5M real products; per-problem ground-truth rewards and voucher
      constraints are supplied to the ProblemScorer.
    source_identifier: "ShoppingBench (arXiv:2508.04266); search-server /get_product_raw"
    trust_model: trusted
    notes: >-
      Product documents fetched via HTTP from SEARCH_SERVER_URL. Reward/voucher dicts
      keyed by query are passed into ProblemScorer at construction.
  - kind: llm_judgment
    description: >-
      An LLM judge (GLM / Gemma class models via Chutes or OpenRouter proxy) scores
      reasoning-quality of each agent trajectory using verified proxy-call logs plus
      the trajectory text.
    source_identifier: "JUDGE_MODELS_BY_PROVIDER (zai-org/GLM-5.1-TEE, google/gemma-4-31B-turbo-TEE, ...)"
    trust_model: adversarial
    notes: >-
      Judge prompt explicitly treats the trajectory as untrusted (anti-prompt-injection)
      and grades on verified proxy inference-call counts/token thresholds, not narration.

aggregation:
  method: winner_take_all
  composition: multiplicative
  normalization: none
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 0.75
    dynamic: false
    notes: >-
      compute_pinned_weights: with t_top=0.25, t_burn=0.75 (WeightSetterThread defaults),
      the top miner gets exactly t_top of normalised emission and burn uid 0 + tail
      together get t_burn. Burn slot pinned at U16_MAX (65535); the protection tail's
      u16 weight comes out of t_burn's share, so the top miner stays at t_top regardless
      of N. fraction 0.75 is the t_burn share (burn + tail combined), not burn-uid-only.
      When the top hotkey or all finishers are missing, uid 0 is pinned and emission is
      effectively burned.
  notes: >-
    Off-chain per-problem scoring feeds a race; finishers are ranked by race_score desc
    (tie-break agent_version_id asc). On-chain the designated top miner (GET /v1/public/top,
    else rank-1 finisher) gets the t_top slot; the top-50% of finishers receive a linear
    taper M, M-1, ..., 1 (deregistration protection) within the t_burn share. final per-
    agent score = success_rate * reasoning_coefficient (blend_final_score).

weight_setting:
  cadence: continuous
  method: >-
    Background WeightSetterThread loops every interval_seconds (config.weight_update_interval),
    syncs the metagraph, fetches the most recent RACE_COMPLETE race's finishers and the
    designated top hotkey from the Backend, builds a deterministic (uids, u16 weights)
    vector via build_metagraph_weight_vector, and calls subtensor.set_weights with
    wait_for_inclusion=True. Determinism across validators is load-bearing for Yuma
    consensus (kappa=0.5). No completed race -> tick skipped (no submission). No retries
    in-tick; the next tick retries.
  on_chain_call: set_weights
  tempo_or_interval: "interval_seconds (config.weight_update_interval); WeightSetterThread default 300s"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA of the on-chain weight vector in source. Temporal stability comes from
      protecting last race's top-50% finishers between races and the decaying score-to-beat
      threshold for challengers (documented in README, threshold constant not in source).

anti_gaming:
  - kind: honeypot
    enforcement: penalty
    description: >-
      LLM reasoning judge detects regex / pattern-matching agents. Gate 1 caps score at
      0.1 if the verified proxy log shows 0 inference calls with completion_tokens>=30;
      the coefficient floor is COEFF_FLOOR=0.3 so a zero-reasoning agent earns at most
      success_rate*0.3. Judge ignores instructions embedded in the (untrusted) trajectory.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Per-step format penalty: step_format *= TIMESTAMP_MISSING_PENALTY (0.5) when a step
      lacks a valid positive extra_info.timestamp, discouraging fabricated/replayed steps.
  - kind: challenge_period
    enforcement: barrier
    description: >-
      README: challengers must exceed a decaying score threshold to claim the top spot,
      "preventing trivial improvements from churning the leader." Threshold/decay handled
      off-chain by the Backend (score-to-beat); no constant in this repo.
  - kind: code_inspection
    enforcement: rejection
    description: >-
      Agents run in isolated Docker sandboxes; only finishers with a non-null race_score
      (ran the race to completion and were scored) are considered. DNF / eliminated /
      never-executed qualifiers (race_score=null) are dropped and get no weight.

sub_competitions:
  structure: single
  stages: []
  count: null
  notes: >-
    A single recurring "race": agents qualify, run, and are ranked by race_score. The
    most recent RACE_COMPLETE race determines the protected top-50% and the top slot.
    No multi-mechanism / per-task-type weight split on chain.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum, registration_age]
  status_values: []
  reset_policy: >-
    Per-race: only finishers (non-null race_score) from the most recent completed race
    are protected; the protected set is recomputed each race from fresh finishers.
  notes: >-
    race_score per qualifier (off-chain). Top-50% finishers keep Emission[uid]>0 between
    races so they survive get_neuron_to_prune (ranks by emission asc, reg_block asc, uid
    asc) when immunity_period expires — i.e. registration age / emission are the relevant
    per-miner state for deregistration protection. The bulk of this state lives in the
    Backend, not in this repo.

