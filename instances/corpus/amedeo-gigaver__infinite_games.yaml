schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: full_burn
mechanism_status_notes: >-
  The documented mechanism (peer scoring + cluster-based metagraph scoring) is fully
  implemented and computed/stored by the validator tasks (PeerScoring, MetagraphScoringAlternative).
  However, the active SetWeights.run() ignores all computed miner scores and hardcodes a single
  weight of 1.0 to the subnet owner UID, so ~all emission is burned to the owner. The miner-based
  weight path (filter_last_scores / renormalize_weights / subtensor_set_weights using
  alternative_metagraph_score) exists in the same file but is not called from run().

subnet:
  name: "Infinite Games"
  owner_repo: "amedeo-gigaver__infinite_games"
  netuid: 6
  implementation_lang: python

task:
  summary: >-
    Miners forecast binary future events (e.g. Polymarket-style questions), submitting a
    probability p in (0,1) that each event occurs, as a time series of submissions before a
    cutoff (typically 24h before resolution). After an event resolves, validators score each
    miner via a peer score comparing the miner's log-probability against the mean of the other
    miners' log-probabilities, aggregate over time intervals with parabolic (power-decay) weights,
    take a moving average over recent events, extremise (max(.,0)^2) and normalize across miners.
  submission_format: [signals]

scoring_signals:
  - name: peer_score
    metric_kind: predictive_contribution
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Per interval, peer_score = log_score(miner) - mean log_score of other miners, where
      log_score = log(p) if outcome==1 else log(1-p). Predictions clipped to [CLIP_EPS, 1-CLIP_EPS]
      with CLIP_EPS=1e-2. Computed in PeerScoring.peer_score_intervals.
  - name: probabilistic_forecast
    metric_kind: probabilistic_forecast
    direction: target_band
    weight: null
    normalization: none
    notes: >-
      Raw miner probability p in (0,1) for a binary event. Legacy Brier scoring documented in README
      ("Brier Score (Legacy)") replaced by peer scoring.

ground_truth_sources:
  - kind: market_data
    description: >-
      Binary future events sourced from prediction-market-style providers (Polymarket referenced),
      processed by an LLM event-generation pipeline; resolution via central/UMA/news mechanisms per
      README roadmap. Validators record the binary outcome o_q in {0,1} per event.
    source_identifier: "ifgames"
    trust_model: oracle
    notes: >-
      unique_event_id prefix 'ifgames-' (metagraph_scoring_alternative.get_internal_forecasts).
      Outcome stored as text in DB and cast to float in peer_score_event.

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "subnet_owner_uid (metagraph.owner_hotkey)"
    fraction: 1.0
    dynamic: false
    notes: >-
      SetWeights.run() builds scores = DataFrame({miner_uid:[owner uid], raw_weights:[1.0]}) and
      sets weights only to the owner UID, burning ~all emission. In the (currently uncalled) miner
      path of MetagraphScoringAlternative, owner_credits_to_burn = 1 - sum_round_credits is also
      allocated to the owner as a dynamic residual.
  notes: >-
    Documented per-event aggregation: weighted average of interval peer scores using power-decay
    weights w(i) = 1 - (i/(n_intervals-1))**exponent with exponent=2 (parabolic). Intervals are
    4-hour blocks (AGGREGATION_INTERVAL_LENGTH_MINUTES = 60*4). Per-event scores enter a moving
    average over the last EVENTS_MOVING_WINDOW=150 events, then extremised max(M,0)^2 and normalized
    across miners (README "Peer Scoring"). These computed scores are NOT used by the active run().

weight_setting:
  cadence: rate_limited
  method: >-
    Active path: SetWeights.run() syncs the metagraph, checks the on-chain weights rate limit
    (time_to_set_weights), then sets a single weight of 1.0 to the owner UID via
    subtensor.set_weights. Documented miner path (renormalize_weights) would normalize
    alternative_metagraph_score to sum 1 and set per-miner weights, but is not invoked in run().
  on_chain_call: set_weights
  tempo_or_interval: "subtensor.weights_rate_limit(netuid)"
  smoothing:
    kind: ema
    alpha: null
    window: 150
    notes: >-
      Documented mechanism keeps a moving average (rema) of peer scores over the last 150 events
      (EVENTS_MOVING_WINDOW). Reverse exponential / power-decay MA weights applied within an event.
      alpha is not a literal constant in the source. This smoothing is dormant under full_burn.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Predictions clipped to (CLIP_EPS, 1-CLIP_EPS) = (0.01, 0.99) to avoid infinite log scores;
      out-of-bound predictions are clipped (PeerScoring.prepare_predictions_df, CLIP_EPS=1e-2).
  - kind: liveness_check
    enforcement: penalty
    description: >-
      Unresponsive miners (registered before an interval but no submission) get an imputed
      prediction at 1/3 the distance from the mean toward the worst prediction
      (UPTIME_PENALTY_DISTANCE = 1/3), penalising non-submission (fill_unresponsive_miners).
  - kind: deduplication
    enforcement: penalty
    description: >-
      Cluster-based metagraph scoring clusters correlated miners and applies a copy-miner penalty
      (COPY_MINER_PENALTY_POW = 2) to limit credit to copied/correlated predictions
      (ClusterSelector). Part of the documented/dormant miner path.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, registration_age]
  status_values: []
  reset_policy: >-
    New miners registering after an event/interval opened are given a score of 0 (baseline) for
    questions opened before registration; miners registered after effective cutoff minus one
    interval are excluded from scoring for that event.
  notes: >-
    miner_registered_minutes derived from registered_date; peer_score_event filters miners by
    registration time relative to the event cutoff. Moving average over last 150 events per miner.

