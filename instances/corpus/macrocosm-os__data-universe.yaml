schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  A fixed 70% of emission is redirected to the subnet owner UID
  (constants.EMISSION_CONTROL_PERCENTAGE = 0.70) via utils.apply_burn_to_weights, with the
  remaining 30% distributed across miners by the documented data-scoring mechanism. The
  scoring code is live (set_weights runs every ~20 minutes), so this is partial_burn rather
  than full_burn.

subnet:
  name: "Data Universe (SN13)"
  owner_repo: "macrocosm-os__data-universe"
  netuid: 13
  implementation_lang: python

task:
  summary: >-
    Miners scrape and store real-time social-media / web data (X/Twitter, Reddit, YouTube
    transcripts) into local DataEntityBuckets keyed by source, time bucket and label, and
    advertise a compressed MinerIndex. Validators periodically sample and verify the data
    (and S3 uploads / on-demand requests) and reward miners by the volume of scorable bytes,
    weighted by data desirability, freshness (age), duplication across miners, and a
    credibility multiplier earned by passing validation.
  submission_format: [content_link, api_response]

scoring_signals:
  - name: scorable_bytes
    metric_kind: volume
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Core raw score: raw_score = data_type_scale_factor * time_scalar * scorable_bytes,
      summed over a miner's data entity buckets. scorable_bytes already discounts data that is
      duplicated across many miners. Contributes via the P2P component
      (score * P2P_REWARD_SCALE * p2p_cred) which is additionally scaled by P2P_REWARD_SCALE =
      0.05 and capped at the S3+OD service components.
  - name: data_desirability_scale_factor
    metric_kind: other
    metric_kind_other: data_desirability_weight
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Per-(source,label) multiplier from the Dynamic Desirability lookup. Desirable labels
      score more highly; unspecified labels get the default_scale_factor (0.3). Negative scale
      factors can penalize undesirable data. Reddit weight 0.6 / X weight 0.4 in the static
      backup lookup; docs/scoring.md cites Reddit 0.55 / X 0.35 / YouTube 0.10.
  - name: data_age_time_scalar
    metric_kind: other
    metric_kind_other: freshness_decay
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Linear age depreciation: data from now scored 1.0, data at max_age_in_hours scored 0.5,
      older than max_age scored 0.0. Formula: 1.0 - (age_in_hours / (2 * max_age_in_hours)).
      max_age = DATA_ENTITY_BUCKET_AGE_LIMIT_DAYS (30) * 24 hours.
  - name: miner_credibility
    metric_kind: other
    metric_kind_other: validation_pass_rate_multiplier
    direction: higher_is_better
    weight: null
    normalization: ema
    notes: >-
      Per-miner credibility in [0,1], EMA of the fraction of validated bytes that passed checks
      (cred_alpha = 0.15). Applied as a multiplier raised to the power _CREDIBILITY_EXP = 2.5:
      final P2P/S3 components use cred ** 2.5. Starting credibility 0. Separate S3 credibility
      (s3_cred_alpha 0.30) and on-demand credibility (EMA alpha 0.02) gate the S3 and OD score
      components.

ground_truth_sources:
  - kind: real_engagement
    description: >-
      Validators verify miner-reported data by re-scraping a sample of each miner's index from
      the original platforms (X/Twitter, Reddit, YouTube), checking correctness/existence and
      schema, and tracking pass rate as credibility.
    source_identifier: "x.com / reddit / youtube scrapers"
    trust_model: adversarial
    notes: >-
      Validators 'remain suspicious of Miners' and periodically sample-verify the MinerIndex
      against the live source platforms.

aggregation:
  method: proportional
  composition: hybrid
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "subnet owner hotkey UID (resolved via get_subnet_owner_hotkey)"
    fraction: 0.70
    dynamic: false
    notes: >-
      apply_burn_to_weights sets the owner UID weight to burn_percentage (0.70) and rescales
      all other miners' weights to sum to (1 - 0.70). burn_percentage =
      constants.EMISSION_CONTROL_PERCENTAGE = 0.70.
  notes: >-
    Final score is reward-proportional: miner_reward = (miner_score / total_network_score) *
    total_reward_pool. get_scores_for_weights combines P2P, S3 and OD components (each gated by
    its own credibility, with caps: S3 <= 2x OD, P2P <= S3+OD), then raw_weights =
    normalize(scores, p=1) (L1). 'hybrid' composition because components are additive but each
    is gated multiplicatively by a credibility and then capped.

weight_setting:
  cadence: rate_limited
  method: >-
    L1-normalized capped scores, then 70% burn applied to owner UID, then
    process_weights_for_netuid, then subtensor.set_weights. Gated on completing
    EVALUATION_ON_STARTUP (10) evaluation cycles after startup.
  on_chain_call: set_weights
  tempo_or_interval: "every >20 minutes (dt.timedelta(minutes=20)) between weight sets"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA is applied to the final per-miner reward before weight-setting; scores are
      L1-normalized directly. EMAs exist upstream on credibility (cred_alpha 0.15, s3_cred_alpha
      0.30, ondemand_alpha 0.3 / ondemand_cred_alpha 0.02), not on the final reward vector.

anti_gaming:
  - kind: deduplication
    enforcement: penalty
    description: >-
      Duplication Factor: data stored by many miners is worth less; value decreases proportional
      to the number of miners storing it. Reflected in scorable_bytes (which discounts shared
      data).
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Validators periodically re-scrape and verify a sample of each miner's reported data against
      the live source platforms; failed checks drive credibility (a cred**2.5 multiplier) down,
      heavily penalizing miners who misrepresent their MinerIndex.
  - kind: rate_limit
    enforcement: rejection
    description: >-
      MIN_EVALUATION_PERIOD = 60 minutes between re-evaluations of a miner; data entity bucket
      size limit (128 MB) and per-miner bucket count limits cap reportable index size.

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: "P2P index scoring"
      role: main
      advancement_rule: "scorable_bytes * desirability * age, scaled by P2P_REWARD_SCALE=0.05, capped at S3+OD"
    - name: "S3 upload validation"
      role: main
      advancement_rule: "effective_size = total_size_bytes * coverage^2; S3 boost share, capped at 2x OD component"
    - name: "On-demand (OD) requests"
      role: main
      advancement_rule: "EMA of recent on-demand rewards, gated by on-demand credibility"
  count: 3
  notes: >-
    Three parallel reward channels (P2P MinerIndex, S3 upload validation, on-demand request
    serving), each gated by its own credibility EMA, combined additively with caps in
    get_scores_for_weights.

per_miner_state:
  tracked: true
  state_kinds: [reputation, cumulative_score]
  status_values: []
  reset_policy: >-
    Scores/credibility persisted via save_state/load_state; STATE_VERSION (currently 9) bumps
    trigger full or partial resets of S3/OD boosts and credibility when exploits are found.
  notes: >-
    Per-miner persistent state: scores, miner_credibility, scorable_bytes, s3_boosts,
    s3_credibility, ondemand_boosts, ondemand_credibility, effective_sizes.

