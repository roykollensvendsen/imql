schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Validator computes per-miner scores (base + business), normalizes to sum-to-one,
  and calls subtensor.set_weights every WEIGHT_SUBMIT_INTERVAL (20) blocks. No burn
  allocation is present in the code. The business component depends on an external
  Business API (api.tensorclaw.ai) whose scoring is not in this repo.

subnet:
  name: "Tensorclaw"
  owner_repo: "tensorclaw__tensorclaw"
  netuid: 92
  implementation_lang: python

task:
  summary: >-
    Miners run an LLM inference backend and connect as pure WebSocket clients to a
    centralized router (AICenter). They are rewarded for serving real, high-quality
    LLM API traffic: availability and a passing active inference probe yield a base
    score, and processing real user requests/tokens via the Business API yields the
    dominant business score.
  submission_format: [api_response, compute_service]

scoring_signals:
  - name: model_availability
    metric_kind: other
    metric_kind_other: model_whitelist_membership
    direction: higher_is_better
    weight: 0.3
    normalization: none
    notes: >-
      Part of base score. model_score is a flat 100.0 when the declared model is in
      the whitelist (otherwise the miner gets 0 total). Weighted 30% within base score.
  - name: availability
    metric_kind: uptime
    direction: higher_is_better
    weight: 0.4
    normalization: none
    notes: >-
      avail_score = 100.0 when the miner passes the active inference probe. Weighted
      40% within base score.
  - name: response_time
    metric_kind: latency
    direction: lower_is_better
    weight: 0.2
    normalization: none
    notes: >-
      Tiered rt_score: 100 if <100ms, 80 if <500ms, 60 if <1000ms, 40 if <2000ms,
      else 20. Weighted 20% within base score.
  - name: historical_uptime
    metric_kind: uptime
    direction: higher_is_better
    weight: 0.1
    normalization: none
    notes: >-
      uptime = success rate over last 100 probes (rolling window capped at 100),
      expressed as a percentage. Weighted 10% within base score.
  - name: business_score
    metric_kind: other
    metric_kind_other: commercial_request_contribution
    direction: higher_is_better
    weight: 0.9
    normalization: none
    notes: >-
      contribution_score returned by an external Business API per miner hotkey;
      reflects real user requests/tokens processed. Weighted 90% of the final score.
      The actual computation lives in the off-repo Business API, not this codebase.

ground_truth_sources:
  - kind: hardware_probe
    description: >-
      Active inference probe via AICenter: a 5-token micro-prompt ("ping" -> expects
      "pong") with 8s timeout to confirm the miner backend is live and serving the
      declared model.
    source_identifier: "{aicenter_url}/api/route/{hotkey}"
    trust_model: trusted
    notes: "model_info and availability are derived from this probe."
  - kind: organic_traffic
    description: >-
      Real user requests forwarded through the HA load balancer; the Business API
      logs requests/tokens and returns a contribution_score per miner.
    source_identifier: "{business_api_url}/scoring"
    trust_model: trusted
    notes: >-
      External, off-repo service (api.tensorclaw.ai). Scoring internals not present
      in this repo.

aggregation:
  method: weighted_average
  composition: hybrid
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn logic in the code."
  notes: >-
    base_score = model*0.3 + avail*0.4 + rt*0.2 + uptime*0.1; final_score =
    base*0.1 + business*0.9. Invalid/unavailable model => final 0.0 (gated). Across
    miners, weights = score / sum(scores) before set_weights.

weight_setting:
  cadence: rate_limited
  method: >-
    Per-miner final_score is collected into miner_scores, filtered to metagraph
    hotkeys, normalized to sum 1, and submitted via subtensor.set_weights with
    version_key=1.
  on_chain_call: set_weights
  tempo_or_interval: "20 blocks (WEIGHT_SUBMIT_INTERVAL)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      Final score has no temporal smoothing. Historical uptime uses a rolling
      window of the last 100 probes, but that feeds only the 10%-weighted base
      uptime component, not the final reward EMA.

anti_gaming:
  - kind: liveness_check
    enforcement: elimination
    description: >-
      Active inference probe: a real 5-token micro-prompt must return within 8s.
      Failures mark the miner unavailable; an invalid/dead/fake backend yields 0
      base score and is banned from the routing pool ("Ghost Script").
  - kind: code_inspection
    enforcement: rejection
    description: >-
      Declared model name must match a dynamically updated whitelist
      (VALID_MODEL_SERIES); non-whitelisted models score 0.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger]
  status_values: []
  reset_policy: >-
    uptime_tracker keeps a rolling list of the last 100 probe outcomes per hotkey
    (oldest entries dropped). In-memory only; not persisted across restarts.
  notes: >-
    Only last_weight_submit_block is persisted (.validator_state.json). The
    uptime_tracker performance history is in-memory.

documentation:
  status: docs_and_code
  source_version: "V2 (Subnet 92)"
  primary_docs: ["README.md"]
  completeness: medium

