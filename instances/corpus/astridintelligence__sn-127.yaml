schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Vault weight targets (fetched from an external API, e.g. "0:75,164:25") send the
  dominant share to the burn UID 0. Arena scoring only redistributes a configurable
  slice (default 25%, set server-side) carved OUT of the burn UID to the top-3 PnL
  miners. When there is no active competition or no eligible miners, the arena slice
  is ignored entirely and vault-only (burn-dominant) weights are submitted.

subnet:
  name: "Astrid (SN-127) Arena Trading Validator"
  owner_repo: "astridintelligence__sn-127"
  netuid: 127
  implementation_lang: typescript

task:
  summary: >-
    Arena miners register on the Astrid Arena platform, run an LLM trading agent against
    a simulated wallet during a live Miner Competition, and are ranked by realized PnL
    percentage. Validators fetch base "vault" weight targets from an external API (which
    send a fixed share to a vault miner and the remainder to the burn UID 0), then
    redirect a configurable percentage of the burn allocation to the top-3 eligible arena
    miners by PnL (split 60/30/10), and submit the blended weights on-chain.
  submission_format: [signals, api_response]

scoring_signals:
  - name: total_pnl_percent
    metric_kind: pnl
    direction: higher_is_better
    weight: 1.0
    normalization: rank
    notes: >-
      Eligible miners sorted by totalPnlPercent descending; only the top 3 receive
      weight. totalPnlPercent is reported by the external Arena API, not computed in
      this repo.
  - name: trade_liveness_eligibility
    metric_kind: uptime
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Gating signal (not additive). A miner is eligible only if it has >=1 trade AND
      every trade in the most recent 12h window with trades has an execution run within
      +/-2h of the trade timestamp. Failing the gate => zero weight.

ground_truth_sources:
  - kind: market_data
    description: >-
      Arena participants' trades, executions, and PnL are served by the external Astrid
      Arena API (default https://arena-api.astrid.global). The repo only consumes
      /public/arena/bittensor, /public/competitions/:id/wallet-activity, and
      /public/competitions/:id/executions; PnL and winner election happen server-side.
    source_identifier: "https://arena-api.astrid.global"
    trust_model: oracle
    notes: >-
      arenaEmissionsPercent and (for delayed payouts) the winner list are pre-elected by
      the platform; the validator trusts them, validating only hotkey/uid/coldkey against
      the live metagraph.
  - kind: other
    kind_other: external_weight_feed
    description: >-
      Base vault weight targets (uid:weight pairs, e.g. "0:75,164:25") fetched from the
      Vault API endpoint {API_URL}/bittensor/weights.
    source_identifier: "https://api.astrid.global/v1/bittensor/weights"
    trust_model: trusted
    notes: >-
      kind 'other' because the targets are an opaque external weight feed, not a
      market/dataset/probe. This is the burn-dominant base allocation.

aggregation:
  method: rank_based
  composition: gated
  normalization: none
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      UID 0 is the burn UID. Its weight comes from the external vault feed (e.g. 75) and
      is reduced by the arena allocation percent (reducedBurnWeight =
      max(0, burnTarget.weight - arenaPercent)). The literal burn fraction is set by the
      external feed, not in this repo, so left null; dynamic=true because it is a
      residual after the arena slice is carved out.
  notes: >-
    Eligible miners ranked by PnL; emission shares assigned by count: 1 miner -> [1.0],
    2 -> [0.7,0.3], 3 -> [0.6,0.3,0.1] (SPLITS_BY_COUNT). Each arena weight =
    floor(arenaPercent * emissionShare), with the integer remainder given to rank 1.
    Vault (non-burn, non-arena) targets pass through unchanged. The "score" only
    redistributes the arena slice carved from the burn UID.

weight_setting:
  cadence: rate_limited
  method: >-
    setInterval loop every BITTENSOR_WEIGHT_INTERVAL_MS (default 60000ms in env.ts /
    documented 3600000ms = 1h). On-chain submission respects the subnet weightsSetRateLimit
    queried from chain; if commitRevealWeightsEnabled is true it commits via
    commitCrv3Weights/commitTimelockedWeights (Drand timelock), else it calls setWeights
    directly.
  on_chain_call: commit_reveal
  tempo_or_interval: "60000ms loop (default); 3600000ms documented; on-chain rate-limited by weightsSetRateLimit"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the final weights in this repo; weights are recomputed each
      cycle from current vault + arena state. Drand commit-reveal adds delay but not
      smoothing.

anti_gaming:
  - kind: liveness_check
    enforcement: elimination
    description: >-
      Rule 2 eligibility: every trade in the most recent 12h window with trades must have
      an execution run (LLM agent decision cycle) within +/-2h of the trade. Intended to
      stop front-running / stale-data agents. Failing => ineligible (zero weight).
      Constants EXECUTION_WINDOW_MS = 2h, RECENT_TRADE_WINDOW_MS = 12h.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Rule 1 eligibility: a participant with totalTrades == 0 (no trades during the
      competition) is immediately ineligible.
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      When the subnet has commitRevealWeightsEnabled, weights are timelock-encrypted via
      Drand (commitCrv3Weights / commitTimelockedWeights v4) and revealed after
      revealPeriodEpochs * tempo blocks, hiding weights until reveal.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      submitWeights enforces the on-chain weightsSetRateLimit: it skips/sleeps if
      blocksSinceLastCommit < weightsRateLimit.

sub_competitions:
  structure: single
  stages: []
  count: null
  notes: >-
    A single active Miner Competition drives live scoring. A separate "delayed
    emissions" payout flow can pay multiple completed competitions in their payout
    window (computeDelayedEmissionsWeights), where winners are pre-elected by the platform
    and each winner weight = emissionsPercent * (splitPercent/100). Not modeled as
    distinct stages.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    No persistent per-miner ledger in this repo. An in-memory per-competition cache
    (cache.ts) accumulates trades/executions across cycles for eligibility, but it is
    transient, not a scored state ledger.

documentation:
  status: docs_and_code
  source_version: "SN-127"
  primary_docs:
    - "docs/ranking-algorithm.md"
    - "docs/overview.md"
    - "README.md"
  completeness: high

