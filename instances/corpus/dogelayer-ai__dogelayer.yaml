schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Proportional scoring by accumulated fiat share-value is implemented and active, but the
  weight distribution is capped by an economic "value_to_dist" budget and any residual weight
  is assigned to the subnet-owner burn UID. When no miner is mining (total_value == 0) the
  validator burns 100% to the burn UID. So the live mechanism mixes active proportional
  scoring with dynamic residual burn and a full-burn fallback.

subnet:
  name: "DogeLayer"
  owner_repo: "dogelayer-ai__dogelayer"
  netuid: 80
  implementation_lang: python

task:
  summary: >-
    Miners contribute Scrypt (LTC/DOGE) proof-of-work mining hashrate to the DogeLayer mining
    pool, registering their work under their Bittensor hotkey (or hotkey.suffix per rig).
    Validators query the pool proxy API for per-miner share metrics over a time window, convert
    each miner's accumulated share_value into a fiat (USD) value, and accumulate it as a score.
    Weights are then distributed proportionally to accumulated share-value, bounded by an
    economic budget, with residual emission burned to the subnet owner UID.
  submission_format: [compute_service]

scoring_signals:
  - name: share_value_fiat
    metric_kind: throughput
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Per-miner pool share_value (already computed by the pool from actual work) converted to
      USD via base_value = (share_value / coin_difficulty) * 6.25 * coin_price, then accumulated
      additively into self.scores[uid]. 6.25 is a hardcoded block-reward multiplier; coin_price
      and coin_difficulty come from external APIs. Higher accumulated fiat share-value -> higher
      weight.

ground_truth_sources:
  - kind: organic_traffic
    description: >-
      Real mining shares/hashrate produced by miners and recorded by the DogeLayer proxy pool;
      validators retrieve per-worker share_value, hashrate and shares via the proxy pool API
      (get_miner_contributions_timerange) keyed by hotkey/worker_id.
    source_identifier: "dogelayer.core.pool.proxy (ProxyPool / ProxyPoolAPI)"
    trust_model: trusted
    notes: >-
      Validators (non-owner) call a shared proxy API URL/token configured in .env; the pool is
      the single source of share metrics, so it is effectively a trusted centralized oracle for
      work done.
  - kind: market_data
    description: >-
      External coin price (CoinGecko, with $75 LTC fallback) and current network difficulty used
      to convert raw share_value into a fiat economic value.
    source_identifier: "CoinPriceAPI('coingecko'); get_current_difficulty('litecoin')"
    trust_model: oracle
    notes: "Price fallback hardcoded to 75.0 USD if the API fails or returns 0."

aggregation:
  method: proportional
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "burn_uid (subnet owner UID, resolved from SubnetOwnerHotkey)"
    fraction: null
    dynamic: true
    notes: >-
      Two burn paths. (1) Residual burn: remaining = max(0, 1 - sum(weights)) is added to
      weights[burn_uid]. (2) Full burn fallback: if total_value (sum of scores) == 0, weights are
      all zero except weights[burn_uid] = 1.0. The distributable share itself is capped by an
      economic budget value_to_dist = blocks_to_set_for * (1 - OWNER_TAKE) * SPLIT_WITH_MINERS *
      (own_stake_weight / total_stake) * alpha_price, with OWNER_TAKE=0.18, SPLIT_WITH_MINERS=0.5,
      PAYOUT_FACTOR=1.0.
  notes: >-
    calculate_weights_distribution: if scaled_total_value (= total_value * PAYOUT_FACTOR) >
    value_to_dist, weights = score / scaled_total_value (proportional, normalized by the larger
    pool value); else weights = (score / total_value) * (scaled_total_value / value_to_dist),
    scaling the whole distribution down by how much of the economic budget was earned. Residual
    goes to burn UID.

weight_setting:
  cadence: rate_limited
  method: >-
    Direct set_weights over UIDs 0..len(hotkeys)-1 each time blocks_since_last_update >=
    weights_interval (= tempo). Commit-reveal code path exists but is commented out; direct
    submission is used. Scores are reset to zero after a successful weight set.
  on_chain_call: set_weights
  tempo_or_interval: "tempo blocks (weights_interval = self.tempo)"
  smoothing:
    kind: ema
    alpha: 0.8
    window: null
    notes: >-
      self.alpha = 0.8 is set in the validator constructor; however no use of self.alpha was
      found in the read scoring/weighting code (scores accumulate additively and reset after each
      set_weights). Reported as the literal alpha constant but its application is unverified.

anti_gaming:
  - kind: proof_of_work
    enforcement: barrier
    description: >-
      Rewards are derived from real Scrypt PoW mining share_value recorded by the pool, so a
      miner must contribute actual hashpower to earn score.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      The distributable economic budget per validator scales with own_stake_weight / total_stake,
      so a validator's distribution is proportional to its own stake share.
  - kind: other
    kind_other: "coldkey blocklist (BAD_COLDKEYS) score zeroing"
    enforcement: elimination
    description: >-
      Hardcoded BAD_COLDKEYS blocklist: on state restore, any miner whose coldkey is in
      BAD_COLDKEYS has its score forced to 0.0.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    self.scores accumulates fiat share-value across evaluation windows and is reset to
    [0.0]*len(hotkeys) after each successful set_weights. Restored from saved state unless the
    validator was down longer than tempo*1.5 blocks.
  notes: >-
    block_at_registration is tracked and used to resolve duplicate worker IDs (older registration
    wins). last_evaluation_timestamp gates the metrics query window.

