schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Daily winner-take-all competition: weights = 1 on the single winning UID (lowest eval_loss
  among the earliest committers within a loss-percentile cutoff), 0 elsewhere. When no active
  competition exists / the dataset commit is unchanged, weights are set entirely on the subnet
  owner (burn) UID. So at any given time emissions go either fully to one miner or fully to the
  burn UID — hence "mixed" rather than continuously active.

subnet:
  name: "FLock OFF"
  owner_repo: "FLock-io__FLock-subnet"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners curate and upload conversational instruction-tuning datasets (JSONL) to Hugging Face
    and register the repo/commit metadata on-chain. Validators train a LoRA adapter on
    Qwen/Qwen2.5-1.5B-Instruct using each miner's dataset and measure evaluation loss on a fixed
    eval dataset. The miner whose dataset yields the lowest eval loss (subject to anti-duplication
    and a loss-percentile + earliest-commit tie-break) wins the daily competition and receives all
    emissions.
  submission_format: [content_link, commitment_hash]

scoring_signals:
  - name: eval_loss
    metric_kind: loss
    direction: lower_is_better
    weight: 1.0
    normalization: none
    notes: >-
      train_lora returns the LoRA eval loss on the fixed eval dataset; stored as the miner's raw
      score (eval_loss). select_winner sorts eligible submissions by eval_loss ascending. Invalid /
      duplicate / errored submissions get DEFAULT_RAW_SCORE = 999.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Fixed evaluation dataset downloaded from a Hugging Face repo
      (flock-io/flock-off-s1-competition, eval_commit "main"); validator trains/evaluates LoRA
      against it.
    source_identifier: "flock-io/flock-off-s1-competition"
    trust_model: trusted
    notes: >-
      eval_commit = "main"; Competition.repo default. Miner datasets are also checked against this
      eval dataset for plagiarism (count_similar must equal full miner dataset, else fallback score).

aggregation:
  method: winner_take_all
  composition: rank
  normalization: none
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "subnet owner UID (SubnetOwnerHotkey)"
    fraction: 1.0
    dynamic: false
    notes: >-
      In _comp_exists_in_db, when no valid stored competition exists, weights are zeroed and
      weights[burn_uid] = 1, where burn_uid is the subnet owner's UID (get_burn_uid queries
      SubnetOwnerHotkey). This is full burn when no competition is active.
  notes: >-
    Winner gets new_weights[winner] = 1 (all other UIDs 0). select_winner: take submissions with
    eval_loss not None, keep the top LOSS_THRESHOLD_PCT (0.05) by loss (min 1), then pick the
    earliest commitment_block/timestamp among those. compute_score() (a benchmark-curve scoring fn)
    exists in validator_utils.py but is NOT called by the validator; winner selection uses raw
    eval_loss directly.

weight_setting:
  cadence: daily
  method: >-
    Competition runs on a daily UTC schedule (submission window starting at 12:00 UTC,
    validation, then rewarding). Weights committed when blocks-to-epoch <= block_threshold (50),
    using commit-reveal.
  on_chain_call: commit_reveal
  tempo_or_interval: "blocks_per_epoch default 360; block_threshold 50"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of weights; each rewarding cycle overwrites self.weights with a fresh
      one-hot winner vector (or burn vector).

anti_gaming:
  - kind: plagiarism_detection
    enforcement: penalty
    description: >-
      count_similar between miner dataset and the eval dataset must equal the full miner dataset
      length (rows capped at competition.rows=100); otherwise the miner gets DEFAULT_RAW_SCORE
      (999), effectively disqualifying them. Each row must come from the eval dataset.
  - kind: deduplication
    enforcement: penalty
    description: >-
      Pairwise count_similar between miners; if > DEFAULT_DUPLICATE_COUNT (33), miners are grouped
      as duplicates, sorted by commitment block, and all but the earliest committer get
      DEFAULT_RAW_SCORE (999).
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      Weights are submitted via commit-reveal (commit_weights_extrinsic / reveal_weights_extrinsic)
      with a fresh random 8-byte salt per commitment; revealed on a later interval.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Miner on-chain metadata commitment subject to a ~20-minute commit cooldown (README: retries
      every 120s if the 20-minute commit cooldown applies).

sub_competitions:
  structure: single
  stages: []
  count: null
  notes: >-
    One daily dataset competition (Competition id "1", repo flock-io/flock-off-s1-competition).
    Competition lifecycle has SUBMISSION / VALIDATION / REWARDING / COMPLETED states but it is a
    single mechanism, not a ladder/tournament of distinct competitions.

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, status_enum, registration_age]
  status_values: [submission, validation, rewarding, completed]
  reset_policy: >-
    Per-competition (daily). A new competition_id (YYYYMMDD) starts each day; scores/submissions are
    recorded per competition_id in scores.db. Earliest commitment_block is used as a tie-break.
  notes: >-
    ScoreDB persists submissions, eval_loss, commitment_block/timestamp, eligibility, and competition
    status per competition_id. CompetitionState enum: submission/validation/rewarding/completed.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs: ["README.md"]
  completeness: medium

