schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: full_burn
mechanism_status_notes: >-
  The documented scoring (camera image similarity via pixelmatch) is implemented in
  reboot/validator/reward.py but is NOT invoked by the live validator forward pass.
  reboot/validator/forward.py initializes every miner reward to zero and assigns a
  hardcoded score of 1000 to a single hardcoded subnet-owner hotkey
  (5D5Yw1NzfxLDQDP8D9jthkTNnJRKBfKSRTwnVBvg6RQymonx), then sets weights from those
  scores. All emission is therefore directed to the owner; competitive scoring is dormant.

subnet:
  name: "Reboot Subnet (Robotics)"
  owner_repo: "reboot-org__reboot-subnet"
  netuid: 47
  implementation_lang: python

task:
  summary: >-
    As documented, a miner receives a RobotSynapse (action sequences + a validator camera
    image) and returns a rendered/predicted camera image (img_b64); the reward function
    scores the structural similarity between the miner's image and the validator's image.
    In the actual running validator, however, no miner work is scored: rewards are zeroed
    and a fixed subnet-owner hotkey is hardcoded to receive the full reward.
  submission_format: [api_response]

scoring_signals:
  - name: camera_image_similarity
    metric_kind: similarity
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      DOCUMENTED/DEAD-CODE signal only. reward() returns the pixelmatch similarity score
      (1 - mismatch/(w*h)); scores below 0.95 are floored to 0. This function is defined in
      reward.py but the live forward.py never calls get_rewards()/reward(); it is not part
      of the operative mechanism.

ground_truth_sources:
  - kind: other
    kind_other: validator_rendered_camera_image
    description: >-
      The validator's own camera image bytes, compared pixel-by-pixel against the miner's
      returned image. (Documented path only; not used by the live validator.)
    source_identifier: "validator_image_bytes"
    trust_model: trusted
    notes: "Used only inside the unused reward()/get_rewards() code path."

aggregation:
  method: winner_take_all
  composition: other
  composition_other: >-
    Hardcoded override: all miner rewards set to 0, a single hardcoded owner hotkey set to 1000;
    no combination of signals occurs.
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "5D5Yw1NzfxLDQDP8D9jthkTNnJRKBfKSRTwnVBvg6RQymonx"
    fraction: 1.0
    dynamic: false
    notes: >-
      Not a literal burn-to-null; rather a full diversion of emission to the hardcoded
      subnet-owner hotkey. Every other miner receives reward 0 in forward.py, so after L1
      normalization in set_weights the owner receives effectively all weight.
  notes: >-
    set_weights() L1-normalizes self.scores (raw_weights = scores / ||scores||_1) before
    process_weights_for_netuid. Since only the owner has a non-zero score, the owner gets
    weight ~1.0.

weight_setting:
  cadence: per_epoch
  method: >-
    self.scores updated each forward via EMA (update_scores), then L1-normalized and emitted
    via subtensor.set_weights with version_key=spec_version.
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks (neuron.epoch_length default)"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores applies scores = alpha*rewards + (1-alpha)*scores with
      alpha = config.neuron.moving_average_alpha (default 0.1). Applied to the hardcoded
      owner reward in the live path.

anti_gaming: []

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    A miner's score is zeroed when its hotkey is replaced in the metagraph (resync_metagraph);
    state (step, scores, hotkeys) is persisted to state.npz.
  notes: >-
    self.scores is an EMA moving-average array over miner UIDs, but in the live mechanism it
    is dominated entirely by the hardcoded owner override.

documentation:
  status: docs_and_code
  source_version: "0.1.1"
  primary_docs:
    - "README.md"
    - "docs/quickstart.md"
  completeness: low

provenance:
  extracted_by: "im-extract (Claude Opus 4.8)"
  confidence_overall: high
  evidence:
    - claim_field: "/subnet/netuid"
      source_path: "README.md"
      line_ref: "88"
      quote: "**Network Stats** – [Taostats Subnet 47](https://taostats.io/subnets/47/chart)"
    - claim_field: "/subnet/implementation_lang"
      source_path: "reboot/validator/forward.py"
      line_ref: "22-23"
      quote: "import numpy as np\nimport bittensor as bt"
    - claim_field: "/documentation/source_version"
