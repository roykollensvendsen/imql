schema_version: "1.0.0"
instance_kind: extracted

# This repository is the Bittensor SDK / core library itself, NOT a subnet. It provides the
# weight-setting machinery (set_weights / commit-reveal extrinsics) that subnet validators call,
# but defines no scoring/reward/aggregation mechanism of its own. Scoring is explicitly off-chain
# in subnets; on-chain reward distribution is Yuma Consensus. Hence mechanism_status: dormant.
mechanism_status: dormant
mechanism_status_notes: >-
  This is the opentensor/bittensor SDK package, not a subnet incentive mechanism. It exposes
  set_weights and commit-reveal extrinsics for validators to publish weights, but contains no
  reward/scoring function. The README states scoring is an off-chain subnet competition and that
  on-chain Yuma Consensus determines TAO rewards. No incentive mechanism is live in this repo.

subnet:
  name: "Bittensor SDK (core library, not a subnet)"
  owner_repo: "opentensor__bittensor"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    No subnet task is defined in this repository. The SDK provides Python packages for interacting
    with the Bittensor ecosystem, including the extrinsics a subnet validator uses to set weights on
    chain (set_weights_extrinsic, commit_timelocked_weights_extrinsic). Miner production and the
    rewarded commodity are defined by individual subnets, not here.
  submission_format: [signals]
  # Closest fit: validators submit weight vectors (signals) over miner UIDs. Not a miner submission.

scoring_signals: []

ground_truth_sources: []

aggregation:
  method: undocumented
  composition: other
  composition_other: "no signal composition; repository defines no scoring aggregation"
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: ""
  notes: >-
    No reward aggregation exists in this SDK. The only normalization present is L1 normalization of
    the published weight vector itself (convert_and_normalize_weights_and_uids), not an aggregation
    of scoring signals.

weight_setting:
  cadence: undocumented
  method: >-
    Validators call set_weights_extrinsic to publish a (uids, weights) vector for a subnet via the
    SubtensorModule.set_mechanism_weights chain call, or commit_timelocked_weights_extrinsic for a
    commit-reveal (timelocked) submission. uids and weights are converted and L1-normalized before
    submission. Cadence/tempo is a per-subnet on-chain hyperparameter read from chain, not fixed here.
  on_chain_call: set_weights
  tempo_or_interval: null
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No final-reward EMA in this repo. Temporal smoothing of emissions/consensus happens on the
      subtensor chain (Yuma Consensus), which is not part of this SDK source.

anti_gaming:
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      Provides commit-reveal (timelocked) weight submission via commit_timelocked_weights_extrinsic
      with a commit_reveal_version default of 4, plus optional MEV-shield encrypted extrinsic
      submission to protect against front-running/MEV. These are transport-level protections, not a
      subnet anti-gaming scoring rule.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: ""

documentation:
  status: code_authoritative
  source_version: null
  primary_docs:
    - "README.md"
    - "bittensor/core/extrinsics/weights.py"
  completeness: medium

