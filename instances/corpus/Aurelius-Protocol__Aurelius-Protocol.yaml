schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: full_burn
mechanism_status_notes: >-
  Operational defaults set burn_mode=True and burn_percentage=1.0
  (DEFAULT_BURN_MODE = True, DEFAULT_BURN_PERCENTAGE = 1.0 in constants.py).
  When burn_mode is True, _set_weights routes 100% of weight to BURN_UID
  (UID 200) and the documented 8-stage scoring pipeline does not influence
  on-chain weights. The full scoring path (classifier-graduated weight)
  exists and runs, but only contributes to on-chain weights when an operator
  or the remote Central API flips burn_mode off / lowers burn_percentage.

subnet:
  name: "Aurelius Protocol"
  owner_repo: "Aurelius-Protocol__Aurelius-Protocol"
  netuid: 37
  implementation_lang: python

task:
  summary: >-
    A miner is a Bittensor axon that serves a library of operator-authored
    ethical-dilemma scenario configs (JSON). When a validator queries with a
    ScenarioConfigSynapse, the miner returns the next config in round-robin
    order, stamped with a work_id and signed by the miner's hotkey. The
    validator runs the config through an 8-stage pipeline (version, schema,
    work-id, work-token balance, rate limit, novelty, classifier gate,
    Concordia generative-agent simulation, plus optional gatekeeper/semantic
    coherence) and sets on-chain weight graduated by classifier confidence.
    Accepted scenarios are simulated through Concordia; transcripts form
    training data for moral-reasoning benchmarks (MoReBench).
  submission_format: [content_link, commitment_hash]
  submission_format_other: ""

scoring_signals:
  - name: classifier_confidence
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 1.0
    normalization: min_max
    notes: >-
      The only signal that produces a non-zero graduated weight. The Central
      API classifier returns a confidence score; compute_weight maps a score
      above threshold linearly into [WEIGHT_MIN=0.1, 1.0] via
      (score - threshold) / (1 - threshold). Below threshold => WEIGHT_FAIL
      (0.0). Default classifier_threshold = 0.5; custom tension_archetype
      bumps threshold by DEFAULT_CUSTOM_ARCHETYPE_THRESHOLD_BUMP = 0.1.
  - name: pipeline_gate_pass
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Gating signal, not additive. The 8-stage pipeline short-circuits on
      first failure (version, schema, verify_work_id, work_token balance,
      rate_limit, novelty, classifier, simulate, optional gatekeeper, optional
      semantic_coherence). Any stage failure yields weight=WEIGHT_FAIL (0.0)
      regardless of classifier confidence.

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      Central-API-hosted classifier scores scenario configs for quality; an
      optional remote-prompt LLM "gatekeeper" rubric judges whether the
      Concordia transcript is a valid moral-reasoning outcome; optional
      semantic coherence check via the configured LLM provider.
    source_identifier: "Central API (https://new-collector-api-production.up.railway.app)"
    trust_model: oracle
    notes: >-
      Classifier threshold, novelty threshold, gatekeeper prompt, and other
      knobs are fetched from the Central API remote config and cached ~5 min.
  - kind: reference_model
    description: >-
      Concordia (google-deepmind/concordia) generative-agent simulation run
      in a sandboxed Docker container; the resulting transcript is the payload
      that determines the miner's weight.
    source_identifier: "ghcr.io/aurelius-protocol/aurelius-concordia"
    trust_model: trusted
    notes: "Simulation uses an OpenAI-compatible LLM (default deepseek-chat)."

aggregation:
  method: proportional
  composition: gated
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: 0.1
  burn_allocation:
    enabled: true
    address_or_uid: "200"
    fraction: 1.0
    dynamic: false
    notes: >-
      DEFAULT_BURN_MODE = True and DEFAULT_BURN_PERCENTAGE = 1.0. In burn_mode,
      weights are np.array([1.0]) to BURN_UID (200). When burn_mode is off,
      burn_percentage still carves a fixed slice: miner weights are normalized
      to sum to 1.0 then scaled by (1 - burn_pct), and burn_pct is appended to
      UID 200. burn_percentage is bounded (0.0, 1.0) in remote config.
  notes: >-
    Non-burn path: each passing miner's graduated weight (result.weight) is
    multiplied by a validator consistency multiplier, then all miner weights
    are normalized to sum to (1 - burn_pct). min_weight_floor (0.1) is
    WEIGHT_MIN, the minimum weight a passing submission receives before
    normalization.

weight_setting:
  cadence: rate_limited
  method: >-
    Main loop sets weights when blocks_since_last >= (weight_interval // 12).
    DEFAULT_WEIGHT_INTERVAL = 300s => ~25 blocks. Burn_mode: single weight 1.0
    to UID 200. Otherwise per-passing-miner graduated weight * consistency
    multiplier, normalized to (1 - burn_pct), burn slice appended. Weights run
    through process_weights_for_netuid before subtensor.set_weights(mechid=0).
    Subtensor's own per-subnet weights rate limit defers most attempts.
  on_chain_call: set_weights
  tempo_or_interval: "TEMPO_BLOCKS = 360 blocks (~4320s); weight_interval default 300s (~25 blocks)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA on the final reward in this repo. Cross-validator aggregation
      is left to Bittensor Yuma consensus. A per-validator consistency
      multiplier (rate - floor)/(1 - floor), with consistency_floor default
      0.4, attenuates low-agreement validators but is not temporal smoothing.

anti_gaming:
  - kind: deduplication
    enforcement: rejection
    description: >-
      Novelty check (stage 5) embeds the config and queries the Central API
      FAISS novelty index; configs too similar (novelty_threshold default 0.88)
      are rejected. Embedding is added to the index before token deduction;
      fail-closed if indexing fails to prevent duplicate resubmission bypass.
  - kind: rate_limit
    enforcement: rejection
    description: >-
      Per-hotkey rate limiter (DEFAULT_RATE_LIMIT_PER_UID_PER_TEMPO = 1 per
      TEMPO_SECONDS window), persisted across restarts.
  - kind: collateral
    enforcement: barrier
    description: >-
      Work-token economy: each accepted submission costs DEFAULT_WORK_TOKEN_COST
      = 1.0 alpha (raised from 0.01 to mitigate Sybil). Balance checked in
      stage 3 and deducted only after the full pipeline passes (stage 8);
      zero-balance miners are rejected before simulation.
  - kind: commit_reveal
    enforcement: rejection
    description: >-
      Work-id verification (stage 2b): validator recomputes
      sha256(config_json + hotkey + time_ns + nonce) and rejects on mismatch.
      Freshness window (work_id_freshness_seconds default 300s) rejects stale
      work ids; the work_id is signed by the miner hotkey.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Self-validation prevention: validator never sets weight for its own
      hotkey. Version gate rejects miners below remote min_miner_version.
      Schema validation enforces scenario structure and a max config size
      (DEFAULT_MAX_CONFIG_SIZE = 65536 bytes).
  - kind: liveness_check
    enforcement: penalty
    description: >-
      Ramp-up: for the first RAMP_UP_TEMPOS (3) tempos a validator skips miners
      with validation_counts < MIN_VALIDATIONS_FOR_WEIGHT (2). Concordia
      simulation runs sandboxed (capped CPU/RAM, egress allowlisted).

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: >-
    Single mechanism. Scenarios carry one of 9 tension_archetype enum values
    (or "custom"), but these are content tags within one task, not separate
    scored competitions; "custom" only raises the classifier threshold.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, cooldown, reputation]
  status_values: []
  reset_policy: >-
    Results retained RESULT_RETENTION_BLOCKS (= TEMPO_BLOCKS = 360 blocks)
    after the recording cycle; results for hotkeys unseen for 3 tempos are
    evicted. Validation counts persisted to disk for ramp-up survival.
  notes: >-
    Per-hotkey: latest PipelineResult (self.results), validation_counts
    (ramp-up), last-seen time, and rate-limiter window. Off-chain in the
    Central API: work-token balance and a per-miner work-token ledger;
    novelty index of prior submissions; validator consistency / agreement_rate.

