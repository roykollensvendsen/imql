schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Documented scoring (relevance verification + superlinear quality*volume) is active, but a
  hardcoded ENABLE_EMISSION_CONTROL=True redirects 80% (EMISSION_CONTROL_PERC=0.8) of total
  weight to a fixed emission-control hotkey before normalization, so most emission is burned/
  controlled and only the residual 20% is distributed across miners by score.

subnet:
  name: "Desearch (SN22)"
  owner_repo: "datura-ai__desearch"
  netuid: 22
  implementation_lang: python

task:
  summary: >-
    Miners run Bittensor axons that serve live AI, X/Twitter, and web search synapses. Validators
    send synthetic and organic search queries, then independently re-scrape/verify the miner's
    returned links and tweets against independent providers and LLM judgment. Miners are rewarded
    for returning relevant, verifiable search results (and summaries) across the three search
    types, weighted by both quality and the volume of correctly served responses.
  submission_format: [content_link, api_response]

scoring_signals:
  - name: twitter_content_relevance
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Per-tweet binary/partial score (validator independently re-fetches tweets via the Apify
      Twitter scraper actor and compares; LLM relevance check on summaries). Averaged per response.
  - name: web_basic_search_content_relevance
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Validator independently fetches web links and scores each returned link 0/1, averaging:
      "sum(scores) / len(scores) if scores else 0.0".
  - name: summary_relevance
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      SummaryRelevanceRewardModel uses an LLM (RewardLLM, reward_model_name
      "VMware/open-llama-7b-open-instruct") to judge summary relevance.
  - name: quality
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Per-(uid,search_type) mean of per-response rewards (0-1), with organic responses weighted
      ORGANIC_DEEP_SCORE_WEIGHT=5 in the mean.
  - name: volume
    metric_kind: volume
    direction: higher_is_better
    weight: null
    normalization: none
    notes: "Raw count of responses scored for a UID in a search type; enters superlinear formula."

ground_truth_sources:
  - kind: real_engagement
    description: >-
      Validators independently re-scrape the actual tweets/web pages the miner returned (Apify
      Twitter scraper actor for X; web fetch for web search) and compare to the miner's claimed
      results.
    source_identifier: "neurons/validators/apify/twitter_scraper_actor.py; web fetch in web_basic_search_content_relevance.py"
    trust_model: adversarial
    notes: "Miner output is verified against an independent provider re-fetch, not trusted as-is."
  - kind: llm_judgment
    description: "LLM (RewardLLM) judges summary/content relevance."
    source_identifier: "neurons/validators/reward/reward_llm.py; VMware/open-llama-7b-open-instruct"
    trust_model: oracle
    notes: ""
  - kind: organic_traffic
    description: >-
      Organic responses collected during the epoch are sampled (capped at
      ORGANIC_SCORE_CAP_PER_TYPE=100) and deep-scored, carrying 5x weight in the per-UID mean.
    source_identifier: "neurons/validators/scoring/query_scheduler.py"
    trust_model: adversarial
    notes: ""

aggregation:
  method: weighted_average
  composition: hybrid
  normalization: l1
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "5CUu1QhvrfyMDBELUPJLt4c7uJFbi7TKqDHkS1Zz41oD4dyP"
    fraction: 0.8
    dynamic: false
    notes: >-
      ENABLE_EMISSION_CONTROL=True; burn_weights() assigns EMISSION_CONTROL_PERC=0.8 of total
      score to the fixed EMISSION_CONTROL_HOTKEY and rescales the remaining 0.2 across other UIDs.
  notes: >-
    Per search type, per-UID (quality, volume) is folded via combine_superlinear_scores:
    score = (sum_t w_t*q_t)^1.5 * (sum_t w_t*v_t)^1.5 with SEARCH_TYPE_WEIGHTS
    {ai_search:0.60, x_search:0.20, web_search:0.20} and QUALITY_EXPONENT_ALPHA=VOLUME_EXPONENT_BETA=1.5.
    Combined scores feed the EMA, which is then L1-normalized (_l1_normalize) into raw weights.

weight_setting:
  cadence: per_epoch
  method: >-
    Hourly (UTC) scoring epoch. After EMA update and 80% emission-control burn, weights are
    L1-normalized and passed through bittensor process_weights (min/max limits), then set on chain
    with retry (set_weights_with_retry).
  on_chain_call: set_weights
  tempo_or_interval: "1 hour (UTC hour boundary scoring epoch)"
  smoothing:
    kind: ema
    alpha: 0.5
    window: null
    notes: >-
      update_moving_averaged_scores: self.moving_averaged_scores = alpha*scattered_rewards +
      (1-alpha)*self.moving_averaged_scores with alpha = 0.5.

anti_gaming:
  - kind: deduplication
    enforcement: penalty
    description: >-
      calculate_adjusted_score applies a duplicate_tweets penalty (0.05 per duplicate) and link-
      count bonus/penalty shaping (max_bonus 0.2, max_links_threshold 10).
  - kind: liveness_check
    enforcement: rejection
    description: >-
      Responses with dendrite.status_code != 200 are zeroed; pattern_to_check regex rejects
      completions containing scoring-template/control tokens (returns None).
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Validator re-fetches the miner's claimed tweets/links from independent providers; results
      that cannot be verified score 0.
  - kind: stake_weighting
    enforcement: other
    enforcement_other: "superlinear consolidation incentive"
    description: >-
      Superlinear score = quality^1.5 * volume^1.5 makes consolidating volume into one UID strictly
      more profitable than splitting across sybil UIDs (per code comment).

sub_competitions:
  structure: per_task_type
  stages:
    - name: ai_search
      role: main
      advancement_rule: ""
      multipliers: {search_type_weight: 0.60}
    - name: x_search
      role: main
      advancement_rule: ""
      multipliers: {search_type_weight: 0.20}
    - name: web_search
      role: main
      advancement_rule: ""
      multipliers: {search_type_weight: 0.20}
  count: 3
  notes: >-
    Three search types scored separately then combined with per-type weights into one superlinear
    per-UID score.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: ""
  notes: >-
    moving_averaged_scores EMA persisted across epochs (save/load_moving_averaged_scores); capacity
    module tracks per-UID per-type quality / declared concurrency / allocation across scoring
    windows (capacity.update_after_scoring, miner_db allocation state).

