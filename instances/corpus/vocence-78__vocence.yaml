schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Full scoring pipeline is implemented (GPT-4o-audio trait extraction, weighted
  element scoring, binary pass-threshold win-rate, stake-weighted global consensus,
  winner-take-all weight setting). However the validator burns (weight 1.0 on UID 0)
  whenever there are too few active validators, too few readable buckets, no usable
  cross-validator data, or no eligible miner clears THRESHOLD_MARGIN — so the live
  network frequently burns while the documented scoring is dormant.

subnet:
  name: "Vocence"
  owner_repo: "vocence-78__vocence"
  netuid: 78
  implementation_lang: python

task:
  summary: >-
    Miners deploy PromptTTS voice-intelligence models on Chutes exposing a single
    /speak endpoint (text + voice-trait instruction -> WAV). Validators derive a task
    spec from real source audio via GPT-4o-audio, call each miner's /speak, and score
    the generated audio on content (WER), audio naturalness (pairwise judge), and
    prompt/voice-trait adherence (gender, pitch, speed, age_group, emotion, tone,
    accent). Rewards go winner-take-all to the single globally-best miner.
  submission_format: [api_response, model_weights]

scoring_signals:
  - name: script
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.30
    normalization: none
    notes: >-
      1 - WER(spec.transcription, miner.transcription), clamped to [0,1]. WER is
      Levenshtein distance over lowercase word tokens. Highest-weighted element.
  - name: naturalness
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.15
    normalization: none
    notes: >-
      Pairwise GPT-4o-audio judge: source vs miner audio, presentation order
      randomized; 1.0 if miner judged more natural else 0.0.
  - name: gender
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.10
    normalization: none
    notes: "Exact enum match (male/female/neutral): 1.0 if equal else 0.0."
  - name: speed
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.10
    normalization: none
    notes: "Ordinal enum (slow/normal/fast): exact=1.0, off-by-one=0.5, else 0.0."
  - name: emotion
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.10
    normalization: none
    notes: "Exact enum match over 8 emotion values: 1.0 if equal else 0.0."
  - name: age_group
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.10
    normalization: none
    notes: "Ordinal enum (child/young_adult/adult/senior): exact=1.0, off-by-one=0.5, else 0.0."
  - name: pitch
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.05
    normalization: none
    notes: "Ordinal enum (low/mid/high): exact=1.0, off-by-one=0.5, else 0.0."
  - name: accent
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.05
    normalization: none
    notes: "Exact enum match (us/uk/au/in/neutral/other): 1.0 if equal else 0.0."
  - name: tone
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.05
    normalization: none
    notes: "Exact enum match over 6 tone values: 1.0 if equal else 0.0."

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      GPT-4o-audio-preview (or GPT_AUDIO_MODEL) used pointwise to extract the source
      task spec and the miner-audio traits, and pairwise to judge naturalness.
      Temperature 0.0 for both calls.
    source_identifier: "gpt-4o-audio-preview"
    trust_model: oracle
    notes: >-
      The "spec" (transcription + 7 voice traits) is derived from real source audio,
      so the judge is also the ground-truth labeler for each evaluation.
  - kind: deterministic_dataset
    description: >-
      Source audio clips pulled from the shared Hippius corpus bucket (LibriVox-sourced,
      20-25s clips) used to derive each task spec.
    source_identifier: "audio-corpus-bucket (AUDIO_SOURCE_BUCKET)"
    trust_model: trusted
    notes: "Validator selects a random .wav avoiding recently-used items; duration-gated 20-25s."

aggregation:
  method: winner_take_all
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      When no miner is eligible / no consensus, validator sets weight 1.0 on burn
      UID 0. BURN_UID = 0, OWNER_UID = 0. Burn is a full-cycle residual, not a fixed fraction.
  notes: >-
    Per-evaluation score = sum(element_weight * element_score) / sum(weights), in [0,1];
    raw element weights are renormalized to sum to 1.0. Each evaluation becomes a binary
    win (generated_wins) when score >= PASS_THRESHOLD (0.9); win_rate = wins/total is the
    ranking primitive (continuous score is diagnostic only). Per-validator win_rates are
    combined into a global stake-weighted mean: sum(sqrt(stake_v)*win_rate_v)/sum(sqrt(stake_v)),
    falling back to equal weights if all stakes are zero. The single global winner that clears
    every earlier eligible miner by THRESHOLD_MARGIN gets weight 1.0; all other valid miners get 0.0.

weight_setting:
  cadence: per_epoch
  method: >-
    Winner-take-all: every CYCLE_LENGTH (150) blocks at offset 15, validator fetches valid
    miners + active validators from owner API, reads recent MAX_EVALS_FOR_SCORING (50) evals
    from each active validator bucket, computes stake-weighted global win_rates, applies
    eligibility (>40 evals in >=3 buckets) + threshold-margin (0.02) + deterministic tie-breaks,
    and sets weight 1.0 on the winner UID (0.0 on others). Burns to UID 0 if no eligible winner.
  on_chain_call: set_weights
  tempo_or_interval: "150 blocks"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA on the final reward; weights are set fresh each cycle (1.0 winner / 0.0 others, or
      1.0 burn UID). A recency window of the most recent 50 evals (MAX_EVALS_FOR_SCORING) bounds
      the per-validator score history, but this is a fixed-count window, not an EMA/SMA smoother.

anti_gaming:
  - kind: plagiarism_detection
    enforcement: elimination
    description: >-
      detect_duplicates groups valid miners by model_hash; for each duplicate hash only the
      earliest commit block is kept valid, later miners marked invalid (duplicate_model). The
      owner base model weights hash is pinned (BASE_MODEL_WEIGHTS_HASH) so miners copying the
      base model are caught.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Each contributing validator's influence on the global score is weighted by sqrt(stake)
      from the current metagraph (validator_weight = sqrt(stake)); zero/unavailable stakes fall
      back to equal weights.
  - kind: code_inspection
    enforcement: rejection
    description: >-
      check_wrapper_integrity verifies the deployed chute source matches the canonical Vocence
      wrapper; chute name must contain the magic word "vocence" (CHUTE_NAME_MAGIC_WORD). Failing
      either marks the miner invalid.
  - kind: rate_limit
    enforcement: elimination
    description: >-
      A hotkey making more than MAX_POST_CUTOVER_COMMITS (2) on-chain commits at/after
      COMMIT_LOCK_BLOCK is marked invalid (cap disabled when COMMIT_LOCK_BLOCK=0).
  - kind: liveness_check
    enforcement: rejection
    description: >-
      A validator only counts as active (and only its bucket is read) if it submitted
      evaluation data within ACTIVE_VALIDATOR_WINDOW_HOURS (24h) and is present in the local
      VALIDATOR_BUCKETS_JSON. Too few active validators -> whole cycle burns.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Pairwise naturalness presentation order randomized to neutralize position bias; trait
      extractor drift coerced to closed enum via alias map; judge temperature pinned to 0.0;
      ELEMENT_WEIGHTS and PASS_THRESHOLD must be identical across honest validators for consensus.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: >-
    Single PromptTTS task (Q1 focus). The owner base model is injected as a synthetic
    participant (uid 0, BASE_MODEL_COMMIT_BLOCK 1000) that miners must beat by THRESHOLD_MARGIN.

per_miner_state:
  tracked: true
  state_kinds: [status_enum, performance_ledger, registration_age]
  status_values: [valid, invalid, duplicate_model, eligible, winner]
  reset_policy: >-
    Win rates recomputed each cycle from the most recent 50 evals per validator bucket (no
    carryover EMA). Validity recomputed from owner API each cycle.
  notes: >-
    Eligibility uses commit block (registration_age proxy) for ordering ("later miners must beat
    earlier baselines") and counts of evals per validator bucket. is_valid/invalid_reason carried
    per participant from the owner API.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/scoring.md"
    - "docs/validator-setup.md"
