schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Default BURN_AMOUNT_PERCENTAGE=0.0 ⇒ the single season winner takes the full
  weight (winner-take-all is operative). Burn is a configurable dial: any
  fraction is sent to BURN_UID and the remainder to the winner; at 1.0 consensus
  is skipped and everything burns. There is also a hard burn-all fallback when no
  eligible winner / no positive rewards exist. So operative reality ranges from
  active WTA to full burn depending on env config.

subnet:
  name: "Web Agents Subnet (Autoppia / Infinite Web Arena)"
  owner_repo: "autoppia__autoppia_web_agents_subnet"
  netuid: 36
  implementation_lang: python

task:
  summary: >-
    Miners submit metadata pointing at a GitHub repo (agent name, image,
    GitHub URL). The validator clones and runs that repo inside a sandbox as a
    web agent exposing a POST /act endpoint. The validator generates synthetic
    web tasks (Infinite Web Arena), executes the agent's returned actions in a
    fresh browser, and runs executable tests to determine task completion. A
    task is binary-solved when eval_score >= 1.0; solved tasks are then shaped
    by execution time and token cost. Per-round/season the highest-rewarding
    miner is selected winner-take-all.
  submission_format: [source_code]

scoring_signals:
  - name: eval_score
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Binary task success gate: eval_score >= 1.0 counts as solved, otherwise the
      task reward is forced to 0.0. eval_score itself comes from IWA executable
      tests (HTML verification, backend event testing, visual/LLM-based
      evaluation) via AsyncStatefulEvaluator. Acts as a multiplicative gate, not
      an additive term, hence weight null.
  - name: eval_score_weight
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.7
    normalization: none
    notes: >-
      EVAL_SCORE_WEIGHT=0.7. For a solved task the base reward contributes
      EVAL_SCORE_WEIGHT * 1.0.
  - name: time_component
    metric_kind: latency
    direction: lower_is_better
    weight: 0.1
    normalization: min_max
    notes: >-
      TIME_WEIGHT=0.1. time_penalty = min(execution_time / TASK_TIMEOUT_SECONDS,
      1.0) (TASK_TIMEOUT_SECONDS=180.0); time_component = 1 - time_penalty. Lower
      execution time ⇒ higher component.
  - name: cost_component
    metric_kind: other
    metric_kind_other: dollar_cost_of_tokens
    direction: lower_is_better
    weight: 0.2
    normalization: min_max
    notes: >-
      COST_WEIGHT=0.2. cost_penalty = min(token_cost /
      REWARD_TASK_DOLLAR_COST_NORMALIZATOR, 1.0)
      (REWARD_TASK_DOLLAR_COST_NORMALIZATOR=0.05 USD); cost_component =
      1 - cost_penalty.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Synthetic web tasks generated by the Infinite Web Arena (IWA) on auto-
      generated demo websites, with executable tests (HTML string/DOM checks,
      backend event testing, visual assessment, LLM-based DOM evaluation,
      hybrid) determining completion. The same N tasks are reused every round
      within a season and only change when a new season starts.
    source_identifier: "autoppia_iwa (AsyncStatefulEvaluator / IWA benchmark)"
    trust_model: trusted
    notes: >-
      Mix of deterministic (HTML/backend-event) and model-based (visual/LLM)
      checks; final eval_score per task is reduced to a binary solved gate
      (>= 1.0) in calculate_reward_for_task.

aggregation:
  method: winner_take_all
  composition: gated
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "5"
    fraction: 0.0
    dynamic: false
    notes: >-
      BURN_UID=5, BURN_AMOUNT_PERCENTAGE default 0.0 (no burn by default). When
      burn_pct > 0: winner gets (1 - burn_pct) and BURN_UID gets burn_pct. When
      burn_pct >= 1.0 consensus is skipped and all weight burns. Additional hard
      burn-all fallback (_burn_all) when there are no valid rewards or no
      eligible winner; that fallback puts weight 1.0 on BURN_UID.
  notes: >-
    Per task: calculate_reward_for_task gives 0 if unsolved, else
    EVAL_SCORE_WEIGHT*1 + TIME_WEIGHT*time_component + COST_WEIGHT*cost_component.
    Rewards are averaged across tasks, aggregated across validators via consensus
    commitments, then a single season winner is chosen (season-best persistence
    with LAST_WINNER_BONUS_PCT overtake margin) and final on-chain weights are
    winner-take-all (final_rewards_array[winner_uid] = 1.0), L1-normalized in
    set_weights.

weight_setting:
  cadence: per_round
  method: >-
    Final per-round weights are winner-take-all: the resolved season winner gets
    1.0 (split with BURN_UID if burn enabled), passed through update_scores (EMA)
    then L1-normalized (raw_weights = scores / ||scores||_1) and
    process_weights_for_netuid before subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "1800 blocks (round = 5 epochs x 360 blocks); season = 100 epochs"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores applies EMA: scores = alpha*scattered_rewards +
      (1-alpha)*scores, alpha = neuron.moving_average_alpha (default 0.1). Since
      final rewards are already winner-take-all (1.0 on one uid), this EMA blends
      the on-chain score toward the new winner each round.

anti_gaming:
  - kind: deduplication
    enforcement: penalty
    description: >-
      Same-solution detection: cosine similarity over bag-of-words of agent
      action sequences; groups with sim >= SAME_SOLUTION_SIM_THRESHOLD=0.90 are
      penalized by multiplying scores by SAME_SOLUTION_PENALTY (hard-coded 0.0,
      i.e. zeroed when active).
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Per-round evaluation limited to top N miners by stake
      (MAX_MINERS_PER_ROUND_BY_STAKE=30 in prod), and miners must meet
      MIN_MINER_STAKE_ALPHA=100.0 alpha stake to be evaluated.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Anti-sybil caps: MAX_MINERS_PER_COLDKEY=2 and MAX_MINERS_PER_REPO=2 unique
      active miners (repo cap per season). Unchanged repo commits are not
      re-evaluated within a season.
  - kind: risk_limit
    enforcement: penalty
    description: >-
      Per-task USD cost cap MAX_TASK_DOLLAR_COST_USD=0.05; after
      MAX_OVER_COST_TASKS_BEFORE_FORCED_ZERO_SCORE=10 tasks exceeding the cap, a
      miner's score is forced to zero.

sub_competitions:
  structure: tiered
  stages: []
  count: null
  notes: >-
    Season/round hierarchy: a Season = 100 epochs containing 20 rounds of 5
    epochs (~6h) each. The same N tasks are reused each round; per-season winner
    persistence (season-best reward per miner) decides the on-chain winner, with
    a challenger needing to beat the reigning leader by > LAST_WINNER_BONUS_PCT
    (5%) to dethrone. Not a true bracketed competition, so 'tiered'.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum, cooldown]
  status_values: [handshake_valid, reused, evaluated]
  reset_policy: >-
    Season-best competition history resets per season (best_by_miner keyed by
    season). Repo caps reset when a new season starts; unchanged commits skip
    re-evaluation until a new season or new commit.
  notes: >-
    _season_competition_history tracks per-miner best consensus reward in the
    season, best round, and snapshots; current_winner_uid persists across rounds.
    Optional adaptive evaluation cooldown (ENABLE_EVALUATION_COOLDOWN, default
    False) waits more rounds for worse/non-responding miners.

