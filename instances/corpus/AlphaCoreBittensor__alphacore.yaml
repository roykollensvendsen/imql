schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Default config burns 90% of emission to BURN_UID (BURN_AMOUNT_PERCENTAGE=0.9) every epoch,
  splitting the remaining 10% among the top-k (k=1) positive-scoring miners. If no miner has a
  positive score the validator emits a burn-only allocation (100% weight to BURN_UID). Scoring
  via the external Validation API is implemented and active; emission is heavily burn-weighted.

subnet:
  name: "AlphaCore"
  owner_repo: "AlphaCoreBittensor__alphacore"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners are autonomous DevOps agents that interpret a task prompt (today: Terraform/GCP
    infrastructure-as-code tasks), execute automation in their own environment, and submit a
    workspace ZIP artifact (base64-encoded). Validators score the submission by running it in a
    Firecracker sandbox Validation API which checks machine-checkable "invariants" against outputs
    (e.g. terraform.tfstate), returning a score in [0,1]. Final per-miner score optionally blends
    the API score with a relative latency score.
  submission_format: [content_link]
  submission_format_other: ""

scoring_signals:
  - name: api_invariant_score
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.8
    normalization: none
    notes: >-
      Score in [0,1] returned by the external Validation API after checking task invariants in a
      Firecracker sandbox. Per-miner api_avg = sum of task scores / task count. Combined weight is
      API_SCORE_WEIGHT=0.8 (normalized against latency weight). Gating: if api_avg <= 0, the final
      combined score is forced to 0 regardless of latency (fail-closed).
  - name: latency_score
    metric_kind: latency
    direction: lower_is_better
    weight: 0.1
    normalization: min_max
    notes: >-
      Relative latency score in [0,1]. LATENCY_SCORE_WEIGHT=0.1. Default mode is winner_take_all:
      among miners tied at the highest API score, the single fastest gets latency_score 1.0 and all
      others 0.0; an alternate "relative" mode uses score=(1-normalized_delta)**gamma with
      LATENCY_SCORE_GAMMA=1.0. Latency scoring is enabled only when LATENCY_SCORING_ENABLED is true
      (default true in testing profile, false in production).

ground_truth_sources:
  - kind: other
    kind_other: "sandbox_invariant_checker"
    description: >-
      Firecracker-backed sandbox Validation API that processes untrusted miner ZIP submissions and
      verifies task "invariants" (machine-checkable requirements) against outputs such as
      terraform.tfstate, returning a score 0..1.
    source_identifier: "VALIDATION_API_ENDPOINT (default http://127.0.0.1:8888)"
    trust_model: oracle
    notes: >-
      No exact enum fit; used kind=other (sandbox_invariant_checker). The sandbox is validator-side
      and trusted; miner inputs are treated as adversarial/untrusted.

aggregation:
  method: winner_take_all
  composition: gated
  normalization: l1
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 0.9
    dynamic: false
    notes: >-
      BURN_AMOUNT_PERCENTAGE default 0.9 (90%) sent to BURN_UID (default UID 0) every epoch via
      _emit_top_k_weights; remaining 0.1 split among top-k (k=1) positive-scoring uids
      (per_uid = (1 - burn_pct)/len(top_uids)). When total score <= 0, _emit_burn_only_weights
      assigns weight 1.0 entirely to BURN_UID.
  notes: >-
    Per-round final score blends api (0.8) and latency (0.1) weights, normalized to sum to 1
    (api_w/=total_w, lat_w/=total_w). Settlement updates EMA scores; emission selects top-k by EMA
    score and applies the burn split. raw_weights = scores / L1-norm before on-chain processing.

weight_setting:
  cadence: per_epoch
  method: >-
    Custom epoch-aware emitter (_maybe_emit_weights): once per epoch, inside the weights window
    (block_in_epoch >= WEIGHTS_EMIT_BLOCK_OFFSET, default 0) and after at least
    WEIGHTS_MIN_TASKS_BEFORE_EMIT (default 10) tasks. If sum(scores) <= 0 -> burn-only (100% to
    BURN_UID); else top-k (k=1) split: burn_pct to BURN_UID, (1-burn_pct) to top positive scorer.
  on_chain_call: set_weights
  tempo_or_interval: "tempo (round_manager.tempo) blocks per epoch"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores applies EMA: self.scores = alpha*scattered_rewards + (1-alpha)*self.scores with
      alpha = config.neuron.moving_average_alpha (default 0.1). Settlement clips per-round scores to
      [0,1] and excludes BURN_UID and non-positive scores before the EMA update.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Submissions are validated in a locked-down Firecracker microVM sandbox with strict egress
      controls (net_checks=False on the validator path); the validator never trusts miner-supplied
      task.json and uses its own remembered per-round invariants. If invariants are missing the
      score is 0; if api score is 0 the final combined score is forced to 0 (fail-closed).
  - kind: liveness_check
    enforcement: rejection
    description: >-
      StartRoundSynapse handshake (HANDSHAKE_TIMEOUT_SECONDS=90) probes miner liveness; dead miners
      are skipped. MIN_RESPONSE_RATE (default 0.5) and MAX_MINERS_TO_QUERY bound participation.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: ""
  notes: >-
    self.scores is a per-uid EMA (moving average) vector persisted to state.npz and updated each
    settlement. Burn UID and non-positive scores are excluded from EMA updates.

