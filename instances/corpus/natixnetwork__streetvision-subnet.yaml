      quote: "REWARD_CURVE_EXPONENT = 3.0  # >1.0 steepens the reward curve"
    - claim_field: "/weight_setting/smoothing/alpha"
      source_path: "natix/utils/config.py"
      line_ref: "288-293"
      quote: >-
        "--neuron.moving_average_alpha", ... default=0.05
    - claim_field: "/weight_setting/smoothing/notes"
      source_path: "natix/base/validator.py"
      line_ref: "447-448"
      quote: >-
        alpha: float = self.config.neuron.moving_average_alpha; self.scores =
        alpha * scattered_rewards + (1 - alpha) * self.scores
    - claim_field: "/weight_setting/method"
      source_path: "natix/validator/forward.py"
      line_ref: "13-16"
      quote: >-
