        "Subnet halted: skipping challenge forward pass."); return
    - claim_field: "/anti_gaming/1/description"
      source_path: "natix/validator/scoring/performance_tracker.py"
      line_ref: "32-34"
      quote: >-
        # Reset histories if miner is new or miner address has changed; if uid not
        in self.prediction_history or self.miner_hotkeys.get(uid) != miner_hotkey:
    - claim_field: "/anti_gaming/2/description"
      source_path: "natix/utils/config.py"
      line_ref: "305-309"
      quote: '"--neuron.vpermit_tao_limit", ... default=40096'
    - claim_field: "/per_miner_state/notes"
      source_path: "natix/validator/scoring/performance_tracker.py"
      line_ref: "14-18"
      quote: >-
        def __init__(self, store_last_n_predictions: int = 100): self.prediction_history
        ... self.label_history ... self.miner_hotkeys
    - claim_field: "/subnet/netuid"
      source_path: "natix/validator/config.py"
      line_ref: "6"
      quote: "MAINNET_UID = 72"
    - claim_field: "/documentation/primary_docs"
      source_path: "docs/incentive.md"
      line_ref: "13-16"
      quote: >-
        The network employs a dynamic reward system to incentivize miners ...
        Miners are rewarded based on their performance in classfiying construction sites.
  unresolved:
    - "decay_rate / temperature: no softmax or rank decay in the (dormant) aggregation."
    - "weight_setting cadence/tempo: SLEEP_TIME derived from MAX_TASKS_PER_DAY but the halted loop never sets weights on a real tempo; exact block tempo not in repo."
