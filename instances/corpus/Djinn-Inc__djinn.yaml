schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Live blended sports+attestation scoring drives the miner weight vector, but
  a fixed 80% of total weight is routed to UID 0 (burn) on every weight set via
  apply_burn(weights, burn_fraction=0.80). Miners share the remaining 20%.

subnet:
  name: "Djinn Protocol"
  owner_repo: "Djinn-Inc__djinn"
  netuid: 103
  implementation_lang: python

task:
  summary: >-
    Miners run TLSNotary provers (and optional peer-notary sidecars) that verify
    sports betting line availability and produce web attestations. Validators
    challenge miners with sports queries (executability/odds checks against ESPN
    + The Odds API ground truth) and dispatch TLSNotary attestation tasks.
    Miners are rewarded for accuracy on sports queries, response speed, proof
    coverage, uptime, advertised hardware capability, and valid TLSNotary
    attestation proofs, blended into a single per-miner score.
  submission_format: [api_response, signals]

scoring_signals:
  - name: accuracy
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.35
    normalization: none
    notes: >-
      Sports challenge: fraction of recent (sliding window of last 20) queries
      where result matched TLSNotary ground truth. W_ACCURACY = 0.35.
  - name: speed
    metric_kind: latency
    direction: higher_is_better
    weight: 0.25
    normalization: min_max
    notes: >-
      Sports challenge response latency, min-max normalized across miners
      (fastest=1.0, slowest=0.0). W_SPEED = 0.25.
  - name: coverage
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.15
    normalization: none
    notes: >-
      Fraction of recent proof requests (last 20) where miner's TLSNotary proof
      verified. W_COVERAGE = 0.15.
  - name: uptime
    metric_kind: uptime
    direction: higher_is_better
    weight: 0.15
    normalization: ema
    notes: >-
      EMA-smoothed uptime score, alpha=0.00193 (half-life = 1 Bittensor tempo,
      360 blocks). W_UPTIME = 0.15. Also gets up to a 10% bonus scaled by
      notary_reliability inside _compute_sports_scores.
  - name: capability
    metric_kind: hardware_spec
    direction: higher_is_better
    weight: 0.10
    normalization: none
    notes: >-
      Resource capability bonus from advertised RAM/CPU/availability/session
      headroom (capped at 0.5). Non-reporting miners get neutral 0.3.
      W_CAPABILITY = 0.10.
  - name: canonical_agreement
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.0
    normalization: none
    notes: >-
      Agreement with canonical odds median consensus. OBSERVE-ONLY: W_CANONICAL
      = 0.0, surfaced in breakdown but not multiplied into final weight.
  - name: attest_validity
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.60
    normalization: none
    notes: >-
      Attestation challenge: fraction of recent (last 10) attestations whose
      TLSNotary proof verified. W_ATTEST_VALIDITY = 0.60 within the attestation
      sub-score.
  - name: attest_speed
    metric_kind: latency
    direction: higher_is_better
    weight: 0.40
    normalization: min_max
    notes: >-
      Attestation latency, min-max normalized independently of sports speed.
      W_ATTEST_SPEED = 0.40 within the attestation sub-score.

ground_truth_sources:
  - kind: market_data
    description: >-
      Sports betting odds/lines used to construct challenges and check miner
      answers (real + synthetic lines mixed).
    source_identifier: "The Odds API"
    trust_model: oracle
    notes: "Module docstring: 'executability checks via The Odds API'."
  - kind: deterministic_dataset
    description: >-
      Public game/score data used to resolve sports outcomes and verify line
      availability.
    source_identifier: "ESPN public API"
    trust_model: trusted
    notes: "README: validator picks a live sport from ESPN; resolves outcomes via ESPN game data."
  - kind: commit_reveal
    description: >-
      TLSNotary cryptographic web attestation proofs that the validator verifies
      to confirm a miner actually fetched a given web resource.
    source_identifier: "TLSNotary"
    trust_model: adversarial
    notes: >-
      Proof validity drives both accuracy gating (unverified proofs never
      counted correct) and the attestation validity sub-score.

aggregation:
  method: weighted_average
  composition: hybrid
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 0.80
    dynamic: false
    notes: >-
      apply_burn assigns burn_fraction (config.bt_burn_fraction = 0.80,
      hardcoded protocol parameter, .env BT_BURN_FRACTION ignored) to UID 0 and
      scales miner weights into the remaining 0.20. Applied every weight set in
      the epoch loop.
  notes: >-
    Per-miner score = (1 - W_ATTESTATION_BLEND)*sports + W_ATTESTATION_BLEND*attest,
    with W_ATTESTATION_BLEND = 0.30 (only when attestation data exists; otherwise
    pure sports). Sports and attestation are each internal weighted sums of their
    signals. The blended score is then multiplied by a sqrt volume-confidence
    factor and several multiplicative gates (challenged-but-never-valid 0.05
    penalty, optional reliability/shield/proof-complexity amplifiers, bootstrap
    and circuit-breaker zeroing) — hence composition: hybrid. Final raw scores
    are L1-normalized to sum to 1 across miners (then burn re-scales). Empty
    epochs use uptime+history(+attestation) weights instead.

weight_setting:
  cadence: rate_limited
  method: >-
    compute_weights_detailed(is_active) builds per-miner blended scores,
    normalizes to sum 1, apply_burn routes 80% to UID 0, then set_weights pushes
    the vector on chain. Gated by should_set_weights (>= MIN_WEIGHT_INTERVAL
    blocks since on-chain last_update).
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks (MIN_WEIGHT_INTERVAL)"
  smoothing:
    kind: ema
    alpha: 0.00193
    window: null
    notes: >-
      No EMA on the final blended reward itself. The only EMA in scoring is on
      the uptime component (MinerMetrics.ema_uptime, _EMA_ALPHA = 0.00193,
      half-life = 1 tempo / 360 blocks), which survives the per-epoch reset.
      Attestation metrics also accumulate across epochs rather than resetting.

anti_gaming:
  - kind: liveness_check
    enforcement: penalty
    description: >-
      Miners challenged for attestation but never producing a valid proof are
      multiplied by 0.05 (95% penalty) in both active and empty epochs unless
      they have a verified proactive proof.
  - kind: commit_reveal
    enforcement: rejection
    description: >-
      TLSNotary proofs must verify cryptographically; queries with
      proof_status 'unverified' are never counted correct (R25-18). Proof bytes
      are capped at MAX_PROOF_BYTES_PER_SESSION = 1_048_576 so padded wire
      proofs can't game the proof-complexity amplifier.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      New-miner zero-weight bootstrap (gated by DJINN_FF_NEW_MINER_ZERO_WEIGHT):
      fresh hotkeys held at weight 0 until BOOTSTRAP_MIN_SAMPLES=50 scored
      samples AND BOOTSTRAP_MIN_AGE_SECONDS=86400 (24h) age. Also a
      coldkey-density sybil divisor (DJINN_FF_COLDKEY_DENSITY_WEIGHT) and a
      volume-confidence sqrt shrinkage below VOLUME_TARGET=250 samples.
  - kind: deterministic_check
    enforcement: elimination
    description: >-
      Consensus circuit breaker (DJINN_FF_CIRCUIT_BREAKER): miners flagged by a
      CUSUM tracker for sustained deviation from validator consensus are forced
      to weight 0.
  - kind: hardware_validation
    enforcement: penalty
    description: >-
      Proof-complexity amplifier (DJINN_FF_PROOF_COMPLEXITY_WEIGHT) and notary
      reliability amplifier (DJINN_FF_RELIABILITY_WEIGHT, RELIAB_FLOOR=0.20,
      gate RELIAB_GATE_MIN_ASSIGNED=5) reward per-UID TLSNotary/notary work that
      a shared-sidecar sybil cluster cannot replicate per UID. Non-notary miners
      take a 0.5 free-rider penalty on attestation score.

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: sports_challenge
      role: main
      advancement_rule: "scored on accuracy/speed/coverage/uptime/capability; 70% blend weight"
    - name: attestation_challenge
      role: main
      advancement_rule: "scored on proof validity/speed; 30% blend weight (W_ATTESTATION_BLEND)"
  count: 2
  notes: >-
    Two independently-scored challenge types blended into one weight. A separate
    empty-epoch path scores uptime+history(+attestation) when no challenges ran.

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cumulative_score, reputation, registration_age]
  status_values: []
  reset_policy: >-
    Per-epoch sports counters (queries, latencies, proofs, notary duties) reset
    in reset_epoch() after weights are set; consecutive_epochs increments for
    participants. Attestation metrics, ema_uptime, lifetime counters, and
    notary-pair history persist across resets. All state persisted to SQLite so
    scores survive restarts; metrics reset on hotkey change (new miner on a UID).
  notes: >-
    first_seen_at drives the bootstrap window (registration_age); ema_uptime and
    notary_reliability are the reputation signals; lifetime_* counters are the
    cumulative ledger.

