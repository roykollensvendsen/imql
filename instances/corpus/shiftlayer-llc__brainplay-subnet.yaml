schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Every weight update mixes 90% burn (UID 0) with 10% real distribution via
  --burn_ratio default 0.90 in game/base/validator.py::_set_weights. In addition,
  whole weight groups fall back to a 100% burn vector (all weight to UID 0) when
  scores are stale (>1h), there are <30 games, no scores, a non-positive or tied
  top score, or the winner is missing from the metagraph. The documented winner-
  take-all scoring is live but only ever expresses through the 10% non-burn share.

subnet:
  name: "Brainplay"
  owner_repo: "shiftlayer-llc__brainplay-subnet"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners deploy AI model endpoints on Targon (TVM) and commit the endpoint UID
    on-chain. Validators query those endpoints to make the models compete in
    games (Codenames, 20 Questions, SuperMario). Miners are rewarded for winning
    / performing best in the games; the single top-scoring miner per competition
    window takes essentially all of that competition's non-burn weight.
  submission_format: [compute_service, commitment_hash]

scoring_signals:
  - name: codenames_team_win
    metric_kind: win_rate
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Legacy Codenames reward (game/validator/reward.py::get_rewards): winning
      team's members get 1.0, losers 0.0. Aggregated as a window-average win rate
      per hotkey before winner selection.
  - name: twentyq_solve
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      20 Questions per-attempt score: 0.0 if unsolved or question_index<=0;
      1.0 if solved within 20 questions; for index in 21..30 a linear penalty
      1.0 - 0.1*(index-20); 0.0 beyond 30 questions.
  - name: supermario_progress
    metric_kind: vlm_judgment
    direction: higher_is_better
    weight: null
    normalization: min_max
    notes: >-
      Round-relative SuperMario score: best valid run gets 1.0; other valid runs
      scale by progress_from_start / best_progress (clamped to [0,1]); failed or
      invalid runs (no artifacts, error, invalid_response) get 0.0.

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      20 Questions referee yes/no/unknown answers are produced by an LLM judge
      provider (chutes.ai, default model openai/gpt-oss-120b-TEE), with a
      deterministic local heuristic fallback when credentials are absent.
    source_identifier: "https://llm.chutes.ai/v1"
    trust_model: oracle
    notes: ""
  - kind: deterministic_dataset
    description: >-
      SuperMario uses an isolated Mario benchmark environment; progress and
      level-completion are measured from the run artifacts/env_score returned by
      the miner endpoint, with validator-side image-hash verification.
    source_identifier: "4b9ba675ef3c8ca8b8e41dfe7636b5c72c507711befe76562d18326572efcfef"
    trust_model: adversarial
    notes: ""

aggregation:
  method: winner_take_all
  composition: hybrid
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: 0.001
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 0.90
    dynamic: false
    notes: >-
      Fixed 0.90 burn_ratio mixed into every published weight vector
      (_set_weights). Separately, the entire vector becomes a pure burn vector
      (UID 0 = 1.0) under stale/insufficient/no-score/tie/missing-winner
      conditions.
  notes: >-
    Per competition, scores are averaged over a rolling window per hotkey
    (default 1 day). Only hotkeys meeting the stake requirement and with games
    >= record_count_limit (int(0.9*median game count)) are eligible. The single
    unique top-scoring hotkey gets raw weight 1.0; every other hotkey with score
    >0 gets a 0.001 floor; the vector is L1-normalized, then 90% burn is mixed
    in. Weight groups combine competitions by ratio (llm group: codenames 0.5 /
    twentyq 0.5 when both present; otherwise 1/count).

weight_setting:
  cadence: rate_limited
  method: >-
    set_weights per weight group per publish_mechid. llm group (codenames+twentyq)
    publishes on mechid=0; vision group (supermario) on mechid=1. Snapshots must
    be fresh (TTL 3600s); missing fresh snapshots keep last publication or burn.
  on_chain_call: set_weights
  tempo_or_interval: "1 days"
  smoothing:
    kind: sma
    alpha: null
    window: 86400
    notes: >-
      Scoring window is a rolling simple average of per-hotkey scores over
      scoring.interval (default '1 days'); not an EMA. Set via
      window_average_scores_by_hotkey over [since_ts, end_ts].

anti_gaming:
  - kind: stake_weighting
    enforcement: rejection
    description: >-
      Only hotkeys with metagraph stake S[uid] >= neuron.minimum_stake_requirement
      are counted toward scores/weights (default 0).
  - kind: liveness_check
    enforcement: penalty
    description: >-
      If the latest synced score is older than 1 hour the validator switches the
      whole competition to a burn vector; competitions with <30 games in the
      window are skipped (burned).
  - kind: rate_limit
    enforcement: penalty
    description: >-
      record_count_limit = int(0.9 * median eligible game count) excludes actors
      with few games (e.g. new registrations) from winner eligibility.
  - kind: hardware_validation
    enforcement: rejection
    description: >-
      For SuperMario, validators verify the deployed miner container image hash
      against the canonical hash before using the endpoint.

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: "codenames"
      role: "main"
      advancement_rule: "weight_group llm, publish_mechid 0; window-average win-rate winner-take-all"
    - name: "twentyq"
      role: "main"
      advancement_rule: "weight_group llm, publish_mechid 0; window-average score winner-take-all"
    - name: "supermario"
      role: "main"
      advancement_rule: "weight_group vision, publish_mechid 1; round-relative progress winner-take-all"
  count: 3
  notes: >-
    Three competitions across two weight groups / two mechids. llm group shares
    mechid 0 (codenames 0.5 + twentyq 0.5); vision group is mechid 1.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    Rolling-window based: scores are summed/averaged only over the configured
    scoring window (default 1 day); older records age out of the window.
  notes: >-
    Per-hotkey window aggregates (avg_scores, total_scores, counts, win/loss
    counts, observer counts) are maintained in the score/generic stores keyed by
    competition and validator hotkey.

documentation:
  status: docs_and_code
  source_version: "2.4.1"
  primary_docs: ["README.md", "docs/running_on_mainnet.md"]
  completeness: medium

