schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  README documents a 90% burn with 10% of alpha used to incentivize quantum compute. The constant
  BURN_PERCENTAGE = 0.90 is defined in WeightSetter.py but is NOT referenced in the live
  _get_weights() weight computation; the live code distributes weights purely proportional to
  miner execution cost over a 14-day lookback, plus a small maintenance incentive. The 90% burn is
  described as applied at the emissions level, not enforced in the on-chain weight vector shown here.

subnet:
  name: "Quantum Compute"
  owner_repo: "qbittensor-labs__quantum-compute"
  netuid: 48
  implementation_lang: python

task:
  summary: >-
    Miners own or operate physical gate-based quantum computers (or are partnered with an operator)
    and execute OpenQASM 2.0/3.0 quantum circuits dispatched by validators on behalf of OpenQuantum
    end users. A miner is rewarded in proportion to the total confirmed execution cost of the
    quantum-compute jobs it successfully completed over the lookback window.
  submission_format: [compute_service]

scoring_signals:
  - name: execution_cost_share
    metric_kind: volume
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Each miner's weight is its summed execution cost (over completed/cost-confirmed jobs in the
      14-day lookback) divided by the network-wide sum of those costs. Cost is fetched per execution
      from the job server's cost endpoint and stored in the successful_job table.
  - name: maintenance_incentive
    metric_kind: uptime
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Onboarded miners present in the metagraph but with no cost-bearing jobs receive a flat
      maintenance allocation: TOTAL_MAINTENANCE_INCENTIVE (0.01) split evenly across all such miners.
      The cost-proportional weights are scaled by (1 - TOTAL_MAINTENANCE_INCENTIVE) when any miner
      needs maintenance.

ground_truth_sources:
  - kind: organic_traffic
    description: >-
      Quantum computing requests (circuits) from OpenQuantum end users, dispatched by the validator
      to miners; success is determined by the miner-reported execution status (COMPLETED/FAILED).
    source_identifier: "OpenQuantum job server"
    trust_model: trusted
    notes: >-
      Job completion status comes from the miner's synapse response (ExecutionStatus). Execution
      cost is confirmed by querying the job server's executions/{id}/cost endpoint.

aggregation:
  method: proportional
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: null
    fraction: 0.90
    dynamic: false
    notes: >-
      README states emissions begin with a 90% burn and 10% available to incentivize quantum compute.
      The literal BURN_PERCENTAGE = 0.90 exists in WeightSetter.py but is not applied in _get_weights;
      DISTRIBUTION_KEY_UID = 220 and get_burn_uid()/_get_burn_uid() are defined but unused in the
      computed weight vector. The address/uid of the burn target is not resolvable from the live
      weight code.
  notes: >-
    weights[uid] = proportion(miner) * (1 - TOTAL_MAINTENANCE_INCENTIVE) for cost-bearing miners;
    weights[uid] = TOTAL_MAINTENANCE_INCENTIVE / N for the N onboarded-but-idle miners.

weight_setting:
  cadence: rate_limited
  method: >-
    Every 30 minutes a Timer fires _set_weights(): fetch onboarded miner hotkeys from the job server,
    compute per-hotkey cost proportions over a 14-day lookback, assign weights, and publish via
    set_weights over the full uid range.
  on_chain_call: set_weights
  tempo_or_interval: "30 minutes"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the final weight vector; weights are recomputed from a rolling 14-day
      SQL aggregation of confirmed execution costs each cycle.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Validator verifies miner responses: synapse.success false or rate_limited causes the job to be
      rejected/retried; only COMPLETED executions are recorded as successful_job rows that count
      toward cost-proportional weight. Rate limiting pushes the circuit back on the queue.
  - kind: rate_limit
    enforcement: rejection
    description: >-
      Miners signal rate_limited in the synapse; rate-limited requests are not credited and are
      re-queued for retry.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    Confirmed-cost rows in successful_job older than MAX_DATA_AGE (30 days) are deleted; weight
    computation only sums costs from the trailing LOOKBACK_PERIOD (14 days).
  notes: >-
    Per-miner cumulative execution cost is accumulated in the successful_job SQLite table
    (miner_hotkey, execution_id, cost, created_at) and summed per hotkey at weight time.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "qbittensor/validator/validator.md"
  completeness: medium

