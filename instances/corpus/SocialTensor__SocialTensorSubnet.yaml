schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  As of the current code path (after 2025-04-01 16:00 UTC), the Burn pseudo-model
  receives 71% of incentive (model_incentive_weight 0.71), routed by setting weight 1.0
  on the subnet owner coldkey's UID. The remaining ~29% is distributed across live
  scored categories (GoJourney 4%, FluxSchnell 10%, OpenGeneral 5%,
  OpenTraditionalArtSketch 5%, DeepSeek_R1_Distill_Llama_70B 5%). So a large fixed
  fraction is burned alongside live scoring.

subnet:
  name: "NicheImage (SocialTensor)"
  owner_repo: "SocialTensor__SocialTensorSubnet"
  netuid: 23
  implementation_lang: python

task:
  summary: >-
    Miners commit to a model type (image-generation or text-generation category) and a
    generation volume, then serve generation requests. Validators issue synthetic
    challenges (prompts/images) per model category and score each miner's response
    against a reference reproduction or quality metric. Categories include fixed image
    models (GoJourney, FluxSchnell), open image categories (OpenGeneral,
    OpenTraditionalArtSketch) scored by image quality + prompt adherence, and a text
    category (DeepSeek_R1_Distill_Llama_70B). Rewards are scaled by committed volume and
    penalized by processing time.
  submission_format: [api_response, content_link]

scoring_signals:
  - name: matching_result
    metric_kind: similarity
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      For fixed/recreatable image categories, miner image is compared to the validator's
      reproduction via ViT CLIP cosine similarity: reward 1.0 if similarity > threshold
      (0.9), (sim + (1-threshold))**3 if sim > 0.4, else 0.0. README: matching_result is
      0 or 1 based on similarity match. NSFW/black-image checks can yield -5 or 0.
  - name: t2i_open_category_score
    metric_kind: composite
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Open category score = 0.5*prompt_adherence + 0.5*iqa. prompt_adherence from a
      binary VQA (MiniCPM-V) over a structured DSG question graph; iqa from pyiqa
      (nima-vgg16-ava) normalized to [0,1] over [3.5, 7.0]. weights = {iqa:0.5,
      prompt_adherence:0.5}.
  - name: gojourney_process_mode_reward
    metric_kind: reward
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      GoJourney reward from process_mode of the fetched Midjourney task:
      turbo=1.0, fast=0.5, relax=0.1; 0 if task failed or prompt mismatch.
  - name: upscale_quality
    metric_kind: similarity
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Upscale pipeline scored by PSNR (threshold 30) and SSIM (threshold 0.9); 1.0 if
      both pass, 0.0 if both fail, else penalty_factor 0.6 * (psnr_penalty+ssim_penalty)/2.
  - name: time_penalty
    metric_kind: latency
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      Subtracted penalty: max_penalty(0.4) * process_time**1.5 / timeout**1.5, capped at
      0.4. README: time_penalty = 0.4 * (processing_time / timeout)**3 (exponent differs
      from code which uses **1.5).
  - name: volume_scale
    metric_kind: volume
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      reward_scale = max(min(total_volume**0.5 / 256**0.5, 1), 0); final reward
      multiplied by (0.6 + 0.4 * reward_scale). total_volume clipped to [40, 256].

ground_truth_sources:
  - kind: reference_model
    description: >-
      Validator reproduces the challenge with the same generation model/seed and the
      miner output is matched against it via CLIP cosine similarity (fixed image
      categories) or PSNR/SSIM (upscale).
    source_identifier: "vit_base_patch16_clip_384.laion2b_ft_in12k_in1k"
    trust_model: trusted
    notes: "CosineSimilarityReward model in services/rewarding/cosine_similarity_compare.py"
  - kind: llm_judgment
    description: >-
      Open-category prompt adherence judged by a binary VQA model (MiniCPM-V-2_6) over a
      structured question graph derived from the prompt; combined with a no-reference
      image quality metric (pyiqa nima-vgg16-ava).
    source_identifier: "openbmb/MiniCPM-V-2_6 ; pyiqa nima-vgg16-ava"
    trust_model: trusted
    notes: "OpenCategoryReward in services/rewarding/open_category_reward.py"
  - kind: organic_traffic
    description: >-
      GoJourney rewards verified by fetching the Midjourney task status/input from an
      external API and comparing prompt and process_mode.
    source_identifier: "https://api.midjourneyapi.xyz/mj/v2/fetch"
    trust_model: oracle
    notes: "fetch_GoJourney / get_reward_GoJourney"

aggregation:
  method: weighted_average
  composition: hybrid
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "5GvTa4JUKbUHqeJH8YLUDaV7jHChrfUy4n5zWrcCiU7bySoc"
    fraction: 0.71
    dynamic: false
    notes: >-
      Burn pseudo-model has model_incentive_weight 0.71 (and temp_incentive_weight Burn
      0.71 in the current/else branch). get_model_specific_weights sets weight 1.0 on the
      owner coldkey's UID for the Burn model, so 71% of incentive is routed to the owner
      (burned).
  notes: >-
    Per-model the validator averages each miner's last-10 scores (sum/10, clipped [0,1]),
    adds registration bonus, normalizes per model, multiplies by the model's incentive
    weight, and sums across models. Open-category models additionally blend rank
    (0.5*raw + 0.5*ranked, then 0.8 + 0.2*combined). Final weight vector L1-normalized in
    set_weights.

weight_setting:
  cadence: rate_limited
  method: >-
    update_scores_on_chain() builds a weight vector by summing per-model normalized
    weights scaled by model incentive weights; set_weights() L1-normalizes, runs
    process_weights_for_netuid, and calls subtensor.set_weights. Forward loop runs roughly
    every loop_base_time (600s) querying miners in batches.
  on_chain_call: set_weights
  tempo_or_interval: "loop_base_time 600 seconds; epoch_length default 100 (12s blocks)"
  smoothing:
    kind: sma
    alpha: null
    window: 10
    notes: >-
      Per-miner reward smoothed as a simple mean over the last 10 scores
      (scores kept as [-10:], get_model_specific_weights sums last 10 / 10). Stake_based
      model (now deprecated/0%) used an EMA with w=0.02. Recycle (now 0%) decayed as
      0.9 ** days_since_registration.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      NSFW/black-image hash check: if validator image is non-black and miner returns a
      black image -> reward 0; if validator is black and miner is non-black -> reward -5.
      Uses imagehash average_hash.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Per-miner rate_limit / total_volume governs how many synthetic queries are issued;
      total_volume clipped to [40, 256]; ~80% of volume used for synthetic, ~20% proxy.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      min_stake (default 10000) gating via get_volume_per_validator; deprecated
      Stake_based model scored miners by alpha_stake EMA + sigmoid of change.
  - kind: data_augmentation
    enforcement: penalty
    description: >-
      Validator reuses/recreates challenge synapses with probabilities (80% reuse
      existing rewarded synapse, 10% reuse with new seed, 10% new) and random seeds/image
      sizes to deter precomputation.

sub_competitions:
  structure: multi_mechanism
  stages: []
  count: 5
  notes: >-
    Multiple model categories each with its own reward_type and fixed incentive weight:
    GoJourney (custom_offline, 4%), FluxSchnell (image, 10%), OpenGeneral (open_category,
    5%), OpenTraditionalArtSketch (open_category, 5%), DeepSeek_R1_Distill_Llama_70B
    (text, 5%); plus pseudo-models Recycle, Stake_based, Burn. count reflects the 5 live
    scored categories.

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, registration_age, cumulative_score]
  status_values: []
  reset_policy: >-
    scores and process_time reset when a miner's reported model_name changes; scores
    kept to last 10, process_time to last 500 (reset on store). Recycle miners' scores
    set to 0.9**days_since_registration.
  notes: >-
    all_uids_info per UID tracks scores, process_time, model_name, total_volume,
    reward_scale, rate_limit, registration_time, ema_previous/staking_score (for
    deprecated Stake_based). Registration age drives a bonus of (10-day)/100 for
    day<10. State persisted via pickle to state.pkl.

