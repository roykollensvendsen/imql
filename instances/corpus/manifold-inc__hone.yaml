schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  set_weights() always allocates BURN_PERCENTAGE (default 0.95) to BURN_UID (default 251) and
  distributes only MINER_PERCENTAGE (default 0.05) to qualifying top miners. If no miner meets the
  accuracy floor, 100% is burned. So the live mechanism is a 95% burn / 5% scored split, escalating
  to full burn when no miner qualifies.

subnet:
  name: "Hone (ARC-AGI-2 Benchmarking)"
  owner_repo: "manifold-inc__hone"
  netuid: 5
  implementation_lang: python

task:
  summary: >-
    Miners expose an /info endpoint pointing to a git repository containing an ARC-AGI-2 solver.
    Validators submit the repo to a Sandbox Runner that clones, builds a Docker image, runs a prep
    phase (internet on) and an isolated inference phase (internet off) over held-out ARC problems,
    then computes metrics. Miners are scored solely on exact_match_rate (fraction of ARC problems
    solved exactly); the top miners above an accuracy floor split a small non-burned reward fraction
    via exponential rank decay.
  submission_format: [source_code]

scoring_signals:
  - name: exact_match_rate
    metric_kind: accuracy
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Only exact_match_rate is used to score and rank miners. The sandbox also computes
      partial_correctness, grid_similarity and efficiency (and a constants.py SCORING_WEIGHTS map
      exact_match=0.5/partial=0.3/grid=0.15/efficiency=0.05), but the validator's
      calculate_scores_and_update_leaderboard only reads exact_match_rate.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Held-out ARC-AGI-2 problems with expected outputs, generated daily by the sandbox runner and
      never exposed to miners. exact_match is computed as predicted_output == expected_output per
      problem.
    source_identifier: "sandbox_runner synthetics / miner_current_dataset.json"
    trust_model: trusted
    notes: "Validation dataset with expected outputs never exposed to miners (README Security Notes)."

aggregation:
  method: exponential_decay_ema
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: 0.8
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "251"
    fraction: 0.95
    dynamic: false
    notes: >-
      BURN_PERCENTAGE default 0.95 to BURN_UID default 251 (both env-overridable). Miners share the
      remaining 0.05. If no miner qualifies, all_weights[BURN_UID]=1.0 (100% burn).
  notes: >-
    Top-N qualifying miners (TOP_MINERS_COUNT default 5) are ranked by avg exact_match_rate; each
    rank r gets weight exp(-0.8*r), normalized to sum to one, then scaled by MINER_PERCENTAGE (0.05).

weight_setting:
  cadence: rate_limited
  method: >-
    Every weights cycle (gated by weights_interval_blocks = cycle_duration+5 and an on-chain
    can_set_weights rate-limit check) the validator computes top-N exponential weights, sets
    BURN_PERCENTAGE on the burn UID and distributes MINER_PERCENTAGE across qualifying miners.
  on_chain_call: set_weights
  tempo_or_interval: "cycle_duration+5 blocks (default CYCLE_DURATION=30 => 35 blocks)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA on final weights. Scoring uses a lookback window score_window_blocks = cycle_duration*4
      over recent DB results, but weights are recomputed fresh each cycle, not smoothed.

anti_gaming:
  - kind: rate_limit
    enforcement: rejection
    description: >-
      MAX_SUBMISSIONS_PER_DAY (default 1) limits evaluations per miner per day; identical
      repo+branch+commit reuse cached scores (no redundant evaluation).
  - kind: deterministic_check
    enforcement: barrier
    description: >-
      Inference phase runs with network disabled (network_mode: none), dropped capabilities
      (CAP_SYS_ADMIN, CAP_NET_ADMIN, etc.) and no-new-privileges; held-out validation dataset never
      exposed to miners.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Validators must have sufficient stake and pass can_set_weights rate limiting before weights are
      accepted on chain (README Troubleshooting: "Weights not setting - Ensure sufficient stake").

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cooldown]
  status_values: []
  reset_policy: >-
    Recent results kept for RETENTION_DAYS (default 30); leaderboard holds current top-N and removes
    miners that drop out of the top N. Daily submission limit resets per day.
  notes: >-
    A leaderboard (top performers) and per-miner query results are persisted in PostgreSQL; scoring
    aggregates over a recent block window.

documentation:
  status: docs_and_code
  source_version: "validator/.version (1.0.0 per README /info example)"
  primary_docs: ["README.md"]
  completeness: high

