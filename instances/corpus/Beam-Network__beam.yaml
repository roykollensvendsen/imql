schema_version: "1.0.0"
instance_kind: extracted

# The live _set_weights path fetches a pre-computed weight snapshot from the
# off-repo BeamCore V2 service (get_recommended_weights). The in-repo SLAScorer
# is an explicit stub returning effective_multiplier=1.0, and the in-repo
# exposure formula (weight_calculator.py) is a "validator-side port" that is only
# invoked in the README's optional custom-scoring example, not the main loop.
# So the documented in-repo scoring is dormant; authoritative scoring is off-repo.
mechanism_status: dormant
mechanism_status_notes: >-
  Validator main loop computes local SLA scores via SLAScorer, but SLAScorer is a
  stub (score_orchestrator returns SLAScore(effective_multiplier=1.0)). The actual
  on-chain weight vector is taken from BeamCore's persisted snapshot via
  subnet_core_client.get_recommended_weights(epoch); local scores are only submitted
  to BeamCore, not used to set weights. The detailed exposure*quality*confidence*penalty
  formula in services/weight_calculator.py is a port of BeamCore's formula and is only
  exercised in the README's optional custom-scoring path, not the running validator.
  No emission burn is present; SLA-failing orchestrators have rewards redirected to
  Orchestrator UID #1 (subnet-owned treasury), not a null/burn UID.

subnet:
  name: "BEAM"
  owner_repo: "Beam-Network__beam"
  netuid: 105
  implementation_lang: python

task:
  summary: >-
    Miners run "orchestrators" (and the workers they coordinate) that relay/transfer
    data chunks across a decentralized bandwidth network. Workers move object bytes
    directly between storage connectors and submit Proof-of-Bandwidth (PoB) evidence
    (signed timing, bytes relayed, claimed bandwidth, canary proof) to the off-repo
    BeamCore service. Validators fetch unverified proofs from BeamCore, verify
    signature/timing/bandwidth/canary, and orchestrators are rewarded based on
    measured delivery performance (throughput, success rate, uptime, latency) rather
    than promises.
  submission_format: [compute_service]

scoring_signals:
  # Signals below are from services/weight_calculator.py (the in-repo exposure-formula
  # port) and the validator README's documented SLA formula. These describe the
  # DOCUMENTED scoring; the live validator defers weight values to BeamCore.
  - name: bandwidth_score
    metric_kind: throughput
    direction: higher_is_better
    weight: 0.40
    normalization: none
    notes: >-
      Quality component, coefficient BANDWIDTH_WEIGHT=0.40 in weight_calculator.py.
      Validator README documents the SLA-formula bandwidth coefficient as 0.30
      (a different, simpler formula); the two in-repo formulas disagree.
  - name: compliance_score
    metric_kind: other
    metric_kind_other: payment_compliance
    direction: higher_is_better
    weight: 0.25
    normalization: none
    notes: >-
      COMPLIANCE_WEIGHT=0.25. Also acts as a hard gate: below
      MIN_COMPLIANCE_FOR_EMISSIONS=0.5 the orchestrator receives zero weight.
  - name: verification_rate
    metric_kind: other
    metric_kind_other: proof_verification_rate
    direction: higher_is_better
    weight: 0.20
    normalization: none
    notes: >-
      VERIFICATION_WEIGHT=0.20. Also scales exposure (effective work =
      claimed * verification_rate, clamped to [0,1]).
  - name: spot_check_rate
    metric_kind: other
    metric_kind_other: spot_check_pass_rate
    direction: higher_is_better
    weight: 0.15
    normalization: none
    notes: "SPOT_CHECK_WEIGHT=0.15."
  - name: exposure
    metric_kind: volume
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Multiplicative factor (not additive). Blended routing share of verified work:
      EXPOSURE_BYTES_WEIGHT=0.70 * bytes_share + EXPOSURE_PROOFS_WEIGHT=0.30 *
      proofs_share, over verification-rate-discounted effective values.
  - name: confidence
    metric_kind: other
    metric_kind_other: work_volume_confidence_ramp
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Multiplicative sqrt ramp on verified work: 0.70*min(sqrt(eff_proofs/10),1) +
      0.30*min(sqrt(eff_bytes/1e9),1). Thresholds CONFIDENCE_PROOF_THRESHOLD=10,
      CONFIDENCE_BYTES_THRESHOLD=1_000_000_000.

ground_truth_sources:
  - kind: hardware_probe
    description: >-
      Proof-of-Bandwidth: workers sign timing/bytes/canary evidence of an actual
      chunk relay. Validator independently recomputes bandwidth from timing
      (bytes*8 / duration), checks timing sanity (>1ms, end>start), canary format,
      and worker hotkey signature.
    source_identifier: "proof_of_bandwidth"
    trust_model: adversarial
    notes: >-
      Proofs are fetched from the off-repo BeamCore service
      (subnet_core_client.get_unverified_proofs); BeamCore (PostgreSQL) holds
      authoritative execution state.
  - kind: other
    kind_other: offchain_coordination_service
    description: >-
      BeamCore V2 (separate repo, github.com/Beam-Network/beamcore_v2) is the
      authoritative coordination service. The live validator fetches the recommended
      weight vector and orchestrator scores from BeamCore rather than computing them
      locally.
    source_identifier: "beamcore_v2"
    trust_model: trusted

aggregation:
  method: weighted_average
  composition: hybrid
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No emission burn. SLA-violating orchestrators have a fraction of reward
      redirected to Orchestrator UID #1 (subnet-owned treasury), governed by
      sla_score.penalty_redirect_percent (a stub returns 0.0 in-repo).
  notes: >-
    Documented in-repo formula (weight_calculator.compute_weights):
    raw = exposure * quality_final * confidence * penalty * effective_compliance,
    then normalized to sum 1 across orchestrators and converted to uint16
    (MAX_WEIGHT_UINT16=65535). quality_final = quality_raw * trust_multiplier, where
    trust_multiplier multiplies by TRUST_PENALTY=0.5 per failed gate
    (compliance<0.5 or verification<0.5; both -> 0.25). It is a weighted_sum of the
    four quality signals, gated by trust and compliance, then multiplied by exposure
    and confidence — i.e. hybrid additive+multiplicative. The LIVE validator instead
    normalizes a vector pulled from BeamCore (get_recommended_weights).

weight_setting:
  cadence: rate_limited
  method: >-
    Async main loop. _maybe_set_weights sets weights only after
    blocks_between_weights (default 100, ~20 min) have passed since last set. The
    weight vector is the BeamCore persisted snapshot (uids, weights) from
    get_recommended_weights for the current/latest data epoch; on-chain via
    bittensor/Fiber set_weights, or timelocked commit-reveal when
    CommitRevealWeightsEnabled is true for the netuid.
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks (blocks_between_weights, ~20 min)"
  smoothing:
    kind: ema
    alpha: 0.3
    window: null
    notes: >-
      config.weight_alpha=0.3 ("EMA smoothing factor") and BANDWIDTH_EMA_ALPHA=0.3
      are defined. The EMA at validator.py:2123 (score = alpha*score + (1-alpha)*old)
      applies only to legacy per-connection scores, NOT to the BeamCore weight vector
      actually set on chain. Recorded as the configured smoother; effectively unused
      on the live path.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Validator re-verifies each PoB: recomputed bandwidth must be within 50% of
      claimed (ratio in [0.5,2.0]) and below physical 100 Gbps limit; transfer
      duration must be >1ms and end>start; canary proof must be 64 hex chars / valid
      hex. Failing proofs are rejected.
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      When CommitRevealWeightsEnabled is set for the subnet, weights are committed via
      time-locked commit-reveal (subtensor.set_weights with wait_for_revealed_execution).
  - kind: other
    kind_other: signature_authentication
    enforcement: rejection
    description: >-
      Worker PoB submissions must carry a valid hotkey signature over
      "{task_id}:{worker_hotkey}:{start}:{end}:{bytes}"; PoB main path verifies the
      orchestrator/miner signature via verify_hotkey_signature before scoring.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Weight setting is rate-limited to once per blocks_between_weights (default 100
      blocks) per validator.
  - kind: other
    kind_other: outflow_traffic_selling_penalty
    enforcement: penalty
    description: >-
      Outflow penalty deters traffic-selling: top 25% sellers
      (OUTFLOW_PENALTY_PERCENTILE=0.75) are penalized down to a 0.25 multiplier
      (OUTFLOW_MAX_PENALTY=0.25, i.e. up to 75% traffic reduction). Defined as
      tunable defaults in weight_calculator.py (part of the dormant in-repo formula).

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: >-
    README mentions BeamCore PRISM tracks orchestrators in "qualifying" vs "qualified"
    pools with prism_final_score, but that logic lives in the off-repo BeamCore service
    and is not implemented in this repository.

per_miner_state:
  tracked: true
  state_kinds: [cooldown, performance_ledger]
  status_values: []
  reset_policy: >-
    New orchestrators get a NEW_ORCHESTRATOR_GRACE_PERIOD_HOURS=24 grace window and
    default compliance=1.0 (no penalty) before their first epoch; PoB verification
    stats reset each epoch.
  notes: >-
    Validator keeps rolling 24h SLA metrics, per-orchestrator PoB verification stats
    (reset per epoch), payment/fraud penalty multipliers, and a grace period for new
    orchestrators. Authoritative orchestrator state lives in BeamCore PostgreSQL.

