schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Live scoring is active: a daily evaluation runs models on fresh unseen data, scores by
  1 - MAPE, picks a winner (threshold + earliest commit), and distributes 99% winner /
  1% non-winners / 0% cheaters. A burn path exists (_apply_burn) but burn_amount is
  hardcoded to 0.0 in validator.py, so no emissions are burned in this revision.

subnet:
  name: "RESI (Real Estate AI) — RESI-models"
  owner_repo: "resi-labs-ai__RESI-models"
  netuid: 46
  implementation_lang: python

task:
  summary: >-
    Miners train and submit ONNX real-estate price-prediction models (committed on-chain and
    uploaded to HuggingFace). Validators download the models, run them in sandboxed Docker
    inference against fresh validation data (properties listed/sold within the last 30 days,
    and committed at least ~30 days prior), and reward the single best-generalizing model.
    Score = 1 - MAPE (Mean Absolute Percentage Error) on predicted vs actual sale prices.
  submission_format: [model_weights, commitment_hash]

scoring_signals:
  - name: mape_score
    metric_kind: regression_error
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Score = 1 - MAPE, clamped to [0,1] via max(0.0, 1.0 - mape). MAPE = mean(|y_true - y_pred|/y_true).
      Lower error => higher score. Score is the sole ranking metric (mape_to_score in metrics.py).

ground_truth_sources:
  - kind: market_data
    description: >-
      Fresh real-estate validation data (recently listed/sold property sale prices) fetched daily
      from the RESI validator dashboard API. Used as y_true for MAPE scoring against model predictions.
    source_identifier: "https://resi-validator-api.vercel.app"
    trust_model: trusted
    notes: >-
      Temporal separation enforced: models must be committed on-chain ~30 days before evaluation,
      and evaluation uses properties listed/sold within the last 30 days (data that did not exist
      at submission time).

aggregation:
  method: winner_take_all
  composition: gated
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: "238"
    fraction: 0.0
    dynamic: false
    notes: >-
      _apply_burn() supports allocating a fraction of emissions to burn_uid (default 238), but
      burn_amount is hardcoded to 0.0 in validator.py ("Hardcoded: 0% burn"), so no burn is applied.
  notes: >-
    Winner-takes-most. Winner set = all valid models within score_threshold (0.005) of best score;
    within that set the earliest on-chain commit wins (innovation/pioneer reward). Distribution:
    winner_share=0.99 to winner, remaining 0.01 split proportionally by score among valid non-winners,
    cheaters (copiers, memorizers, rejected) get 0. Validator normalizes scores so weights sum to 1.

weight_setting:
  cadence: per_epoch
  method: >-
    Daily evaluation produces an IncentiveWeights mapping (hotkey -> weight); validator writes it
    into self.scores, normalizes by total, and submits via Pylon. A separate weight-setting loop
    fires once elapsed blocks exceed epoch_length.
  on_chain_call: set_weights
  tempo_or_interval: "361 blocks"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the final reward. Scores are overwritten each evaluation
      (self.scores.fill(0.0) then set). Weight setting gated by epoch_length (361 blocks).

anti_gaming:
  - kind: deduplication
    enforcement: elimination
    description: >-
      Duplicate prediction detection: models producing identical predictions (within
      similarity_threshold=1e-6) are grouped; the earliest committer is the "pioneer", later
      committers are "copiers" and receive 0 weight.
  - kind: data_augmentation
    enforcement: elimination
    description: >-
      Generalization (memorization) detection via perturbation. Models re-evaluated on globally
      perturbed features (global_noise_pct=0.01) and spatially perturbed coords
      (spatial_noise_std=0.005). Flagged as memorizer if global_ratio < global_threshold (0.70) or
      spatial_ratio < spatial_threshold (0.95); memorizers get 0 weight. Perturbation seed is the
      decentralized commit-reveal randomness seed.
  - kind: code_inspection
    enforcement: rejection
    description: >-
      ModelInspector inspects submitted ONNX models; rejects models with too many price-like
      constants (price_count_threshold=50000, i.e. lookup/memorization) and, when configured,
      models with unused initializers (reject_unused_initializers=True).
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      Decentralized randomness: validators timelock-commit a random value (~360 blocks reveal) and
      harvest a shared seed used for perturbation, with a mid-epoch snapshot of committers to reject
      late commits (min_quorum=2). Also a temporal commit-cutoff: commitments must be at least
      min_commitment_age_blocks (216000, ~30d) old to be eligible.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [registration_age]
  status_values: []
  reset_policy: >-
    Score zeroed when a UID's hotkey changes (deregistration/replacement). Winner selection uses
    on-chain commit block_number; minimum commitment age (~30d) gates eligibility.
  notes: >-
    No persistent per-miner ledger; per-cycle scores are recomputed and overwritten. Commit
    block/age is the main per-miner state used (earliest-commit tie-break + eligibility gate).
    An optional ATH (all-time-high) mode (ath_enabled, default false) would reward the persisted
    ATH winner 99% / 1% to others until beaten, but it is disabled by default in this revision.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/VALIDATOR.md"
    - "docs/MINER.md"
  completeness: high

