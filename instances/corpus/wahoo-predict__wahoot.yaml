schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Validator scores miners by EMA-smoothed trading profit (EMAVolumeScorer), then
  normalizes those scores to sum to 1, scales the miner portion by
  MINER_EMISSION_PERCENTAGE (0.25), and routes the remaining BURN_RATE (0.75) as a
  single weight to owner/validator UID 176. So ~25% of emissions are distributed to
  miners by the documented profit mechanism and ~75% is captured by the owner UID.

subnet:
  name: "Wahooτ (Wahoot)"
  owner_repo: "wahoo-predict__wahoot"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners are human traders on the Wahoo prediction-market platform (no code run by
    miners). Validators fetch each registered hotkey's trading statistics from the
    Wahoo API and reward miners by their realized trading profit over a trailing
    window. A miner's score is an EMA of profit^0.7 (only positive profit counts);
    scores are normalized into weights. A threshold gate requires positive profit.
  submission_format: [api_response]

scoring_signals:
  - name: trading_profit
    metric_kind: pnl
    direction: higher_is_better
    weight: 1.0
    normalization: ema
    notes: >-
      raw_score = max(0, profit) ** PROFIT_EXPONENT (0.7); losses clipped to 0.
      raw_score is EMA-smoothed per hotkey, then normalized to sum to 1 across miners.
  - name: profit_threshold_gate
    metric_kind: pnl
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      _check_thresholds requires profit > 0 (and win_rate >= MIN_WIN_RATE=0.0),
      else the miner's weight is forced to 0.0 in reward().

ground_truth_sources:
  - kind: organic_traffic
    description: >-
      Wahoo prediction-market trading statistics per hotkey (profit, win_rate,
      total_volume_usd) fetched from the Wahoo API v2 statistics endpoint.
    source_identifier: "https://api.wahoopredict.com/api/v2/event/bittensor/statistics/v2"
    trust_model: trusted
    notes: >-
      Validator trusts the centralized Wahoo API as the source of trading
      performance; data described as public.

aggregation:
  method: exponential_decay_ema
  composition: gated
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "176"
    fraction: 0.75
    dynamic: false
    notes: >-
      BURN_RATE = 1.0 - MINER_EMISSION_PERCENTAGE = 0.75. Miner rewards are scaled by
      MINER_EMISSION_PERCENTAGE (0.25); owner_weight = BURN_RATE is appended as the
      weight for OWNER_UID 176 in the final weight vector. If UID 176 is absent from
      the metagraph the burn fraction is truly burned.
  notes: >-
    Per-hotkey EMA: smoothed = (1-alpha)*prev + alpha*raw, EMA_ALPHA derived from a
    12-hour half-life over 360*12s epochs. New miners (prev==0) take raw directly;
    a cliff reset sets smoothed=raw when raw < CLIFF_RESET_THRESHOLD*prev (0.5).

weight_setting:
  cadence: per_epoch
  method: >-
    Loop interval computed from blocks until the next epoch boundary
    (tempo * BLOCK_TIME_SECONDS, default fallback 4800s). Each iteration recomputes
    EMA weights, scales miners by 0.25, appends 0.75 to OWNER_UID 176, and calls
    subtensor.set_weights with retry/cooldown handling (commit_period=32 blocks).
  on_chain_call: set_weights
  tempo_or_interval: "tempo blocks (BLOCK_TIME_SECONDS=12.0; default interval 4800s)"
  smoothing:
    kind: ema
    alpha: null
    window: null
    notes: >-
      EMA_ALPHA = 1 - 0.5**(1/HALF_LIFE_EPOCHS) where HALF_LIFE_SECONDS=12*3600 and
      EPOCH_INTERVAL_SECONDS=360*12, so HALF_LIFE_EPOCHS=10. Alpha is computed, not a
      literal constant, so left null. EMA scores persisted in SQLite across restarts.

anti_gaming:
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      _check_thresholds zeroes a miner's weight if profit is not strictly positive
      (profit > 0 required; win_rate must be >= MIN_WIN_RATE=0.0).
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      _validate_response rejects malformed responses (prob_yes/prob_no out of [0,1],
      prob_yes+prob_no != 1 within 1e-6, non-finite, invalid event_id/confidence),
      though in main loop miner responses are passed as None (miners run no code).
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      EMA cliff reset: when raw_score < CLIFF_RESET_THRESHOLD (0.5) * stored EMA, the
      stored EMA is discarded and the miner's score drops to the raw value, preventing
      a miner from coasting on a past-inflated EMA after profit collapses.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    Per-hotkey EMA score persisted in SQLite (scoring_runs). New miners (prev EMA == 0)
    seed from raw score; cliff reset replaces stored EMA with raw when raw < 0.5*prev.
    Unregistered miners removed from the database each iteration.
  notes: >-
    smoothed_scores returned in result.meta and saved as 'ema_update' scoring runs;
    used as previous_scores on the next iteration. Old cache entries auto-cleaned
    (7-day default).

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
  completeness: medium

