schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Documented mechanism rewards miners proportional to time-decayed betting volume on an EVM
  smart contract. When no miner has any betting volume, forward() explicitly runs a burn path
  that assigns the full reward (1.0) to UID 0. So live behavior is full-burn-to-UID-0 whenever
  betting activity is absent, and proportional volume scoring otherwise.

subnet:
  name: "Casino TAO"
  owner_repo: "Casino-TAO__casino-tao-subnet"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners place native-TAO bets on the TAO Casino smart contract deployed on Bittensor EVM,
    after linking their Bittensor coldkey to an EVM address. Validators query the contract for
    each miner's betting volume over a 7-day window, apply time-decay weights (most recent days
    weighted higher), and reward each miner proportional to its share of total weighted volume.
    Miners produce no synapse response; the rewarded artifact is on-chain betting activity.
  submission_format: [other]
  submission_format_other: "on-chain betting volume on the TAO Casino EVM smart contract (no synapse response)"

scoring_signals:
  - name: time_decayed_betting_volume
    metric_kind: volume
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Per-miner weighted volume is each miner's betting volume over 7 days with daily decay
      weights [1.0, 0.85, 0.70, 0.55, 0.40, 0.25, 0.10] (today..6 days ago). Reward = miner's
      weighted volume / total weighted volume across all miners (volume share).

ground_truth_sources:
  - kind: market_data
    description: >-
      TAO Casino smart contract on Bittensor EVM. Validator queries the contract via RPC for each
      miner's EVM address (linked from the miner's coldkey via a signed wallet-mapping) to obtain
      daily betting volumes.
    source_identifier: "TAO Casino contract 0x1e0bA1BcF31feFf1a9dc16FE3E0A203E3439DB47 via https://lite.chain.opentensor.ai (chain id 964)"
    trust_model: oracle
    notes: "EVM address mapping is established via POST /api/wallet-mapping with coldkey signature verification."

aggregation:
  method: proportional
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      When active_count == 0 (no miner has betting volume), forward() sets reward_array[0] = 1.0
      ("running burn code"), assigning the entire weight to UID 0. Otherwise no burn; rewards are
      pure volume share.
  notes: >-
    Reward is computed in calculate_volume_rewards as raw_volumes / total_volume (volume share,
    sums to 1). The within-window time-decay weights are applied earlier (apply_time_decay /
    get_miner_volume), not as an aggregation decay_rate; aggregation itself is a plain proportional
    normalization. set_weights then L1-normalizes the EMA scores (raw_weights = scores / ||scores||_1).

weight_setting:
  cadence: per_epoch
  method: >-
    EMA scores are L1-normalized (raw_weights = self.scores / norm where norm is the L1 norm),
    passed through process_weights_for_netuid, converted to uint16, and emitted via
    subtensor.set_weights with version_key = spec_version.
  on_chain_call: set_weights
  tempo_or_interval: "360 blocks"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores applies scores = alpha * scattered_rewards + (1 - alpha) * scores with
      alpha = config.neuron.moving_average_alpha, default 0.1. Epoch/weight-commit interval is
      360 blocks (~72 min), default --neuron.epoch_length 360, WEIGHT_COMMIT_INTERVAL = 360.

anti_gaming:
  - kind: other
    kind_other: "coldkey-to-EVM wallet mapping requires cryptographic signature proof of coldkey ownership"
    enforcement: barrier
    description: >-
      Wallet mappings (coldkey -> EVM address) require cryptographic proof of coldkey ownership
      (README Security: "Wallet mappings require cryptographic proof of coldkey ownership"),
      preventing a miner from claiming another participant's betting volume.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, other]
  status_values: []
  reset_policy: >-
    On hotkey replacement (resync_metagraph), scores[uid] is zeroed and miner_volumes,
    miner_daily_volumes, miner_evm_addresses for that UID are cleared.
  notes: >-
    self.scores is an EMA per UID (moving_average_alpha). miner_volumes and miner_daily_volumes
    hold the latest queried volumes; snapshots of scores+volumes are persisted to SQLite on each
    successful weight commit. The "other" state_kinds are: per-UID weighted betting volume,
    per-UID daily volume arrays, and per-UID coldkey-to-EVM address mapping.

