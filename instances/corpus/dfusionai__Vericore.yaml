schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  ENABLE_EMISSION_CONTROL is True and EMISSION_CONTROL_PERC = 0.80, so the validator
  allocates 80% of total weight to a fixed emission-control (burn) hotkey first, gives a
  1% base pool split equally among miners, and distributes the remainder by ranking. The
  documented full scoring pipeline (NLI quality, penalties, speed, ranking) is computed and
  drives the miner remainder, but the dominant emission share is burned. Note: docs claim
  50% emission control / 50% to miners, but the live code constant is 0.80 burn.

subnet:
  name: "Vericore"
  owner_repo: "dfusionai__Vericore"
  netuid: 70
  implementation_lang: python

task:
  summary: >-
    Miners perform semantic fact-checking: given a natural-language statement, a miner returns
    up to 5 evidence snippets (excerpt + source URL) that either support (entail) or contradict
    the statement. Validators verify each snippet exists in the cited page, score its semantic
    relevance with a RoBERTa-large-MNLI model (local_score = P(contradiction) + P(entailment)),
    apply penalties/bonuses, a domain-deduplication factor, a speed factor, and desearch/social
    bonuses, producing a per-request final_score that feeds a moving average used to rank miners.
  submission_format: [signals]

scoring_signals:
  - name: nli_local_score
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: softmax
    notes: >-
      local_score = prob_contradiction + prob_entailment from RoBERTa-large-MNLI softmax over
      [contradiction, neutral, entailment]; neutral intentionally excluded. Multiplied (not
      added) by domain_factor and approved_url_multiplier to form snippet_score.
  - name: snippet_score
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      snippet_score = local_score * domain_factor * approved_url_multiplier. domain_factor =
      1/(2^times_used) (first use 1.0, then 0.5, 0.25...). approved_url_multiplier = 3 for
      approved/social domains else 1. Snippets summed into sum_of_snippets.
  - name: speed_factor
    metric_kind: latency
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      speed_factor = max(1, 2.0 - (elapse_time / 30.0)); multiplies sum_of_snippets.
      Faster-than-30s responses get up to 2.0x; >=30s clamped to 1.0.
  - name: validation_penalties
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Fixed penalty scores assigned per failure: unreachable -10, invalid response -10,
      snippet==statement -10, no snippet/excerpt-too-similar/blacklisted/search/fake/invalid
      excerpt -5, SSL required -2, snippet-not-in-url -1, domain-registered-recently -1.
      LOWEST_FINAL_SCORE floor = -10.
  - name: desearch_and_social_bonus
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Miner-level desearch_adjustment = +2 if all desearch proofs valid, -5 if any invalid, 0
      otherwise. social_bonus_total = +1 per desearch x.com/twitter.com snippet, +0.5 per
      reddit.com snippet (only when proofs valid). final_score =
      (sum_of_snippets * speed_factor) + desearch_adjustment + social_bonus_total.

ground_truth_sources:
  - kind: reference_model
    description: >-
      RoBERTa-large-MNLI sequence-classification model used to score entailment/contradiction
      between the statement (hypothesis) and miner snippet (premise).
    source_identifier: "roberta-large-mnli"
    trust_model: trusted
    notes: "Softmax over [contradiction, neutral, entailment]; local_score = contra + entail."
  - kind: organic_traffic
    description: >-
      Live web pages fetched at the miner-supplied URL; the snippet must be verified present in
      the rendered page (exact normalized match or fuzzy partial_ratio >= 0.94).
    source_identifier: "miner-supplied evidence URLs (https only)"
    trust_model: adversarial
    notes: "Domain blacklist, approved-site allowlist, recently-registered-domain and search-page checks."

aggregation:
  method: rank_based
  composition: hybrid
  normalization: other
  normalization_other: "weights distributed to sum to DEFAULT_TOTAL_WEIGHT = 65535"
  temperature: null
  decay_rate: 0.5
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "5FWMeS6ED6NG6t5ovKQNZvGWEWVtZPve5BhYWM9wics5FgJ9"
    fraction: 0.80
    dynamic: false
    notes: >-
      EMISSION_CONTROL_PERC = 0.80 allocated to EMISSION_CONTROL_HOTKEY first. Then 1% base pool
      (BASE_WEIGHT_FRACTION) split equally among miners, remainder distributed by ranking.
  notes: >-
    distribute_weights_burn_base_remainder: burn 80% to control hotkey, 1% base pool equally to
    miners, remainder ranked geometrically (top gets RANKING_EMISSION_TOP_PERC=0.5 of remainder,
    each next rank half: 0.25, 0.125...). Ranking on the moving-average calculated_score; ties
    broken by request count. Validators and banned hotkeys get 0.

weight_setting:
  cadence: per_epoch
  method: >-
    Daemon loop: when blocks_since_last_update > tempo+1, aggregate per-request final_scores into
    moving scores, compute weights via move_miner_weights, then subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "tempo+1 blocks"
  smoothing:
    kind: ema
    alpha: 0.3
    window: null
    notes: >-
      Established miners (count > IMMUNITY_PERIOD=100): calculated_score = prev*INITIAL_WEIGHT(0.7)
      + new*(1-0.7), i.e. new-score weight 0.3. During immunity period (count <= 100): first score
      sets baseline, else prev*(1-IMMUNITY_WEIGHT) + new*IMMUNITY_WEIGHT with IMMUNITY_WEIGHT=0.5.

anti_gaming:
  - kind: deduplication
    enforcement: penalty
    description: >-
      domain_factor = 1/(2^times_used): repeated use of the same domain within a response halves
      its snippet contribution each time (first 1.0, then 0.5, 0.25...). Social desearch domains
      exempt.
  - kind: plagiarism_detection
    enforcement: rejection
    description: >-
      Snippet must be verified present in the fetched page (exact normalized match or fuzzy
      partial_ratio >= 0.94, min length 25); otherwise SNIPPET_NOT_VERIFIED_IN_URL = -1. FAKE/
      UNRELATED snippet classification via AI assessment.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Excerpt-too-similar-to-statement (-5), snippet==statement (-10), search-as-evidence (-5),
      blacklisted domain (-5), non-HTTPS URL (-2), recently-registered domain (-1), search web
      page (-5).
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Validators (validator_permit) excluded from weight distribution; banned hotkeys (env
      BANNED_WALLET_HOTKEYS) get 0 weight.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, registration_age]
  status_values: []
  reset_policy: >-
    Per-UID WeightedMinerRecord holds calculated_score (moving average) and count (requests
    processed). Reset to a fresh record when the UID's hotkey changes. count drives immunity
    period (first 100 requests) vs established weighting.
  notes: >-
    miner_score_cache: list of WeightedMinerRecord{calculated_score, count, wallet_hotkey} per UID.
    count<=IMMUNITY_PERIOD(100) uses immunity weighting, count>100 uses INITIAL_WEIGHT.

