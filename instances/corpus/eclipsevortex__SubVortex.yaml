schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Weights are set directly from the per-miner EMA moving_scores array
  (main.py: weights = self.moving_scores); no burn / UID-routing is present in the
  weight-setting path. The documented 4-criteria scoring drives weights.

subnet:
  name: "SubVortex"
  owner_repo: "eclipsevortex__SubVortex"
  netuid: 7
  implementation_lang: python

task:
  summary: >-
    Miners each run a Bittensor subtensor node. The validator challenges each miner by
    connecting to its subtensor and fetching the current block, scoring the miner on
    availability (verified + unique IP), latency (normalized request time with a
    distance-based tolerance), reliability (Wilson-normalized success/attempt ratio), and
    global distribution (geographic spread). These four scores combine into a weighted
    average final score that feeds an EMA moving score used to set on-chain weights.
  submission_format: [compute_service]

scoring_signals:
  - name: availability
    metric_kind: uptime
    direction: higher_is_better
    weight: 8.0
    normalization: none
    notes: >-
      1.0 if miner is verified and has no IP conflict, else 0.0
      (AVAILABILITY_FAILURE_REWARD). In compute_final_score the weight is 3 instead of 8
      when the miner is verified but its subtensor is not synced.
  - name: latency
    metric_kind: latency
    direction: higher_is_better
    weight: 7.0
    normalization: min_max
    notes: >-
      Process time is scaled by a distance-based tolerance (1 - distance/MAX_DISTANCE),
      converted to a relative latency score (1 - process_time/baseline_latency), then
      min-max normalized across verified miners so best=1, worst=0. 0.0 if not verified or
      IP conflict.
  - name: reliability
    metric_kind: win_rate
    direction: higher_is_better
    weight: 3.0
    normalization: other
    normalization_other: "wilson_score_interval (lower/upper bound midpoint, z=0.6744897501960817)"
    notes: >-
      Ratio of challenge_successes/challenge_attempts normalized via Wilson score interval;
      returns 0.5 when total attempts is 0.
  - name: distribution
    metric_kind: other
    metric_kind_other: "geographic_distribution"
    direction: higher_is_better
    weight: 2.0
    normalization: none
    notes: >-
      1 / (# of verified, non-conflicting miners in that miner's country), else 0.0 if not
      verified or IP conflict.

ground_truth_sources:
  - kind: hardware_probe
    description: >-
      Validator establishes a direct connection to the miner's subtensor node and retrieves
      the current block; success, response time, and the miner's reported country/IP drive
      all four scores.
    source_identifier: "miner subtensor node (block fetch)"
    trust_model: adversarial
    notes: ""

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: other
  normalization_other: "divide by sum of the four signal weights (availability+latency+reliability+distribution)"
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn or UID-routing in the weight-setting path; weights = moving_scores."
  notes: >-
    final score = (avail_w*avail + lat_w*lat + rel_w*rel + dist_w*dist) /
    (avail_w + lat_w + rel_w + dist_w). Suspicious miners' final score is multiplied by a
    penalty_factor (0 if none provided).

weight_setting:
  cadence: rate_limited
  method: >-
    should_set_weights gates on min stake and the subnet weights_rate_limit (next_block =
    validator_last_update + weights_rate_limit + 1). Weights are the EMA moving_scores
    processed through process_weights_for_netuid, then set via subtensor.set_weights with
    retries.
  on_chain_call: set_weights
  tempo_or_interval: "weights_rate_limit (subnet hyperparameter)"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      moving_scores[uid] = alpha*score + (1-alpha)*moving_scores[uid] for non-suspicious
      miners; suspicious miners' moving score is multiplied by penalty_factor. Code comment
      says alpha=0.1 replaces ~10% of the previous weight.

anti_gaming:
  - kind: deduplication
    enforcement: penalty
    description: >-
      Multiple miners sharing the same IP all receive 0 for availability, latency, and
      distribution (1 miner = 1 IP enforced via ip_occurrences).
  - kind: liveness_check
    enforcement: penalty
    description: >-
      A miner must be verified (miner and subtensor operational and accessible) or it scores
      0 on availability/latency/distribution.
  - kind: other
    kind_other: "suspicious_uid_list_penalty"
    enforcement: penalty
    description: >-
      Miners present in the suspicious UID list (matched by uid + hotkey) have their final
      and moving scores multiplied by a penalty_factor in ]0,1[, or set to 0 when no penalty
      factor is provided.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    Reliability challenge statistics (successes/attempts) are reset every 3 epochs
    (RELIABILLITY_RESET = 1080 in constants.py). Moving scores persist across challenges in
    saved state.
  notes: >-
    Persistent per-uid moving_scores (EMA) saved to disk via save_state/load_state, plus
    per-miner challenge_successes/challenge_attempts counters used by the Wilson reliability
    score.

