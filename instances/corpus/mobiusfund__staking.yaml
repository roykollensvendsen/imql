schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  The documented scoring algorithm is live and drives weights (validator.score() overwrites
  self.scores with etc.score(...), which the base set_weights() L1-normalizes onto chain). A
  Dynamic Emission Control (DEC) burn routes a computed residual to DEC_UID=0: when dec > DEC_CUTOFF
  (0.03), score[0] = sum(score) * dec / (1 - dec), and if no miner scores anything, score[0] = 1
  (full burn fallback). The template EMA update_scores() and the toy reward() (1.0 if response ==
  query*2) are dead code: the live validator overrides the loop (validator.concurrent_forward =
  lambda: ...) and writes self.scores directly, bypassing the moving average.

subnet:
  name: "Investing - Decentralized AUM"
  owner_repo: "mobiusfund__staking"
  netuid: 88
  implementation_lang: python

task:
  summary: >-
    Miners submit investment strategies (asset-allocation tables / portfolios) for an asset class of
    their choice — Tao/Alpha staking (asset 0) or US stocks (asset 1) — in a high-fidelity simulated
    trading environment. Each strategy is a dict mapping assets to allocation weights (negative for
    shorts), filed as a file under Investing/strat/ and resubmitted on file-timestamp change
    ("active rebalancing"). Validators replay strategies against market data, compute daily PnL, and
    score on a composite of return, risk, volatility, drawdown, and timeframe.
  submission_format: [signals]

scoring_signals:
  - name: mar
    metric_kind: risk_adjusted_ratio
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      return% / max(risk%, risk_init/sqrt(days)); risk% is max drawdown. risk_init = 5 for both
      Tao/Alpha and US stocks (RISK_INIT_DTAO/RISK_INIT_STK). Multiplicative factor in score.
  - name: lsr
    metric_kind: risk_adjusted_ratio
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Loss/Sum Ratio = sum(pnl) / sum(|pnl|); README states >0.99 correlated to Sharpe (lsr ~=
      sharpe/11). Multiplicative factor in score.
  - name: odds
    metric_kind: probabilistic_forecast
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      odds% = 50 + kelly(prob, pavg/lavg)/2*100, Kelly-normalized winning odds; clipped to 0 if <=0.
      Multiplicative factor in score.
  - name: daily
    metric_kind: pnl
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      daily% = ((1 + gain/100)^(1/days) - 1) * 100, compounded daily return. Multiplicative factor
      in score. score = mar * lsr * odds * daily; clipped to 0 if <=0.
  - name: close_binary
    metric_kind: other
    metric_kind_other: binary_close_above_open
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      'c' = int(swap_close[-1] >= swap_open[0]); score is multiplied by this 0/1 gate (a strategy
      ending below its starting value is zeroed). etc.score: sc['score'] *= sc['c'].
  - name: cash_alloc_factor
    metric_kind: other
    metric_kind_other: cash_allocation_penalty
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      score *= ((1 - cash)^CASH_DECAY).clip(CASH_RESIDUE, 1) with CASH_DECAY=1, CASH_RESIDUE=0.01;
      penalizes idle-cash allocations, floor 0.01.

ground_truth_sources:
  - kind: market_data
    description: >-
      Simulated trading against historical market data: hourly precision for dtao (Tao/Alpha
      staking dividends from validator delegation at default 18% take), 30-minute precision for US
      stocks (benchmark SPY). Daily OCHL/PnL DBs fetched from api.investing88.ai.
    source_identifier: "api.investing88.ai"
    trust_model: trusted
    notes: >-
      VALI_TAKE = 0.18, TAO_WEIGHT = 0.18. Stock benchmark STK_BENCH='SPY', tz America/New_York.
      Validator computes daily score at 00:00 UTC (Tao/Alpha) and 06:00 UTC (US stocks).

aggregation:
  method: proportional
  composition: multiplicative
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      DEC (Dynamic Emission Control). DEC_UID=0. dec = (sum(last)/sum(days+1))^DEC_DECAY with
      DEC_DECAY=3; if dec > DEC_CUTOFF (0.03): score[0] = sum(score)*dec/(1-dec), routing a computed
      residual to UID 0 to penalize stale (non-rebalanced) miners collectively. If no miner scores,
      score[0] = 1 (full burn fallback). Residual fraction is dynamic, not a fixed literal.
  notes: >-
    Composite score = mar * lsr * odds% * daily%, then sequentially multiplied by gates: c (binary
    close>=open), dedupe (similarity/anti-dup factor in [0,1]), DEC1 stale-decay (1 - clip((last/
    DEC1_CLIFF)^DEC1_DECAY, 0,1) when days>DEC1_START), cash factor, and a new-miner ramp
    ((days/DAYS_FINAL)^DAYS_DELAY when days<DAYS_FINAL=30). Per-asset emission partition: within each
    asset a, scores rescaled so each asset's share equals ra[a] (asset ratio), i.e. score *= ra[a]*
    scz/sca. Final weights = L1 norm of self.scores in base set_weights() (raw_weights = scores/norm).

weight_setting:
  cadence: daily
  method: >-
    Validator overrides the template loop: score() waits until minute 25 or 55, calls etc.score(pl,
    ab, da, ra, n) to compute self.scores directly (NOT the template EMA), and the base
    set_weights() L1-normalizes self.scores into raw_weights = scores / ||scores||_1 then emits via
    subtensor.set_weights. Daily score calculation at 00:00 UTC (Tao/Alpha) / 06:00 UTC (stocks).
  on_chain_call: set_weights
  tempo_or_interval: "daily score calc 00:00 UTC (Tao/Alpha), 06:00 UTC (US stocks)"
  smoothing:
    kind: none
    alpha: null
    window: 50
    notes: >-
      No EMA in the live path: the template base update_scores() applies an EMA
      (alpha*reward + (1-alpha)*scores) but is bypassed — score() overwrites self.scores wholesale.
      A 50-day rolling window (WIN_SIZE_DTAO/WIN_SIZE_STK=50) is applied to PnL inside pl2sc()
      (dd[-win_size:]) before scoring; recorded here as window=50. Outlier clip CLIP_OUTLIERS=2 days.

anti_gaming:
  - kind: deduplication
    enforcement: penalty
    description: >-
      dedupe() in etc.py: strategies with allocation distance below DD_TRIGGER (0.01) to another
      miner's strategy get a dedupe factor in [0,1] = min((block-gap / bb / DAYS_FINAL)^DD_POWER, 1),
      DD_POWER=1; score *= dedupe. README: "a new or revised strategy that is overly similar to a
      pre-existing one will receive a reduced score." Black/whitelist override dedupe to 0/1.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      README: "To curb UID spam, each miner requires a certain amount of alpha token stake. The
      total required stake is reflected on the coldkey." Required stake enforced off the scored path.
  - kind: liveness_check
    enforcement: penalty
    description: >-
      DEC / DEC1 stale-strategy decay: miners that stop rebalancing (large 'last active' value) are
      penalized. DEC1: score *= 1 - clip((last/DEC1_CLIFF)^DEC1_DECAY, 0, 1) for days>DEC1_START=5
      (DEC1_CLIFF=20, DEC1_DECAY=2). DEC routes collective residual emission to UID 0.

sub_competitions:
  structure: multi_asset
  stages: []
  count: 2
  notes: >-
    UID space and emissions partitioned by asset class via asset ratio ra (api.investing88.ai/ratio):
    asset 0 = Tao/Alpha staking, asset 1 = US stocks (an=2). Each asset's emission share is forced to
    ra[a] by rescaling scores within the asset (score *= ra[a]*scz/sca). Per-asset constants:
    RISK_INIT, WIN_SIZE differ by class (both 5 / 50 here).

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cumulative_score, registration_age]
  status_values: []
  reset_policy: >-
    50-day rolling PnL window per strategy. New miners: 3-day immunity, go live on dashboard after
    day 1; score ramped by (days/30)^DAYS_DELAY while days<DAYS_FINAL=30. Base validator zeroes
    self.scores for replaced hotkeys on metagraph resync.
  notes: >-
    Persistent PnL/score history per uid maintained via daily DB (pnl.col, score.col). Registration
    age (days) gates the new-miner score ramp and DEC1 onset (days>5).

