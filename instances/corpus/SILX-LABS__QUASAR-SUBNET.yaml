schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Validators evaluate committed models with a multi-axis composite evaluator,
  select a single "king" by composite worst/weighted score, and set one-hot
  on-chain weights (king = 1.0, all others = 0.0). No burn UID or emission-burn
  fraction is present in the scoring/weight-setting code.

subnet:
  name: "Quasar"
  owner_repo: "SILX-LABS__QUASAR-SUBNET"
  netuid: 24
  implementation_lang: python

task:
  summary: >-
    Miners train Quasar-architecture small language models (3B total / ~1B
    active MoE), publish them as public Hugging Face repos, and commit the
    pinned model revision on-chain. Validators verify each commitment, score
    it on a multi-axis composite evaluator (teacher-distillation KL/on-policy
    RKL plus capability/benchmark/generation-discipline axes), and set one-hot
    weights to the current king (strongest valid model).
  submission_format: [model_weights, commitment_hash]

scoring_signals:
  - name: on_policy_rkl
    metric_kind: similarity
    direction: lower_is_better
    weight: 0.35
    normalization: none
    notes: >-
      On-policy reverse KL on the student's own rollouts vs the teacher;
      primary distillation axis. Normalized to [0,1] higher-is-better against
      the king's RKL inside the composite. Weight 0.35 in AXIS_WEIGHTS.
  - name: kl
    metric_kind: similarity
    direction: lower_is_better
    weight: 0.15
    normalization: none
    notes: >-
      Off-policy forward-KL vs the teacher's top-128 support; retained as a
      distillation/transparency axis. Weight 0.15. Normalized king_kl/kl.
  - name: capability
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.25
    normalization: none
    notes: >-
      Verifiable-rewards pass fraction blended absolute + teacher-relative.
      Weight 0.25.
  - name: length
    metric_kind: other
    metric_kind_other: length_penalty
    direction: higher_is_better
    weight: 0.10
    normalization: none
    notes: "Length-discipline penalty axis in [0,1]. Weight 0.10."
  - name: degeneracy
    metric_kind: other
    metric_kind_other: generation_discipline
    direction: higher_is_better
    weight: 0.15
    normalization: none
    notes: >-
      Think-probe terminates + non-degenerate + self-bleu combined score.
      Weight 0.15.
  - name: judge_probe
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.15
    normalization: none
    notes: >-
      Teacher-as-judge rubric (1-5) on rotated prompts, normalized to [0,1].
      JUDGE_AXIS_WEIGHT default 0.15.
  - name: chat_turns_probe
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.08
    normalization: none
    notes: "Teacher-graded 3-turn dialogue coherence. CHAT_TURNS_AXIS_WEIGHT default 0.08."
  - name: math_bench
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.14
    normalization: none
    notes: "Procedural math pass_frac. BENCH_MATH_WEIGHT default 0.14."
  - name: code_bench
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.14
    normalization: none
    notes: "Procedural code pass_frac. BENCH_CODE_WEIGHT default 0.14."
  - name: reasoning_bench
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.10
    normalization: none
    notes: "BENCH_REASONING_WEIGHT default 0.10."
  - name: ifeval_bench
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.07
    normalization: none
    notes: "BENCH_IFEVAL_WEIGHT default 0.07."
  - name: aime_bench
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.10
    normalization: none
    notes: "Olympiad math pass_frac. BENCH_AIME_WEIGHT default 0.10."
  - name: mbpp_bench
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.08
    normalization: none
    notes: "BENCH_MBPP_WEIGHT default 0.08."
  - name: tool_use_bench
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.06
    normalization: none
    notes: "Agentic Python tool use. BENCH_TOOL_USE_WEIGHT default 0.06."
  - name: long_context_bench
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.04
    normalization: none
    notes: "Block-seeded procedural needle-in-haystack. BENCH_LC_WEIGHT default 0.04."
  - name: robustness_bench
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.07
    normalization: none
    notes: "Math items under paraphrase+noise wrappers. BENCH_ROBUSTNESS_WEIGHT default 0.07."
  - name: reasoning_density
    metric_kind: other
    metric_kind_other: efficiency
    direction: higher_is_better
    weight: 0.05
    normalization: none
    notes: >-
      pass_frac x length_bonus per bench, penalizing over-thinking on trivia.
      REASONING_DENSITY_WEIGHT default 0.05.
  - name: knowledge_bench
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.0
    normalization: none
    notes: >-
      Muted to weight 0 in v28 (eval-setup-fragile MC); kept for telemetry.
      BENCH_KNOWLEDGE_WEIGHT default 0.0.

ground_truth_sources:
  - kind: reference_model
    description: >-
      Distillation teacher (Qwen3.5-4B). Teacher continuations / logprobs and
      teacher-as-judge rubric scores are the reference for the KL, on-policy
      RKL, judge, and chat-turn axes.
    source_identifier: "Qwen/Qwen3.5-4B"
    trust_model: trusted
    notes: >-
      Teacher generation cached once per epoch; KL computed over shared top-128
      support. A teacher-sanity gate drops axes where the teacher itself scores
      below TEACHER_SANITY_FLOOR.
  - kind: deterministic_dataset
    description: >-
      Per-round benchmark items generated procedurally from the chain block
      seed (math/aime/code/mbpp/tool_use/long_context/robustness), graded
      against fresh (params, gold) pairs that exist nowhere on disk.
    source_identifier: "pod_eval_vllm.py procedural generators (block_seed)"
    trust_model: trusted
    notes: >-
      Public datasets (GSM8K/MATH-500/HumanEval/MBPP/BBH/MMLU-Pro/IFEval/AIME/
      ARC/TruthfulQA) named in code history but validator grades against
      block-seeded procedural items, not the static pools (v27+).
  - kind: reference_model
    description: >-
      Undistilled base/reference model at REFERENCE_UID = -1, run through the
      same bench probes; axes where the reference scores pass_frac == 0 are
      treated as eval-setup-broken and dropped from the worst() gate.
    source_identifier: "Qwen/Qwen3.5-4B (UID -1)"
    trust_model: trusted
    notes: "REFERENCE_BROKEN_BENCH_FLOOR = 0.0."

aggregation:
  method: winner_take_all
  composition: hybrid
  normalization: none
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn UID/fraction in scoring or weight-setting code."
  notes: >-
    Per student, the composite emits two aggregations: worst = min over present
    (non-broken) axes (anti-gaming rule); weighted = convex combination with
    AXIS_WEIGHTS over present axes (total renormalized over surviving axes).
    King selection sorts candidates by (worst desc, weighted desc, prior_bonus,
    uid). The selected king receives ALL validator weight (one-hot), so the
    network-level allocation is winner_take_all even though per-miner scoring is
    a hybrid worst/weighted composite. A challenger must beat the prior king by
    SINGLE_EVAL_DETHRONE_MARGIN (default 0.03) on worst or weighted to dethrone.

weight_setting:
  cadence: per_epoch
  method: >-
    build_winner_take_all_weights(n_uids, winner_uid): a one-hot vector with
    weights[winner_uid] = 1.0, everyone else 0.0, then subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "360 blocks"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA: "No EMA - models are permanently committed, scores converge
      naturally" (eval/scoring.py module docstring).

anti_gaming:
  - kind: deduplication
    enforcement: rejection
    description: >-
      Weight-hash and content-hash duplicate detection (check_duplicate_hash,
      check_duplicate_content_hash, compute_content_hash). The earlier on-chain
      commitment owns an identical weight hash; re-sharded copies caught via
      content hashing. Activation-fingerprint cosine similarity >=
      ACTIVATION_COPY_THRESHOLD flags COPY.
  - kind: code_inspection
    enforcement: rejection
    description: >-
      Prechecks before GPU eval: architecture compliance, tokenizer
      compatibility, public-revision integrity, safetensors availability, and
      rejection of quantized formats (GPTQ/AWQ/GGUF/FP8). DQ reasons: COPY /
      REMOVED / INVALID / EVAL_ERROR, scoped per hotkey+commit_block.
  - kind: data_augmentation
    enforcement: barrier
    description: >-
      Prompt sets are block-seeded and not known before evaluation; bench items
      are generated fresh per round from block_seed and benchmark prompts are
      paraphrased / MC-options shuffled per round so canonical-wording lookups
      cannot saturate an axis.
  - kind: deterministic_check
    enforcement: barrier
    description: >-
      Multi-axis composite worst-case rule: a model that games one axis (e.g.
      low KL) but fails a core capability/generation-discipline axis is floored
      by min over axes, preventing single-axis Goodhart wins. Pareto majority
      dominance gate also blocks a challenger that wins KL but loses a majority
      of axes (PARETO_DOMINANCE_GATE).
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      Private prompt holdout (axis A7) uses a sha256 commit-reveal: the commit
      root is published before eval and per-prompt hashes after, so auditors can
      verify the validator did not retro-fit the holdout to results.

sub_competitions:
  structure: single
  stages: []
  count: null
  notes: >-
    Single king-of-the-hill competition; one king holds all weight. KL is one
    axis, not a separate sub-competition.

per_miner_state:
  tracked: true
  state_kinds: [status_enum, cumulative_score, reputation]
  status_values: [king, queued, tested, stale, untested, disqualified]
  reset_policy: >-
    Disqualification is per hotkey + commit_block; a miner re-registering on a
    new hotkey (or committing a new model) gets a fresh chance. Failure counts
    reset on a successful eval (reset_failures); a UID with >= max_failures
    (default 3) is treated as stale.
  notes: >-
    Persisted to disk: scores.json (KL), composite_scores.json,
    cumulative_scores.json, disqualified.json, failures.json, score_history.
    King regression streak tracked per king_uid.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/QUASAR_SYSTEM_REPORT.md"
    - "miner/README.md"
  completeness: high

