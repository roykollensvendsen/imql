schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  The documented and recommended validator (neurons/neuron_validator.py, the one in
  docs/validator.md) runs the real liquidity-weighted scoring via validator/forward.py and
  RewardCalculator. However the repo also ships neurons/burn_validator.py whose forward()
  assigns weight 1.0 to UID 0 and 0.0 to every other UID — a full burn to UID 0. Which one
  is actually run on-chain cannot be determined from the source alone, so the operative
  reality is mixed.

subnet:
  name: "Oceans Subnet 66"
  owner_repo: "Oceans-Subnet__oceans_subnet"
  netuid: 66
  implementation_lang: python

task:
  summary: >-
    Miners provide liquidity to Bittensor subnet pools. Each epoch a miner is rewarded in
    proportion to its share of the total liquidity (measured in TAO) it supplies to each
    target subnet, weighted by a "master weight" vector over subnets derived from sn66
    alpha-stake holder votes. The reward for a miner is the sum over subnets of
    (miner_LP_in_subnet / total_LP_in_subnet) * subnet_master_weight.
  submission_format: [signals]

scoring_signals:
  - name: liquidity_provided
    metric_kind: volume
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Per-subnet liquidity a miner supplies, measured as total TAO value of its positions
      (lp_amt). Within each subnet, a miner's contribution is lp_amt * (1/total_LP) * w_sub,
      i.e. its share of total subnet liquidity scaled by the subnet's master weight. Not an
      additive standalone weight, hence weight: null.
  - name: subnet_master_weight
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Per-subnet weight w_sub derived from holder votes (stake-weighted, normalised to sum
      to 1.0) in RewardCalculator._build_master_vector. Acts as a multiplier on each subnet's
      liquidity share; not an additive per-miner signal.

ground_truth_sources:
  - kind: market_data
    description: >-
      On-chain liquidity positions of each registered miner across Bittensor subnet pools,
      converted to TAO value, fetched by the LiquidityFetcher.
    source_identifier: "validator/forward.py liq_fetcher.fetch_and_store()"
    trust_model: trusted
    notes: "Returns {subnet: {uid: tao}} liquidity map consumed by RewardCalculator.compute."
  - kind: other
    kind_other: stake_weighted_offchain_vote
    description: >-
      sn66 alpha-stake holder votes fetched off-chain via the VoteFetcher (vote API), each
      carrying a voter_stake; combined into a stake-weighted normalised per-subnet weight
      vector.
    source_identifier: "validator/vote_fetcher.py VoteFetcher.fetch_and_store()"
    trust_model: crowd
    notes: >-
      V1/V2 votes are off-chain web votes; roadmap (V3-V5) plans migration to on-chain
      smart contracts.

aggregation:
  method: proportional
  composition: multiplicative
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 1.0
    dynamic: false
    notes: >-
      Only in neurons/burn_validator.py: weights = [1.0 if uid == 0 else 0.0 for uid in
      range(0,256)], a full burn of all emission to UID 0. The documented
      neuron_validator.py path performs no burn — it distributes proportionally by liquidity.
  notes: >-
    Documented path: reward[uid] += lp_amt * (1/total_lp) * w_sub summed over subnets, then
    normalised so the reward vector sums to 1.0 (uniform fallback if the vector is all zero).

weight_setting:
  cadence: continuous
  method: >-
    BaseValidatorNeuron.set_weights L1-normalises self.scores and emits via
    subtensor.set_weights. neuron_validator.py runs forward() then sleeps a random 10-20
    minutes per iteration (no explicit epoch detection); burn_validator.py sleeps 300s then
    sets weights.
  on_chain_call: set_weights
  tempo_or_interval: "random 10-20 minutes per iteration (neuron_validator.py)"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores applies EMA: self.scores = alpha * scattered + (1 - alpha) * self.scores
      with alpha = 0.1 (base/validator.py).

anti_gaming:
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Voter influence on the master subnet vector is proportional to voter_stake
      (stake * weight/sum), so vote weight is gated by alpha-stake holdings rather than vote
      count.

sub_competitions:
  structure: multi_asset
  stages: []
  count: null
  notes: >-
    Rewards are computed independently per target Bittensor subnet pool (multiple liquidity
    pools), then summed per miner. No staged/tournament structure.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    self.scores persisted via save_state/load_state (state.npz); EMA-decayed each update and
    zeroed for replaced hotkeys on metagraph resync.
  notes: >-
    Per-UID EMA score vector maintained in base/validator.py; no debt ledger or status enum.

documentation:
  status: docs_and_code
  source_version: "v0 / V1 (July 2025)"
  primary_docs: ["README.md", "docs/validator.md", "docs/miner.md"]
  completeness: medium

