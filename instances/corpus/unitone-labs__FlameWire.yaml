      line_ref: "75-91"
      quote: "Fastest node receives 1.0, slowest receives 0.0, and values in-between are linearly scaled ... relative = (max_latency - float(node.avg_latency_ms)) / (max_latency - min_latency)"
    - claim_field: "/ground_truth_sources/0/description"
