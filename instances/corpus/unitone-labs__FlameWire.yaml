      line_ref: "114-117"
      quote: "correctness_score = 1.0 if node.data_verified else 0.0 ... if correctness_score <= 0.0: total_score = 0.0"
    - claim_field: "/scoring_signals/1/notes"
      source_path: "flamewire/utils/scoring.py"
