      line_ref: "151-162"
      quote: "Merge cycle health checks into persistent validator-local uptime history ... merged = CheckStats(total=previous.total + cycle.total, passed=previous.passed + cycle.passed,)"
    - claim_field: "/mechanism_status"
      source_path: "README.md"
      line_ref: "260-261"
      quote: "Final chain weights are distributed pro-rata to miner scores and set after each full verification cycle."
  unresolved:
    - "Whether the 'buyback-and-burn of ALPHA' economic policy is enforced anywhere (no on-chain burn or emission-recycling code exists in this repo)."
    - "Live netuid: config default is 97 and README says SN97, but corpus dir is named for owner; no on-chain confirmation available."
    - "Miner-side code is absent from this repo (node registration is dashboard-based per README), so miner submission specifics are inferred from validator probes only."

extensions:
  diminishing_returns:
    rule: "per miner+region, sorted node scores; node N contributes node_score * (1/N)"
    source: "flamewire/utils/scoring.py:200-202"
  diversity_bonus_by_coverage:
    "1": 1.0
    "2": 1.1
    "3": 1.2
  regional_multiplier:
    formula: "clamp(target_share / actual_share, 0.5, 2.0), target_share = 1/3 per region"
    source: "flamewire/utils/scoring.py:166-180"
