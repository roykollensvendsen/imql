schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  set_weights L1-normalizes the EMA score vector and emits it directly via
  bt.utils.weight_utils. No burn UID, burn fraction, or emission-burn branch
  appears in the weight-setting code; validator scoring is live.

subnet:
  name: "Mainframe (Folding / Protein-Folding, SN25)"
  owner_repo: "macrocosm-os__folding"
  netuid: 25
  implementation_lang: python

task:
  summary: >-
    Miners run molecular-dynamics protein-folding simulations (OpenMM) on a PDB
    challenge assigned by validators, and upload their trajectory/checkpoint
    files. The miner that reaches the lowest (most negative) potential energy for
    a given protein job wins the bulk of the reward; remaining valid miners get a
    linearly decreasing share. Jobs come in synthetic (SyntheticMD) and organic
    (OrganicMD) flavors.
  submission_format: [content_link, signals]

scoring_signals:
  - name: reported_energy
    metric_kind: loss
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      The simulated potential energy of the folded protein (kJ/mol). Lower
      (more negative) is better. The validator re-runs/validates checkpoints and
      takes the median of the final ENERGY_WINDOW_SIZE checked energies; the
      argmin energy across miners defines best_loss / best_hotkey. This is a
      gated/ranking signal (not an additively-weighted one), hence weight null.

ground_truth_sources:
  - kind: reference_model
    description: >-
      Validators independently re-simulate a subset of the miner's reported
      checkpoints in OpenMM and compare the recomputed energy to the miner's
      reported energy; a percent difference above ANOMALY_THRESHOLD invalidates
      the submission. Gradient and XML-checkpoint thresholds also gate validity.
    source_identifier: "OpenMM molecular-dynamics re-simulation (validator-side)"
    trust_model: adversarial
    notes: >-
      Re-computation is probabilistic: validation runs with probability
      get_validation_probability(credibility); high-credibility miners are
      checked less often (skip path reuses reported energy).

aggregation:
  method: rank_based
  composition: gated
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No burn UID or burn fraction in set_weights; raw_weights are the L1-normalized
      EMA scores emitted directly.
  notes: >-
    Per job (MDReward.get_rewards): the best miner (argmin energy / stored
    best_hotkey) receives top_reward = TOP_SYNTHETIC_MD_REWARD (0.80); the
    remaining valid non-zero miners share (1 - top_reward) via divide_decreasing,
    a linearly decreasing allocation sorted smallest-energy-first. If no/one miner
    replies the best miner gets reward 1. Final per-job reward is multiplied by
    job.priority (SyntheticMD) or job.priority * 10 (OrganicMD). Cross-job
    aggregation onto chain weights is an EMA in update_scores, then L1-normalized
    in set_weights.

weight_setting:
  cadence: per_epoch
  method: >-
    sync() calls weight_setter() -> set_weights() when should_set_weights() is
    true (>= epoch_length blocks since last update). Validator scores are zeroed,
    L1-normalized (torch.nn.functional.normalize p=1), processed via
    process_weights_for_netuid, converted, and emitted with subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks (neuron.epoch_length default)"
  smoothing:
    kind: ema
    alpha: null
    window: null
    notes: >-
      update_scores does a per-uid EMA: scores = alpha*reward + (1-alpha)*scores,
      where alpha = neuron.positive_alpha (default 0.10) when reward > 0, else
      neuron.negative_alpha (default 0.03). Two distinct alphas, so alpha left null.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Validator re-simulates miner checkpoints in OpenMM; if the recomputed
      median energy differs from the reported energy by more than ANOMALY_THRESHOLD
      (1%), the submission is marked invalid (reason 'energy_difference_too_large').
      GRADIENT_THRESHOLD_FINAL/INTERMEDIATE and XML_CHECKPOINT_THRESHOLD further
      gate validity.
  - kind: deduplication
    enforcement: rejection
    description: >-
      Energies within DIFFERENCE_THRESHOLD (1e-6) of an already-seen energy are
      marked is_duplicate and excluded from the energies dict, preventing
      copy-of-the-winner submissions from being rewarded. TOP_K=5 unique valid
      energies are collected per job.
  - kind: code_inspection
    enforcement: penalty
    description: >-
      credibility_pipeline: if reason == 'state-checkpoint' (checkpoint-file
      exploit detected) the miner's chain score is halved (scores[uid] *= 0.5).
      Per-task credibility is updated via EMA with CREDIBILITY_ALPHA_POSITIVE 0.15
      / CREDIBILITY_ALPHA_NEGATIVE 0.25.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Only non-validator UIDs are queried/rewarded (get_all_miner_uids with
      vpermit_tao_limit, default 20000); validator permit UIDs have their scores
      forced to 0 before weight setting.

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: SyntheticMD
      role: main
      advancement_rule: >-
        Validator-created synthetic PDB folding jobs; final reward = per-job
        reward * job.priority.
      multipliers: {final: "rewards * priority"}
    - name: OrganicMD
      role: main
      advancement_rule: >-
        Externally-submitted (organic) folding jobs; final reward = per-job
        reward * priority * organic_priority_multiplier (10).
      multipliers: {final: "rewards * priority * 10", organic_priority_multiplier: 10}
  count: 2
  notes: >-
    REWARD_REGISTRY maps job_type -> reward class (SyntheticMD / OrganicMD).
    Same MDReward.get_rewards logic; differ only in calculate_final_reward
    multiplier.

per_miner_state:
  tracked: true
  state_kinds: [reputation, cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    MinerRegistry credibility per task starts at STARTING_CREDIBILITY (0.50) and
    is updated by EMA each job. On hotkey replacement (resync_metagraph) the miner
    is reset and chain score zeroed. EMA chain scores persist across epochs in
    state.pt.
  notes: >-
    Credibility drives get_validation_probability (lower credibility -> always
    validated; higher -> exponentially less likely, exp(-4.605*(cred-0.5))).

