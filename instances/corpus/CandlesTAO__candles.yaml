schema_version: "1.1.0"
instance_kind: extracted

# The documented scoring pipeline (color + price accuracy, decay-weighted EMA) is fully
# implemented, BUT every set_weights call passes raw_weights through _apply_hardcoded_weights,
# which forces 80% of all weight onto a single hardcoded UID (147), distributing only the
# remaining 20% by the scored weights. So the genuine merit signal governs only ~20% of emission.
mechanism_status: partial_burn
mechanism_status_notes: >-
  _apply_hardcoded_weights() unconditionally assigns 80% of the weight vector to hardcoded
  UID 147 and spreads the remaining 20% proportionally among others on every set_weights call.
  The merit-based scoring therefore governs only ~20% of emission. UID 147 is not a known
  burn UID label in code, so this is captured as a fixed-fraction emission redirect (partial_burn).

subnet:
  name: "Candles Subnet"
  owner_repo: "CandlesTAO__candles"
  netuid: 31
  implementation_lang: python

task:
  summary: >-
    Miners predict cryptocurrency candle outcomes for the TAO-USD pair over hourly, daily, and
    weekly intervals: each prediction supplies a candle color (red/green = down/up), a closing
    price, and a confidence. Validators score the prediction once the interval closes against
    real market data fetched from CoinDesk. Rewards combine color accuracy (weighted 60%) and
    price proximity (weighted 40%), modulated by the miner's stated confidence.
  submission_format: [signals]

scoring_signals:
  - name: color_accuracy
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.6
    normalization: none
    notes: >-
      _calculate_color_score returns 1.0 if predicted candle color equals actual color, else 0.0.
      Combined into base_score with a 0.6 weight.
  - name: price_proximity
    metric_kind: regression_error
    direction: higher_is_better
    weight: 0.4
    normalization: none
    notes: >-
      _calculate_price_score computes percentage_error = abs(pred-actual)/actual, then converts
      to a 0..1 score via exp(-percentage_error * 10). Combined into base_score with a 0.4 weight.
      Higher final score is better (lower error -> higher score).
  - name: confidence_weight
    metric_kind: composite
    direction: target_band
    weight: null
    normalization: none
    notes: >-
      Confidence (default 0.5 if absent) modulates the base score: if base_score>0.5 the score is
      boosted by (confidence-0.5)*0.2, otherwise it is penalized by (confidence-0.5)*0.2. Acts as a
      multiplicative/gated adjustment, not an additive signal, hence weight null.

ground_truth_sources:
  - kind: market_data
    description: >-
      Actual OHLC candle data for the closed interval, fetched per interval from the CoinDesk
      price API via PriceClient, used as the actual color and actual close price for scoring.
    source_identifier: "CoinDesk OHLC API (provider=coindesk); symbol TAO-USD"
    trust_model: oracle
    notes: >-
      Requires COINDESK_API_KEY env var; validator raises if unset. actual_ohlc.color and
      actual_ohlc.close are the references for color and price scoring.

aggregation:
  method: exponential_decay_ema
  composition: hybrid
  normalization: none
  temperature: null
  decay_rate: 0.032
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "147"
    fraction: 0.8
    dynamic: false
    notes: >-
      _apply_hardcoded_weights forces target_weight_ratio=0.8 of the weight to target_uid=147;
      the remaining 0.2 is distributed proportionally to the merit-based raw weights among the
      other UIDs. Not labeled a burn address in code, but functions as a fixed emission redirect.
  notes: >-
    Per-prediction final_score = clip(base_score +/- (confidence-0.5)*0.2). Per miner, daily scores
    are averaged (total_score/prediction_count). Then _calculate_historical_decay_score aggregates
    up to 31 daily scores: today gets decay 1.0, older days get decay exp(-0.032*days_ago) (=0 past
    31 days), summed and divided by the number of effective days. The composition is hybrid:
    weighted-sum of color/price + gated confidence + temporal decay aggregation.

weight_setting:
  cadence: continuous
  method: >-
    Background asyncio task _incentive_scoring_and_set_weights_async runs every 60s; when the
    current UTC minute is divisible by INCENTIVE_SCORING_INTERVAL (default 30) it scores closed
    intervals, runs update_scores (EMA), then calls set_weights_async. A second background loop
    _periodic_weight_setting also checks should_set_weights every 60s. Raw weights are L1-normalized,
    IP-deduplicated, then 80% hardcoded to UID 147 before process_weights_for_netuid.
  on_chain_call: set_weights
  tempo_or_interval: "INCENTIVE_SCORING_INTERVAL minutes (default 30)"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores applies self.scores = alpha*scattered_rewards + (1-alpha)*self.scores, where
      alpha = config.neuron.moving_average_alpha (argparse default 0.1). This is the final-reward EMA,
      distinct from the within-aggregation 31-day decay (aggregation.decay_rate).

anti_gaming:
  - kind: deduplication
    enforcement: penalty
    description: >-
      enforce_unique_miner_ip=True: _filter_uids_by_unique_ip keeps only the lowest UID per IP when
      querying, and _apply_ip_deduplication_to_weights zeroes weights of duplicate-IP miners (keeping
      the highest-weighted UID per IP). IP 0.0.0.0 is exempted.
  - kind: deduplication
    enforcement: rejection
    description: >-
      Within an interval, PredictionBatchScorer tracks (prediction_id, miner_uid) keys and skips
      duplicate predictions from the same miner for the same prediction_id.
  - kind: other
    kind_other: interval_id_whitelist
    enforcement: rejection
    description: >-
      parse_responses ignores any miner prediction whose interval_id was not in the validator's
      original request set (allowed_ids), preventing injection of unrequested intervals.

sub_competitions:
  structure: multi_asset
  stages: []
  count: 3
  notes: >-
    Three concurrent prediction horizons are requested and scored independently: hourly, daily,
    and weekly intervals (TimeInterval enum). Not separate reward ladders but parallel interval
    types whose scores are pooled per miner. Treated as multi_asset/multi-horizon; closest enum.

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cumulative_score, registration_age]
  status_values: []
  reset_policy: >-
    On hotkey change for a UID, detect_new_hotkeys clears self.scores[uid]=0 and calls
    sqlite_storage.clear_miner_history for the old hotkey.
  notes: >-
    SQLite storage retains up to 31 days of historical daily scores per miner (get_historical_daily_scores,
    days=31) used for decay aggregation. _get_days_since_registration converts blocks-since-last-update to
    days (BLOCKS_PER_DAY=7200), capped 1..31, used as a fallback denominator when SQLite history is absent.

