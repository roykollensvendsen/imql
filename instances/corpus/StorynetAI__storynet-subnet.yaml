schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  The validator routes all miner scoring to an external API (api.storyai.art /score-miners/),
  not the local scoring/ modules. Weights apply a "burn UID" mechanism that diverts a dynamic
  owner_share (max(0.10, 0.50 - 0.01*num_miners)) of all weight to the subnet owner UID every
  weight-setting round, while the documented 100-point local scoring code (technical/structure/
  content/narrative) is not invoked in the live validation path.

subnet:
  name: "StoryNet Subnet"
  owner_repo: "StorynetAI__storynet-subnet"
  netuid: 92
  implementation_lang: python

task:
  summary: >-
    Miners generate AI-powered interactive story content across a 4-stage pipeline
    (blueprint, characters, story_arc, chapters). The validator deterministically selects a
    task type by block, queries miners, then submits each miner's structured JSON output to an
    external scoring API which returns a 0-100 score per miner (with technical/structure/content/
    narrative breakdown). EMA-smoothed scores drive weights.
  submission_format: [api_response]

scoring_signals:
  - name: api_quality_score
    metric_kind: composite
    direction: higher_is_better
    weight: 0.75
    normalization: ema
    notes: >-
      Per-miner score (0-100) returned by external API /score-miners/. Composite weight is
      0.75 in calculate_weights (normalized_quality). Documented breakdown components
      (technical/structure/content/narrative) are computed server-side, not in this repo.
  - name: historical_score
    metric_kind: composite
    direction: higher_is_better
    weight: 0.25
    normalization: ema
    notes: >-
      Average of stored per-miner historical scores (normalized to 0-1); contributes 0.25 of
      composite. Defaults to 0.5 when no history exists.

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      External scoring API (api.storyai.art) returns per-miner scores with a breakdown of
      technical/structure/content/narrative. Narrative is described as AI-based subjective
      evaluation whose prompts are loaded server-side (not in repo).
    source_identifier: "https://api.storyai.art/score-miners/"
    trust_model: oracle
    notes: >-
      Scoring is off-repo; the documented local scoring modules describe the intended rubric
      but are not called by validator.py.

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: sum_to_one
  temperature: 2.0
  decay_rate: null
  min_weight_floor: 0.001
  burn_allocation:
    enabled: true
    address_or_uid: "subnet_owner_uid (get_subnet_owner_hotkey)"
    fraction: null
    dynamic: true
    notes: >-
      owner_share = max(0.10, 0.50 - 0.01 * num_miners); miner weights scaled by
      (1 - owner_share) and remaining owner_share assigned to the subnet owner UID each round.
  notes: >-
    composite = 0.75 * normalized_quality + 0.25 * historical_score; incentives = composite **
    temperature (2.0); normalized to sum 1.0; min_weight 0.001 applied then re-normalized;
    then burn-UID owner_share carve-out.

weight_setting:
  cadence: rate_limited
  method: >-
    set_weights called every weight_update_frequency steps (default 10), gated by an on-chain
    blocks-since-last rate limit (weights_rate_limit hyperparameter, fallback 100 blocks).
  on_chain_call: set_weights
  tempo_or_interval: "weights_rate_limit blocks (fallback 100)"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      EMA_ALPHA env default 0.1; scores[uid] = exponential_moving_average(score, scores[uid],
      ema_alpha) where EMA = alpha*new + (1-alpha)*old.

anti_gaming:
  - kind: plagiarism_detection
    enforcement: penalty
    description: >-
      README: "Plagiarism Detection: Responses too similar to history are penalized" and
      "Originality Scoring". Implemented (if at all) server-side / in unused scoring modules,
      not in the live validator weight path.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Blacklist set tracked in validator state for known bad-actor UIDs; model-quality policy
      (apply_model_quality_multiplier) can zero out blacklisted models. Not invoked in live
      run_step path.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Weight submission is block-rate-limited via can_set_weights (weights_rate_limit, fallback
      100 blocks) to avoid excessive on-chain updates.

sub_competitions:
  structure: per_task_type
  stages:
    - name: "blueprint"
      role: main
    - name: "characters"
      role: main
    - name: "story_arc"
      role: main
    - name: "chapters"
      role: main
  count: 4
  notes: >-
    task_distribution = {blueprint:0.40, characters:0.25, story_arc:0.25, chapters:0.10};
    one task type deterministically selected per block. Scores are pooled into a single EMA per
    miner, not separate weight pools.

per_miner_state:
  tracked: true
  state_kinds:
    - cumulative_score
    - performance_ledger
    - status_enum
  status_values:
    - "blacklisted"
  reset_policy: >-
    State persisted to validator_state.json across restarts; history deques capped at maxlen 100.
  notes: >-
    Per-miner EMA score (self.scores), score/timestamp history (deque maxlen 100), violation
    counts, and blacklist set are tracked and persisted.

documentation:
  status: docs_and_code
  source_version: "Protocol v3.2.1"
  primary_docs:
