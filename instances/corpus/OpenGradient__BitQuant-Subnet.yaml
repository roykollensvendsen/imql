schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Validators score miner responses via an external BitQuant Agent API and set weights
  from L1-normalized EMA scores. No burn allocation is present in the code. The reward
  is fully delegated to a remote evaluation endpoint; the actual scoring logic lives
  off-repo behind the API.

subnet:
  name: "BitQuant Subnet"
  owner_repo: "OpenGradient__BitQuant-Subnet"
  netuid: 15
  implementation_lang: python

task:
  summary: >-
    A miner runs the BitQuant agent for AI-powered quantitative DeFi analysis. The validator
    sends a natural-language QuantQuery; the miner forwards it to BitQuant and returns a
    QuantResponse (response text, signature, proofs, metadata). The response is rewarded by a
    quality score in [0.0, 1.0] obtained from the BitQuant Agent evaluation API.
  submission_format: [api_response]

scoring_signals:
  - name: bitquant_agent_evaluation_score
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Single score in [0.0, 1.0] returned by the BitQuant Agent API endpoint
      (quant-api.opengradient.ai/api/subnet/evaluate). Code clamps the value to
      max(0.0, min(1.0, score)) and defaults to 0.0 on any failure, None response,
      or empty response content. The exact evaluation logic runs off-repo behind the API.

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      The production BitQuant Agent deployment evaluates the miner's response via an HTTP API.
      Validators are explicitly invited to design their own evaluation mechanism.
    source_identifier: "https://quant-api.opengradient.ai/api/subnet/evaluate"
    trust_model: oracle
    notes: >-
      Off-chain remote API; the actual scoring model is not in this repository
      (see https://github.com/OpenGradient/BitQuant).

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn allocation present in the weight-setting code."
  notes: >-
    There is a single scoring signal. EMA-smoothed scores are L1-normalized
    (raw_weights = self.scores / norm, norm = L1 norm) before being processed for
    on-chain emission.

weight_setting:
  cadence: per_epoch
  method: >-
    Per-step EMA of API reward scores; on sync, scores are L1-normalized, passed through
    process_weights_for_netuid and convert_weights_and_uids_for_emit, then committed via
    subtensor.set_weights with version_key=spec_version.
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks (neuron.epoch_length, 12s blocks)"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores applies scores = alpha * scattered_rewards + (1 - alpha) * scores,
      with neuron.moving_average_alpha default 0.1.

anti_gaming:
  - kind: hardware_validation
    enforcement: penalty
    description: >-
      A TEE GPU remote-attestation framework exists (retrieve_remote_attestation /
      validate_attestation against golden_measurements.json, plus a periodic check), but the
      hard attestation gate in reward() is commented out: "no hard TEE attestation check
      requirement for now". So it is implemented but not currently enforced in scoring.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Validator queries require a validator permit / vpermit; neuron.vpermit_tao_limit default
      4096 caps TAO allowed to query a validator with a vpermit (see add_validator_args).

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    On metagraph resync, scores for replaced hotkeys are zeroed; state (step, scores, hotkeys)
    is persisted to state.npz.
  notes: >-
    self.scores is a per-UID EMA moving average over float32, updated each step via update_scores.

documentation:
  status: docs_and_code
  source_version: "quant __version__ 0.1.0; __spec_version__ 100000"
  primary_docs:
    - "README.md"
    - "quant/validator/reward.py"
  completeness: medium

