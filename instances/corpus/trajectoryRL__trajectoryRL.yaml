    - claim_field: "/ground_truth_sources/1/description"
      source_path: "docs/EVALUATION_S1.md"
      line_ref: "37-39"
      quote: >-
        Scoring uses an agent judge that independently explores the sandbox
        environment and grades the testee agent's work. The judge reads a
        natural-language rubric (`JUDGE.md` per scenario) and produces a quality score.
    - claim_field: "/aggregation/method"
      source_path: "docs/INCENTIVE_MECHANISM.md"
      line_ref: "97-99"
      quote: "weight[winner] = 1.0 / weight[others] = 0.0"
    - claim_field: "/aggregation/notes"
      source_path: "docs/INCENTIVE_MECHANISM.md"
      line_ref: "331-336"
      quote: >-
        consensus_score = Σ(stake_i × score_i) / Σ(stake_i), summed over
        qualified-reporting validators only
    - claim_field: "/aggregation/burn_allocation/fraction"
      source_path: "trajectoryrl/base/validator.py"
      line_ref: "72"
      quote: "BURN_FRACTION = 0.95  # 95% of miner emissions burned via owner UID"
    - claim_field: "/aggregation/burn_allocation/address_or_uid"
      source_path: "trajectoryrl/base/validator.py"
      line_ref: "71"
      quote: "OWNER_UID = 74"
    - claim_field: "/aggregation/burn_allocation/notes"
      source_path: "trajectoryrl/base/validator.py"
      line_ref: "1245-1250"
      quote: >-
        if winner_uid == OWNER_UID: uids = [OWNER_UID]; weights = [1.0] else:
        uids = [winner_uid, OWNER_UID]; weights = [1.0 - BURN_FRACTION, BURN_FRACTION]
    - claim_field: "/mechanism_status"
      source_path: "trajectoryrl/base/validator.py"
      line_ref: "1166-1172"
      quote: >-
        if not self._winner_state.is_fresh(...): ... "refusing set_weights and
        burning to owner UID" ... await self._set_burn_weights(reason="winner_cache_stale")
    - claim_field: "/weight_setting/tempo_or_interval"
      source_path: "trajectoryrl/utils/config.py"
      line_ref: "135"
      quote: "weight_interval_blocks: int = 100"
    - claim_field: "/weight_setting/on_chain_call"
      source_path: "trajectoryrl/base/validator.py"
      line_ref: "1195-1202"
      quote: "result = self.subtensor.set_weights(netuid=self.config.netuid, wallet=self.wallet, uids=uids, weights=weights, ...)"
    - claim_field: "/weight_setting/method"
      source_path: "docs/INCENTIVE_MECHANISM.md"
      line_ref: "114-118"
      quote: >-
        Validators always call `set_weights` every tempo, never skip — failure to
