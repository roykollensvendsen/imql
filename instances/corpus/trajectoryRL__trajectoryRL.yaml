    - claim_field: "/anti_gaming/1/description"
      source_path: "trajectoryrl/utils/ncd.py"
      line_ref: "19"
      quote: "SIMILARITY_THRESHOLD = 0.80"
    - claim_field: "/anti_gaming/2/description"
      source_path: "trajectoryrl/utils/config.py"
      line_ref: "98"
      quote: "score_delta: float = 0.10  # Winner Protection: challenger must score 10% higher"
    - claim_field: "/anti_gaming/3/description"
      source_path: "trajectoryrl/utils/config.py"
      line_ref: "113-114"
      quote: >-
        min_validator_stake: float = 10000.0 ... quorum_threshold: float = 0.5 ...
        aggregate only when submitted stake share > threshold
    - claim_field: "/anti_gaming/4/description"
      source_path: "docs/INCENTIVE_MECHANISM.md"
      line_ref: "260"
      quote: "Validators verify `sha256(canonical_json) == pack_hash` independently."
    - claim_field: "/anti_gaming/5/description"
      source_path: "docs/INCENTIVE_MECHANISM.md"
      line_ref: "64"
      quote: "Per-miner cooldown: 60 min (configurable via `MINER_SUBMIT_COOLDOWN_SECONDS`)"
    - claim_field: "/per_miner_state/status_values"
      source_path: "docs/INCENTIVE_MECHANISM.md"
      line_ref: "638-640"
      quote: >-
        miner_submissions row inserted with eval_status = 'pending_pre_eval' ...
        failed → eval_status = 'failed' ... all checks pass → eval_status = 'pending_eval'
    - claim_field: "/documentation/source_version"
      source_path: "trajectoryrl/utils/config.py"
      line_ref: "40"
      quote: "SPEC_NUMBER = 10"
    - claim_field: "/sub_competitions/notes"
      source_path: "docs/INCENTIVE_MECHANISM.md"
      line_ref: "103-110"
      quote: >-
        When active miners < `bootstrap_threshold` (default 10) ... weight[1st] =
        0.70 / weight[2nd] = 0.20 / weight[3rd] = 0.10
  unresolved:
    - >-
      /aggregation Winner Protection delta: docs v6.0 state delta = 0.03, but the
      only literal in the read code is ValidatorConfig.score_delta = 0.10 (legacy
      v5.x value). The 0.03 constant is not present in the source read, so the
      documented value is not code-confirmed.
    - >-
      /scoring_signals active scoring method: two scoring descriptions coexist —
      sandbox_harness.py computes passed_tests/total_tests from ctrf.json
      (Terminal-Bench verifier), while EVALUATION_S1.md describes an agent-judge
      quality_score. Which is live for the current season is not unambiguously
      resolvable from the read sources.
    - >-
      /aggregation config vs docs divergence: config.py reflects the v5.x
      consensus-CAS model (IPFS, consensus_epsilon, window_publish_pct,
      disable_winner_protection default true) while INCENTIVE_MECHANISM.md and
      validator.py reflect v6.0 server-coordinated derivation; scoring/__init__.py
      confirms the v5.x scorer was removed. The config dataclass is partly stale
      relative to the live daemon.

composition:
  shape: gated
  overlays: [burn, guards, state]
  extern_count: 0   # provisional; coverage.py recomputes
