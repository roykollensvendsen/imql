schema_version: "1.1.0"
instance_kind: extracted

# The repo's validator does NOT compute miner scores locally. It fetches pre-computed
# weights from an off-repo central server (https://77.creativebuilds.io/weights), applies
# an EMA, normalizes, and sets them on chain. The substantive scoring logic (vote tallying,
# liquidity-position valuation) lives server-side and is not present in this source tree.
mechanism_status: active
mechanism_status_notes: >-
  Validator actively sets on-chain weights every ~101 blocks. However the actual reward
  formula (how votes + Uniswap V3 liquidity positions map to per-miner weight) is computed
  by an off-repo central server and is not in this repository; only the fetch/EMA/normalize/
  set pipeline is present.

subnet:
  name: "Subnet77 Liquidity Auction & Voting"
  owner_repo: "creativebuilds__sn77"
  netuid: 77
  implementation_lang: typescript

task:
  summary: >-
    Miners provide liquidity to Uniswap V3 pools and register (link) their Bittensor hotkey
    to an Ethereum/EVM address. Token holders vote weighted allocations across liquidity
    pools (weights summing to 10000). A central server tallies votes weighted by token
    holdings and miners' liquidity positions to compute final per-miner weights; validators
    fetch those weights and set them on subnet 77. Miners are rewarded for providing liquidity
    to pools that voters favor.
  submission_format: [content_link, signals]
  # content_link: linked EVM address / on-chain LP positions; signals: holder votes feed scoring.

scoring_signals:
  - name: liquidity_provision
    metric_kind: other
    metric_kind_other: "voter-weighted liquidity contribution (server-side; formula not in repo)"
    direction: higher_is_better
    weight: null
    normalization: other
    normalization_other: "computed off-repo by central server"
    notes: >-
      Final per-miner weight is computed server-side from holder votes (token-weighted) and
      miners' Uniswap V3 liquidity positions. The repository contains no scoring code for this;
      the validator only consumes the server's /weights output.

ground_truth_sources:
  - kind: organic_traffic
    description: >-
      Holder votes (token-weighted allocations across liquidity pools) collected by the central
      server, combined with on-chain Uniswap V3 liquidity positions for registered miners.
    source_identifier: "https://77.creativebuilds.io"
    trust_model: crowd
    notes: >-
      Votes are token-holder driven (crowd). Position data sourced from Uniswap V3 via The Graph
      (THEGRAPH_API_KEY). The tallying/valuation happens off-repo; trust model is the central server.

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: ""
  notes: >-
    In-repo aggregation is limited to: normalize the server-provided per-miner weights so they
    sum to 1 (normalizeFinalMinerWeights), then scale to u16 (0..65535). If total weight is
    zero/invalid the validator falls back to a uniform distribution across miners/UIDs. The
    underlying vote-to-weight aggregation is server-side and not in the source tree.

weight_setting:
  cadence: rate_limited
  method: >-
    Periodic loop (default 5 min). Every SET_INTERVAL_MS (default 101*12*1000 ms = "101 Blocks")
    the EMA-smoothed weights are normalized and pushed via subtensorModule.setWeights.
  on_chain_call: set_weights
  tempo_or_interval: "101 blocks (SET_INTERVAL_MS default 101*12*1000 ms)"
  smoothing:
    kind: ema
    alpha: 0.2
    window: null
    notes: >-
      EMA over successive server weight fetches: next = EMA_ALPHA*curr + (1-EMA_ALPHA)*prev,
      EMA_ALPHA default 0.2 (env-overridable). NaN/non-finite values are coerced to 0.

anti_gaming:
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Vote cooldown management (server-side, documented in README): base 72-minute cooldown after
      vote changes, progressive doubling (72m -> 144m -> 288m -> 576m) capped at 8 hours, reset to
      base after 24h inactivity; no cooldown for first-time voters. Prevents rapid vote-gaming.
  - kind: commit_reveal
    enforcement: rejection
    description: >-
      Votes and validator pings are Ed25519/sr25519-signed and signature-verified; validators must
      be registered on the subnet (keyToUid check) and pass a server version-compatibility ping
      check (12h incompatibility timeout shuts the validator down).

sub_competitions:
  structure: multi_asset
  stages: []
  count: null
  notes: >-
    Competition is across liquidity pools (up to MAX_POOLS = 10 per voter), each an asset/pool that
    accrues vote weight. Voters allocate weights across pools summing to 10000.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    No per-miner persistent state in the repo's validator beyond the in-memory EMA of weights,
    which is not keyed to durable miner identity/ledger state. Vote-cooldown state is per-voter
    and lives on the off-repo server.

