schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Emission control (burn) is configurable but disabled by default
  (emission_control.enabled=False). The dynamic auto-burn path in
  effective_emission_control only activates when the computed emission_percentage
  < 1.0, but with default config emission_min=emission_max=1.0, so
  calculate_emission_percentage always returns 1.0 and no burn occurs by default.
  Scoring (quality via ImageBind + speed + API model usage) is the live mechanism.

subnet:
  name: "Neza"
  owner_repo: "subnet99__Neza"
  netuid: 99
  implementation_lang: python

task:
  summary: >-
    Miners run open-source video-generation models (e.g. WAN2.1) through ComfyUI,
    executing workflows dispatched by validators, then upload the generated video to
    public cloud storage. Validators score each output on quality (ImageBind similarity
    against a benchmark/reference render) and speed (completion time vs a baseline),
    plus an API path that scores miners on model-call cost x success rate (with a
    time factor for sora-2 models). Higher quality and faster generation yield higher
    rewards.
  submission_format: [content_link, api_response]

scoring_signals:
  - name: quality_score
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.6
    normalization: none
    notes: >-
      ImageBind similarity between validator reference render and miner output, averaged
      over files. Weighted by verification.quality_score_weight (default 0.6). If avg
      quality < quality_threshold (0.9), the speed score is forced down to
      low_quality_speed_score (0.2).
  - name: speed_score
    metric_kind: latency
    direction: higher_is_better
    weight: 0.4
    normalization: none
    notes: >-
      Speed score in [0,1]: 1.0 if completion_time <= verification_time_estimate baseline
      (300s), else max(0, 1 - excess_time/baseline). Weighted by speed_score_weight
      (default 0.4). Combined task score = quality*0.6 + speed*0.4.
  - name: api_model_score
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: min_max
    notes: >-
      API task score = sum over models of (total_cost * success_rate * model_weight),
      with a sora-2 time_factor multiplier. Normalized across miners via percentile
      (5th/95th) min-max into [0,1]. Combined with the comfy task score as
      task_avg*comfy_task_weight (0.2) + api_avg*api_task_weight (0.8).

ground_truth_sources:
  - kind: reference_model
    description: >-
      Validator renders a reference output and uses the ImageBind model
      (imagebind_huge, pretrained) to compute similarity between the validator render
      and the miner-generated video/image/audio.
    source_identifier: "imagebind_model.imagebind_huge(pretrained=True)"
    trust_model: trusted
    notes: "VideoVerifier in neza/validator/verify.py."
  - kind: organic_traffic
    description: >-
      Organic workflows from real user requests pushed into the database and dispatched
      to miners; API-path scoring uses real model-call stats (call_count, success_count,
      total_cost) fetched from the API.
    source_identifier: "get_api_miner_stats"
    trust_model: trusted
    notes: "API scoring path in process_api_scoring."

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: l1
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      emission_control disabled by default. When enabled (or when computed
      emission_percentage < 1.0), a burn fraction = 1.0 - emission_percentage is routed
      to UID 0 via emission_control_scores. With default emission_min=emission_max=1.0
      the percentage is always 1.0 so no burn occurs.
  notes: >-
    Per-miner final_weight = (history_avg*history_weight(0.4) + combined_score*current_weight(0.6))
    * miner_factor (stake-based, default range 1.0-1.0). combined_score =
    task_avg*comfy_task_weight(0.2) + api_avg*api_task_weight(0.8). Validator scores are
    then blended 50/50 with an external consensus score (consensus_score_ratio 0.5,
    local_score_ratio 0.5). Final on-chain raw_weights = scores / L1-norm in base set_weights.

weight_setting:
  cadence: continuous
  method: >-
    Block-callback driven. set_weights computes API scores, updates base scores via
    calculate_weights, blends 50/50 with consensus scores, applies optional emission
    control, then the base BaseValidatorNeuron.set_weights normalizes by L1 norm and calls
    subtensor.set_weights with version_key=spec_version.
  on_chain_call: set_weights
  tempo_or_interval: null
  smoothing:
    kind: sma
    alpha: null
    window: 6
    notes: >-
      Historical scores keep a sliding window of max_history=6 epoch averages; history
      contributes history_weight=0.4 of the base weight. Epoch scores moved to history
      every history_move_blocks=6000 blocks (~20h). task/api sliding_window=30.

anti_gaming:
  - kind: liveness_check
    enforcement: penalty
    description: >-
      Comfy support queried every 100 blocks; miners that no longer support ComfyUI have
      their task_scores reset to [0.0]. API miners not in the active cache get api_scores
      reset to [0.0].
  - kind: rate_limit
    enforcement: penalty
    description: >-
      PenaltyManager: consecutive failure_threshold=2 triggers penalty_duration 5min,
      doubling (penalty_multiplier=2) up to max_penalty_duration 30min.
  - kind: stake_weighting
    enforcement: other
    enforcement_other: "score multiplier"
    description: >-
      calculate_miner_factor scales final weight by a stake-based segmented-exponential
      factor (default min/max both 1.0, so neutral by default).
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Hotkey-change detection clears all score records for a UID when its hotkey changes;
      coldkey blacklist and blacklisted_uids zero out scores.

sub_competitions:
  structure: per_task_type
  stages: []
  count: null
  notes: >-
    Two task types contribute to the combined score: ComfyUI/synthetic+organic video
    tasks (comfy_task_weight 0.2) and API model-call tasks (api_task_weight 0.8). Not a
    formal tournament/ladder.

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cumulative_score, cooldown]
  status_values: []
  reset_policy: >-
    Scores cleared on hotkey change. Historical scores capped at max_history=6;
    task/api scores capped at sliding_window=30. Penalty cooldowns reset on success.
  notes: >-
    score_cache.json persists historical_scores, current_scores, task_scores, api_scores,
    and miner_hotkeys across cycles, versioned (cache_version=1).

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/validator_installation_guide.md"
    - "docs/models.md"
    - "docs/miner_installation_guide.md"
  completeness: medium

