schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Documented LP-scoring mechanism is live, but set_weights reserves a fixed 50% of total
  weight for the owner UID 201 (MINER_EMISSIONS_BURN_PCT = 0.5), with the remaining 50%
  distributed across LP miners by their concentration scores.

subnet:
  name: "Swap"
  owner_repo: "Swap-Subnet__swap-subnet"
  netuid: 10
  implementation_lang: python

task:
  summary: >-
    Miners provide liquidity to the TaoFi TAO<>USDC Uniswap V3 pool from an EVM wallet
    associated to their hotkey. The validator queries the TaoFi subgraph for each miner's
    on-chain LP positions and scores them by the position's Uniswap V3 liquidity value L
    (which inherently rewards concentration) when the position is in range. Higher liquidity
    of in-range positions yields higher reward.
  submission_format: [signals]

scoring_signals:
  - name: position_liquidity_in_range
    metric_kind: volume
    direction: higher_is_better
    weight: 1.0
    normalization: min_max
    notes: >-
      Per-position reward_score equals the Uniswap V3 liquidity value L if the pool's current
      tick is within [tick_lower, tick_upper], else 0. Per-miner score is the sum of their
      in-range position liquidity. Rewards are then divided by the max score across miners
      (max-normalization to [0,1]).

ground_truth_sources:
  - kind: market_data
    description: >-
      TaoFi subgraph (GraphQL) reporting Uniswap V3 positions at a given block: owner,
      tickLower, tickUpper, pool tick, and liquidity.
    source_identifier: "https://subgraph.taofi.com/graphql"
    trust_model: oracle
    notes: >-
      Positions queried via positionsAtBlock at current_block - BLOCK_BUFFER; on-chain LP
      state is the source of truth, fetched through the TaoFi subgraph oracle.

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: min_max
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "201"
    fraction: 0.5
    dynamic: false
    notes: >-
      In set_weights, MINER_EMISSIONS_BURN_PCT (0.5) of total weight is reserved for OWNER_UID
      (201); remaining (1 - burn_pct) is scaled across other miners' processed weights.
  notes: >-
    Per-miner reward is the sum of in-range position liquidity, max-normalized to [0,1] in
    get_rewards_uniswap_v3_lp. At weight time, scores are L1-normalized via normalize_numpy
    (p=1), then the owner-burn reservation is applied.

weight_setting:
  cadence: continuous
  method: >-
    raw_weights = normalize_numpy(self.scores) (L1 norm); process_weights_for_netuid applies
    subtensor limits; then 50% of total weight is reserved for OWNER_UID 201 and the rest is
    scaled across remaining miners; converted to uint16 and emitted via subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "MAIN_LOOP_FREQUENCY = 300 seconds"
  smoothing:
    kind: ema
    alpha: 1.0
    window: null
    notes: >-
      update_scores does EMA: scores = clip(alpha*rewards + (1-alpha)*scores, 0, 1) with
      alpha = config.neuron.lp_moving_average_alpha, default LP_MINER_ALPHA = 1.0, i.e. the
      new observation fully replaces the previous score.

anti_gaming:
  - kind: deduplication
    enforcement: rejection
    description: >-
      calculate_miner_score skips an owner EVM address already claimed by another miner
      (claimed_owner_addresses) and skips token_ids already claimed (claimed_token_ids),
      preventing double-counting of the same on-chain position across miners.
  - kind: rate_limit
    enforcement: penalty
    description: >-
      If the number of scored LP miners exceeds MINER_GROUP_THRESHOLDS["UNISWAP_V3_LP"] = 200,
      the lowest-performing miners beyond the top 200 have their reward set to 0.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      In resync_metagraph, if a miner changes their committed miner_type since last sync,
      their score is reset to 0.

sub_competitions:
  structure: single
  stages: []
  count: 1
  notes: >-
    Only one miner group exists: UNISWAP_V3_LP, which receives 100% of emissions
    (MINER_GROUP_EMISSIONS["UNISWAP_V3_LP"] = 1).

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum]
  status_values: ["UNISWAP_V3_LP"]
  reset_policy: >-
    Score reset to 0 when a miner's hotkey is replaced or when the miner changes its committed
    miner_type; scores persisted to state.npz (save_state/load_state).
  notes: >-
    self.scores is an EMA-updated per-UID score array; self.miner_types maps UID to committed
    MINER_TYPE; both saved/loaded from disk.

documentation:
  status: docs_and_code
  source_version: "7.1.2"
  primary_docs: ["README.md", "docs/taofi_lp.md", "docs/validator.md"]
  completeness: medium

