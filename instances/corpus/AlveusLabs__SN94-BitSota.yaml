        `winner_share` of weight to the most recently accepted SOTA winner
    - claim_field: "/anti_gaming/2/description"
      source_path: "docs/rewards.md"
      line_ref: "98-99"
      quote: >-
        If your claimed score differs from validator's score by more than 10%,
        validators vote to blacklist you.
    - claim_field: "/sub_competitions/notes"
      source_path: "core/evaluations.py"
      line_ref: "31-35"
      quote: >-
        TASK_REGISTRY = { DEFAULT_TASK_TYPE: CIFAR10BinaryTask, "mnist_binary":
        MNISTBinaryTask, "scalar_linear": ScalarLinearRegressionTask, }
    - claim_field: "/aggregation/notes"
      source_path: "validator_config.yaml.example"
      line_ref: "mode"
      quote: 'mode: "sticky_burnsplit"'
  unresolved:
    - >-
      Which reward_mode runs in production on netuid 94 is not pinned by the repo:
      the hardcoded code default is "capacitor" (EVM contract voting) but example
      and committed configs use capacitorless sticky_burnsplit. The 90/10 split is
      taken from the shipped example config (burn_share: 0.9), not a hardcoded
      constant in scoring code.
    - >-
      Pool-mining reputation -> RAO conversion (evaluator_weight, evolver_weight,
      tolerance_ratio, consensus_threshold, repetition_penalty, epoch budget,
      pool fee, 5% per-miner cap) is described in docs/rewards.md with no concrete
