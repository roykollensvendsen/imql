      quote: >-
        if not winner_hotkey or winner_hotkey == self.burn_hotkey:
        desired_scores = {self.burn_hotkey: 1.0}
        else: desired_scores = {self.burn_hotkey: float(self.burn_share), str(winner_hotkey): float(self.winner_share)}
    - claim_field: "/aggregation/burn_allocation/fraction"
      source_path: "validator_config.yaml.example"
