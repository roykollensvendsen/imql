schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  The shipped capacitorless config burns 90% of weight to a burn hotkey and pays
  10% to the latest accepted SOTA winner (burn_share: 0.9). When no winner exists,
  100% goes to burn. The code's hardcoded default reward_mode is "capacitor" (EVM
  contract voting), but the example/committed validator configs select capacitorless
  sticky_burnsplit. Scoring (CIFAR-10 binary DSL evaluation) is real but only gates
  who, if anyone, receives the 10% winner share.

subnet:
  name: "BitSota"
  owner_repo: "AlveusLabs__SN94-BitSota"
  netuid: 94
  implementation_lang: python

task:
  summary: >-
    Miners evolve machine-learning algorithms (expressed in a DSL) via genetic
    programming and submit those that beat the current State-of-the-Art (SOTA)
    threshold on a fixed CIFAR-10 binary classification evaluation pipeline.
    Validators re-evaluate submitted algorithms deterministically and, when an
    algorithm beats SOTA, direct the winner share of on-chain weight to its miner;
    the remainder is burned.
  submission_format: [source_code]

scoring_signals:
  - name: cifar10_binary_median_accuracy
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Validator runs the algorithm over a deterministic suite of task_count tasks
      and takes the median per-task score (np.median(scores)). The algorithm
      "passes" if score >= sota_threshold. Used as a gate/winner-selection signal,
      not as an additive weight component, so weight is null.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Deterministic CIFAR-10 binary task suite (also MNIST binary and scalar linear
      regression registered) sampled with fixed seeds. task_count defaults to 128,
      task_seed defaults to 1337, default_task_type cifar10_binary, default_input_dim 16.
    source_identifier: "core/evaluations.py TASK_REGISTRY; validator_hyperparams.json"
    trust_model: trusted
    notes: >-
      Validators do not trust miner-reported scores; they re-run algorithms with
      deterministic per-task RNG seeds and use their own evaluated scores.
  - kind: commit_reveal
    description: >-
      Relay service (relay.bitsota.com) finalizes SOTA events via validator votes;
      sticky/windowed weight managers fetch finalized SOTA events (miner_hotkey,
      start_block, end_block) to identify the winner.
    source_identifier: "validator/relay_client.py; validator/sota_schedule.py"
    trust_model: adversarial
    notes: >-
      In winner_source 'local' mode the validator uses its own locally-evaluated
      best miner instead of relay-finalized events.

aggregation:
  method: winner_take_all
  composition: gated
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "5Ef5EsPQoMVmJ8rYectQ26BEvscvATEGm365bcQjo1Y6bxGr"
    fraction: 0.9
    dynamic: false
    notes: >-
      burn_share: 0.9 in capacitorless sticky_burnsplit mode; winner_share defaults
      to 1 - burn_share = 0.1. burn_hotkey example
      5Ef5EsPQoMVmJ8rYectQ26BEvscvATEGm365bcQjo1Y6bxGr. If no winner exists, burn
      receives 1.0. In the windowed (non-sticky) capacitorless manager the winner
      receives full weight (1.0) during the reward window and burn 1.0 otherwise.
  notes: >-
    Sticky burn-split: weights are {burn_hotkey: burn_share, winner_hotkey:
    winner_share}; weights change only when the accepted SOTA winner changes.

weight_setting:
  cadence: rate_limited
  method: >-
    Validator background loop sets on-chain weights via subtensor.set_weights once
    per chain rate-limit window. should_set_weights() gates on
    (current_block - last_update[uid]) > epoch_length. Sticky burn-split assigns
    burn_share to burn_hotkey and winner_share to the latest SOTA winner.
  on_chain_call: set_weights
  tempo_or_interval: "alignment_mod: 360 blocks (config); epoch_length: 100"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the final weights; weights are set discretely and
      change only when the winner changes (sticky) or the reward window flips
      (windowed).

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Validators independently re-evaluate submitted algorithms on a deterministic
      task suite rather than trusting miner-reported scores (verify_solution_quality
      returns score >= sota_threshold).
  - kind: rate_limit
    enforcement: barrier
    description: >-
      SOTA threshold ratchets upward: each new accepted algorithm raises the bar so
      the next submission must beat it (progressive improvement). Also IP/address
      request rate limiting in validator config.
  - kind: code_inspection
    enforcement: elimination
    description: >-
      Blacklisting: if a miner's claimed score differs from the validator's
      re-evaluated score by more than 10%, validators vote to blacklist; after
      multiple votes the relay rejects the miner's submissions (per docs/rewards.md).

sub_competitions:
  structure: per_task_type
  stages: []
  count: null
  notes: >-
    TASK_REGISTRY supports cifar10_binary (default), mnist_binary, and scalar_linear,
    selected per submission via task_type; cifar10_binary is the documented/default
    validator benchmark. Direct vs pool participation modes also exist but only direct
    mining feeds the on-chain SOTA winner mechanism.

per_miner_state:
  tracked: true
  state_kinds: [status_enum, reputation]
  status_values: [active_winner, burn_default, blacklisted]
  reset_policy: >-
    Winner changes (and prior winner stops earning) when a new SOTA event is accepted
    or a better local candidate is found; min_winner_improvement (default 0.0) gates
    replacement of the local winner.
  notes: >-
    On-chain: validator tracks the current SOTA winner hotkey (sticky) or the active
    windowed event. Off-chain pool mining tracks a reputation ledger converted to RAO
    at hourly epoch boundaries (documentation only).

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/rewards.md"
    - "docs/validation.md"
    - "validator_config.yaml.example"
  completeness: high

