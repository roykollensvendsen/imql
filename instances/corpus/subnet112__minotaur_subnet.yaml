schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: full_burn
mechanism_status_notes: >-
  _build_weights_mapping and build_bootstrap_or_champion_weights route 100% of
  emissions to the subnet-owner hotkey (burn) until a "real miner-backed
  champion" exists (is_real_miner_hotkey returns False for the genesis/empty
  hotkey). The documented scored/ranked decay path only activates once a real
  miner champion has been adopted, so the operative default is a full burn to
  the owner hotkey.

subnet:
  name: "Minotaur — Agentic Intent Execution Platform"
  owner_repo: "subnet112__minotaur_subnet"
  netuid: 112
  implementation_lang: python

task:
  summary: >-
    Miners write and continuously update a "Solving Engine" (solver) that turns
    user/agent App Intents (e.g. swaps) into execution plans. Validators run the
    highest-scoring submitted solver inside isolated Docker containers, simulate
    its plans on an Anvil fork, and double-score each plan against both a
    JavaScript scoring module and an on-chain constraint score. Submissions are
    benchmarked; the highest benchmark_score becomes the "champion" engine, and
    weights are emitted toward champion-eligible miners (decay-ranked) — or
    burned to the owner hotkey before a real champion exists.
  submission_format: [source_code, compute_service]

scoring_signals:
  - name: plan_quality_js_score
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.6
    normalization: none
    notes: >-
      Plan is scored by the app's JavaScript scoring module via the JS engine
      (PlanScorer.score / ScoringEngine._score_via_js). When no JS engine is
      available, compute_mock_score returns a deterministic mock in [0.3,1.0].
      In run_benchmark this term is combined with plan_quality_weight=0.6.
      Marked llm_judgment as the closest enum to an app-defined scoring program
      (see provenance.unresolved: metric_kind is a stress point).
  - name: auto_trigger_accuracy
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.4
    normalization: none
    notes: >-
      For auto-triggered intents, trigger_score is 1.0 if the solver's
      trigger_decision matches trigger_ground_truth, else 0.0. Combined with
      auto_trigger_weight=0.4 in run_benchmark. Only applied when the intent is
      auto-triggered and ground truth is available; otherwise the composite is
      just the plan JS score.
  - name: on_chain_constraint_score
    metric_kind: other
    metric_kind_other: on_chain_constraint_score_bps
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Gating signal (not additive). simulation.on_chain_score must be >=
      threshold (app_def.config.on_chain_threshold, default 5000 BPS) or the
      proposal is rejected (ON_CHAIN_SCORE_BELOW_THRESHOLD). Also the JS
      local_score must be >= score_threshold (default 0.5) or rejected
      (SCORE_BELOW_THRESHOLD).

ground_truth_sources:
  - kind: market_data
    description: >-
      Plans are re-simulated on an Anvil fork (mainnet/Base/Bittensor-EVM) of
      real chain state; simulation produces gas_used, token_transfers and an
      on_chain_score used to gate and score solver plans.
    source_identifier: "Anvil fork (ANVIL_RPC_URL / BASE_RPC_URL / ETHEREUM_RPC_URL)"
    trust_model: oracle
    notes: >-
      README: "Execute the solver software ... within isolated Docker
      containers to simulate plans on an Anvil fork." Followers independently
      re-simulate (FOLLOWER_PROPOSAL_RESIMULATE default "1").
  - kind: deterministic_dataset
    description: >-
      Benchmark scenarios with trigger_ground_truth (correct auto-trigger
      decision per intent app_id) used to score trigger accuracy.
    source_identifier: "run_benchmark trigger_ground_truth"
    trust_model: trusted
    notes: "Validator-supplied ground-truth trigger decisions per intent."

aggregation:
  method: exponential_decay_ema
  composition: hybrid
  normalization: sum_to_one
  temperature: null
  decay_rate: 0.6
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "subnet owner hotkey (SUBNET_OWNER_HOTKEY / OWNER_HOTKEY env)"
    fraction: 1.0
    dynamic: false
    notes: >-
      build_bootstrap_or_champion_weights returns {owner: 1.0} (100% burn) when
      no real miner champion exists; once a real champion exists, burn stops and
      weights go to champion-eligible miners.
  notes: >-
    Champion-eligible scored submissions are sorted by benchmark_score
    descending; raw weight = weight_decay**rank (rank 0 = champion,
    weight_decay default 0.6), then normalized to sum to 1.0. Composition is
    hybrid: per-plan benchmark_score itself is a weighted sum (0.6*JS_score +
    0.4*trigger_score) gated by JS and on-chain thresholds, while the
    cross-miner weight distribution is exponential rank decay.

weight_setting:
  cadence: per_epoch
  method: >-
    Epoch loop (default 5-minute windows per README; ChampionWeights epoch
    default 60s) builds a hotkey→weight mapping via _build_weights_mapping, then
    WeightsEmitter.emit_async maps hotkeys→UIDs and calls subtensor.set_weights.
    Only the leader (highest-stake validator) emits (metagraph_sync.is_leader).
  on_chain_call: set_weights
  tempo_or_interval: "epoch (README default 5 minutes; ChampionWeights epoch_seconds default 60)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the final emitted weights found; weights are
      rebuilt and normalized each epoch.

anti_gaming:
  - kind: code_inspection
    enforcement: rejection
    description: >-
      is_submission_champion_eligible rejects inline-source/subprocess
      submissions (non-None solver_path or repo_url starting 'source://'),
      requires an image_tag and an immutable image_id starting 'sha256:'.
  - kind: commit_reveal
    enforcement: rejection
    description: >-
      Signed provenance required by default (REQUIRE_SIGNED_PROVENANCE and
      REQUIRE_ASYMMETRIC_PROVENANCE default True). verify_signed_provenance
      checks the submission's provenance against allowed signers / expected
      image_id; failure makes the submission not champion-eligible.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Consensus proposals must carry a valid EIP-191 proposer_signature from a
      registered validator (verify_proposer_signature); followers independently
      re-simulate plans (FOLLOWER_PROPOSAL_RESIMULATE default 1) and re-score
      via JS rather than trusting the leader's reported score.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Leader-based OrderBook: only the highest-stake validator maintains the
      OrderBook and emits weights (metagraph_sync.is_leader); consensus requires
      a quorum (QUORUM_BPS, default 8000).

sub_competitions:
  structure: single
  stages: []
  count: null
  notes: >-
    Single champion competition: submissions ranked by benchmark_score; the top
    eligible submission becomes the champion engine run across all validators.

per_miner_state:
  tracked: true
  state_kinds: [status_enum, cumulative_score]
  status_values: [SCORED, ADOPTED]
  reset_policy: >-
    StateStore persists watermarks, last scores and last emitted block per
    validator; recoverable across restarts via JSON snapshot + .backup.
  notes: >-
    Submissions carry a status (only SCORED/ADOPTED are champion-eligible) and a
    benchmark_score; champion submission tracked with submission_id, image_id,
    hotkey, activated_round_id/epoch. The active champion can be re-benchmarked
    (_refresh_incumbent_score) when scenarios change.

