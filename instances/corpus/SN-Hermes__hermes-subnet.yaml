schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  The documented dual-scoring mechanism (synthetic fact-score x latency weight, plus
  organic workload score, smoothed via overall EMA) is fully implemented in code. However the
  live weight-setting path has several burn fallbacks: a remote-config burn_ratio (default 0,
  but can be raised to 1.0 for full burn), an all-zero-scores burn to burn_uid, and a guard that
  burns to burn_uid after 5 consecutive unchanged rounds. Whether the subnet currently scores or
  burns depends on the runtime meta-config, which is not in the repo.

subnet:
  name: "SubQuery Hermes Subnet"
  owner_repo: "SN-Hermes__hermes-subnet"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners run a decentralized GraphQL query / blockchain-data-indexing agent. A validator poses
    synthetic numerical questions about project schemas (counts, sums, averages) and also forwards
    organic user requests; the miner returns a numerical answer. Rewards combine factual accuracy
    of the answer against a validator-generated ground truth, scaled by response latency, plus an
    organic-workload quality/quantity term.
  submission_format: [api_response]

scoring_signals:
  - name: factual_accuracy_score
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      "Fact score" produced by a strict fact-checking LLM prompt comparing the miner response to
      the validator's ground truth, on a 0-10 scale; clamped to max 10.0 in code. Multiplicative
      with the latency weight (zip_scores = fact_score * elapse_weight), so weight is not additive.
  - name: latency_weight
    metric_kind: latency
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Quadratic weight w = 1 / (1 + elapsed_time/ground_truth_cost)^2, in [0,1]. Returns 0 if the
      miner is not at least min_latency_improvement_ratio (default 0.2) faster than ground-truth
      cost. Multiplies the fact score (gating/multiplicative, not additive).
  - name: organic_workload_score
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: min_max
    notes: >-
      Per-miner organic score = min(0.5 * quality_ema + 0.5 * normalized_workload, 5). quality_ema
      is an EMA (alpha=0.7) over up to 20 sampled organic fact*latency scores; normalized_workload
      is min-max over miners of a 3-hour windowed completion count. Summed in as an extra row of the
      score matrix alongside synthetic project scores.

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      Validator generates the ground-truth numerical answer with its own GraphQL agent
      (generate_ground_truth), then a separate scoring LLM grades the miner response against it.
    source_identifier: "hermes/validator/challenge_manager.py:generate_ground_truth ; scorer_manager.cal_ground_truth_score"
    trust_model: oracle
    notes: >-
      Default models google/gemini-3-flash-preview for both synthetic generation and scoring;
      scoring LLM temperature 0. Project schemas pulled from SubQuery / IPFS.

aggregation:
  method: weighted_average
  composition: hybrid
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "burn_uid (env BURN_UID, default 0)"
    fraction: null
    dynamic: true
    notes: >-
      burn_ratio from remote meta-config (default 0). If burn_ratio >= 1.0 or all scores are zero,
      all weight goes to burn_uid (=1.0). For 0 < burn_ratio < 1.0, burn_weight =
      scores_sum * burn_ratio / (1 - burn_ratio) is assigned to burn_uid. Also burns to burn_uid
      after 5 consecutive unchanged rounds.
  notes: >-
    Per-signal: fact_score * latency_weight is multiplicative; project scores are summed across
    projects (matrix sum axis=0); workload score is summed in as an extra row; final per-miner
    score is then EMA-smoothed (overall EMA alpha default 0.5). On-chain normalization via
    bt.utils.weight_utils.process_weights_for_netuid (sum-to-one).

weight_setting:
  cadence: rate_limited
  method: >-
    Final per-miner overall-EMA scores sorted by uid become raw weights; burn logic applied;
    process_weights_for_netuid normalizes; subtensor.set_weights submitted with version_key 10010.
    Also force-submits near epoch boundary (epoch-guard) within a buffer of blocks.
  on_chain_call: set_weights
  tempo_or_interval: "SET_WEIGHT_INTERVAL env, default 1800 seconds (30 min)"
  smoothing:
    kind: ema
    alpha: 0.5
    window: null
    notes: >-
      overall_ema = EMAUpdater(alpha=0.5); synthetic_ema also alpha=0.5. Alpha overridable via
      remote ema_score_alpha (default 0.5). Quality EMA inside workload uses alpha=0.7 (separate).
      Note docs/incentive.md states overall/synthetic alpha 0.7 but the code constructs both with
      alpha=0.5.

anti_gaming:
  - kind: deduplication
    enforcement: penalty
    description: >-
      Multi-coldkey penalty: miners sharing a coldkey beyond the first uid have zip_scores
      multiplied by multi_coldkey_penalty (remote default 1, i.e. no-op unless configured).
  - kind: rate_limit
    enforcement: rejection
    description: >-
      Duplicate-IP miners get DUPLICATED_IP error and are not scored; suspicious_uids (remote
      config) are zeroed in EMA and rejected during scoring.
  - kind: liveness_check
    enforcement: rejection
    description: >-
      Periodic CapacitySynapse availability check; only miners reporting role 'miner' with
      capacity are queried. Latency gate (min_latency_improvement_ratio) zeros slow responses.

sub_competitions:
  structure: per_task_type
  stages: []
  count: null
  notes: >-
    Per-project (cid_hash) synthetic challenges scored and summed across projects; an extra
    organic workload track is merged in. CODEX node_type uses weight_a=100/weight_b=0 question mix
    vs default 70/30. Projects have phases (e.g. WARMUP excluded from score matrix).

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    EMA scores reset to current value when a uid's hotkey changes; suspicious uids zeroed.
    Persisted state (score/workload) only loaded if within 3 days.
  notes: >-
    overall/synthetic EMA score dicts persisted to .data/{role}_score_state.pt; organic workload
    bucket counters persisted to .data/{role}_workload_state.pt; quality-sample deque (maxlen 20)
    per miner.

documentation:
