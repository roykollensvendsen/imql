schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Active two-pool incentive (run_baseline_incentive). The 75% "above baseline" pool is burned to
  UID 111 whenever no submitted model beats the dynamic baseline; the 25% below-baseline pool is
  distributed by reputation+score softmax. So in practice emissions partially burn to UID 111 when
  no model clears the baseline.

subnet:
  name: "OMEGA Labs Any-to-Any (SN21)"
  owner_repo: "omegalabsinc__omegalabs-anytoany-bittensor"
  netuid: 21
  implementation_lang: python

task:
  summary: >-
    Miners train and upload a voice-to-voice (any-to-any, currently speech) model to Hugging Face and
    commit its metadata on-chain. Validators pull the model, run it through a VoiceBench evaluation
    (CommonEval, WildVoice, IfEval, AdvBench) plus a Voice MOS quality eval inside a Docker container
    via a scoring API, and produce a combined score. Weights are set so that models above a dynamic
    performance baseline share the larger emissions pool.
  submission_format: [model_weights, commitment_hash]

scoring_signals:
  - name: voicebench_overall
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.7
    normalization: none
    notes: >-
      VoiceBench overall score (weighted average across CommonEval, WildVoice, IfEval, AdvBench
      datasets), LLM-judge based. Combined into the model score with weight VOICEBENCH_WEIGHT=0.7.
  - name: voice_mos
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.3
    normalization: none
    notes: >-
      Voice MOS (mean opinion score) audio-quality metric. Combined into the model score with weight
      VOICE_MOS_WEIGHT=0.3. metric_kind approximated as similarity/quality (no exact enum).

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      VoiceBench evaluation over fixed datasets (CommonEval, WildVoice, IfEval, AdvBench) scored via
      LLM-based judging; plus a Voice MOS quality model. A per-competition dynamic "baseline" score is
      fetched from the SN21 API to split miners into pools.
    source_identifier: "VoiceBench datasets (commoneval, wildvoice, ifeval, advbench); SN21 API baseline-score endpoint"
    trust_model: trusted
    notes: >-
      Scoring runs in a Docker container behind a scoring API; baseline and reputations are fetched
      from https://sn21-api.omegatron.ai.

aggregation:
  method: softmax
  composition: weighted_sum
  normalization: sum_to_one
  temperature: 0.01
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "111"
    fraction: 0.75
    dynamic: true
    notes: >-
      When no UID scores above the dynamic baseline, the entire 75% above-baseline pool is assigned to
      UID 111 (BURN_UID=111). Otherwise the 75% pool is distributed by score-softmax among up to
      PLAYERS_IN_ABOVE_BASELINE=3 models, and the 25% pool by a reputation/score blend among up to
      PLAYERS_IN_BELOW_BASELINE=10 models.
  notes: >-
    Two-pool system: above-baseline pool weight = 0.75 * softmax(score/temperature); below-baseline
    pool weight = 0.25 * softmax(0.7*reputation + 0.3*score). Final weights normalized to sum to 1.
    temperature=0.01 from constants. (A separate legacy _try_win_rate_competition path uses EMA
    alpha=0.9 and per-competition reward_percentage, but the live weight thread calls
    run_baseline_incentive which overwrites self.weights directly.)

weight_setting:
  cadence: rate_limited
  method: >-
    Weight thread loops every minute and sets weights only when the UTC minute is a multiple of 20
    (:00, :20, :40). It calls run_baseline_incentive() to compute the two-pool weights, then
    subtensor.set_weights().
  on_chain_call: set_weights
  tempo_or_interval: "every 20 minutes (UTC minute % 20 == 0)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      The active run_baseline_incentive path assigns self.weights = weights directly with no EMA. The
      adjust_for_vtrust interpolation in the weight setter is commented out. (constants.alpha=0.9 EMA
      exists only in the unused _try_win_rate_competition method.)

anti_gaming:
  - kind: deduplication
    enforcement: penalty
    description: >-
      Models with duplicate model hashes are detected; the UID with the newer block is penalized to
      score 0 (the older-block submission keeps the score). Implemented in _try_win_rate_competition
      and also in run_step duplicate-preference logic.
  - kind: challenge_period
    enforcement: rejection
    description: >-
      Models must be old enough before evaluation: model_age must exceed constants.MIN_AGE (currently
      MIN_AGE=0 seconds), enforced via is_model_old_enough, intended to prevent evaluating models that
      saw OMEGA data-subnet data.
  - kind: code_inspection
    enforcement: barrier
    description: >-
      Submitted Hugging Face repos are size-capped (MAX_HUGGING_FACE_BYTES = 18 GiB) and a percent
      improvement threshold (PERCENT_IMPROVEMENT=10) is referenced for beating the prior top model
      (the improvement gate is present but commented out at the call site).

sub_competitions:
  structure: single
  stages: []
  count: 1
  notes: >-
    COMPETITION_SCHEDULE contains a single competition (competition_id="v4", reward_percentage=1.0).
    run_baseline_incentive uses COMPETITION_SCHEDULE[0] only.

per_miner_state:
  tracked: true
  state_kinds: [reputation, registration_age]
  status_values: []
  reset_policy: ""
  notes: >-
    Per-hotkey reputation is fetched from the SN21 API (default 0.5 when missing) and used to weight
    the 25% below-baseline pool. Model block (upload age) is tracked and used for tie-breaking,
    duplicate penalties, and the min-age gate.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/README_VALIDATOR_LOGIC.md"
  completeness: medium

