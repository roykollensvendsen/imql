schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Validators compute and commit per-miner weights from a throughput-based curve
  (throughput^5, normalized, IP-region capped, with a subnet-owner boost) via
  timelocked commit-reveal. No burn/null-UID allocation is present in the
  weight-setting path. Note a separate per-UID ScoreManager (decay/recovery EMA
  on verified response time) and PoW-derived scores are maintained in state, but
  the weights actually committed on-chain are derived from compute_throughput_weights,
  not from that EMA score map.

subnet:
  name: "Subnet 2 — Proof of Inference (Inference Labs)"
  owner_repo: "inference-labs-inc__subnet-2"
  netuid: 2
  implementation_lang: rust

task:
  summary: >-
    Miners run custom AI models compiled into zero-knowledge circuits, receive
    input data from validators, perform verified inference and return the
    outputs together with a zk-proof of inference. Validators verify the proof
    and reward miners primarily on verified throughput (proving rate x capacity)
    and on response time, not on prediction correctness.
  submission_format: [api_response]

scoring_signals:
  - name: verified_throughput
    metric_kind: throughput
    direction: higher_is_better
    weight: 1.0
    normalization: min_max
    notes: >-
      Committed weights derive from throughput = rate * capacity raised to
      PERFORMANCE_CURVE_POWER (5.0), then L1-normalized across miners. Only
      counted once a miner has at least PERFORMANCE_MIN_SAMPLES (100) samples;
      otherwise raw weight is 0.
  - name: response_time_metric
    metric_kind: latency
    direction: lower_is_better
    weight: null
    normalization: min_max
    notes: >-
      ScoreManager.update_score normalizes response_time to [0, 0.99] via
      min/max, passes it through a normalized tangent curve, and moves a per-UID
      score toward effective_max = (1/n) * (1 - tangent(norm)). This EMA-like
      score is maintained in state but is NOT the source of the committed
      throughput weights; recorded as a distinct signal.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Validators verify the miner's returned zero-knowledge proof of inference
      (cryptographic integrity / source-model fingerprint) using the sn2-verify
      Expander backend; scoring is based on proof validity, proving throughput
      and response time rather than prediction accuracy.
    source_identifier: "sn2-verify (Expander backend)"
    trust_model: trusted
    notes: >-
      Output consistency between miner-reported outputs and the validator's run
      is also checked (OutputConsistency::Consistent/Diverged).

aggregation:
  method: proportional
  composition: gated
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No burn or null-UID allocation found in the weight-setting path. A
      subnet-owner UID boost exists instead: when an owner UID is present, all
      other miners' normalized weights are multiplied by 0.2 and the owner UID
      weight is set to 0.8.
  notes: >-
    raw_weight[uid] = (rate*cap)^5 for miners with >=100 samples, else 0; then
    divided by the sum (L1 normalize). Skiplisted and coldstart miners get 0.
    IP-region cap zeroes the lowest-weight miners in any region holding more
    than floor(n * 0.25) miners, then re-normalizes. Final weights are scaled
    to u16 (w * u16::MAX).

weight_setting:
  cadence: rate_limited
  method: >-
    Throughput weights computed in update_weights, then committed as timelocked
    (commit-reveal) weights. Skipped when blocks_since_last_update <
    WEIGHT_RATE_LIMIT_BLOCKS (100) or when all weights are zero.
  on_chain_call: commit_reveal
  tempo_or_interval: "rate-limited: >= 100 blocks since last update (Tempo default 360)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      The committed throughput weights are not temporally smoothed across
      rounds; they are recomputed from the current throughput snapshot each
      eligible cycle.

anti_gaming:
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      Weights are submitted via commit_timelocked_weights (timelocked drand
      commit-reveal, COMMIT_REVEAL_VERSION 4) so they cannot be copied before
      reveal.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      RSV verification: proof verification failures record a strike; reaching
      VERIFICATION_STRIKES_REQUIRED (3) within VERIFICATION_STRIKES_WINDOW_BLOCKS
      (7200) skiplists the hotkey for VERIFICATION_SKIPLIST_TEMPOS (5) tempos.
      Skiplisted and coldstart miners receive weight 0.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Coldstart: newly seen hotkeys are excluded (weight 0) for
      VERIFICATION_COLDSTART_BLOCKS (1800) blocks before they can earn weight.
  - kind: other
    kind_other: ip_region_concentration_cap
    enforcement: penalty
    enforcement_other: cap_and_redistribute
    description: >-
      IP-region cap: at most floor(n * IP_REGION_CAP_FRACTION=0.25) miners per
      /16-style IP region keep weight; excess (lowest-weight) miners in a
      saturated region are zeroed and weights re-normalized. Mitigates
      sybil/co-location concentration.

sub_competitions:
  structure: multi_mechanism
  stages: []
  count: null
  notes: >-
    Multiple parallel scoring paths feed validator state: verified-inference
    throughput scoring (committed), a response-time decay/recovery score, and
    PoW (proof-of-weights) derived scores via apply_pow_scores. Only the
    throughput path produces the committed on-chain weights.

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cumulative_score, cooldown, status_enum]
  status_values: [skiplisted, coldstart, active]
  reset_policy: >-
    Per-UID scores persisted to disk; sync_uids drops stale UIDs and inserts new
    ones at 0.0. Skiplist entries expire after VERIFICATION_SKIPLIST_TEMPOS
    tempos; strike/coldstart records pruned by last-seen retention windows.
  notes: >-
    ScoreManager holds a HashMap<uid, f64> updated by decay (0.4) / recovery
    (0.1). RsvManager tracks skiplist, strikes (sliding window), coldstart
    first-seen, last_seen, and per-tempo sample budget. PerformanceTracker
    tracks a windowed throughput snapshot (rate, capacity, count).

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/README.md"
  completeness: medium

