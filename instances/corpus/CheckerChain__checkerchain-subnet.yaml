schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Validator computes per-miner rewards from an LLM analysis of each review (sentiment,
  keyword verification, coherence, score accuracy), keeps the top 90% of miners, EMA-blends
  into self.scores, and emits L1-normalized weights via set_weights. No burn / no-op path
  observed in the weight-setting code.

subnet:
  name: "CheckerChain SN87 — AI-powered trustless crypto review platform (tRCM)"
  owner_repo: "CheckerChain__checkerchain-subnet"
  netuid: 87
  implementation_lang: python

task:
  summary: >-
    Miners run an LLM to predict a product's Trust Score (0-100) plus a short review,
    quality keywords, and a sentiment for products fetched from the CheckerChain dApp.
    Validators compare each prediction against the platform-provided ground-truth trustScore:
    predictions deviating more than 10% earn 0, otherwise an LLM analyzes the response and
    awards points for score accuracy, sentiment, keyword verification, and coherence.
  submission_format: [signals]

scoring_signals:
  - name: score_accuracy
    metric_kind: regression_error
    direction: higher_is_better
    weight: 40.0
    normalization: none
    notes: >-
      analysis_result["score_accuracy"] capped at 40 (accuracy_score = min(..., 40)).
      LLM rubric: 40 within 2%, 30 within 6%, 20 within 8%, 10 within 10%, 0 beyond 10%.
      A hard gate also returns 0.0 when deviation > 10% before the LLM is called.
  - name: sentiment_score
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 20.0
    normalization: none
    notes: >-
      sentiment_score = 20 if analysis_result["sentiment"] != "unknown" else 5.
      sentiment == "malicious" returns -math.inf (blacklist sentinel).
  - name: keyword_verification_score
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 5.0
    normalization: none
    notes: 'keyword_score = min(analysis_result["keyword_verification_score"], 5); LLM rubric 0-5.'
  - name: coherence_score
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 20.0
    normalization: none
    notes: 'coherence_score = min(analysis_result["coherence_score"], 20); LLM rubric 0-20.'

ground_truth_sources:
  - kind: real_engagement
    description: >-
      Product trustScore (0-100) produced by CheckerChain's tRCM consensus of human reviewers,
      fetched from the CheckerChain dApp / API and passed as `actual` to the reward function.
    source_identifier: "checkerchain.com / fetch_products()"
    trust_model: oracle
    notes: >-
      reviewed_product.trustScore is the authoritative target. When trustScore == 0 the validator
      short-circuits and pays a flat 100/len(responses) to every responder.

aggregation:
  method: weighted_average
  composition: hybrid
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: ""
  notes: >-
    Per-prediction perf_score = accuracy_score + sentiment_score + keyword_score + coherence_score
    (additive, each capped). Gating overlays: deviation>10% => 0.0; malicious => -inf (blacklist).
    After per-miner rewards, only the top 90% by reward are kept (keep_count = ceil(0.9*N)), the rest
    set to 0. Per-product rewards accumulate into rewards[idx] across reward_items. In set_weights the
    scores vector is L1-normalized (raw_weights = scores / ||scores||_1) before emission.

weight_setting:
  cadence: per_epoch
  method: >-
    update_scores() does EMA: scores = alpha*scattered_rewards + (1-alpha)*scores. set_weights()
    L1-normalizes scores, runs process_weights_for_netuid, converts to uint16 and calls
    subtensor.set_weights with version_key=spec_version. should_set_weights() fires when
    blocks-since-last-update > epoch_length and neuron is a validator.
  on_chain_call: set_weights
  tempo_or_interval: "epoch_length = 100 (12-second blocks); forward sleeps 25 min per cycle"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      config default neuron.moving_average_alpha = 0.1. update_to_last_scores() falls back to
      last_scores when there is nothing to reward this cycle.

anti_gaming:
  - kind: deduplication
    enforcement: rejection
    description: >-
      filter_duplicate_predictions: predictions matching to 3 decimal places (int(pred*1000)/1000)
      are grouped and only one randomly-chosen miner per identical value is kept.
  - kind: honeypot
    enforcement: elimination
    description: >-
      LLM sentiment == "malicious" (prompt injection / manipulation) returns -math.inf, and the
      miner is added to the blacklist (add_or_update_blacklisted_miner). Blacklisted hotkeys are
      excluded from future uid selection in get_filtered_uids.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Hard deviation gate: get_deviation_percentage(prediction, actual) > 10 returns reward 0.0
      before any LLM analysis.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      get_filtered_uids caps miners per coldkey at max_per_key=15, limiting sybil concentration
      per coldkey.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      get_stake_score maps stake in [500, 2000] to [0,1] (1.0 above 2000). NOTE: defined in
      reward.py but not observed wired into the final reward() return; recorded as present-but-unused.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum]
  status_values: [blacklisted]
  reset_policy: >-
    scores zeroed for a uid when its hotkey is replaced in the metagraph (resync_metagraph);
    blacklist is a persistent DB table of malicious miners.
  notes: >-
    self.scores is an EMA-accumulated per-uid score vector persisted to state.npz (load_state/
    save_state); last_scores enables fallback. Blacklisted miners stored in DB and filtered out.

