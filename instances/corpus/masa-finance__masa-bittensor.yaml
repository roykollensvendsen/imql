schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Active volume-based scoring: validators query miners for tweets, validate them,
  accumulate per-miner tweet volume across a rolling window, score via a kurtosis
  (normal-CDF z-score) curve, EMA the scores, and set_weights on chain. No burn
  logic present in source.

subnet:
  name: "Masa Subnet 42 (Real-Time Data Scraping)"
  owner_repo: "masa-finance__masa-bittensor"
  netuid: 42
  implementation_lang: python

task:
  summary: >-
    Miners extract recent/trending tweets from X (Twitter) using the Masa SDK in
    response to validator-issued keyword queries. Validators check each returned
    batch for structural validity, ID validity, deduplication, query-keyword
    match, recency (timestamp within ~yesterday), and existence via masa-ai's
    TweetValidator. Each miner's reward is driven by its accumulated volume of
    valid, unique tweets over a rolling window of tempos.
  submission_format: [api_response]

scoring_signals:
  - name: valid_tweet_volume
    metric_kind: volume
    direction: higher_is_better
    weight: 1.0
    normalization: zscore
    notes: >-
      Accumulated count of valid, unique tweets per miner over the volume_window
      of tempos. Reward = stats.norm.cdf((volume - mean)/std_dev) (kurtosis-based
      score). Only volume that passes all validation checks is counted.

ground_truth_sources:
  - kind: organic_traffic
    description: >-
      Trending Twitter queries fetched via masa_ai TrendingQueries (top 10), with
      fallback keywords ["crypto","btc","eth"]; tweets are validated for existence
      against the live Twitter/X API through masa-ai's TweetValidator.
    source_identifier: "masa_ai.tools.validator (TrendingQueries, TweetValidator)"
    trust_model: oracle
    notes: >-
      Tweet existence/authenticity is checked against the real Twitter API (404
      handling); queries derive from real-time trending topics.

aggregation:
  method: exponential_decay_ema
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn logic found in source."
  notes: >-
    Per-round rewards are the normal-CDF z-score of each miner's windowed volume
    (single miner => reward 1). These are EMA'd into self.scores
    (update_scores), then passed raw to process_weights_for_netuid which applies
    max-weight normalization and sum-to-one normalization before emit. With one
    miner the reward list is [1].

weight_setting:
  cadence: rate_limited
  method: >-
    self.scores (EMA of per-round rewards) -> process_weights_for_netuid
    (max-weight + sum-to-one normalization) -> convert_weights_and_uids_for_emit
    -> subtensor.set_weights. Gated by should_set_weights: requires >=150 scored
    UIDs on mainnet and >100 blocks since last update (except first run).
  on_chain_call: set_weights
  tempo_or_interval: "epoch_length default 100 blocks; set_weights gated on >100 blocks since last_update"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      update_scores: scores[mask] = alpha*reward + (1-alpha)*scores[mask], alpha =
      config.neuron.moving_average_alpha (default 0.1). Volume itself is summed
      over a rolling window of volume_window=6 tempos before scoring.

anti_gaming:
  - kind: deduplication
    enforcement: rejection
    description: >-
      Within-batch duplicate detection (unique tweet IDs must equal batch size)
      and cross-history dedup via tweets_by_uid: previously seen tweet IDs are
      subtracted so only new unique tweets add to volume.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      strict_tweet_id_validation (pure ASCII digits, no leading zeros, no
      zero-width chars), query-keyword match across tweet fields, and timestamp
      recency (>= yesterday) checks; any failure invalidates the whole batch.
  - kind: liveness_check
    enforcement: rejection
    description: >-
      masa-ai TweetValidator validates 3 randomly sampled tweets against the live
      Twitter API (requires >=2/3 successful validations); 404s count as failures.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Miners selected for scoring are those with metagraph.validator_trust == 0;
      validators require minimum stake / vpermit to be queried.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    On hotkey replacement (resync_metagraph), the miner's score is zeroed, its
    recent windowed volumes set to 0, and tweets_by_uid reset to empty set.
  notes: >-
    Per-miner persistent state: self.scores (EMA), self.volumes (rolling window of
    per-tempo volume), self.tweets_by_uid (set of seen tweet IDs, capped 100,000).
    State saved to state.pt; scores can be rebuilt from scores.log.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs: ["README.md", "docs/RELEASE_NOTES.md"]
  completeness: medium

