schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Documented scoring (README: Consistency/Memory/Creativity/Goal-Driven NPC quality)
  is not implemented. The live validator scores miners purely on throughput/latency,
  status codes, and a trivial keyword check, then in set_weights() OVERWRITES any
  composite final_score < 0.8 or > 1.0 with random.uniform(0.8, 1.0) — so the on-chain
  weights are largely randomized rather than quality-derived. A burn-to-owner fallback
  routes weight to the subnet owner when all miner weights fall below threshold.

subnet:
  name: "SoulX - The Sentient NPC Protocol"
  owner_repo: "SentiVerse-AI__soulx"
  netuid: 115
  implementation_lang: python

task:
  summary: >-
    Miners run an LLM (Qwen-based) that, given a validator-issued "micro-quest" (scene
    description, character card, player intent), generates in-character NPC dialogue.
    README claims responses are judged on Consistency, Memory, Creativity and Goal-Driven
    behavior, but the implemented validator only scores API success, response time,
    work/throughput throughput metrics and a content-length / greeting-keyword heuristic.
  submission_format: [api_response]

scoring_signals:
  - name: api_success_and_status
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Gate/multiplier: non-success or status_code != 200 yields base_score 0.0;
      status_code multipliers applied in _apply_quality_adjustments (400->0.3, 429->0.2,
      500->0.1, other->0.5, 200->1.0).
  - name: response_time
    metric_kind: latency
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      response_time > 30s caps base_score at 0.1; per-task-type bonuses for faster
      responses (e.g. image <10s -> +0.2). Also feeds a 1/(1+response_time) factor in
      core/scoring.py.
  - name: throughput_metric
    metric_kind: throughput
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      metric = volume / response_time (work units per second) and stream_metric =
      num_tokens / stream_time. Bonuses applied at thresholds (e.g. metric>100 -> +0.2)
      and a performance_factor = min(metric/100, 1.0) multiplier.
  - name: content_heuristic
    metric_kind: other
    metric_kind_other: response_length_and_greeting_keyword
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      For chat tasks: +0.2 if response content length > 10 chars; +0.1 if content
      contains "hello" or "hi". No semantic/quality evaluation of NPC dialogue.
  - name: quality_score_composite
    metric_kind: composite
    direction: higher_is_better
    weight: 0.7
    normalization: none
    notes: >-
      Per-cycle mean of per-result quality_scores. Combined in set_weights as
      stake_weight + current_quality_score*0.7 + historical_score*0.1.

ground_truth_sources:
  - kind: organic_traffic
    description: >-
      Validators distribute tasks (micro-quests) to miners via a task queue / config
      server and score the returned API responses. No deterministic reference output or
      external oracle is used; scoring is heuristic on the response envelope.
    source_identifier: ""
    trust_model: unknown
    notes: >-
      README describes validators as "Game Masters" issuing quests; implemented scoring
      does not compare against any ground-truth dialogue.

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: 0.001
  burn_allocation:
    enabled: true
    address_or_uid: subnet_owner_uid
    fraction: null
    dynamic: true
    notes: >-
      When no miner has positive weight (or all weights fall below MIN_WEIGHT_THRESHOLD
      0.001), set_weights routes weight to the subnet owner uid using
      config.owner_default_score (OWNER_DEFAULT_SCORE = 0.2).
  notes: >-
    Per-miner final_score = stake/total_stake*0.2 + current_quality_score*0.7 +
    historical_score*0.1. CRITICAL: if final_score < FINAL_MIN_SCORE (0.8) or > 1.0 it is
    replaced by random.uniform(0.8, 1.0). Weights below MIN_WEIGHT_THRESHOLD (0.001) zeroed,
    then normalized to sum to one.

weight_setting:
  cadence: per_epoch
  method: >-
    set_weights() called when blocks_since_last_update >= weights_interval
    (tempo * 1/2). Builds per-miner composite scores, applies random replacement for
    out-of-range scores, zeroes sub-threshold weights, normalizes, then calls
    subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "tempo * 1/2"
  smoothing:
    kind: ema
    alpha: 0.3
    window: null
    notes: >-
      historical_scores updated in ScoringResultsManager._start_new_cycle:
      historical = alpha*current + (1-alpha)*historical with alpha=0.3. Validator also
      sets self.alpha = 0.95 used as a fallback historical_score default in set_weights.

anti_gaming:
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      stake_weight = (stake/total_stake)*0.2 contributes to the composite; minimum stake
      gates exist (MIN_VALIDATOR_STAKE_DTAO=1000, MIN_MINER_STAKE_DTAO=50).
  - kind: liveness_check
    enforcement: rejection
    description: >-
      Nodes with axon ip '0.0.0.0' are skipped; optional CHECK_NODE_ACTIVE skips inactive
      neurons.

sub_competitions:
  structure: per_task_type
  stages: []
  count: null
  notes: >-
    Scoring branches by task prefix: chat-, text-to-image, image-to-image, avatar, and a
    generic fallback, each with its own response-time/throughput thresholds.

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cumulative_score]
  status_values: []
  reset_policy: >-
    Per-result scoring results kept per hotkey; _start_new_cycle prunes results older than
    24h and folds them into an EMA historical_score. clear_current_cycle_scores wipes both
    current and historical dicts after a successful set_weights.
  notes: >-
    ScoringResultsManager holds scoring_results (hotkey -> [ScoringResult]) and
    historical_scores (hotkey -> float). core/scoring.py ScoringSystem keeps a separate
    performance_history capped at 1000 entries with exponential-weighted averaging.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - README.md
    - docs/running_validator.md
    - docs/running_miner.md
  completeness: medium

