schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Validator computes a real per-miner final_score (quality 0.65 + speed 0.35) and sets
  on-chain weights as final_score ** (3 * ALPHA_SCORING_MULTIPLICATOR), normalized to sum
  to 1. No burn / zeroing logic was found in set_weights.py; if all scores are zero the
  validator distributes weight evenly across nodes.

subnet:
  name: "Score Vision (SN44 / GSR)"
  owner_repo: "score-technologies__score-vision"
  netuid: 44
  implementation_lang: python

task:
  summary: >-
    Miners perform Game State Recognition on football video: per-frame object detection and
    tracking (players, goalkeepers, referees, ball) plus pitch keypoint detection. Validators
    download a challenge video, select frames, and score the miner's returned detections/
    keypoints. Reward combines a quality score (CLIP-based bbox confidence + homography/keypoint
    consistency) with a processing-time-based speed score.
  submission_format: [signals]

scoring_signals:
  - name: bbox_score
    metric_kind: vlm_judgment
    direction: higher_is_better
    weight: 0.5
    normalization: none
    notes: >-
      Average CLIP-based bounding-box confidence score over selected frames
      (evaluate_bboxes / evaluate_frame in bbox_clip.py). Forms half of quality_score.
      Also acts as a gate: bbox_score <= 0.2 forces speed_score to 0.
  - name: keypoints_final_score
    metric_kind: composite
    direction: higher_is_better
    weight: 0.5
    normalization: none
    notes: >-
      Keypoint/homography quality score (calculate_final_score_keypoints), divided by 100.
      Weighted blend of keypoint_score 0.25, mean_on_line 0.4, mean_inside 0.2,
      keypoint_stability 0.05, player_final_score 0.1, then multiplied by
      kpts_stability_weighted_avg and (mean_scale+scale_valid)/2. Returns 0 if mean_on_line<=0.2.
      Forms half of quality_score.
  - name: speed_score
    metric_kind: latency
    direction: higher_is_better
    weight: 0.35
    normalization: min_max
    notes: >-
      Exponential decay of normalized processing_time: exp(-5 * normalized_time) where
      normalized_time = (processing_time - min_time)/(MAX_PROCESSING_TIME - min_time).
      Zeroed if bbox_score<=0.2 or processing_time>=MAX_PROCESSING_TIME (15.0s).

ground_truth_sources:
  - kind: reference_model
    description: >-
      CLIP (openai/clip-vit-base-patch32) used for semantic verification of bounding-box class
      labels, plus geometric/homography consistency checks (RANSAC homography to a fixed
      SoccerPitchConfiguration) for keypoints. No external labeled ground-truth dataset; quality
      is assessed via model + geometric plausibility checks.
    source_identifier: "openai/clip-vit-base-patch32"
    trust_model: oracle
    notes: >-
      Keypoint scoring is reference-free (self-consistency: reprojection error, stability,
      on-line/inside fractions). bbox scoring uses CLIP as the judge model.

aggregation:
  method: proportional
  composition: hybrid
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No burn found. If total weight is 0 (no positive scores), weights are distributed evenly
      across all nodes rather than burned.
  notes: >-
    quality_score = bbox_score*0.5 + keypoints_final_score*0.5;
    final_score = quality_score*0.65 + speed_score*0.35. On-chain weight per node =
    final_score ** (3 * ALPHA_SCORING_MULTIPLICATOR) with ALPHA_SCORING_MULTIPLICATOR=4
    (exponent 12), then normalized so weights sum to 1.0. Composition is hybrid: quality
    signals are additive among themselves but speed gating/zeroing is multiplicative/gated.

weight_setting:
  cadence: rate_limited
  method: >-
    set_weights() reads per-miner final_score from the DB (last 24h), raises each to the
    power (3*ALPHA_SCORING_MULTIPLICATOR), normalizes to sum 1.0, and calls
    fiber weights.set_node_weights on chain with wait_for_inclusion/finalization.
  on_chain_call: set_weights
  tempo_or_interval: "WEIGHTS_INTERVAL = 30 minutes"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the final reward in code. Scores are pulled from the DB over the
      last 24 hours; raising to a high power (exponent 12) sharpens the distribution toward top
      miners.

anti_gaming:
  - kind: liveness_check
    enforcement: rejection
    description: >-
      Validators select random frames (select_random_frames) from a downloaded challenge video
      to validate against, and enforce MAX_PROCESSING_TIME (15.0s); responses with bbox_score<=0.2
      or processing_time>=MAX_PROCESSING_TIME get speed_score 0.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Geometric plausibility / self-consistency checks penalize implausible outputs: RANSAC
      homography requiring >=4 valid keypoints, player movement plausibility (max_speed_pixels),
      scene-transition detection, keypoint stability, and scoreboard-zone / min-size bbox filtering.
      keypoints_final_score returns 0 when mean_on_line<=0.2.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cumulative_score]
  status_values: []
  reset_policy: >-
    set_weights uses get_miner_scores_with_node_id over the last 24 hours of stored task scores;
    miners with no scores default to final_score 0.0.
  notes: >-
    Per-response scores (quality_score, speed_score, final_score, processing_time) are stored in
    the validator DB and aggregated per node for weight setting.

