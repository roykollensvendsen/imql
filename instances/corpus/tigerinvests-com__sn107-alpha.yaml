schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  No burn logic present. The validator computes per-miner EMA scores and sets
  softmax-normalized weights on-chain every epoch via subtensor.set_weights.
  Scoring depends on an external private validation API (CRYPTO_HOLDINGS_URL),
  so live behavior cannot be confirmed from the repo alone, but the code path
  is wired and active.

subnet:
  name: "ALPHA — Company Intelligence / Verifiable On-Chain Treasury Data"
  owner_repo: "tigerinvests-com__sn107-alpha"
  netuid: 107
  implementation_lang: python

task:
  summary: >-
    A miner ("agent") answers company-intelligence queries: given a ticker and an
    analysis_type (crypto, financial, sentiment, or news), it returns an
    IntelligenceResponse with company data (e.g. crypto holdings, market cap, share
    price, sentiment, news). Validators score each response against JSON-schema
    structure and against an external authoritative API, plus response time and
    confidence alignment.
  submission_format: [api_response]

scoring_signals:
  - name: structure_validation
    metric_kind: composite
    direction: higher_is_better
    weight: 0.3
    normalization: none
    notes: >-
      Tier 1: JSON-schema structural/completeness validation of the response.
      Contributes with structure_weight (default 0.3). Acts as a gate: if
      structure_score < 0.3 the response is rejected with that score.
  - name: api_validation
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.7
    normalization: none
    notes: >-
      Tier 2: field-by-field accuracy of response data vs external API
      (CRYPTO_HOLDINGS_URL). Contributes with api_validation_weight (default 0.7).
      Per analysis_type, enhanced adjustments are applied (crypto/financial/
      sentiment/news field weightings and quality bonuses). Gate: if api_score < 0.5
      the final score is min(structure_score, api_score).
  - name: response_time
    metric_kind: latency
    direction: higher_is_better
    weight: 0.15
    normalization: none
    notes: >-
      Piecewise time score: 1.0 if <=2s, decreasing in bands up to >20s -> 0.05.
      Added into final_score with a literal 0.15 coefficient.
  - name: confidence_alignment
    metric_kind: composite
    direction: higher_is_better
    weight: 0.15
    normalization: none
    notes: >-
      Scores how well the miner's reported confidenceScore aligns with success
      (e.g. success & confidence>0.6 -> 1.0). Added into final_score with a literal
      0.15 coefficient.

ground_truth_sources:
  - kind: market_data
    description: >-
      External authoritative validation API for company / crypto-holdings data,
      queried per (ticker, analysis_type, miner_data). Returns valid flag,
      per-field scores, overall score, freshness/completeness scores.
    source_identifier: "CRYPTO_HOLDINGS_URL (env, default https://api.example.com)"
    trust_model: oracle
    notes: >-
      Endpoint and API key are supplied via environment; not in repo. Tier-2
      scoring fully depends on this external client (ExternalAPIClient.validate_company_data).

aggregation:
  method: softmax
  composition: weighted_sum
  normalization: softmax
  temperature: 2.0
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn logic in the repo."
  notes: >-
    Per-miner EMA score (alpha=0.1) is the input. calculate_weights places each
    miner's EMA score into a vector, then applies softmax with temperature=2.0:
    exp(weights/temperature)/sum(...). If all scores are 0, weights are uniform
    (1/N). The per-response final_score itself is a weighted sum of the four
    signals (structure*0.3 + api*0.7 + time*0.15 + confidence*0.15), gated by the
    structure<0.3 and api<0.5 short-circuits.

weight_setting:
  cadence: per_epoch
  method: >-
    Each loop iteration: forward() gathers validation results, update_scores
    applies the EMA, calculate_weights softmax-normalizes, then
    subtensor.set_weights(uids, weights, wait_for_inclusion=True).
  on_chain_call: set_weights
  tempo_or_interval: "epoch_length * 12 seconds (default epoch_length=100)"
  smoothing:
    kind: ema
    alpha: 0.1
    window: null
    notes: >-
      miner_scores[uid] = (1 - alpha)*current + alpha*new_score, with
      moving_average_alpha default 0.1. Per-uid score_history capped at 1000 entries.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Tier-1 JSON-schema structure validation; structure_score < 0.3 short-circuits
      to that score (response effectively rejected before API validation).
  - kind: deduplication
    enforcement: barrier
    description: >-
      get_available_miners deduplicates miners by IP, keeping the lowest port, and
      requires axon.ip != 0.0.0.0, port > 0, and stake > 0 to be queried/weighted.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Only miners with total_stake > 0 are considered available for querying and
      weight setting.

sub_competitions:
  structure: per_task_type
  stages: []
  count: 4
  notes: >-
    Four analysis_type values (crypto, financial, sentiment, news) drive
    type-specific API score adjustments in _calculate_enhanced_api_score, but all
    feed a single shared per-miner score/weight vector — not separate weight pools.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    In-memory only; score_history per uid trimmed to last 1000 entries. No on-disk
    persistence of scores (state file saves step/stats only).
  notes: >-
    IncentiveMechanism keeps miner_scores (EMA), score_history (per-response
    records: score, timestamp, response_time, success, confidence), and a capped
    weights_history (last 100).

