schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  The validator does not compute scores locally: it fetches orchestrator-computed
  global miner scores via the orchestrator API (/validator/global_miner_scores) and
  copies them onto the chain. The actual scoring/spot-check logic is dynamically
  fetched as zipped "validator code" from the orchestrator at runtime, so it is not
  present in this repo. A dynamic burn factor is applied (subnet burn_factor =
  1 - sum(all miner weights)); when no global weights are received the validator
  falls back to copying stake-weighted weights from the chain.

subnet:
  name: "IOTA (Incentivized Orchestrated Training Architecture)"
  owner_repo: "macrocosm-os__iota"
  netuid: 9
  implementation_lang: python

task:
  summary: >-
    Miners are nodes in a data- and pipeline-parallel LLM pretraining pipeline.
    The orchestrator distributes model layers across heterogeneous miners and
    streams activations between them; miners compete to process as many activations
    as possible during the training stage, periodically upload local weights, and
    merge activations via a variant of Butterfly All-Reduce. Validators spot-check
    miners to ensure work was actually performed.
  submission_format: [compute_service]

scoring_signals:
  - name: miner_raw_score
    metric_kind: throughput
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      raw_score is documented as "sum(scores within time window)" per miner; the
      per-activation scoring that produces these is computed by the orchestrator
      (off-repo). total_score = raw_score * multiplier. Concrete scoring formula and
      the multiplier value are not present in this repository.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Training data is the FineWeb dataset; pretraining loss/work is the underlying
      training signal. Activations carry BLAKE3 hash chains and a fraction are
      spot-checked against S3-verifiable uploads.
    source_identifier: "HuggingFaceFW/fineweb"
    trust_model: trusted
    notes: >-
      DATASET_NAME = "HuggingFaceFW/fineweb" in shared/common settings. Spot-check
      verification logic runs on the orchestrator.

aggregation:
  method: proportional
  composition: weighted_sum
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "209"
    fraction: null
    dynamic: true
    notes: >-
      Subnet burn_factor is documented as "1 - sum(all miner weights)" (a dynamic
      residual). Per-run burn_factor also exists. Burn is realized as weight assigned
      to OWNER_UID (209). FALLBACK_BURN_FACTOR = 0.8 is used only as a fallback
      constant; the active per-run/subnet burn fraction is computed by the
      orchestrator and not a fixed literal in this repo.
  notes: >-
    Final per-miner weight is documented as run_weight * (1 - run's burn rate) *
    run's incentive_perc; run_weight = total_score / sum of total_scores for the run.
    The validator L1-normalizes the received scores (torch normalize p=1) before
    process_weights_for_netuid.

weight_setting:
  cadence: rate_limited
  method: >-
    weight_setting_step fetches global miner scores from the orchestrator, sums
    per-uid weights into a dict, L1-normalizes to a tensor, runs
    bt.utils.weight_utils.process_weights_for_netuid, then calls
    subtensor.set_weights. If no global weights are returned it falls back to
    copy_weights_from_chain (stake-weighted average of on-chain validator weights).
  on_chain_call: set_weights
  tempo_or_interval: "1260 seconds (60*21)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No local temporal smoothing of the final reward in this repo; the validator
      copies orchestrator-provided scores each interval. WEIGHT_SUBMIT_INTERVAL =
      60*21 seconds.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Validators spot-check miners by re-validating activations/weights against
      thresholds: COSINE_SIMILARITY_THRESHOLD = 0.9, ACTIVATION_MAGNITUDE_THRESHOLD =
      0.8, OPTIMIZER_SIMILARITY_THRESHOLD = 0.8 (validator settings).
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Every activation carries a BLAKE3 hash chain; producer/consumer hashes are
      submitted to the orchestrator for auditability. A configurable fraction of P2P
      activations (SPOT_CHECK_RATE, default 0.01) are randomly uploaded to S3 for
      verification (documented in docs/p2p_design_doc.md; constant not present in
      this repo's Python).
  - kind: hardware_validation
    enforcement: rejection
    description: >-
      Miners answer attestation challenges (registration / weights / merged_partitions)
      with signed/enclave attestation payloads, supporting delay-suspect runtime checks.

sub_competitions:
  structure: multi_mechanism
  stages: []
  count: null
  notes: >-
    Incentive is allocated across multiple concurrent training runs: each
    RunIncentiveAllocation has an incentive_weight (fraction of incentive for the run)
    and a per-run burn_factor; miner scores are weighted within their assigned run.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum]
  status_values: []
  reset_policy: ""
  notes: >-
    Per-miner MinerScore carries raw_score, total_score, run_weight, weight and an
    assigned run_id; miners progress through status states (e.g. uploading_weights).
    Detailed status enum and reset policy are managed orchestrator-side.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/p2p_design_doc.md"
    - "docs/VALIDATOR_README.md"
    - "https://arxiv.org/abs/2507.17766"
  completeness: medium

