schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Miner emissions are split proportionally to public demand via off-chain
  auctions (tower API). Any emission not allocated to winning auction bids is
  burned across three randomized burn keys (uids 28, 15, 243). Per miner.md:
  "The remainder of emissions not allocated to auctions is burned."

subnet:
  name: "Targon"
  owner_repo: "manifold-inc__targon"
  netuid: 4
  implementation_lang: go

task:
  summary: >-
    Miners run confidential-compute (CC/PPCIE) GPU and CPU nodes (NVIDIA Hopper/Blackwell
    via Intel TDX, AMD EPYC SEV-SNP) that serve secure attestable inference hardware. Each
    miner reports node IPs and a per-GPU-hour bid price. Validators collect remote
    attestations from each node and verify them via the tower attestation service; verified
    nodes enter demand-driven auctions keyed by hardware type. Emission is paid as the
    percentage of the USD emission pool a miner's winning bids represent; unallocated
    emission is burned.
  submission_format: [compute_service]

scoring_signals:
  - name: attestation_validity
    metric_kind: other
    metric_kind_other: confidential_compute_remote_attestation_pass
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Gating signal. A node only enters the auction if its remote attestation verifies via
      the tower /verify-attestation endpoint (attestResponse.Valid) and the nonce matches;
      duplicate CVM node ids are rejected. Nodes below the auction's min_cluster_size GPU
      count are excluded.
  - name: auction_bid_payout
    metric_kind: other
    metric_kind_other: demand_driven_auction_emission_share
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Per verified node, per-miner USD payout = min(pool/nodes, MaxPrice) where pool =
      TargetPrice * TargetCards for that auction. Miner incentive (emission share) =
      (perMiner * 1.2 * count) / (EmissionPool * 100). This share is multiplied by U16MAX
      (65535) and floored to produce the on-chain weight.

ground_truth_sources:
  - kind: hardware_probe
    description: >-
      Remote attestation of confidential-compute GPU/CPU hardware. Validator requests an
      attestation quote from each miner node (/api/v1/evidence) and verifies it against the
      tower attestation service (/api/v1/verify-attestation). GPU/switch remote attestation
      results carried in NVCCResponse.
    source_identifier: "tower.targon.com (verify-attestation, auctions APIs)"
    trust_model: oracle
    notes: >-
      The tower service is an off-chain trusted oracle: it returns the auction definitions
      (target cards/price, max price, min cluster size), the burn distribution, the tao
      price, and the attestation verdict. Auction allocation reflects "public demand".

aggregation:
  method: proportional
  composition: gated
  normalization: none
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "uids 28, 15, 243"
    fraction: null
    dynamic: true
    notes: >-
      forBurn = max(U16MAX - sumScores, 0); distributed across burn keys by
      c.BurnDistribution (uid -> percent, supplied by the tower auction API). Remaining
      rounding remainder added to the last burn key. burnKeys = [28, 15, 243], "randomized
      across 3 keys for WC combat".
  notes: >-
    Per-uid payout percentages are summed across auctions, scaled by U16MAX and floored.
    No on-chain normalization is done by the validator ("we are sending weights via the
    bittensor sdk which is going to normalize anyways"). The 1.2 multiplier and the *100 /
    EmissionPool divisor are literal in getWeights; the emission pool itself is computed as
    (alphaOut/1e9)*0.41*360*taoPrice*movingPrice.

weight_setting:
  cadence: per_epoch
  method: >-
    On the block where getBlocksFrom(h)==1 within each tempo interval (tempo=360), the
    validator computes auction payouts via getWeights and POSTs uids/weights to the local
    weights-api, which calls subtensor.set_weights with wait_for_finalization. Skipped if
    no miner nodes or within 180 blocks of validator startup.
  on_chain_call: set_weights
  tempo_or_interval: "360 blocks"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the final weights in the validator; scores are recomputed each
      interval from current verified nodes and auction state (resetState clears state after
      each set).

anti_gaming:
  - kind: hardware_validation
    enforcement: rejection
    description: >-
      Remote confidential-compute attestation is mandatory; a node's hardware must verify via
      the tower service (attestResponse.Valid) and the attestation nonce must match. Failed
      or invalid attestation excludes the node from the auction.
  - kind: deduplication
    enforcement: rejection
    description: >-
      Duplicate CVM node ids are rejected: if c.NodeIds[userData.CVMID] is already seen,
      the node errors with "duplicate node id found" and is not counted, preventing one
      physical node from being claimed by multiple miners/IPs.
  - kind: other
    kind_other: minimum_cluster_size_requirement
    enforcement: rejection
    description: >-
      For auctions with MinClusterSize != 0, a node must report at least that many GPU cards
      or it is marked with an error ("Node reporting N cards, M required") and excluded.

sub_competitions:
  structure: per_task_type
  stages: []
  count: null
  notes: >-
    Multiple independent auctions keyed by hardware type (e.g. SEV-CPU-AMD-EPYC-V4,
    TDX-NVCC-NVIDIA-H200), each with its own target_cards, target_price, max_price and
    min_cluster_size. A node is routed to its auction by userData.AuctionName. Auction set
    is supplied dynamically by the tower API, so the count is not fixed in source.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: >-
    State is rebuilt each interval: resetState(c) runs after every setWeights; VerifiedNodes,
    MinerErrors, EmissionPool and auction data are recollected per interval.
  notes: >-
    No persistent per-miner ledger/reputation affecting scoring; verified-node and error maps
    are per-interval working state, not accumulated history.

