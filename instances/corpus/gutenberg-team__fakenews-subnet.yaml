      line_ref: "110-119"
      quote: "keep_idx = [i for i, p in enumerate(recent_preds) if p != -1] ... predictions = np.round(pred_probs) ... accuracy = accuracy_score(labels, predictions) * window_k"
    - claim_field: "/aggregation/method"
      source_path: "fakenews/validator/reward.py"
      line_ref: "152-158"
      quote: "return cls._LONG_ALPHA * metrics_long[\"accuracy\"] + (1 - cls._LONG_ALPHA) * metrics_short[\"accuracy\"]"
    - claim_field: "/aggregation/notes"
      source_path: "fakenews/validator/reward.py"
