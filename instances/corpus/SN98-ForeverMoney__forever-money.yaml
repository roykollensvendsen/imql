schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Live weight-setting is revenue-gated burn: if vault revenue <= 0 (or fetch fails)
  100% of emissions go to UID 0 (burn). When revenue > 0 the miner share grows with
  revenue up to profit_ratio (default 1.0) and is distributed proportionally to the
  per-job top miners' combined_score. The documented PnL-vs-HODL scoring is active but
  only feeds the miner-distribution branch, which is fully burned whenever revenue is
  non-positive.

subnet:
  name: "SN98 ForeverMoney"
  owner_repo: "SN98-ForeverMoney__forever-money"
  netuid: 98
  implementation_lang: python

task:
  summary: >-
    Miners optimize Uniswap V3 / Aerodrome liquidity provision by responding to
    RebalanceQuery requests from validators with desired positions (rebalance or keep
    current). Validators evaluate each miner's strategy through forward simulations
    (backtests) and score by net PnL vs HODL (relative return) with an exponential
    impermanent-loss penalty. The single top miner per job earns emissions weight,
    gated by a revenue-driven burn split.
  submission_format: [signals]

scoring_signals:
  - name: net_return_vs_hodl
    metric_kind: pnl
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      return_pct = (final_value - initial_value) / initial_value, clamped to [-10, 10].
      This raw relative return is the primary signal; no scaling beyond the clamp.
  - name: impermanent_loss_penalty
    metric_kind: risk_adjusted_ratio
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Multiplicative penalty = exp(-loss_penalty_multiplier * loss_ratio) with
      loss_penalty_multiplier default 10.0; loss_ratio prefers impermanent_loss else
      token-delta. Applied multiplicatively to return when gaining, dividing when losing.
  - name: in_range_ratio_bonus
    metric_kind: engagement
    direction: higher_is_better
    weight: null
    normalization: min_max
    notes: >-
      Optional time-in-range bonus when in_range_ratio present; multiplies score by
      (1 - 0.08) + 0.08 * r with r clamped to [0,1]. DEFAULT_IN_RANGE_WEIGHT = 0.08.

ground_truth_sources:
  - kind: market_data
    description: >-
      Forward simulation / backtest of the proposed liquidity positions against
      current blockchain state, yielding initial_value/final_value, impermanent_loss
      and in_range_ratio metrics. Live revenue measured from on-chain vault fees.
    source_identifier: "Backtester metrics; on-chain CollectEvent vault fees (Base L2)"
    trust_model: oracle
    notes: >-
      Vault revenue in USD computed from fee0/fee1 priced via CoinGecko/PriceService;
      lookback_days=1 for the emissions split.

aggregation:
  method: proportional
  composition: hybrid
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      burn_ratio = 1 - miner_ratio, where miner_ratio = min(profit_ratio,
      revenue_alpha / total_emission_alpha). 100% burn when revenue_usd <= 0,
      total emissions == 0, no miner scores, or emissions calc fails. profit_ratio
      default 1.0 (PROFIT_RATIO env), clamped to [0,1].
  notes: >-
    Per-job top miner (by combined_score) is selected; a miner's aggregate score is
    the sum of combined_scores over jobs it tops. Miner_ratio is distributed
    proportionally to normalized_score = score/total_score. Final weights normalized
    to sum to 1.0.

weight_setting:
  cadence: rate_limited
  method: >-
    monitor_and_set_weights loop calls EmissionsService.set_weights_on_chain every
    1200s (20 min). Aggregates per-job top-miner combined_scores, computes
    revenue-gated burn split, distributes miner_ratio proportional to score, assigns
    burn_ratio to UID 0, then calls subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "1200 seconds"
  smoothing:
    kind: ema
    alpha: null
    window: null
    notes: >-
      EMA applied to the stored per-job reputation scores (not the final on-chain
      weight): evaluation_score new = old*0.9 + latest*0.1; live_score new =
      old*0.7 + latest*0.3; combined_score = eval*0.6 + live*0.4.

anti_gaming:
  - kind: liveness_check
    enforcement: barrier
    description: >-
      Live-execution eligibility requires participation on >= MINER_ELIGIBILITY_DAYS
      distinct days (default 7) where rounds_participated > rounds_refused, OR the
      hotkey being whitelisted. Only eligible miners with combined_score > 0 are
      ranked for weight.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Only the single top miner per job (by combined_score) receives non-zero weight;
      validator excludes its own UID and reserves UID 0 for burn.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Hotkey replacement detection: on metagraph resync, any uid whose hotkey changed
      is zeroed out (zero_out_miner), removing its accumulated DB scores.

sub_competitions:
  structure: multi_asset
  stages:
    - name: "Evaluation rounds"
      role: qualifier
      advancement_rule: "participate >= MINER_ELIGIBILITY_DAYS (default 7) distinct days, combined_score > 0"
    - name: "Live rounds"
      role: main
      advancement_rule: "is_eligible_for_live and per-job top combined_score"
  count: null
  notes: >-
    Jobs-based architecture: multiple liquidity pools/pairs managed concurrently, each
    a separate per-pair competition with its own MinerScore reputation. Dual-mode
    evaluation + live rounds per job.

per_miner_state:
  tracked: true
  state_kinds:
    - reputation
    - cumulative_score
    - status_enum
    - registration_age
  status_values:
    - "is_eligible_for_live (bool)"
  reset_policy: >-
    Per-job MinerScore zeroed (zero_out_miner) when the uid's hotkey is replaced on the
    metagraph. Otherwise EMA-decayed continuously.
  notes: >-
    Per (job, miner_uid) MinerScore tracks evaluation_score, live_score, combined_score
    (EMA), total_evaluations, successful_evaluations, refusals, total_live_rounds,
    successful_live_rounds, participation_days, is_eligible_for_live. MinerParticipation
    tracks daily rounds_participated/rounds_refused.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "MINER_GUIDE.md"
    - "ARCHITECTURE.md"
  completeness: medium

