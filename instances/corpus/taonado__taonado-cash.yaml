      line_ref: "93-103"
      quote: "if (totalAllocated < depositGoal) { denominator = depositGoal; } else { denominator = totalAllocated; } ... weights[i] = uint16((((unnormalizedWeights[i]) * type(uint16).max) / denominator));"
