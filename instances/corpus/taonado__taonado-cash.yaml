    - claim_field: "/weight_setting/tempo_or_interval"
      source_path: "scripts/vali.ts"
      line_ref: "93"
      quote: "setInterval(setWeights_loop, 113 * 12 * 1000); // every 113 blocks or so"
    - claim_field: "/anti_gaming/0/description"
      source_path: "contracts/EvmValidator.sol"
      line_ref: "177-182"
      quote: 'require(block.number >= lastSetWeightsBlock + setWeightsBlockInterval, "Weight set interval has not passed");'
    - claim_field: "/weight_setting/method/bounty"
      source_path: "contracts/EvmValidator.sol"
      line_ref: "90-99"
      quote: "uint256 refundAmount = (gasUsed + refundOverhead) * tx.gasprice + setWeightsBounty; ... (bool ok, ) = msg.sender.call{value: refundAmount}(\"\");"
    - claim_field: "/per_miner_state/reset_policy"
      source_path: "contracts/core/Taonado.sol"
      line_ref: "39-40, 85"
      quote: "// deposit lifetime for each address, for scoring\n    mapping(address => uint256) public totalLifetimeDeposits; ... totalLifetimeDeposits[msg.sender] += denomination;"
    - claim_field: "/mechanism_status"
      source_path: "ARCHITECTURE.md"
      line_ref: "69-70"
      quote: "Burn mechanism for excess emissions; Validators directly apply the weights, leading to high trust in their scoring."
    - claim_field: "/ground_truth_sources/0/description"
      source_path: "ARCHITECTURE.md"
      line_ref: "23-25"
      quote: "DepositTracker -->|Query Associations| WeightsV2; WTAO -->|Query Balances| WeightsV2; Metagraph[Metagraph] -->|Query Hotkeys| WeightsV2"
  unresolved:
    - "depositGoal literal value (owner-set via setDepositGoal; no on-chain default in source; test uses 1000 TAO)"
    - "setWeightsBlockInterval, setWeightsBounty, metagraph_boost_value, versionKey, refundOverhead default values (owner-set state; only refundOverhead has a literal initializer 15_000 for gas refund, not a scoring constant)"
    - "burn_uid concrete value (state variable, only a comment that it *should* be 0; no initializer)"
    - "Whether validators are live on mainnet and actually calling setWeights at the documented cadence"

composition:
  shape: pipeline
  overlays: [burn, guards, state]
  extern_count: 0   # provisional; coverage.py recomputes
