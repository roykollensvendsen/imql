schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Scoring is fully on-chain and active: weights are the sum of WTAO balance plus
  lifetime deposits of each hotkey's associated depositor addresses, normalized to
  uint16. When total allocated deposits fall below the owner-set depositGoal, the
  shortfall (depositGoal - totalAllocated) is assigned to burn_uid, dynamically
  burning the excess emissions. So a proportional-to-deposit reward and a dynamic
  burn coexist.

subnet:
  name: "Taonado Cash"
  owner_repo: "taonado__taonado-cash"
  netuid: 113
  implementation_lang: typescript

task:
  summary: >-
    Miners deposit/lock TAO (as WTAO and into the Taonado zk-mixer pools) and associate
    their depositing EVM (H160) address with their Bittensor ss58 hotkey via the
    DepositTracker contract. A miner's score is the total WTAO balance plus lifetime
    mixer deposits across all EVM addresses associated with their hotkey. Larger / more
    persistent deposits earn proportionally more emission. There is no off-chain model
    or content submission; "mining" is supplying liquidity to the privacy pools.
  submission_format: [other]
  submission_format_other: "on-chain TAO/WTAO deposit + EVM-to-hotkey association"

scoring_signals:
  - name: associated_deposit_balance
    metric_kind: volume
    direction: higher_is_better
    weight: 1.0
    normalization: other
    normalization_other: "L1 / sum-to-denominator scaling to uint16 at aggregation"
    notes: >-
      Per-hotkey weight = sum over up to MAX_ASSOCIATIONS_PER_HOTKEY (100) associated
      depositor addresses of (wtao.balanceOf(depositer) + taonado.totalLifetimeDeposits(depositer)).
      Computed entirely on-chain in WeightsV3.getWeights().

ground_truth_sources:
  - kind: other
    kind_other: on_chain_token_balance
    description: >-
      On-chain WTAO ERC20 balances and the totalLifetimeDeposits ledger of the Taonado
      mixer contract, joined to hotkeys through the DepositTracker associations and the
      metagraph hotkey table. No external oracle; the chain state is authoritative.
    source_identifier: "WTAO / Taonado / DepositTracker / Metagraph precompile (0x0802)"
    trust_model: trusted
    notes: ""

aggregation:
  method: proportional
  composition: weighted_sum
  normalization: other
  normalization_other: >-
    scaled to uint16: weight_i = unnormalizedWeight_i * type(uint16).max / denominator,
    where denominator = max(totalAllocated, depositGoal)
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "burn_uid (uint16, commented as *should* be 0)"
    fraction: null
    dynamic: true
    notes: >-
      When totalAllocated < depositGoal, weights[burn_uid] = depositGoal - totalAllocated,
      so the residual below the deposit goal is burned. burn_uid value is a contract
      state variable (no literal initializer in source); comment notes it *should* be 0.
  notes: >-
    Weights summed per uid then divided by denominator = max(totalAllocated, depositGoal)
    and multiplied by uint16 max. uid 0 is skipped in the per-uid loops (loops start at 1).

weight_setting:
  cadence: rate_limited
  method: >-
    On-chain. EvmValidator.setWeights()/operatorSetWeights() reads WeightsV3.getNormalizedWeights()
    and calls the Neuron precompile (0x0804) setWeights. Any EVM wallet may call setWeights() and is
    paid a TAO bounty (gas refund + setWeightsBounty); if the caller's hotkey is in the metagraph it
    receives metagraph_boost_value added to its weight. operatorSetWeights() is owner-only.
  on_chain_call: set_weights
  tempo_or_interval: "113 blocks"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA. Off-chain scripts re-set weights every ~113 blocks; contract enforces a
      minimum setWeightsBlockInterval between calls (value is owner-set state, no literal in source).

anti_gaming:
  - kind: rate_limit
    enforcement: barrier
    description: >-
      setWeightsIntervalPassed modifier requires block.number >= lastSetWeightsBlock +
      setWeightsBlockInterval; nonReentrant guard on setWeights.
  - kind: other
    kind_other: per_hotkey_association_cap
    enforcement: barrier
    description: >-
      MAX_ASSOCIATIONS_PER_HOTKEY = 100 caps how many depositor addresses contribute to a
      single hotkey's weight, limiting unbounded association farming.
  - kind: other
    kind_other: dynamic_burn_to_goal
    enforcement: penalty
    description: >-
      If total associated deposits are below the owner-set depositGoal, the shortfall is
      routed to burn_uid, reducing emissions until the network meets the liquidity goal.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, other]
  status_values: []
  reset_policy: >-
    totalLifetimeDeposits is monotonic (incremented by denomination on each deposit, never
    decremented). An EVM address, once associated to a hotkey, cannot be reassigned.
  notes: >-
    Per-depositor totalLifetimeDeposits ledger lives in the Taonado mixer contract; current
    WTAO balance is live ERC20 state; associations are stored in DepositTracker.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs: ["README.md", "ARCHITECTURE.md"]
  completeness: medium

