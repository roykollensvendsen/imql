schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Live scoring drives champion selection, but miner emission is hard-capped at 10% of total
  weight (MAX_MINER_EMISSION_FRACTION = 0.10) and scaled by the champion's benchmark score; the
  remainder is routed to owner uid=0, which the README describes as burning that share of miner
  emission. If no eligible benchmark score exists for the newest champion, all miner emission is
  burned for that round. So at most 10% of emission can ever reach miners, and frequently the full
  share is burned -- live scoring with a structurally large/dynamic burn.

subnet:
  name: "Harnyx"
  owner_repo: "harnyx__harnyx"
  netuid: 67
  implementation_lang: python

task:
  summary: >-
    Harnyx (SN67) is a deep-research subnet. Miners submit Python agent scripts that implement a
    `query` entrypoint; given a research-style query (plain text), the script must return a plain-text
    answer produced under a tight tool budget. Validators execute each miner script inside sandboxed
    containers against a batch of tasks, where each task is one query plus one stronger reference
    answer generated by a more expensive model. Validators score the miner response against the
    reference answer and report scored runs to a central platform, which aggregates across validators,
    selects a champion via a dethroning cascade, and computes the on-chain weight vector.
  submission_format: [source_code]

scoring_signals:
  - name: comparison_score
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Pairwise LLM judge compares the miner response against the task's reference answer, run twice
      with the answer order swapped; miner_wins counts how often the miner is preferred, and
      comparison_score = miner_wins / 2.0 (so 0.0, 0.5, or 1.0). total_score = comparison_score
      (ScoreBreakdown enforces total_score == comparison_score). The judge system prompt treats the
      miner answer as untrusted and only credits independently-retrieved `validated_citations`.
  - name: benchmark_correctness
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Separate benchmark path: a strict LLM "is_correct" judge over a sampled set of benchmark items
      (BENCHMARK_SAMPLE_SIZE = 20); mean_total_score = correct_item_count / terminal_item_count. This
      benchmark score does NOT contribute additively to champion ranking; it gates and scales how much
      emission the selected champion receives (benchmark_score * 0.10).

ground_truth_sources:
  - kind: reference_model
    description: >-
      Each task carries a reference answer generated by a more expensive model than the typical miner
      budget allows; the pairwise scoring judge treats reference_answer as canonical ground truth.
    source_identifier: "task.reference_answer (platform-generated)"
    trust_model: trusted
    notes: >-
      Tasks are mixed across factual recall, explanation, comparison, and synthesis. Scoring and the
      benchmark correctness judge are themselves LLM-based (provider/model configured per validator).

aggregation:
  method: winner_take_all
  method_other: ""
  composition: gated
  composition_other: ""
  normalization: other
  normalization_other: >-
    Champion weight vector is {champion_uid: 1.0} before emission scaling; final on-chain vector is
    L1-normalized to sum to 1.0 (WeightSubmission requires sum == 1.0 +/- 0.01) after benchmark
    scaling splits weight between champion and owner uid=0.
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      Owner uid=0 receives 1.0 - miner_fraction, where miner_fraction = benchmark_score * 0.10
      (MAX_MINER_EMISSION_FRACTION = 0.10, OWNER_UID = 0). So owner/burn share is at least 90% and is
      100% when benchmark_score is 0.0 or no eligible benchmark score exists. README: owner uid=0
      "burns that share of miner emission".
  notes: >-
    Champion selection is a dethroning cascade, not highest-score-wins: starting from the incumbent
    champion, challengers are compared in batch order; a challenger only dethrones the incumbent if
    its aggregate total beats the incumbent by score_margin_required = 0.20, or it is non-regressing
    and materially cheaper (COST_REDUCTION_REQUIRED = 0.20) or faster (TIME_REDUCTION_REQUIRED = 0.20,
    min 1000.0 ms). Per-task scores are aggregated across validators by median, then summed across
    tasks into an artifact total.

weight_setting:
  cadence: rate_limited
  method: >-
    A tempo-aware WeightWorker polls every 30s (DEFAULT_POLL_INTERVAL) and submits only when the
    chain-owned cadence window is open (weight_submission_cadence.can_submit, gated by weights
    rate limit / blocks since last update). It fetches the platform-computed champion weights via
    get_champion_weights() and submits them; the platform computes the actual weight vector.
  on_chain_call: set_weights
  tempo_or_interval: "weights_rate_limit hyperparam; 30s poll interval"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the reward observed. Champion persistence across rounds (incumbent
      carry-over via the dethroning cascade) provides temporal hysteresis instead of numeric smoothing.

anti_gaming:
  - kind: deduplication
    enforcement: rejection
    description: >-
      Pairwise judge payload bounds and de-duplicates validated citations (_MAX_RENDERED_CITATIONS
      = 200; identical citation payloads dropped) and explicitly does not give citation credit for
      URLs/source-like structures appearing inside the untrusted miner answer_text.
  - kind: code_inspection
    enforcement: barrier
    description: >-
      Miners submit Python agent scripts that validators execute inside sandboxed containers
      ("sandbox/ runtime run by validators"), isolating untrusted miner code.
  - kind: challenge_period
    enforcement: barrier
    description: >-
      Dethroning cascade: an incumbent champion is only replaced when a challenger clears a
      score_margin_required = 0.20 margin (or is non-regressing and materially cheaper/faster),
      so marginal/gamed score deltas inside the tolerance band do not displace the incumbent.

sub_competitions:
  structure: single
  stages: []
  count: null
  notes: >-
    A single global competition for one champion artifact per the batch/dethroning cascade; no
    ladders, tournaments, or multi-track structure observed.

per_miner_state:
  tracked: true
  state_kinds: [status_enum, cumulative_score]
  status_values: ["queued", "running", "completed", "partial_success", "failed"]
  reset_policy: ""
  notes: >-
    The incumbent champion (champion_uid / champion_artifact_id) persists across batches and is
    carried into the next selection as the initial incumbent. Benchmark run state enum
    (BenchmarkRunState: queued/running/completed/partial_success/failed) gates emission eligibility
    (EMISSION_BENCHMARK_STATES = {completed, partial_success}). Per-artifact aggregate totals are
    cumulative across tasks within a batch.

