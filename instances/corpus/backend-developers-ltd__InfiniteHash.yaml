schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Live mechanism is the validator-managed auction (mechanism 1), mirrored onto
  mechanism 0 ("Legacy mechanism 0 scheduling disabled. Auction weights are
  mirrored to both mechanisms from the auction pipeline."). Unused auction budget
  (total_budget_alpha - total_spent_alpha) is dynamically redirected to the subnet
  owner's earliest-registered neuron (burn UID) and included in weight
  normalization, so a variable fraction of emissions is burned each epoch.

subnet:
  name: "InfiniteHash (subnet auction incentive system)"
  owner_repo: "backend-developers-ltd__InfiniteHash"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners are Bitcoin hashrate providers. Each validation window they post on-chain
    bid commitments encoding (hashrate, price) pairs. Validators run an integer linear
    program that maximizes purchased PH/s under a budget derived from subnet emissions
    and consensus prices (TAO/USDC, ALPHA/TAO, HASHP/USDC), selecting auction winners
    subject to a per-bid max price multiplier. Winners must then deliver the committed
    hashrate, verified against Luxor mining-pool scraping snapshots. Delivered winners
    are paid in proportion to an ALPHA-denominated payment; unused budget is burned to
    the subnet owner. Underdelivering hotkeys are banned from future auctions.
  submission_format: [commitment_hash]

scoring_signals:
  - name: delivered_hashrate_payment_alpha
    metric_kind: throughput
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Per delivered winner, payment_alpha = delivered_hashrate * hashp_usdc *
      price_multiplier * (window_blocks / blocks_per_day) / alpha_usdc. Summed across
      6 windows per hotkey; final weight = payment / total_payments_alpha. Only winners
      with delivered != False contribute.
  - name: delivery_compliance
    metric_kind: throughput
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Gating check: delivered_ph (from Luxor samples) must be >= DELIVERY_THRESHOLD_FRACTION
      (0.1) * total_commitment to count as delivered. Failing winners are excluded from
      payment and their hotkeys banned. (Docs prose says "at least 95%", but the code
      constant is 0.1.)

ground_truth_sources:
  - kind: real_engagement
    description: >-
      Observed delivered hashrate from Luxor mining-pool scraping snapshots over the
      validation window, compared against committed hashrate. If validator scraping has
      gaps > 7 blocks the underdelivery check is skipped and all winners assumed delivered.
    source_identifier: "Luxor scraping snapshots (LUXOR_SUBACCOUNT_NAME)"
    trust_model: trusted
    notes: ""
  - kind: market_data
    description: >-
      Price consensus over miner/validator price commitments: TAO/USDC, ALPHA/TAO,
      HASHP/USDC FP18 prices used for the auction budget and ALPHA payment normalization.
    source_identifier: "compute_price_consensus (TAO_USDC, ALPHA_TAO, HASHP_USDC)"
    trust_model: adversarial
    notes: "Aggregated across commitments; banned hotkeys excluded from contributing bids."

aggregation:
  method: convex_optimization
  composition: gated
  normalization: l1
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "subnet owner earliest-registered neuron (burn UID)"
    fraction: null
    dynamic: true
    notes: >-
      total_burn_alpha = total_budget_alpha - total_spent_alpha is added to
      payments_alpha[burn_hotkey] and included in the L1 weight normalization, so the
      burned fraction is the residual of unspent auction budget each epoch.
  notes: >-
    Winner selection solves an ILP (PuLP/CBC) maximizing purchased hashrate under a PH/s
    budget. Final on-chain weights normalize summed ALPHA payments to sum-to-one
    (weights = payment / total_payments_alpha), then to u16 via division by max weight.

weight_setting:
  cadence: per_epoch
  method: >-
    calculate_auction_weights runs only in validation window 0 of the next epoch, after
    all 6 windows of the previous validation epoch are processed; weights committed and
    revealed for both mechanism 0 and mechanism 1. Celery beat triggers
    calculate_auction_weights and set_auction_weights every 1 minute (gated to window 0).
  on_chain_call: commit_reveal
  tempo_or_interval: "6 validation windows/epoch; windows of 60 blocks (window 5 = 61)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      commit_timelocked_mechanism_weights (CRV3, commit_reveal_version=4); falls back to
      set_mechanism_weights if commit-reveal is disabled. No EMA on final weights.

anti_gaming:
  - kind: liveness_check
    enforcement: elimination
    description: >-
      Delivery verification against Luxor snapshots; hotkeys whose delivered hashrate
      falls below DELIVERY_THRESHOLD_FRACTION (0.1) of commitment in any bid are added to
      BannedMiner and excluded from future auctions until ban expires/cleared.
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      Bids, price feeds and ban bitmaps are on-chain commitments; weights published via
      timelocked commit/reveal (CRV3) so validator weights are not front-runnable.
  - kind: risk_limit
    enforcement: rejection
    description: >-
      _build_worker_items discards bids priced more than MAX_PRICE_MULTIPLIER (1.05) above
      the consensus price before the ILP, capping how far above market a bid can be.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Ban consensus (compute_ban_consensus) aggregates ban bitmaps published by other
      validators so excluded hotkeys are honored network-wide.

sub_competitions:
  structure: multi_mechanism
  stages: []
  count: 2
  notes: >-
    Two on-chain mechanisms (IDs 0 and 1). Mechanism 0 legacy hashrate scoring is
    disabled; the auction pipeline (mechanism 1) computes weights and mirrors the same
    normalized weights onto both mechanisms.

per_miner_state:
  tracked: true
  state_kinds: [status_enum]
  status_values: [banned]
  reset_policy: >-
    Ban recorded in BannedMiner (banned_at, epoch_start, window_number, reason); repeat
    offense updates the ban timestamp. Ban honored until it expires or is manually cleared.
  notes: "Banned hotkeys' commitments are filtered out of future auctions."

documentation:
  status: docs_and_code
  source_version: "commit 1c1d576"
  primary_docs:
    - "docs/subnet_auction_incentive_system.md"
    - "README.md"
  completeness: medium

