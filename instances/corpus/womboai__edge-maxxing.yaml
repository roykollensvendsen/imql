schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  The documented scoring path is the one the validator invokes: set_weights() computes
  scores via contest_state.get_scores() and weights via calculate_score_weights(). No burn /
  null-UID routing is present in the source; when scoring cannot proceed (no contest state,
  no baseline, all-equal scores) the validator falls back to equal weights ([1.0]*N), not a burn.

subnet:
  name: "WOMBO EdgeMaxxing"
  owner_repo: "womboai__edge-maxxing"
  netuid: 39
  implementation_lang: python

task:
  summary: >-
    Miners submit optimized AI image-generation model repositories (e.g. Flux Schnell, SDXL
    NewDream) targeting fixed consumer hardware (NVIDIA RTX 4090). A daily contest benchmarks
    each submission's inference performance (generation time, VRAM/RAM use, power, size, load
    time) and output similarity to a reference baseline. Miners are rewarded by how much their
    submission improves on the baseline relative to other miners.
  submission_format: [source_code]

scoring_signals:
  - name: average_similarity
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: other
    normalization_other: >-
      transformed: ((average_similarity - 0.75) / (1 - 0.75)) ** (1 - 0.75); enters the score
      product as a multiplicative factor.
    notes: >-
      Image output similarity vs the baseline model output. Gated: if min_similarity < 0.75 the
      score is forced to -1.
  - name: generation_time_improvement
    metric_kind: latency
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      pow(baseline_generation_time / benchmark_generation_time, metric_weight/metric_gcd);
      enters the score as a multiplicative factor. metric_weight is fetched from the remote
      inputs API (not a code literal). README states generation time = 14% of final score for
      the Flux contest.
  - name: vram_used_improvement
    metric_kind: hardware_spec
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      pow(baseline_vram / benchmark_vram, metric_weight/metric_gcd). README: VRAM = 43% of
      final score for the Flux contest.
  - name: size_improvement
    metric_kind: hardware_spec
    direction: lower_is_better
    weight: null
    normalization: none
    notes: pow(baseline_size / benchmark_size, metric_weight/metric_gcd).
  - name: watts_used_improvement
    metric_kind: hardware_spec
    direction: lower_is_better
    weight: null
    normalization: none
    notes: pow(baseline_watts / benchmark_watts, metric_weight/metric_gcd).
  - name: load_time_improvement
    metric_kind: latency
    direction: lower_is_better
    weight: null
    normalization: none
    notes: pow(baseline_load_time / benchmark_load_time, metric_weight/metric_gcd).
  - name: ram_used_improvement
    metric_kind: hardware_spec
    direction: lower_is_better
    weight: null
    normalization: none
    notes: pow(baseline_ram / benchmark_ram, metric_weight/metric_gcd).

ground_truth_sources:
  - kind: reference_model
    description: >-
      Each contest has a fixed baseline repository (e.g. flux-schnell-edge-inference at a pinned
      revision). Submissions are benchmarked against the baseline's metrics and its image output
      (for similarity).
    source_identifier: "womboai/flux-schnell-edge-inference, womboai/sdxl-newdream-20-inference"
    trust_model: trusted
    notes: >-
      Baseline RepositoryInfo with pinned url+revision is hardcoded per Contest in CONTESTS.
  - kind: hardware_probe
    description: >-
      Benchmark metrics (generation_time, size, vram_used, watts_used, load_time, ram_used) are
      measured by running the submitted model on the target device (NVIDIA RTX 4090).
    source_identifier: "NVIDIA GeForce RTX 4090"
    trust_model: trusted

aggregation:
  method: proportional
  composition: multiplicative
  normalization: none
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No burn / null-UID routing in source. Fallback when scoring is impossible is equal
      weights ([1.0]*N), not a burn.
  notes: >-
    Per-miner score = product over the 7 metric-improvement factors and the transformed
    similarity, minus 1. Final weight per hotkey = score - min(score over all miners) (a min
    subtraction / floor-shift, NOT softmax or sum-to-one). Min-similarity gate forces score to
    -1. method=proportional captures that on-chain weight is proportional to the shifted score.

weight_setting:
  cadence: daily
  method: >-
    WeightSetter thread loops: get scores from benchmarks, calculate_score_weights (score - min
    score), map to node_ids, call set_node_weights. Sleeps epoch_length*12 seconds between
    successful sets. Contest runs daily at 12 PM PST per README; delayed_weight_setting flag
    (from inputs API) can defer to previous day's benchmarks.
  on_chain_call: set_weights
  tempo_or_interval: "epoch_length blocks (sleep epoch_length*12 s after a successful set)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA / moving-average smoothing of the reward in source. delayed_weight_setting reuses
      the previous day's benchmarks but is a substitution, not a temporal average.

anti_gaming:
  - kind: deduplication
    enforcement: rejection
    description: >-
      Copy/duplicate submissions are identified server-side via the inputs API
      (get_duplicate_submissions returns safe_submissions vs duplicate_submissions with copy_of).
      calculate_score_weights notes 'Assumes that copies are removed from the scores'. on_safe_list
      checks a hotkey+revision against the safe list.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Output similarity gate: if min_similarity < SIMILARITY_SCORE_THRESHOLD (0.75) the score is
      forced to -1, penalizing submissions that diverge too far from baseline image output.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Blacklist (hotkeys/coldkeys) from the inputs API removes blacklisted miners' benchmarks and
      submissions before scoring.

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: FLUX_NVIDIA_4090
      role: main
      advancement_rule: "score relative to baseline and other miners"
    - name: SDXL_NEWDREAM_NVIDIA_4090
      role: main
      advancement_rule: "score relative to baseline and other miners"
  count: 2
  notes: >-
    Two contests defined in CONTESTS, each tied to a baseline model + RTX 4090 device. The set of
    active contests and per-metric weights are supplied by the remote inputs API at runtime.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    Scoring is recomputed each contest from current benchmarks; no persistent per-miner ledger
    or status enum carried across rounds in the validator source.

