schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Winner-take-all on chain only during the (episodic) reward period; during contest,
  submit, evaluation, review, and any idle/no-tournament time the validator burns 100%
  on UID 0 (with an optional 1% to the preliminary leader). The actual per-agent scoring
  and stake-weighted aggregation are performed by an off-repo tournament backend API, so
  the ranking math is not present in this source tree.

subnet:
  name: "Nepher Robotics Subnet"
  owner_repo: "nepher-ai__nepher-subnet"
  netuid: 49
  implementation_lang: python

task:
  summary: >-
    Miners train robotics control policies locally and submit signed agents (a
    best_policy.pt checkpoint plus a task module) to a tournament backend. Validators
    download each eligible agent and run it against standardized Isaac Lab environments in
    a sandboxed Docker container, producing a score that is submitted back to the backend.
    The single approved tournament winner receives all on-chain weight during the reward
    period; everything else burns.
  submission_format: [model_weights, source_code]

scoring_signals:
  - name: agent_evaluation_score
    metric_kind: reward
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Each agent is run in a sandbox container against Isaac Lab environments and produces
      a single scalar 'score' returned by the sandbox runner and submitted to the backend
      (result['score']). The metric semantics (episodic task reward) are defined inside the
      agent/task module and the off-repo eval harness, not in this tree.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Standardized Isaac Lab simulation environments executed via eval-nav inside a
      no-network, no-wallet sandbox container. Acts as the reference environment for
      scoring submitted policies.
    source_identifier: "Isaac Lab environments (eval-nav)"
    trust_model: trusted
    notes: >-
      Sandbox has GPU access for Isaac Sim but no wallet, no Docker socket, and no network
      access except whitelisted domains.

aggregation:
  method: winner_take_all
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      Outside the reward period (contest, submit, evaluation, review, idle/no-tournament)
      the validator burns 100% on UID 0; optionally 1% (LEADER_WEIGHT_FRACTION) is split to
      the preliminary leaderboard leader with the remaining 99% burned. If no winner is
      approved or the winner hotkey is absent from the metagraph, weight burns on UID 0.
  notes: >-
    Stake-weighted averaging of validator scores, descending rank, ties broken by earliest
    submission time, is documented as occurring in the off-repo backend; only the
    winner-takes-all weight assignment is implemented in this repo.

weight_setting:
  cadence: per_tournament
  method: >-
    During the reward period the validator queries the approved winner hotkey from the
    tournament API, maps it to a metagraph UID, and sets all weight (1.0) to that UID via
    subtensor.set_weights, refreshing every WEIGHT_SET_INTERVAL (1800s / 30 min). A SHA-256
    weight-hash dedup check skips redundant commits within DEDUP_WINDOW (900s). Outside the
    reward period weights burn on UID 0 every BURN_INTERVAL (1800s).
  on_chain_call: set_weights
  tempo_or_interval: 1800
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No on-chain weight smoothing; weight setting is winner-takes-all per refresh with
      wait_for_inclusion=True, wait_for_finalization=False.

anti_gaming:
  - kind: stake_weighting
    enforcement: other
    enforcement_other: aggregation_weighting
    description: >-
      Validator scores for an agent are aggregated by stake-weighted averaging in the
      backend (simple average fallback if no validator has stake). Documented in
      docs/incentive_mechanism.md; not implemented in this repo.
  - kind: deduplication
    enforcement: rejection
    description: >-
      Only the latest agent per miner is scored; eligible-miner list is snapshotted from
      the metagraph and locked before evaluation. On-chain weight commits are deduplicated
      via a SHA-256 weight hash within a 900s window across validators sharing a hotkey.
  - kind: code_inspection
    enforcement: elimination
    description: >-
      Admin team reviews aggregated scores and verifies the top submission for cheating
      before approving a winner; if not approved, all weight burns on UID 0.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Pre-flight model weight validation loads best_policy.pt in an isolated subprocess
      with a 120s timeout (MODEL_VALIDATION_TIMEOUT) and rejects files larger than 2048 MB
      (MAX_POLICY_SIZE_MB) or that fail to load.
  - kind: liveness_check
    enforcement: barrier
    description: >-
      Evaluation runs inside a sandboxed Docker container with no wallet, no Docker socket,
      and no network access (whitelisted domains only); network/sandbox-escape errors are
      classified and reported to the backend.

sub_competitions:
  structure: tournament
  stages:
    - name: "Contest Period"
      role: qualifier
      advancement_rule: "submit signed agent during contest/submit window"
    - name: "Submit Period"
      role: qualifier
      advancement_rule: "registered in metagraph AND submitted agent; list snapshotted and locked"
    - name: "Evaluation Period"
      role: main
      advancement_rule: "agent scored in Isaac Lab sandbox; score submitted to backend"
    - name: "Review Period"
      role: knockout
      advancement_rule: "admin reviews aggregated scores and approves winner (no cheating)"
    - name: "Reward Period"
      role: final
      advancement_rule: "approved winner receives all on-chain weight"
  count: 5
  notes: >-
    Each tournament proceeds through five sequential block-bounded periods; emissions are
    directed to the winner only during the Reward Period. Period boundaries are defined by
    Bittensor block numbers converted to timestamps by the backend.

per_miner_state:
  tracked: true
  state_kinds: [status_enum, registration_age]
  status_values: []
  reset_policy: >-
    Eligibility re-evaluated per tournament; eligible-miner list snapshotted and locked
    during the submit period.
  notes: >-
    Eligibility requires both on-chain registration (present in metagraph) and an agent
    submission during the contest/submit period. A miner deregistered before/during
    evaluation or reward still receives its reward (hotkey-based emission is mandatory).

documentation:
