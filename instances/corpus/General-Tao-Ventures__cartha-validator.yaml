schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Documented scoring is fully implemented (liquidity-weighted per-position scoring), and a fixed
  24.3902% of weight always goes to the "Cartha's Incentive Pool" hotkey. When no miners meet the
  100,000 USDC minimum threshold, the remaining 75.6098% is routed to the subnet owner hotkey
  explicitly for EMISSION BURNING. So the live mechanism mixes active scoring, a fixed pool
  allocation, and a burn fallback depending on whether any miners qualify.

subnet:
  name: "Cartha"
  owner_repo: "General-Tao-Ventures__cartha-validator"
  netuid: 35
  implementation_lang: python

task:
  summary: >-
    Miners are USDC liquidity providers who lock USDC into Cartha vaults (principal miners operate
    vaults; federated miners lock into a principal's vault). A miner's reward is driven by the sum of
    all their active locked positions, each scored as pool_weight x amount_usdc x lock_boost, where
    lock_boost rewards longer lock durations (capped at 365 days). The validator fetches an
    epoch-frozen miner/position snapshot from the Cartha verifier API rather than evaluating any
    model output.
  submission_format: [other]
  submission_format_other: >-
    On-chain/off-chain USDC liquidity lock positions reported by the Cartha verifier API as
    (hotkey, pool_id, amount, lock_days, expires_at, deregistered_at) entries.

scoring_signals:
  - name: locked_usdc_amount
    metric_kind: volume
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      amount_usdc = original_amount_usdc frozen at epoch start (6 decimals). Mid-epoch top-ups do not
      count until the next epoch. Multiplicative factor in position_score = pool_weight x amount_usdc
      x lock_boost.
  - name: lock_duration_boost
    metric_kind: other
    metric_kind_other: lock_duration_commitment
    direction: higher_is_better
    weight: null
    normalization: min_max
    notes: >-
      lock_boost = min(lock_days, max_lock_days) / max_lock_days, with max_lock_days = 365. A 365-day
      lock gives boost 1.0, 182 days gives ~0.5. Multiplicative factor in position_score.
  - name: pool_weight
    metric_kind: other
    metric_kind_other: pool_multiplier
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Per-pool multiplier looked up from settings.pool_weights, defaulting to 1.0. Currently 1.0 for
      all pools (PRE_DEX equal-weight mode); POST_DEX on-chain allocations exist in pool_weights.py
      but are inactive.

ground_truth_sources:
  - kind: other
    kind_other: verifier_api_epoch_frozen_snapshot
    description: >-
      Cartha verifier API (https://api.cartha.finance) returns the epoch-frozen verified-miner list
      with (hotkey, slot_uid, pool_id, amount, lock_days, expires_at, deregistered_at). This is the
      single source of truth for verified miner positions and frozen liquidity amounts.
    source_identifier: "https://api.cartha.finance"
    trust_model: trusted
    notes: >-
      Verifier handles all on-chain (EVM) validation and RPC queries. Legacy on-chain EVM event
      replay (LockCreated/LockUpdated/LockReleased) exists but is used only with
      --no-use-verified-amounts; verified-amounts mode is the default and required mode on mainnet.

aggregation:
  method: proportional
  composition: multiplicative
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "subnet owner hotkey (metagraph.owner_hotkey UID)"
    fraction: null
    dynamic: true
    notes: >-
      When miner_total <= 0 (no miners with positive score, e.g. all below the 100,000 USDC minimum),
      the remaining_weight (1.0 - trader_pool_weight = 0.756098) is allocated to the subnet owner
      hotkey UID for EMISSION BURNING (explicitly "not rewards"). Separately, a fixed 0.243902
      (24.3902%) is always allocated to the trader rewards pool hotkey
      (5EPdZMZyByHbweNBWRFwYqL5czKGbdeVKTpHqVizp4UyUq94); this is a fixed reserved allocation, not a
      burn.
  notes: >-
    Per-miner raw score = sum over active positions of (pool_weight x amount_tokens x boost).
    Negative scores clamped to 0; miners with score 0 (incl. below-threshold) excluded. Miner weights
    = (score_i / sum_score) x remaining_weight where remaining_weight = 1.0 - 0.243902. Trader pool
    gets fixed 0.243902. Weights verified to sum to 1.0.

weight_setting:
  cadence: weekly
  method: >-
    Weights computed once per weekly epoch (Friday 00:00 UTC -> Thursday 23:59 UTC), cached for the
    week, and republished every Bittensor epoch (tempo blocks) via subtensor.set_weights with a
    cooldown check (blocks_since_update vs tempo/epoch_length_blocks). version_key = __spec_version__
    (1000*major + 10*minor + 1*patch). Daily expiry checks re-filter expired pools/deregistered
    hotkeys and force re-publication.
  on_chain_call: set_weights
  tempo_or_interval: "360 blocks (default_tempo / epoch_length_blocks fallback; tempo from metagraph when available)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA smoothing of the final reward. Weekly cached weights are republished unchanged each
      tempo; scores are recomputed fresh per weekly epoch from the frozen snapshot.

anti_gaming:
  - kind: risk_limit
    enforcement: rejection
    description: >-
      Minimum total assets threshold: principal miners with total locked USDC < 100,000
      (min_total_assets_usdc) score 0.0 regardless of lock duration, so all federated miners in that
      vault also earn nothing for the epoch. Prevents dust positions from gaming weight distribution.
  - kind: other
    kind_other: epoch_freeze_snapshot
    enforcement: barrier
    description: >-
      Epoch freezing: scoring uses the verifier's epoch-frozen original_amount_usdc snapshot taken at
      Friday 00:00 UTC. Mid-epoch top-ups (pending_amount) do not count until the next epoch,
      preventing mid-epoch manipulation.
  - kind: liveness_check
    enforcement: rejection
    description: >-
      Expired pool filtering (pools with expires_at < now excluded) and deregistered-hotkey filtering
      (all positions for deregistered hotkeys scored 0). Deregistered hotkeys fetched from the
      verifier; expiry/deregistration parsed per position in process_entries.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Validator whitelist: only whitelisted validator hotkeys may query verified miners from the
      verifier; non-whitelisted validators are rejected. Validators must also meet the on-chain
      minimum version requirement (weight_versions hyperparameter).

sub_competitions:
  structure: multi_asset
  stages: []
  count: 6
  notes: >-
    Six market pools across three parent vaults (Cryptos: BTC/USD, ETH/USD; Currencies: EUR/USD,
    GBP/USD, JPY/USD; Commodities: GOLD/USD). Currently all pools have equal weight 1.0 (PRE_DEX);
    pool choice does not differentiate scores until POST_DEX on-chain allocations activate. Treated as
    multi_asset rather than separate competitions because all pools feed one summed per-miner score.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: >-
    Scores are recomputed fresh each weekly epoch from the frozen verifier snapshot; no persistent
    per-miner ledger or reputation carried across epochs in this validator.
  notes: >-
    Weights are cached for the duration of a weekly epoch and recomputed at the next epoch boundary,
    but this is a per-epoch cache, not persistent per-miner state.

