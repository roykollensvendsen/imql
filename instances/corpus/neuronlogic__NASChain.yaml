schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Active Pareto-based scoring. Validators evaluate downloaded miner models, compute the
  Pareto-optimal set over (accuracy, params, flops), then assign exponential rewards to the
  Pareto front and set weights directly (no EMA smoothing — the moving-average alpha is
  commented out in update_scores). No burn allocation found in the source.

subnet:
  name: "NASChain"
  owner_repo: "neuronlogic__NASChain"
  netuid: 31
  implementation_lang: python

task:
  summary: >-
    Miners run Neural Architecture Search (NAS) to design small neural networks that maximize
    test-set accuracy while minimizing the number of parameters and FLOPs. Miners upload their
    best models to Hugging Face and commit the metadata on-chain. Validators download and
    evaluate each model, identify the Pareto-optimal architectures over (accuracy, params,
    flops), retrain Pareto candidates to detect test-set leakage, and reward miners whose
    models lie on the Pareto-optimal front.
  submission_format: [model_weights, commitment_hash]

scoring_signals:
  - name: accuracy
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: min_max
    notes: >-
      Validator-measured test-set accuracy. Models below vali_config.min_accuracy (70.0) are
      excluded from the Pareto front. Used both as a Pareto objective and as norm_accuracy in
      the exponential reward combined_score.
  - name: params
    metric_kind: other
    metric_kind_other: parameter_count
    direction: lower_is_better
    weight: null
    normalization: min_max
    notes: >-
      Number of model parameters. A Pareto objective (minimized) and contributes via
      -0.25 * norm_params to the combined_score.
  - name: flops
    metric_kind: throughput
    direction: lower_is_better
    weight: null
    normalization: min_max
    notes: >-
      Floating-point operations of the model. Models with flops >= vali_config.max_flops
      (280000000) are excluded from the Pareto front. Contributes via -0.5 * norm_flops to
      the combined_score.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Validators evaluate miner models on a fixed test set with deterministic (fixed-seed)
      training/evaluation. Pareto candidates are retrained by validators with a standard
      train/valid split to detect test-set leakage (disqualified if validator-measured
      accuracy is lower than the miner-claimed accuracy).
    source_identifier: "vali_trainer.py / vali_config.py"
    trust_model: trusted
    notes: >-
      Validator hardware fixed to RTX 4090 with fixed seed for deterministic results.

aggregation:
  method: softmax
  composition: weighted_sum
  normalization: softmax
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn allocation found in source."
  notes: >-
    combined_score = norm_accuracy - 0.25*norm_params - 0.5*norm_flops, computed only over
    the rewarded (Pareto-optimal) models; reward = exp(combined_score) / sum(exp(combined_score)).
    This is a softmax over a weighted-sum combined score with the literal coefficients 0.25 and
    0.5 (temperature is implicitly 1, not a named constant). Only models flagged reward==True
    (the Pareto front) participate.

weight_setting:
  cadence: per_epoch
  method: >-
    raw_weights = L1-normalize(self.scores); processed via
    bt.utils.weight_utils.process_weights_for_netuid then convert_weights_and_uids_for_emit;
    set on chain with subtensor.set_weights(version_key=self.spec_version).
  on_chain_call: set_weights
  tempo_or_interval: "100 blocks (neuron.epoch_length, ~12s blocks)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      update_scores zeros self.scores and scatters the current rewards directly; the EMA
      moving-average update (alpha * scattered + (1-alpha)*scores) is commented out in source.

anti_gaming:
  - kind: code_inspection
    enforcement: elimination
    description: >-
      Test-set leakage check: Pareto top models have weights reinitialized and are retrained by
      the validator on a standard train-test split. If the submitted model's accuracy is lower
      than the validator's retrained accuracy, the miner is disqualified.
  - kind: deduplication
    enforcement: rejection
    description: >-
      Duplicate architectures (same accuracy, params, flops) on the Pareto front are deduplicated
      via filter_pareto_by_commit_date / filter_pareto_by_lowest_block: only the oldest commit
      date (or lowest block / lowest ext_idx) keeps pareto=True; others are set to non-Pareto.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      File-size limit (vali_config.max_download_file_size = 5.5*1024*1024); models exceeding the
      limit are rejected. Models must be loadable via torch.jit.load (TorchScript) to be evaluated.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, status_enum]
  status_values: []
  reset_policy: >-
    eval_frame persisted to state/state.csv; scores zeroed each step before scattering current
    rewards; scores for replaced hotkeys are reset to 0 in resync_metagraph.
  notes: >-
    Per-UID eval_frame DataFrame tracks uid, params, flops, accuracy, score, pareto (bool),
    reward (bool), commit, commit_date, block, ext_idx, hf_account, evaluate, vali_evaluated.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs: ["README.md"]
  completeness: medium

