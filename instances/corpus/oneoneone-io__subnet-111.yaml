    - claim_field: "/per_miner_state/reset_policy"
      source_path: "oneoneone/base/validator.py"
      line_ref: "339-341"
      quote: "for uid, hotkey in enumerate(self.hotkeys): if hotkey != self.metagraph.hotkeys[uid]: self.scores[uid] = 0  # hotkey has been replaced"
    - claim_field: "/sub_competitions/structure"
      source_path: "oneoneone/validator/forward.py"
      line_ref: "96-98"
      quote: "type_id = task[\"typeId\"]\n    metadata = task[\"metadata\"]\n    timeout = task[\"timeout\"]"
    - claim_field: "/mechanism_status"
      source_path: "oneoneone/base/validator.py"
      line_ref: "254-255"
      quote: "# Calculate weights with burner control\n        raw_weights = self._calculate_weights_with_burner(uids, scores)"
  unresolved:
    - "Actual scoring math (speed/volume/recency computation, spot-check, structural validation, disqualification) lives in an out-of-repo Node.js endpoint (/score-responses); only the README documents the formula. The literal constants 0.5/0.3/0.2 are quoted from README pseudocode, not from executed code in this repo."
