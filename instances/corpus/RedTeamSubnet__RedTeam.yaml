schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: partial_burn
mechanism_status_notes: >-
  Final onchain score is a fixed 50/50 split between challenge performance and an "alpha burn"
  component that assigns weight 1.0 to the subnet owner's hotkey. When a challenge has no valid
  submissions its incentive weight is redistributed to alpha burn, and if no challenge has any valid
  submissions all weight goes to burn (fallback / full_burn regime). So at least 50% is always burned.

subnet:
  name: "RedTeam Subnet (by Innerworks)"
  owner_repo: "RedTeamSubnet__RedTeam"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners submit Docker-packaged code solutions (e.g. a bot.py for the Humanize Behaviour challenge)
    to subnet challenges. Validators run each submission in a challenge Docker container, score it on
    challenge-specific criteria, and compare it against past and same-day submissions for originality.
    Higher-quality, original solutions earn higher scores; plagiarized/duplicate submissions are
    rejected or zeroed.
  submission_format: [source_code]

scoring_signals:
  - name: challenge_score
    metric_kind: composite
    direction: higher_is_better
    weight: 0.5
    normalization: softmax
    notes: >-
      Per-challenge performance score produced by each ChallengeManager (abstract get_challenge_scores;
      concrete scoring lives in external per-challenge images). Combined across challenges by their
      challenge_incentive_weight. README states a softmax normalizes scores. CHALLENGE_SCORES_WEIGHT
      default 0.5.
  - name: alpha_burn
    metric_kind: other
    metric_kind_other: owner_burn_allocation
    direction: higher_is_better
    weight: 0.5
    normalization: none
    notes: >-
      Burn component: assigns score 1.0 to the subnet owner's hotkey (metagraph.owner_hotkey).
      ALPHA_BURN_WEIGHT default 0.5; increased by redistributed weight from challenges with no valid
      submissions.
  - name: comparison_similarity
    metric_kind: similarity
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      Plagiarism/originality gate, not an additive reward. Max comparison score >= 0.6 causes the
      submission's comparison validation to be skipped (treated as high similarity); README: similarity
      above 60% rejected, 100% similarity = zero score.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Challenge inputs generated/seeded inside the challenge Docker container; each miner submission is
      run against these inputs to produce scoring logs.
    source_identifier: "challenge container (e.g. selenium/standalone-chrome for Humanize Behaviour)"
    trust_model: trusted
    notes: "Inputs come from seed_inputs plus container-generated challenge inputs (start_challenge)."
  - kind: commit_reveal
    description: >-
      Miners commit encrypted submissions; commits are subject to a 24h cooldown and time-on-time check
      before scoring.
    source_identifier: "MinerChallengeCommit / encrypted_commit"
    trust_model: adversarial
    notes: "COMMIT_COOLDOWN default 86400s; is_commit_on_time requires commit >= 24h old."

aggregation:
  method: weighted_average
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "subnet owner hotkey (metagraph.owner_hotkey)"
    fraction: 0.5
    dynamic: true
    notes: >-
      ALPHA_BURN_WEIGHT default 0.5 (fixed floor). Dynamic because unused challenge incentive weight is
      added: alpha_burn_weight = ALPHA_BURN_WEIGHT + weights_to_redistribute * CHALLENGE_SCORES_WEIGHT.
      If no challenge has valid submissions, all weight goes to burn.
  notes: >-
    Per-challenge scores are normalized (exclude_same_miner produces scores summing to 1), multiplied by
    each challenge's challenge_incentive_weight, summed, then combined 50/50 with the burn score.
    final_scores = challenge_scores * CHALLENGE_SCORES_WEIGHT + alpha_burn_scores * alpha_burn_weight.

weight_setting:
  cadence: daily
  method: >-
    get_onchain_scores combines normalized challenge scores (weight CHALLENGE_SCORES_WEIGHT) and alpha
    burn scores (weight ALPHA_BURN_WEIGHT) into final onchain scores. Scoring occurs once per day at
    SCORING_HOUR (default 14 UTC). The actual subtensor.set_weights call site is not present in this
    repository.
  on_chain_call: unknown
  tempo_or_interval: null
  smoothing:
    kind: other
    alpha: null
    window: null
    notes: >-
      README describes a time-based decay of historical scores ("Older submissions decay over ~10-15
      days") and _get_challenge_scores docstring mentions "applies time-based decay to historical
      scores", but no decay-rate constant is present in this repo's source; concrete decay lives in
      external per-challenge scoring. Decay kind/rate unresolved.

anti_gaming:
  - kind: plagiarism_detection
    enforcement: rejection
    description: >-
      Submissions compared against past and same-day submissions. Max comparison score >= 0.6 skips
      comparison validation (high similarity). README: similarity above 60% => rejection; 100%
      similarity => zero score.
  - kind: deduplication
    enforcement: penalty
    description: >-
      exclude_same_miner keeps only the best-scoring submission among miners deemed the same entity
      (shared IP, Docker username, or overlapping coldkeys); other UIDs in the group are zeroed.
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      Commit cooldown (COMMIT_COOLDOWN default 24h) and is_commit_on_time gate prevent rapid
      resubmission; submissions must be >= 24h old to be scored.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      MIN_VALIDATOR_STAKE default 10,000 required for validators. _get_alpha_stake_scores uses sqrt of
      alpha stake aggregated per coldkey (present but not used in the final get_onchain_scores path).

sub_competitions:
  structure: multi_mechanism
  stages: []
  count: null
  notes: >-
    Multiple independent challenges (e.g. Humanize Behaviour) each managed by a ChallengeManager with
    its own challenge_incentive_weight; scores combined across challenges. Number of active challenges
    not fixed in this repo.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, cooldown]
  status_values: []
  reset_policy: >-
    Miner state per challenge keyed by UID; a hotkey change on a UID resets that UID's MinerChallengeInfo.
    Each new commit immediately stops rewards from the previous submission (README).
  notes: >-
    ChallengeManager.miner_states maps uid -> MinerChallengeInfo (latest_commit); a bounded heap tracks
    up to max_unique_commits unique commits. Miners not in metagraph are pruned.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/miner/concepts/incentive.md"
    - "docs/challenges/humanize_behaviour/README.md"
  completeness: medium

