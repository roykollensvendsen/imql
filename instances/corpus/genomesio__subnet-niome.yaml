schema_version: "1.0.0"
instance_kind: extracted

# BURNING_RATE = 1.0 means 100% of weight goes to OWNER_HOTKEY; the documented genomics
# scoring pipeline is fully implemented but its weight output is multiplied by (1 - 1.0) = 0.
# The forward loop also short-circuits to a burn-only set_weights when BURNING_RATE == 1.0.
mechanism_status: full_burn
mechanism_status_notes: >-
  BURNING_RATE is hard-coded to 1.0. In set_weights, miner weights are scaled by
  (1 - BURNING_RATE) = 0 and the owner UID receives the full BURNING_RATE = 1.0. The
  forward() loop additionally branches to a burn-only path (set_weights([], "") then
  subtensor.set_weights) whenever BURNING_RATE == 1.0, so the genomic VCF scoring
  pipeline does not currently influence on-chain emissions.

subnet:
  name: "NIOME (Privacy-Safe Genomic Intelligence)"
  owner_repo: "genomesio__subnet-niome"
  netuid: 55
  implementation_lang: python

task:
  summary: >-
    Validators fetch a synthetic genomic simulation task (paired-end FASTQ reads plus
    expected variant count) from the NIOME backend and broadcast it to miners. Each miner
    runs a variant-calling / generative genomics pipeline and returns a VCF file of called
    variants. Validators score the miner VCF against a held-out ground-truth VCF using
    depth-weighted precision, recall and F1.
  submission_format: [content_link]   # VCF content returned in the GenomicsTaskSynapse response (vcf_content)
  submission_format_other: ""

scoring_signals:
  - name: weighted_precision
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.3
    normalization: none
    notes: >-
      Depth-weighted precision tp_w / (tp_w + fp_w + 1e-9); variants weighted by a
      difficulty heuristic (variant_weight: 0.3/0.6/1.0 by read depth). Contributes 0.3
      to the final score.
  - name: weighted_recall
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.3
    normalization: none
    notes: >-
      Depth-weighted recall tp_w / (tp_w + fn_w + 1e-9). Contributes 0.3 to final score.
  - name: weighted_f1
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.4
    normalization: none
    notes: >-
      Depth-weighted F1 = 2*p*r/(p+r+1e-9). Contributes 0.4 to final score
      (final_score = 0.4*f1 + 0.3*p + 0.3*r).
  - name: response_time
    metric_kind: latency
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      response_time is recorded and passed to final_score(), but the time-penalty term
      (score2) is commented out, so response time currently does NOT affect the score.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Held-out truth VCF and reference FASTA fetched from the NIOME backend per task,
      normalized via bcftools and compared as exact variant sets.
    source_identifier: "https://niome-api.genomes.io/api/tasks/ground_truth"
    trust_model: trusted
    notes: >-
      Ground truth (truth_vcf, ref) is downloaded from the centralized genomes.io backend;
      depth map derived from a BAM built by aligning task reads with bwa/samtools.

aggregation:
  method: rank_based
  composition: weighted_sum            # final_score is a weighted sum of f1/precision/recall
  normalization: sum_to_one
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "5DJ5fT174AY8GzbYHnamYQCJd4cTcj2Zf7ogUvBhry1KfYVd"   # OWNER_HOTKEY
    fraction: 1.0                      # BURNING_RATE = 1.0
    dynamic: false
    notes: >-
      final_weights = full_miner_weights * (1 - BURNING_RATE); owner gets += BURNING_RATE.
      With BURNING_RATE = 1.0 the owner receives 100% of emissions.
  notes: >-
    SCORING_SYSTEM = "top": process_scores_top keeps only the top TOP_MINER_COUNT (10)
    positive-scoring miners and assigns weights from SCORE_DISTRIBUTION
    [0.6, 0.2, 0.05, 0.04, 0.03, 0.02, 0.02, 0.02, 0.01, 0.01] (renormalized), ranked by
    descending final_score. A "linear" proportional alternative exists but is not selected.

weight_setting:
  cadence: other
  cadence_other: "block-phased within a fixed INTERVAL_BLOCKS cycle"
  method: >-
    Phased loop keyed off chain block: fetch miners' VCFs at FETCHING_BLOCK offset, run
    validation/scoring at VALIDATION_BLOCK offset, within each INTERVAL_BLOCKS cycle since
    BASE_BLOCK_NUMBER. set_weights builds a normalized weight vector then applies burn.
  on_chain_call: set_weights
  tempo_or_interval: "INTERVAL_BLOCKS = 2400 (FETCHING_BLOCK=0, VALIDATION_BLOCK=750, WEIGHT_SET_BLOCK=900)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/moving average of the final reward; scores are recomputed fresh each cycle and
      converted directly to weights.

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Miner responses whose non-header variant line count != task.expected_variant_count are
      skipped (continue) and never scored. Axons with ip == '0.0.0.0' are also skipped.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Validator task/ground-truth requests to the backend are signed with the validator
      hotkey (build_signature_headers / canonical JSON signature) to authenticate the caller.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    Per-cycle scoring only; self.scores array is reset to zero on hotkey replacement in
    resync_metagraph but is not used as a moving average for weight setting.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/validator_guide.md"
  completeness: medium

