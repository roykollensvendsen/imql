schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  Production weight-setting uses the loss/DPO-margin ProgressTracker score raised to
  WEIGHT_EXPONENT, split equally per active track. Emissions are burned to UID 0 only
  dynamically: a per-round emission_scale in [emission_floor, 1.0] decays from the last time
  a miner was improving/near-frontier, and the burn UID receives (1 - effective_budget).
  When miners are active, scale is 1.0 (no burn beyond budget cap); when the subnet stagnates,
  emission decays toward UID 0. A separate interview-style scoring.py module (Validity +
  Questions + Interview - Loop penalties) exists but is NOT the path used by the validator
  weight worker.

subnet:
  name: "EvolAI"
  owner_repo: "openevolai__evolai"
  netuid: 47
  implementation_lang: python

task:
  summary: >-
    Miners publish open HuggingFace language models (model name must contain "evolai") in the
    "transformer" or "mamba2" track and register them on-chain via commitment metadata.
    Validators download each model and measure cross-entropy loss and reasoning quality on a
    deterministic per-epoch challenge set: a per-token base CE on ground-truth responses, a
    thinking-augmented CE, DPO-style margins (CE of model-generated vs ground-truth response),
    and binary side-quest accuracy. Lower loss / better reasoning that genuinely improves over
    time is rewarded.
  submission_format: [model_weights]

scoring_signals:
  - name: absolute_quality
    metric_kind: loss
    direction: lower_is_better
    weight: null
    normalization: ema
    notes: >-
      DPO-base absolute = min(1.0, exp(gamma * ema_dpo_base)) where dpo_base_margin =
      CE(G_base|q) - CE(T|q) (always <= 0). Falls back to exp(-gamma*ema_base_ce) for miners
      without DPO history. Combined with think_gain into quality = absolute*(0.60+0.40*think_gain),
      then weighted by (w_abs + w_think) = 0.75. Weight is non-additive (entangled with think_gain),
      so left null.
  - name: think_gain
    metric_kind: reward
    direction: higher_is_better
    weight: null
    normalization: ema
    notes: >-
      think_gain = max(0, tanh(ema_dpo_think - ema_dpo_base)); multiplicative on absolute via
      quality = absolute*(0.60 + 0.40*think_gain). A memorizer (think_gain~0) reaches only 60%
      of absolute. Not an additive signal -> weight null.
  - name: flow
    metric_kind: risk_adjusted_ratio
    direction: higher_is_better
    weight: 0.15
    normalization: ema
    notes: >-
      W_FLOW=0.15. Sharpe ratio of the EMA trend of dpo_think_margin (or CE fallback):
      sharpe = mu_delta/(sigma_delta + flow_eps), flow = max(0, tanh(sharpe)). Requires
      >= MIN_FLOW_EPOCHS=10 records.
  - name: side_quest_accuracy
    metric_kind: accuracy
    direction: higher_is_better
    weight: 0.10
    normalization: ema
    notes: >-
      W_SQ=0.10. EMA of side-quest accuracy (fraction of deterministic math side-quest answers
      correct, binary per quest, 2 quests per sample).
  - name: per_miner_scale
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: ema
    notes: >-
      Multiplicative final scale in [0,1]: miner_scale = W_IMPROVEMENT*improvement +
      W_PROXIMITY*proximity (0.3/0.7). improvement = max(0, tanh(long_ema - short_ema));
      proximity = min(1, global_best_long_ema/long_ema). raw_score is multiplied by miner_scale.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Per-epoch challenge rows drawn deterministically (epoch seed committed on-chain) from the
      ACTIVE_DATASETS HuggingFace dataset(s); ground-truth instruction/response pairs used as the
      teacher-forced target for CE and as the reference T in DPO margins.
    source_identifier: "evolai/universal_qa"
    trust_model: trusted
    notes: "ACTIVE_DATASETS default 'evolai/universal_qa'; N_EVAL=10 rows per dataset."
  - kind: deterministic_dataset
    description: >-
      Side-quest turns: deterministic math questions generated from block_hash + sample index;
      answer-matching is binary (0 if correct answer appears in output, else counted via
      check_side_quest_answer).
    source_identifier: "evolai.validator.side_quests.generate_side_quests"
    trust_model: trusted
    notes: "SIDE_QUEST_N=2 per sample; turn order shuffled deterministically by block_hash+index."

aggregation:
  method: proportional
  composition: hybrid
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    dynamic: true
    notes: >-
      STAGNATION_BURN_UID=0. Burn UID weight = max(0, 1 - effective_budget), where
      effective_budget = miner_budget * emission_scale. emission_scale is 1.0 when any miner is
      improving or near-frontier, else decays exp(-EMISSION_LAMBDA*staleness_days) floored at
      EMISSION_FLOOR=0.2. miner_budget = min(1, DAILY_TAO_EMISSION/(alpha_price*DAILY_ALPHA_EMISSION)),
      defaulting to 1.0 when price unavailable.
  notes: >-
    Per-track: per-miner final score is raised to WEIGHT_EXPONENT=2.0, normalized within the
    track (sum to 1), then scaled by an equal _share = 1/num_active_tracks across tracks, then
    multiplied by effective_budget. Final weight vector normalized to sum to 1 on-chain.

weight_setting:
  cadence: rate_limited
  method: >-
    Background weight-updater thread runs every _WEIGHT_INTERVAL_S=600s. For each active track,
    score**WEIGHT_EXPONENT normalized to sum 1, multiplied by equal track share and effective
    budget; burn UID gets the residual. set_weights called with wait_for_inclusion=True.
  on_chain_call: set_weights
  tempo_or_interval: "600 seconds (weight worker); EPOCH_BLOCKS=360 for eval epochs"
  smoothing:
    kind: ema
    alpha: 0.10
    window: null
    notes: >-
      PROGRESS_EMA_ALPHA=0.10 used as the per-signal EMA over epoch history (_ema). Short/long
      EMAs for improvement/proximity use alpha = 2/(N+1) with EMA_SHORT_ROUNDS=140,
      EMA_LONG_ROUNDS=1800. Loss/score history capped at HISTORY_EPOCHS=1800 records.

anti_gaming:
  - kind: code_inspection
    enforcement: barrier
    description: >-
      Model name must contain 'evolai' and be a public HuggingFace model; supported tracks
      transformer/mamba2. VALID_PARAM_RANGES_B gates allowed parameter counts to three bands
      (~0.45-0.48B, 1.5-1.8B, 3.5-3.8B).
  - kind: plagiarism_detection
    enforcement: elimination
    description: >-
      copy_gaming: model_fingerprint.py flags a UID whose model fingerprint matches another UID's
      (exact weight hash, structural clone, or near-copy); EMA score forced to 0 and evaluation
      skipped (score_zero_copy_gaming). Note: enforcement lives in the interview/scoring.py path.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Anti-memorization: absolute quality uses DPO-base margin only (not think margin), so a
      miner degrading base quality while faking thinking traces gets absolute=0. Special-token
      literals (<|...|>) are stripped from miner decodes to block injected fake turn boundaries.
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      Epoch seed is committed on-chain one epoch ahead (generate_seed/commit_epoch_seed) and used
      to derive eval rows the NEXT epoch, so miners cannot precompute on the live eval set.
  - kind: rate_limit
    enforcement: penalty
    description: >-
      Answer-loop detection: LOOP_WARNING_PENALTY=0.1 per warning; identical response repeated
      >= LOOP_CIRCUIT_BREAKER=5 forces score 0 (answer_loop_circuit_break). (scoring.py path.)

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: transformer
      role: main
      advancement_rule: ""
    - name: mamba2
      role: main
      advancement_rule: ""
  count: 2
  notes: >-
    Two parallel tracks (transformer, mamba2) evaluated and weighted independently; each active
    track receives an equal emission share (1/num_active_tracks).

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cumulative_score, registration_age]
  status_values: []
  reset_policy: >-
    Per-UID epoch history (deque maxlen=HISTORY_EPOCHS=1800) wiped on hotkey/coldkey change;
    coldkey:hotkey history archived and restorable within COLDKEY_ARCHIVE_TTL_DAYS=7. Loss
    history reset when a miner's model_name changes.
  notes: >-
    ProgressTracker persists EpochRecord history (loss, thinking_loss, base_loss, sq_accuracy,
    dpo_think_margin, dpo_base_margin, model_revision) per UID to progress_tracker.json.

documentation:
  status: code_authoritative
  source_version: null
  primary_docs: ["README.md", "VALIDATOR_INTERVIEW_EVALUATION.md (referenced by scoring.py docstring)"]
  completeness: medium

