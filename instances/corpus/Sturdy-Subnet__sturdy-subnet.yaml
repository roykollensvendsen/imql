      quote: "MINER_GROUP_EMISSIONS = {\n    \"UNISWAP_V3_LP\": 1,  # uniswap lp miners will receive 100% of the emissions\n}"
    - claim_field: /per_miner_state/reset_policy
      source_path: swap/base/validator.py
      line_ref: "361-365"
      quote: "if uid in old_miner_types and old_miner_types[uid] != self.miner_types[uid]:\n                ...\n                self.scores[uid] = 0"
    - claim_field: /per_miner_state/notes
      source_path: swap/base/validator.py
      line_ref: "437-443"
      quote: "np.savez(\n                self.config.neuron.full_path + \"/state\",\n                step=self.step,\n                scores=self.scores,\n                hotkeys=self.hotkeys,\n                miner_types=self.miner_types,\n            )"
  unresolved:
    - "Whether the live subnet currently registers >200 LP miners (so the rank-200 cutoff actually fires) is not determinable from source."
    - "The README states scoring is by 'fees received in the past 24 hours' but the code scores by in-range liquidity value L, not realized fees; the realized-fees variant is not present in the read code (BLOCK_ONE_DAY_AGO is defined but unused)."
    - "Exact set_weights cadence in wall-clock blocks vs the 300s loops is governed by epoch_length default 25 (12s blocks) but the loop also gates on MAIN_LOOP_FREQUENCY; the effective on-chain tempo is not pinned to a single constant."
