schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: mixed
mechanism_status_notes: >-
  TOTAL_BURN_EMISSION = 0.91 is burned every cycle (distributed to fixed burner UIDs),
  leaving only 1 - 0.91 = 0.09 for actual miners under the default algorithm. The active
  algorithm is "rental_price", which can dynamically convert part of the 0.91 burn into a
  rental_share paid to miners with unrented high-end GPUs (capped at 0.91); when no eligible
  rental supply exists the share is 0 and the cycle is effectively a 0.91 burn. So real
  scoring (hardware/rental incentive) coexists with a large dynamic burn — hence mixed.

subnet:
  name: "Lium / Compute Subnet (Datura)"
  owner_repo: "Datura-ai__lium-io"
  netuid: 51
  implementation_lang: python

task:
  summary: >-
    Miners register GPU executors (machines). Validators send synthetic jobs to verify each
    executor's GPU model, count, connectivity, collateral and rental state. Miners are rewarded
    for providing real, verified, available GPU compute — primarily for unrented high-end GPUs
    whose rental market value drives a dynamic "rental_price" emission share, plus a smaller
    mining-pool reward for rented executors. Burner UIDs absorb the residual (0.91) burn emission.
  submission_format: [compute_service]
  submission_format_other: ""

scoring_signals:
  - name: gpu_hardware_validation
    metric_kind: hardware_spec
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Validator runs synthetic jobs to determine gpu_model, gpu_count and a base score/job_score.
      calculate_scores() gates the actual_score: machine price above base_price*MACHINE_MAX_PRICE_RATE,
      missing EMA verifyx download speed, or (for non-excluded GPU types) missing collateral / outdated
      contract version drive actual_score to 0 (gating, not additive).
  - name: rental_price_incentive
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      For unrented eligible GPUs: incentive = rental_share * gpu_count * effective_rate /
      total_rental_cost, where effective_rate = hourly_rate * unrented_cap_multiplier *
      sysbox_multiplier. Multiplicative/proportional within the dynamic rental pool, not an
      additive weighted signal.
  - name: mining_score
    metric_kind: composite
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Default-pool score for rented / non-eligible GPUs: mining_score = score * gpu_portion *
      gpu_count / total_gpu_count * sysbox_multiplier * uptime_multiplier; incentive =
      mining_share * mining_score / total_mining_score where mining_share = 1 - TOTAL_BURN_EMISSION.

ground_truth_sources:
  - kind: hardware_probe
    description: >-
      Synthetic jobs executed on each executor over SSH verify GPU model/count, connectivity
      (port/DinD probes), verifyx download speed, and rental state. Drives score/job_score.
    source_identifier: "neurons/validators/src/services/task/score_calculator.py"
    trust_model: adversarial
    notes: "Validator-run probes; miners can attempt to fake hardware, hence adversarial."
  - kind: market_data
    description: >-
      TAO price (CoinGecko) and alpha rate feed epoch_subnet_emission used to convert total
      rental USD/hour cost into the rental emission share.
    source_identifier: "incentive/price_provider.py (PriceProvider.get_tao_price / get_alpha_rate)"
    trust_model: oracle
    notes: "Used in _calculate_rental_share; on failure rental_share falls back to 0."

aggregation:
  method: proportional
  composition: hybrid
  normalization: sum_to_one
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "NEW_BURNERS uids [187..196] (ENABLE_NEW_BURN_LOGIC=True); legacy BURNERS [4,206,207,208]"
    fraction: 0.91
    dynamic: true
    notes: >-
      TOTAL_BURN_EMISSION=0.91 is the burn pool ceiling. Under rental_price, burn_share =
      TOTAL_BURN_EMISSION - rental_share, so the burn fraction is a dynamic residual that
      shrinks as eligible rental supply grows (rental_share capped at 0.91). With new burn
      logic, burn_share is split equally across the NEW_BURNERS uids.
  notes: >-
    Two-phase: per-cycle scores (mining incentives + burn scores) are accumulated into
    miner_scores across cycles, then set_weights normalizes via process_weights_for_netuid.

weight_setting:
  cadence: per_epoch
  method: >-
    Per sync cycle the validator accumulates cycle_scores (burn scores for burner UIDs +
    mining/rental incentives for miners) into self.miner_scores. When should_set_weights()
    is true (last_update >= tempo), set_weights normalizes accumulated scores with
    process_weights_for_netuid, applies a positive floor, and calls subtensor.set_weights;
    miner_scores is then reset to {}.
  on_chain_call: set_weights
  tempo_or_interval: "360 blocks (TEMPO); jobs every BLOCKS_FOR_JOB; sync loop every 12s (SYNC_CYCLE)"
  smoothing:
    kind: other
    alpha: null
    window: null
    notes: >-
      No EMA. Temporal smoothing is via additive accumulation of per-cycle scores into
      miner_scores until a weight-set, then reset. First post-restart set_weights is skipped
      (completed_cycles_since_start < 1 warm-up).

anti_gaming:
  - kind: hardware_validation
    enforcement: barrier
    description: >-
      Synthetic jobs verify GPU model/count and connectivity before any score; spot-tier and
      failed executors get mining_score 0 and are excluded from both pools.
  - kind: collateral
    enforcement: penalty
    description: >-
      For non-excluded GPU types, missing collateral sets actual_score and job_score to 0
      (unless ENABLE_NO_COLLATERAL). Outdated contract version multiplies score by
      SCORE_PORTION_FOR_OLD_CONTRACT = 0. (Note: B200 is in COLLATERAL_EXCLUDED_GPU_TYPES.)
  - kind: rate_limit
    enforcement: penalty
    description: >-
      price_per_gpu above base_price * MACHINE_MAX_PRICE_RATE (default 2.0) sets actual_score
      to 0, preventing miners from inflating rental price for higher rental incentive.
  - kind: liveness_check
    enforcement: penalty
    description: >-
      Missing EMA verifyx download speed (probe failed/never measured) on unrented executors
      sets actual_score and job_score to 0.

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: "default incentive (rented / non-eligible GPUs)"
      role: main
      advancement_rule: "mining_share * mining_score / total_mining_score"
    - name: "rental_price incentive (unrented eligible high-end GPUs)"
      role: main
      advancement_rule: "rental_share * gpu_count * effective_rate / total_rental_cost"
    - name: "burn pool (fixed burner UIDs)"
      role: other
      advancement_rule: "burn_share = TOTAL_BURN_EMISSION - rental_share, split across burner uids"
  count: 3
  notes: >-
    IncentiveFactory selects algorithm from IncentiveConfig.algorithm (default "rental_price";
    options "default"|"rental_price"). Cap dilution is applied per (base_model, gpu_count_bucket).

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    miner_scores accumulate per cycle and are persisted to Redis (MINER_SCORES_KEY); reset to
    {} immediately after a successful set_weights.
  notes: >-
    Executor uptime (minutes) is also tracked in Redis and feeds uptime_multiplier in the
    default mining score when collateral penalty is not skipped.

