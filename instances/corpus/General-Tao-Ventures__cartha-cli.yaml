schema_version: "1.0.0"
instance_kind: extracted

mechanism_status: unknown
mechanism_status_notes: >-
  This repository is the miner-side command-line tool (cartha-cli), NOT the validator. The actual
  scoring and weight-setting code lives in a separate repo referenced in a code comment as
  "cartha-validator config.py min_total_assets_usdc". The CLI only documents mechanism facts as
  surfaced to miners: weekly epochs frozen Friday 00:00 UTC, locked-USDC liquidity is what gets
  scored, and a 100,000 USDC minimum portfolio threshold below which a miner receives score=0 and
  no rewards. Whether the live validator burns emission, the exact scoring curve, the aggregation,
  and the on-chain weight cadence cannot be determined from this repo. Hence mechanism_status:
  unknown.

subnet:
  name: "Cartha"
  owner_repo: "General-Tao-Ventures__cartha-cli"
  netuid: 35
  implementation_lang: python

task:
  summary: >-
    Cartha is the Liquidity Provider for the 0xMarkets DEX. Miners provide liquidity by locking USDC
    into Cartha vault contracts on an EVM chain (e.g. Base) for a chosen duration (7-365 days),
    against a specific trading pair / pool (e.g. BTCUSD). An off-chain "verifier"/validator detects
    the on-chain LockCreated event and includes the miner's locked position in the upcoming weekly
    reward epoch. Miners are rewarded for the USDC liquidity they keep locked; a miner whose total
    locked portfolio is below 100,000 USDC receives score=0 and no rewards. The actual scoring/weight
    computation is performed by the separate cartha-validator service, not by this CLI.
  submission_format: [other]
  submission_format_other: >-
    On-chain liquidity lock: miner locks USDC into a Cartha vault contract (EIP-712 signed
    LockRequest from the verifier), and the verifier detects the LockCreated event to enroll the
    position in the next epoch. No model weights, code, or signals are submitted to validators.

scoring_signals:
  - name: locked_usdc_liquidity
    metric_kind: other
    metric_kind_other: locked_liquidity_amount
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Total USDC locked across the miner's vault positions (the "portfolio"). The CLI displays an
      "Active Portfolio (Current Epoch)" and "Verified Portfolio (Next Epoch)" and warns that
      portfolios below 100,000 USDC get score=0. The exact mapping from locked amount to validator
      weight is NOT in this repo (it is in cartha-validator). Weight left null because the additive
      contribution/curve is undocumented here.

ground_truth_sources:
  - kind: market_data
    description: >-
      On-chain LockCreated events from Cartha vault contracts on an EVM chain (e.g. Base, chain id
      8453 mainnet / 84532 Base Sepolia testnet). The verifier reads these events to determine each
      miner's locked USDC amount and pool membership for an epoch.
    source_identifier: "Cartha vault contracts (EVM); verifier api.cartha.finance"
    trust_model: oracle
    notes: >-
      Ground-truth lock state is read on-chain by the off-chain verifier; the CLI only queries the
      verifier's HTTP API to display status. Lock detection is event-driven (LockCreated).

aggregation:
  method: undocumented
  composition: gated
  normalization: none
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: >-
      No burn logic present in this repo (CLI only). Burn behaviour of the live validator is unknown.
  notes: >-
    The only documented gating rule in this repo is a hard minimum-portfolio threshold: miners with
    less than 100,000 USDC total locked receive score=0 and no rewards (gated/fail-closed). The
    actual aggregation across pools/miners and the conversion to on-chain weights is performed by
    cartha-validator and is not present here, hence method: undocumented.

weight_setting:
  cadence: weekly
  method: >-
    Rewards are organised around weekly epochs. The epoch "freezes" each Friday at 00:00 UTC; the
    CLI computes the current epoch start as the most recent Friday 00:00 UTC and the next freeze as
    +7 days. Positions verified before the freeze are "Active" (earning rewards in the current
    frozen epoch); positions locked after are "In Next Epoch". The actual set_weights call is made
    by the cartha-validator, not by this CLI.
  on_chain_call: unknown
  tempo_or_interval: "weekly (epoch freeze every Friday 00:00 UTC)"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No reward smoothing logic in this repo. The CLI only displays per-epoch active vs next-epoch
      status; any temporal smoothing would live in cartha-validator (not present).

anti_gaming:
  - kind: collateral
    enforcement: barrier
    description: >-
      Minimum-portfolio barrier: a miner must lock at least 100,000 USDC total across pools to be
      eligible for any score/rewards; below this threshold score=0. Liquidity is real on-chain USDC
      locked for a fixed term (7-365 days), making it a capital/collateral requirement rather than a
      cheap signal.
  - kind: liveness_check
    enforcement: rejection
    description: >-
      Positions are scoped to weekly epochs frozen Friday 00:00 UTC; only positions verified before
      the freeze count toward the current epoch ("Active"), others are deferred to the next epoch.
      Pair states include "revoked" (deregistered or evicted), indicating positions can be evicted.

sub_competitions:
  structure: multi_asset
  stages: []
  count: null
  notes: >-
    Miners can hold positions across multiple trading-pair pools (e.g. BTCUSD and others listed by
    "cartha vault pools"); the portfolio threshold is evaluated on the total across all pools. No
    explicit tiers/ladder documented.

per_miner_state:
  tracked: true
  state_kinds: [status_enum]
  status_values: [active, verified, pending, revoked, unknown]
  reset_policy: ""
  notes: >-
    The CLI's pair-status command documents a per-miner pair state enum: active (in current frozen
    epoch, earning rewards), verified (has lock proof, not in current active epoch), pending
    (registered, no lock proof yet), revoked (deregistered or evicted), unknown (no pair record).
    These states are maintained by the verifier, not this CLI.

