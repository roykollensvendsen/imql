schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: full_burn
mechanism_status_notes: >-
  The documented incentive (per-zipcode competitive scoring with 55/30/10/5 reward
  distribution) is implemented in rewards/zipcode_competitive_scorer.py, but the live
  weight-setting call site in neurons/validator.py hardcodes 100% of emission to a single
  burn UID (238) and zeros all miner weights. The competitive scorer path is therefore
  dormant in production: scores are computed but never drive on-chain weights.

subnet:
  name: "RESI - Real Estate Super Intelligence"
  owner_repo: "resi-labs-ai__resi"
  netuid: 46
  implementation_lang: python

task:
  summary: >-
    Miners build custom scrapers to collect US real estate listing data (e.g. sold
    properties for assigned zipcodes from sources like Zillow, Redfin, county records),
    conform it to a required property schema, and upload it to S3. Validators assign
    miners zipcodes per epoch and score submissions on quantity, quality/schema
    compliance, and spot-check accuracy against the source. The documented mechanism
    runs a per-zipcode competition rewarding the earliest valid submissions.
  submission_format: [content_link]
  submission_format_other: ""

scoring_signals:
  - name: tier1_quantity
    metric_kind: volume
    direction: target_band
    weight: null
    normalization: none
    notes: >-
      Tier 1 gate: actual listing count must fall within +/-15% of the expected count
      from the zipcode server (expected_min = expected_count*0.85, expected_max =
      expected_count*1.15). Pass/fail gate, not an additive weight.
  - name: tier2_quality_epoch_compliance
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Tier 2 gate: quality and epoch-compliance validation of entities (schema
      completeness, etc.). Pass/fail; failing here drops the miner to participant status.
  - name: tier3_spot_check
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Tier 3 gate: randomly selected entities are re-scraped from the source and
      verified for accuracy. Passing all three tiers makes a miner eligible to be a
      top-3 winner for that zipcode.
  - name: submission_earliness
    metric_kind: latency
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      Submissions are sorted by submission_timestamp earliest-first; the first three
      miners to pass all tiers take 1st/2nd/3rd place for the zipcode.
  - name: zipcode_reward_rank
    metric_kind: reward
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Per-zipcode reward by rank: 1st=0.55, 2nd=0.30, 3rd=0.10; remaining 0.05 split
      equally among non-winner participants. Each zipcode's contribution is weighted by
      that zipcode's share of total listings found across the epoch.

ground_truth_sources:
  - kind: organic_traffic
    kind_other: ""
    description: >-
      Real estate listing source websites (e.g. Zillow) are re-scraped by validators in
      Tier 3 spot-check validation to verify miner-submitted listing accuracy.
    source_identifier: "zillow / real estate websites"
    trust_model: trusted
    notes: >-
      Expected listing counts and zipcode assignments come from the RESI API server
      (api.resilabs.ai); accuracy verification scrapes the original listing source.
  - kind: deterministic_dataset
    kind_other: ""
    description: >-
      Per-epoch zipcode assignments and expected listing counts served by the RESI API
      define the ground-truth target quantity for Tier 1.
    source_identifier: "RESI API (get_current_zipcode_assignments)"
    trust_model: trusted
    notes: ""

aggregation:
  method: winner_take_all
  method_other: ""
  composition: gated
  composition_other: ""
  normalization: sum_to_one
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "238"
    fraction: 1.0
    dynamic: false
    notes: >-
      Live set_weights() hardcodes final_weights[0] = 1 for burn UID 238 (100% to burn)
      and sets remaining_weight = 0, so every miner weight is zeroed. The competitive
      scorer's normalized per-miner scores never reach the chain.
  notes: >-
    Documented aggregation: each zipcode is a winner-take-(top-3) competition gated by a
    3-tier pass/fail check; per-zipcode rewards are weighted by zipcode listing share and
    normalized to sum to 1.0 (calculate_epoch_proportional_weights). This documented path
    is bypassed by the burn in the live call site.

weight_setting:
  cadence: rate_limited
  cadence_other: ""
  method: >-
    should_set_weights() triggers when the validator enters a new 1200-block (4-hour)
    cycle; set_weights() then routes 100% weight to burn UID 238 and calls
    subtensor.set_weights().
  on_chain_call: set_weights
  tempo_or_interval: "1200 blocks (4 hours) per cycle"
  smoothing:
    kind: none
    kind_other: ""
    alpha: null
    window: null
    notes: ""

anti_gaming:
  - kind: deduplication
    enforcement: rejection
    enforcement_other: ""
    description: >-
      are_entities_unique() runs a 4-layer duplicate check (zpid, URI-zpid consistency);
      a submission with duplicates fails pre-tier (failed_at_tier 0) and is rejected.
  - kind: deterministic_check
    enforcement: rejection
    enforcement_other: ""
    description: >-
      Tier 1 quantity gate: listing count must be within +/-15% of the API-provided
      expected count, preventing under/over-reporting.
  - kind: hardware_validation
    enforcement: rejection
    enforcement_other: ""
    description: >-
      Tier 3 spot-check re-scrapes randomly selected entities from the original source
      to detect synthetic or fabricated listing data.
  - kind: commit_reveal
    enforcement: barrier
    enforcement_other: ""
    description: >-
      DeterministicConsensus computes a consensus hash over final scores and an epoch
      nonce so all validators reach identical results for the epoch.

sub_competitions:
  structure: per_task_type
  structure_other: ""
  stages: []
  count: null
  notes: >-
    Each assigned zipcode is an independent competition (per-zipcode ranking and 55/30/10/5
    reward split), aggregated across all zipcodes in the epoch weighted by listing share.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    Per-zipcode validation produces transient WINNER/PARTICIPANT status within an epoch
    result dict, but no persistent cross-epoch per-miner ledger was found in the scoring code.

