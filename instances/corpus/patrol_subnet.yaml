schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Validator computes per-miner overall scores (Volume 90%, Responsiveness 10%),
  takes a moving average, normalizes scores to sum-to-one and calls set_weights.
  Weight setting is gated on ENABLE_WEIGHT_SETTING (default "1" => enabled) and is
  due once blocks_since_last_update > tempo. No burn allocation is present in the
  code. Novelty score is documented but unimplemented (returns 0.0).

subnet:
  name: "Patrol"
  owner_repo: "patrol_subnet"
  netuid: 81
  implementation_lang: python

task:
  summary: >-
    A validator selects a target wallet (and target block) randomly from the
    Bittensor chain and sends it to each miner. Each miner builds a subgraph of
    relational on-chain data (nodes = wallets, edges = transaction/staking
    relationships, plus supporting evidence) tracing the target out to N degrees
    of separation, and submits it. The validator verifies the subgraph against
    on-chain events (pass/fail) and then scores the miner on the volume of valid
    data submitted (90%) and responsiveness/latency (10%).
  submission_format: [signals]

scoring_signals:
  - name: volume
    metric_kind: volume
    direction: higher_is_better
    weight: 0.9
    normalization: none
    notes: >-
      Sigmoid of total_items = len(nodes) + len(edges):
      1 / (1 + exp(-STEEPNESS * (total_items - INFLECTION_POINT))) with
      STEEPNESS=0.005 and INFLECTION_POINT=1000. ~0.5 at 1000 items.
  - name: responsiveness
    metric_kind: latency
    direction: higher_is_better
    weight: 0.1
    normalization: none
    notes: >-
      RESPONSE_TIME_HALF_SCORE / (response_time + RESPONSE_TIME_HALF_SCORE) with
      RESPONSE_TIME_HALF_SCORE=2 seconds. Lower latency yields a higher score.
  - name: novelty
    metric_kind: other
    metric_kind_other: novelty_uniqueness
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Documented as "coming soon"; calculate_novelty_score is a placeholder
      returning 0.0 and novelty_score is stored as None. Not in overall_score.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      On-chain Bittensor events fetched and processed by the validator. Each
      miner-submitted edge must match a processed chain event (exact key match
      on coldkey source/destination/owner, category, type, rao_amount,
      block_number, etc.); unmatched edges within fetched blocks fail validation.
    source_identifier: "wss://archive.chain.opentensor.ai:443"
    trust_model: oracle
    notes: >-
      Pass/fail verification: empty payload, single node, target-not-in-graph,
      disconnected graph, out-of-range blocks, or mismatched edges => score 0.

aggregation:
  method: proportional
  composition: weighted_sum
  normalization: sum_to_one
  normalization_other: ""
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn allocation present in the weight-setting code."
  notes: >-
    overall_score = volume_score*0.9 + responsiveness_score*0.1 per submission.
    A moving average is taken over the latest scores divided by
    moving_average_denominator (default 20). At weight time, last average overall
    scores for metagraph miners are summed and each divided by the sum
    (overall_weights = v / sum_of_scores) to produce sum-to-one weights.

weight_setting:
  cadence: rate_limited
  method: >-
    Normalize last-average overall scores to sum-to-one across miners present in
    the metagraph, then submit via subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "blocks_since_last_update > tempo (chain tempo)"
  smoothing:
    kind: sma
    alpha: null
    window: 20
    notes: >-
      overall_score_moving_average = (sum(previous_overall_scores) +
      overall_score) / moving_average_denominator, with moving_average_denominator
      default 20 (previous fetched as denominator-1 latest scores).

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Pass/fail validation of the submitted subgraph against on-chain events;
      failures (empty/null payload, single node, target not in graph,
      disconnected graph, duplicate node/edge, blocks outside
      [LOWER_BLOCK_LIMIT, current_block], or edges not matching on-chain events)
      yield an ErrorPayload and a score of 0.0.
  - kind: deduplication
    enforcement: rejection
    description: >-
      Duplicate nodes (by id) and duplicate edges (by source/destination/
      category/type/rao_amount/block_number key) raise PayloadValidationError,
      failing the submission.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: ""
  notes: >-
    Per-(hotkey, uid) overall scores are persisted in a repository; a moving
    average over the latest scores (denominator default 20) is maintained and
    used at weight-setting time.

