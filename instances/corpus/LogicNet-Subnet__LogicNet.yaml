schema_version: "1.1.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Scoring is live: per-response rewards (similarity + correctness - time penalty) feed a
  rank-based cubic incentive, which is averaged over the last 5 epochs and normalized to set
  on-chain weights. No burn allocation is present in the code. The on-chain set_weights call is
  active (gated only by --neuron.disable_set_weights, default False).

subnet:
  name: "LogicNet"
  owner_repo: "LogicNet-Subnet__LogicNet"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners receive a mathematical / logical reasoning question and return both a reasoning trace
    (logic_reasoning) and a final answer (logic_answer). The validator rewards each response by a
    weighted sum of cosine similarity between the miner's reasoning and a validator-generated
    ground-truth reasoning, an LLM-judged (or programmatically computed) correctness of the final
    answer, and a small processing-time penalty. Per-epoch mean rewards are ranked and converted to
    a cubic rank-based incentive that determines on-chain weights.
  submission_format: [signals]

scoring_signals:
  - name: similarity
    metric_kind: similarity
    direction: higher_is_better
    weight: 0.3
    normalization: none
    notes: >-
      Cosine similarity (sentence-transformers all-MiniLM-L6-v2) between validator-generated
      ground-truth text and the miner's logic_reasoning. README documents 0.2, but rewarder.py
      uses SIMILARITY_WEIGHT = 0.3.
  - name: correctness
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: 0.7
    normalization: none
    notes: >-
      Final-answer correctness in [0,1]. First attempts programmatic numerical comparison
      (_compare_numerical_answers); falls back to LLM judgment (CORRECTNESS_TEMPLATE). Cheat words,
      template responses, and detected trick answers score -1. README documents 0.8, but
      rewarder.py uses CORRECTNESS_WEIGHT = 0.7.
  - name: processing_time_penalty
    metric_kind: latency
    direction: lower_is_better
    weight: -0.05
    normalization: none
    notes: >-
      PROCESSING_TIME_WEIGHT = -0.05 multiplied by min(process_time / timeout, 1). README documents
      -0.1, but rewarder.py uses -0.05.

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      Validator self-generates the reference reasoning/ground-truth text for the similarity signal
      by calling an LLM (model_selector task_type=create_task) on the raw question. Correctness is
      judged by an LLM against base_synapse.ground_truth_answer, or computed programmatically for
      numerical answers.
    source_identifier: "model_selector / OpenAI-compatible LLM pool; CORRECTNESS_TEMPLATE"
    trust_model: oracle
    notes: >-
      Questions/ground-truth answers are pulled from an external TaskPoolServer (TASK_POOL_URL).

aggregation:
  method: rank_based
  composition: weighted_sum
  normalization: sum_to_one
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    dynamic: false
    notes: "No burn allocation found in the reward or weight-setting code."
  notes: >-
    Per-response reward = SIMILARITY_WEIGHT*sim + CORRECTNESS_WEIGHT*correct +
    PROCESSING_TIME_WEIGHT*min(t/timeout,1), then rescaled reward/2 + 0.5. Per epoch, each UID's mean
    reward is computed (negatives floored to 0), UIDs ranked descending, and a cubic rank function
    incentive = -1.038e-7*rank^3 + 6.214e-5*rank^2 - 0.0129*rank - 0.0118 + 1 is applied. Only
    miners with mean score > 0.3 and rank <= 160 get their true-rank incentive; all others receive
    incentive_formula(250). These incentives are stored per UID; on-chain weights are the mean of the
    last 5 stored scores per UID (get_model_specific_weights), clamped to [0,1] and normalized to sum
    to 1, then scaled by category incentive_weight = 1.0.

weight_setting:
  cadence: per_epoch
  method: >-
    update_scores_on_chain sets validator scores to the per-category normalized mean-of-last-5-scores
    weights (incentive_weight=1.0). set_weights then L1-normalizes scores, runs
    process_weights_for_netuid, and calls subtensor.set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "50 blocks (neuron.epoch_length, in 12s blocks)"
  smoothing:
    kind: sma
    alpha: null
    window: 5
    notes: >-
      On-chain weight per UID is the simple mean of the last NO_OF_RECENT_SCORES = 5 stored
      incentive scores (get_model_specific_weights). Note: base/validator.py also defines an EMA
      update_scores using config.neuron.moving_average_alpha, but the active validator overrides
      self.scores via update_scores_on_chain, so the live path is the 5-sample SMA, not the EMA.

anti_gaming:
  - kind: honeypot
    enforcement: penalty
    description: >-
      Cheat-word list fetched from TaskPoolServer (/cheats); any response containing a cheat word
      returns correctness -1. Responses matching the regex {{ answer }} template also return -1.
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      LLM-based trick detection (DETECT_TRICK_TEMPLATE): if the cleaned response is judged a trick
      ('yes'), correctness is set to -1.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Per-validator request rate limit derived from stake-weighted epoch volume, clamped to
      [MIN_RATE_LIMIT=2, MAX_RATE_LIMIT=80]. reward_scale = clamp(epoch_volume/512, 0, 1).
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Only validators with total_stake >= MIN_STAKE (10000) receive query volume; min_stake gates
      rate-limit allocation.

sub_competitions:
  structure: single
  stages: []
  count: 1
  notes: >-
    Single category 'Logic' with incentive_weight 1.0 (init_category). The code is structured to
    support multiple categories but only one is defined.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, reputation]
  status_values: []
  reset_policy: >-
    Scores and reward_logs are kept as a rolling window of the last NO_OF_RECENT_SCORES = 5 entries.
    A UID's score is zeroed when its hotkey is replaced (resync_metagraph).
  notes: >-
    MinerInfo holds per-UID category, recent scores list, epoch_volume, rate_limit, reward_scale, and
    reward_logs; refreshed each epoch.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs: ["README.md", "docs/VALIDATOR.md", "docs/MINER.md"]
  completeness: medium

