schema_version: "1.2.0"
instance_kind: extracted

mechanism_status: active
mechanism_status_notes: >-
  Winner-stays-in competition. On-chain weights go almost entirely to a single leader
  hotkey; the residual (1.0 - leader_weight) goes to the subnet owner UID. When a leader
  defends, its weight decays toward a floor each round, so the owner share grows over
  time — i.e. an increasing, dynamic burn to the owner UID rather than a fixed split.

subnet:
  name: "404-GEN Competition System"
  owner_repo: "404-Repo__404-gen-subnet"
  netuid: 17
  implementation_lang: python

task:
  summary: >-
    Miners submit open-source AI 3D-generation solutions (a GitHub repo + commit +
    Docker image producing Three.js modules). When a round opens, miners use a published
    seed and prompts to generate 3D models and upload them to their CDNs. Validators
    render the outputs to multi-view PNGs and run VLM-based pairwise duels; the round
    winner becomes/defends the global leader. The single leader receives nearly all
    on-chain weight under a winner-stays-in format with a proof-of-work (audit) model.
  submission_format: [source_code, content_link, compute_service]

scoring_signals:
  - name: duel_prompt_match_penalty
    metric_kind: vlm_judgment
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      Stage 1 of the multi-stage duel judge. For 4 near-front angles, a VLM (GLM-4.6V-Flash)
      assigns each of the two models a 0-10 penalty (0 = perfect match to reference,
      10 = completely wrong), evaluated both AB and BA. A weighted, split-aware aggregator
      either declares a per-duel winner or routes to later stages.
  - name: duel_best_view_penalty
    metric_kind: vlm_judgment
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      Stage 2A. DINOv3 embeddings pick each side's highest-similarity rendered view vs the
      prompt; the VLM compares those two best views (AB+BA) producing 0-10 penalties.
  - name: duel_artifact_penalty
    metric_kind: vlm_judgment
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      Stage 2B. VLM rates rendering quality on a 2x2 grid render per side (bounding box,
      color/material accuracy, surface quality, geometric detail) as a 0-10 penalty.
  - name: duel_checklist_score
    metric_kind: vlm_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Stage 2C. VLM decomposes the prompt into a 4-7 item feature checklist, then verifies
      each model's grid; per-item yes/partial/no scores (2/1/0) plus a +3 main-object bonus.
  - name: side_guard_garbage_votes
    metric_kind: vlm_judgment
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      Stage 4 anti-gaming guard. 4 side angles per side classified OK/GARBAGE; K-of-4 garbage
      votes flag a side and can demote a winning-but-flagged side to a draw.
  - name: match_margin
    metric_kind: win_rate
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Per match (a set of per-prompt duels), margin = score / number_of_duels. A challenger
      must reach win_margin against the leader/timeline winner to qualify and advance.

ground_truth_sources:
  - kind: llm_judgment
    description: >-
      Vision-language model (GLM-4.6V-Flash served via operator vLLM) performs pairwise
      duels comparing two rendered 3D models against a reference image across multiple
      gated stages.
    source_identifier: "glm-4.6v-flash (judge-service/judge_service/judges/multi_stage.py MODEL)"
    trust_model: oracle
    notes: >-
      DINOv3 embeddings (image-distance-service) provide best-view selection and verify
      that regenerated outputs match submissions.
  - kind: deterministic_dataset
    description: >-
      Published per-round random seed plus selected prompts drive deterministic generation;
      winners are audited by regenerating their outputs with the miner's own Docker image
      on serverless GPUs (proof-of-work verification).
    source_identifier: "rounds/{n}/seed.json, prompts.txt; generation-orchestrator regeneration"
    trust_model: adversarial
    notes: >-
      Verification regenerates 128 prompts (4 batches of 32) with the same seed; failure
      discards the candidate timeline.

aggregation:
  method: winner_take_all
  composition: gated
  normalization: none
  temperature: null
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "199"
    fraction: null
    dynamic: true
    notes: >-
      WeightsService._calculate_weights: if no leader (or leader is the owner) the owner UID
      gets weight 1.0; otherwise owner_weight = 1.0 - leader_weight and weights are set to
      [owner_uid, leader_uid] = [owner_weight, leader_weight]. The owner share is the dynamic
      residual and grows as a defending leader's weight decays toward weight_floor.
  notes: >-
    Round winner is decided by the judge-service via pairwise duels; round-manager updates
    leader.json. New leader enters at weight 1.0; a defending leader's weight decays by
    config.weight_decay each round down to config.weight_floor (finalize_round.py
    _compute_leader_transition). Only one non-owner UID receives weight at a time.

weight_setting:
  cadence: per_round
  method: >-
    A standalone weights-setter loop polls the competition git repo's leader.json, resolves
    the active leader hotkey to a metagraph UID at the current block, and sets a two-UID
    weight vector [owner_uid, leader_uid]. Leader weight is whatever leader.json records for
    the active transition (1.0 for a fresh winner, decayed otherwise).
  on_chain_call: set_weights
  tempo_or_interval: "set_weights_interval_sec (configurable); inner loop 60s"
  smoothing:
    kind: none
    alpha: null
    window: null
    notes: >-
      No EMA/SMA in the weight setter. set_weights is called with wait_for_inclusion=False
      and wait_for_finalization=False; 3 confirmation blocks are polled only to verify the
      update landed. Temporal smoothing of leader weight is via the per-round weight_decay,
      not an EMA.

anti_gaming:
  - kind: proof_of_work
    enforcement: rejection
    description: >-
      Candidate winners are audited by regenerating their outputs with the miner's own Docker
      image on serverless GPUs (4xH200) using the round seed; regenerated outputs are compared
      to submissions. If verification fails the timeline is discarded and alternatives evaluated.
  - kind: code_inspection
    enforcement: rejection
    description: >-
      Each returned JavaScript module is statically analyzed and executed in a sandbox before
      rendering during verification.
  - kind: liveness_check
    enforcement: penalty
    description: >-
      Stage 4 side guard: per-angle OK/GARBAGE VLM classification (K-of-4 garbage threshold,
      S4_K_THRESHOLD=3) flags sides whose non-front views are unmodeled/replaced; a flagged
      winning side is stepped down to a draw.
  - kind: deduplication
    enforcement: rejection
    description: >-
      _find_new_leader: if a round winner's repo and commit match the current leader's, no
      transition occurs (the same submission cannot re-take leadership).

sub_competitions:
  structure: single
  stages:
    - name: qualification
      role: qualifier
      advancement_rule: >-
        Every miner duels the current base leader; a miner qualifies if match.margin >= win_margin.
    - name: timeline
      role: main
      advancement_rule: >-
        Qualified miners are run as a timeline of pairwise matches; a challenger beating the
        current timeline winner by win_margin becomes the new local leader and is sent to audit.
  count: 1
  notes: >-
    The repo also ships Competitions/competition0..2.md describing successive competition
    definitions, but the on-chain mechanism is a single winner-stays-in ladder per round.

per_miner_state:
  tracked: true
  state_kinds: [status_enum, cumulative_score]
  status_values: [leader, qualified, rejected, local_leader]
  reset_policy: >-
    Leader state (leader.json) is append-only across rounds; per-round match matrices,
    winner, and audit/rejection sets are recomputed each round.
  notes: >-
    leader.json is an append-only transition log (hotkey, repo, commit, docker, weight,
    effective_block). Per-round, rejected_hotkeys and qualified lists track miner status.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "Competitions/competition0.md"
    - "shared/subnet_common/competition/config.py"
    - "weights-setter/weights_service.py"
  completeness: high

