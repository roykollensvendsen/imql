schema_version: "1.1.0"
instance_kind: extracted

subnet:
  name: "Subnet 1: Apex"
  owner_repo: "macrocosm-os__prompting"
  netuid: 1
  implementation_lang: python

task:
  summary: >-
    Apex is a competition-based subnet. Miners submit Python-based algorithms (a
    "solution file", optionally with binary artifacts) to a specific Competition
    via the Apex CLI, paying an on-chain submission fee. Each Competition runs
    multiple Rounds. An off-chain orchestrator (apex.api.macrocosmos.ai) executes
    each submission in sandboxes against the competition's deterministic,
    seed-generated challenge instances and produces a single scalar score per
    submission, forming a per-competition leaderboard. Validators in this repo do
    NOT score: they poll the orchestrator for "global miner scores" (already a
    weight per UID) and submit them on-chain. Concrete competitions include energy
    arbitrage (score = simulated total profit, higher is better), RL Battleship
    (sink ships in as few turns as possible, lower is better), and an Iota
    distributed-training simulator. Per-competition emissions are scaled by an
    incentive_weight and reduced by a burn_factor, with a base (minimum) burn rate.
  submission_format: [source_code]

scoring_signals:
  - name: competition_score
    metric_kind: other
    metric_kind_other: "per-competition scalar score from sandboxed execution of the submitted algorithm (e.g. simulated total_profit for energy_arbitrage; fewer turns for RL Battleship)"
    direction: higher_is_better
    weight: 1.0
    normalization: rank
    notes: >-
      The orchestrator produces one scalar score per submission and ranks miners
      into a leaderboard (MinerRankRecord.rank / top_scorer). The semantics of the
      raw score are competition-specific: for energy_arbitrage higher total_profit
      is better; for RL Battleship fewer turns is better. The orchestrator that
      computes the raw score and converts it to a leaderboard/weight is a remote
      API not present in this repo, so the cross-competition normalization beyond
      "rank-based leaderboard with a top_scorer" is unresolved.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Each competition generates challenge instances deterministically from a seed
      (and a hidden_seed not visible to the submitted policy). Scoring is the
      objective outcome of running the submitted algorithm against these generated
      instances inside a sandbox (e.g. simulated profit accumulated over the
      rollout for energy_arbitrage).
    source_identifier: "competition.<name> challenge generators (e.g. energy_arbitrage/python/challenge.py generate_instance)"
    trust_model: trusted

aggregation:
  method: rank_based
  normalization: other
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: null
    fraction: null
    notes: >-
      Per-competition emissions = (1 - burn_factor) * incentive_weight; the
      remainder is burned. burn_factor has a configured floor base_burn_rate
      (DEFAULT_BASE_BURN_RATE = 0.9), shown in the CLI as "min burn". The exact
      live burn_factor value and the recipient of the burned emission are set by
      the off-chain orchestrator (not in this repo), so fraction/address are
      unresolved.
  notes: >-
    Normalization is "other": per-competition incentive_weight is a direct decimal
    allocation (0.0-1.0) scaled by (1 - burn_factor); the per-UID weights are
    provided by the orchestrator. Validators receive an already-computed per-UID
    weight from the orchestrator and submit it via set_weights; on failure they
    copy a stake-weighted average of existing on-chain weights.

weight_setting:
  cadence: continuous
  method: >-
    Validator weight_loop polls the orchestrator (get_global_miner_scores) for a
    SubnetScores object containing {uid, weight} per miner, then calls
    set_weights. If no scores are available or on timeout/error it falls back to
    copy_weights_from_chain (stake-weighted average of validator weights). Loops
    every WEIGHT_SUBMIT_INTERVAL seconds.
  on_chain_call: set_weights
  tempo_or_interval: "WEIGHT_SUBMIT_INTERVAL = 60*21 (every 21 minutes) in production"

anti_gaming:
  - kind: collateral
    enforcement: barrier
    description: >-
      Submitting requires an on-chain submission fee (amount_rao / fee_usd) paid
      via transfer_keep_alive to SUBMISSION_FEE_ADDRESS; the orchestrator verifies
      the payment receipt before accepting the submission. This acts as an
      anti-spam / sybil barrier on submissions.
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Submitted algorithms run in sandboxes (SandboxRunRules) and receive only a
      restricted PolicyView, not the full Challenge, so they cannot access the
      seed or RT-price generation; the hidden_seed used to drive the rollout is
      withheld from the policy. Challenge instances are deterministic from seeds.

sub_competitions:
  structure: multi_mechanism
  stages: []
  count: null
  notes: >-
    The subnet runs multiple independent Competitions in parallel, each with its
    own package (pkg), process/competition type (ptype/ctype), deterministic
    challenge, leaderboard, incentive_weight and burn_factor. Each Competition is
    divided into Rounds (RoundRecord.round_number). Observed competitions in-repo:
    energy_arbitrage, battleship, rl_battleship, iota_simulator, tron,
    matrix_compression. The exact set and per-competition incentive_weight values
    are owned by the off-chain orchestrator and not pinned in this repo.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum, registration_age]
  status_values: []
  reset_policy: >-
    burn_factor_reset_at marks when the burn factor was reset (tied to a new top
    scorer / "Age" of the current top scorer). Per-miner best score and rank
    persist across submissions within a competition.
  notes: >-
    Per miner the orchestrator tracks best score, leaderboard rank, top_scorer
    flag, submission version, submissions_count and join_date
    (MinerRankRecord/SubmissionRankMiner). A miner is "top_scorer" if its current
    submission is the competition winner. Submissions must beat a score_to_beat to
    take the top spot.

documentation:
  status: docs_authoritative
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/sandbox-startup-config.md"
    - "https://docs.macrocosmos.ai/subnets/new-subnet-1-apex/incentive-mechanism"
  completeness: medium

provenance:
  extracted_by: "im-extract"
  confidence_overall: medium
  extractor_notes: >-
    This is the newer "Apex" competition architecture, not the classic SN1
    prompting/reward-model LLM-inference subnet described in the task brief. The
    actual scoring engine (orchestrator) is a remote API (apex.api.macrocosmos.ai)
    and is NOT in this repo; only the validator (which forwards orchestrator
    weights on-chain), the miner-facing CLI, the per-competition challenge
    simulators, and shared API models are present. Reward-pipeline / leaderboard
    construction internals are therefore inferred from data models and CLI render
    logic, not from the scoring source.
  unresolved:
    - "Exact per-competition incentive_weight values and the live burn_factor (orchestrator-owned, not in repo)."
    - "The recipient address/UID of burned emissions and the precise burn fraction beyond the 0.9 base_burn_rate floor."
    - "Cross-competition aggregation: how per-competition leaderboards combine into the single per-UID global weight returned to validators."
    - "Decay rate / min weight floor: no such constant present in this repo."
    - "Whether any LLM/reference-model judging is used (none found in this repo; competitions are deterministic simulations/games)."
