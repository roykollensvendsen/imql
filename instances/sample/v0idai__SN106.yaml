schema_version: "1.0.0"
instance_kind: extracted

subnet:
  name: "SN106"
  owner_repo: "v0idai__SN106"
  netuid: 106
  implementation_lang: typescript

task:
  summary: >-
    Miners provide concentrated liquidity to wAlpha/wTAO trading pairs on Solana
    (Raydium CLMM), receive a liquidity-position NFT, and stake that NFT to the
    SN106 program on Solana. The validator reads each staked NFT position
    (tickLower/tickUpper/liquidity) and the pool's current tick from chain, then
    scores positions: narrower (more concentrated) ranges, proximity to the
    current market tick, and larger liquidity score higher; out-of-range
    positions score zero. Emissions are split chain -> pool -> NFT position ->
    miner. NOTE: the active validator entry point (runValidator) currently runs
    in 100% burn mode (all weight to UID 0); the position-scoring emissions path
    (runValidatorWithEmissions) is present but "kept for reference" and not
    invoked.
  submission_format: [other]
  submission_format_other: >-
    Staked Solana liquidity-position NFT (Raydium CLMM position) registered to
    the SN106 program; the validator reads on-chain position state rather than a
    direct miner-to-validator submission.

scoring_signals:
  - name: range_concentration
    metric_kind: other
    metric_kind_other: liquidity_range_width_penalty
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      widthPenalty = 1 / Math.pow(width, 1.2), where width = tickUpper -
      tickLower. Narrower (more concentrated) ranges score higher. Part of the
      reference emissions path only (runValidatorWithEmissions), not the active
      burn path.
  - name: market_proximity
    metric_kind: other
    metric_kind_other: distance_from_pool_current_tick
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      centerWeight = 1 / (1 + distanceFromCenter), distanceFromCenter =
      |center - currentTick|, center = (tickLower + tickUpper) / 2. Closer to
      current tick scores higher. Out-of-range positions (currentTick outside
      [tickLower, tickUpper]) score 0.
  - name: liquidity_amount
    metric_kind: other
    metric_kind_other: position_liquidity
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Final score = widthPenalty * centerWeight * position.liquidity. Larger
      liquidity scales the score linearly.

ground_truth_sources:
  - kind: market_data
    kind_other: ""
    description: >-
      On-chain Solana state: staked NFT position parameters (tickLower,
      tickUpper, liquidity) decoded from SN106 program stake records, and each
      pool's current tick decoded from Raydium CLMM pool state.
    source_identifier: "solana_raydium_clmm_pool_state"
    trust_model: trusted

aggregation:
  method: proportional
  normalization: sum_to_one
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 1.0
    notes: >-
      The active entry point runValidator() calls burnAllWeightsOnSubtensor,
      allocating 100% (65535 u16 units) to UID 0. The reference emissions path
      (runValidatorWithEmissions) sets burnPercentage = 0 (burn disabled), so
      when that path is used the burn fraction is 0 and 100% goes to miners. As
      shipped, the invoked path is full burn.
  notes: >-
    Reference path: per-NFT emission = (score / totalScore) * poolReward, where
    poolReward = poolWeights[pool] * totalReward; per-miner weight is the sum of
    that miner's NFT emissions, then normalized to sum to 1.0. Pool weights use
    reserved fixed shares (85% to subnet-0 pools, 15% to subnet-106 pools) per
    calculatePoolWeightsWithReservedPools. An EMA smoothing (alpha default 0.3,
    configurable) is applied to eligible miners when CONFIG.VALIDATOR.USE_EMA is
    set. These apply only to the reference path, not the active burn path.

weight_setting:
  cadence: other
  cadence_other: >-
    Fixed wall-clock timer: validator re-runs every 40 minutes
    (scheduleNextRun, setTimeout). README text says every 20 minutes; code uses
    40. Not tied to chain epoch/tempo.
  method: >-
    u16 largest-remainder scaling to 65535 total, then api.tx.subtensorModule.
    setWeights(netuid, uids, scaled, versionKey) signed by the validator hotkey.
    versionKey is the current chain block number.
  on_chain_call: set_weights
  tempo_or_interval: "40 minutes (setTimeout fixed interval)"

anti_gaming:
  - kind: deterministic_check
    kind_other: ""
    enforcement: rejection
    description: >-
      Out-of-range positions get zero score (isInRange = currentTick in
      [tickLower, tickUpper]); invalid/degenerate positions (non-finite tick,
      liquidity <= 0, width <= 0) also score 0. In setWeights, if all non-zero
      weights are exactly equal it is treated as likely error and all weights
      are forced to zero; empty/invalid weight sets are submitted as all-zero
      (no uniform fallback).

sub_competitions:
  structure: other
  structure_other: >-
    Two-tier reward structure: subnet-level allocation (reserved pool shares by
    subnetId) and individual NFT-position competition within each pool. Not a
    ladder/tournament; positions compete continuously within their pool's
    reward slice.
  stages: []
  count: null
  notes: >-
    README: "two-tier reward system: Subnet Performance ... Individual
    Performance". Reserved shares: 85% subnet-0 pools, 15% subnet-106 pools.

per_miner_state:
  tracked: true
  state_kinds: [other]
  status_values: []
  reset_policy: >-
    EMA state lives in global.__sn106EmaWeights, persisted on module scope
    across scheduled runs in-process; reset on process restart. Only updated for
    miners with positive (in-range) emissions.
  notes: >-
    Exponentially-weighted moving average of per-miner weights
    (EMA_ALPHA * current + (1-EMA_ALPHA) * previous), applied only in the
    reference emissions path when USE_EMA is enabled. Not a debt/status ledger.
  extensions:
    state_kind_detail: ema_weight_smoothing_in_memory

