    - "min_weight_floor: no explicit floor; EMA_EPSILON thresholds tiny weights to 0 but is a config value with no literal in source."
    - "reserved-share constants: poolWeights default signature uses 0.85/0.15 (matching index.ts call), but the function default header and docs cite 0.25; only the index.ts call-site values (0.85 subnet-0, 0.15 subnet-106) are the actually-passed constants."
