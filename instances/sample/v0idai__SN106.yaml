  extractor_notes: >-
    TypeScript/blockchain-centric subnet that does not fit the standard
    bittensor reward-template vocabulary. Miners do not submit models/code to
    validators; they provide Raydium CLMM concentrated liquidity on Solana and
    stake position NFTs, which the validator reads from chain. The scoring is a
    DeFi market-making quality function (concentration + price proximity +
    liquidity), unlike loss/accuracy tasks. Two control-flow paths exist:
    full-burn (active) and position-emissions (reference). I recorded the active
    burn path in burn_allocation while capturing the reference scoring mechanism
    in scoring_signals/aggregation, flagging the ambiguity in unresolved. No
    config/ constants file was found by locate.py; numeric constants come from
    call sites and function-default parameters, which conflict with the docs in
    several places (EMA alpha, reserved shares, 20- vs 40-minute interval).
