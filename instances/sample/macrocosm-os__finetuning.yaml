schema_version: "1.2.0"
instance_kind: extracted

subnet:
  name: "Finetuning (Subnet 37)"
  owner_repo: "macrocosm-os__finetuning"
  netuid: 37
  implementation_lang: python

task:
  summary: >-
    Miners fine-tune LLMs locally, publish the best model to Hugging Face, and commit
    that model's metadata to the Bittensor chain (one model per miner at a time).
    Validators download each miner's model and score it on a competition-specific set
    of evaluation tasks (synthetic MMLU multiple-choice, word-sorting reference loss,
    FineWeb text cross-entropy loss, synthetic IFEval rule-following, and reasoning-trace
    reference loss). Within a competition, models are compared pairwise with an
    epsilon (earlier-block) advantage, and the model(s) with the highest win rate
    receive that competition's emission share. The subnet runs several competitions
    (e.g. B7_MULTI_CHOICE, INSTRUCT_8B, DISTILLED_REASONING_3B) over time, each with its
    own model-size/architecture constraints and reward percentage.
  submission_format: [model_weights, commitment_hash]
  extensions:
    publication: "Model uploaded to Hugging Face (public repo); model metadata/hash committed to the Bittensor chain."

scoring_signals:
  - name: synthetic_mmlu_deviation
    metric_kind: accuracy
    direction: lower_is_better
    weight: 0.30
    normalization: none
    notes: >-
      MULTIPLE_CHOICE method: fraction of incorrect answers on a synthetic MMLU-like
      multiple-choice dataset sourced from Subnet 1 (Prompting). Raw score is the ratio
      of incorrect answers (0 = correct, 1 = incorrect), so lower is better. Weight shown
      is for the active INSTRUCT_8B post-B7-sunset schedule (0.75 in the earlier schedule).
  - name: word_sorting_reference_loss
    metric_kind: loss
    direction: lower_is_better
    weight: 0.05
    normalization: other
    notes: >-
      REFERENCE_LOSS on a word-sorting task; normalized via INVERSE_EXPONENTIAL with
      ceiling 40.0 (taoverse normalize_score). Cross-entropy on the reference portion.
  - name: fineweb_text_loss
    metric_kind: loss
    direction: lower_is_better
    weight: 0.35
    normalization: other
    notes: >-
      TEXT_LOSS: average cross-entropy on a FineWeb-edu sample; normalized via
      INVERSE_EXPONENTIAL with ceiling 20.0. A reasonable-output sanity check returns
      inf (worst) if outputs overlap/repeat too much.
  - name: if_eval_v2
    metric_kind: accuracy
    direction: lower_is_better
    weight: 0.30
    normalization: none
    notes: >-
      IF_EVAL: fraction of rules NOT satisfied across two responses; per-response score
      is 1 - (correct_ratio**2). Models with >10% duplicated responses across prompts
      are forced to score 1 (worst). Lower is better.
  - name: composite_weighted_task_score
    metric_kind: other
    metric_kind_other: weighted_sum_of_normalized_task_scores
    direction: lower_is_better
    weight: null
    normalization: other
    notes: >-
      score_model() returns score = sum over eval tasks of (normalized_score * task_weight),
      with task weights renormalized to sum to 1. This per-model composite score is then
      used as the 'loss' input to the pairwise win comparison. Lower composite is better.
      Task set and weights vary by competition/schedule block.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Synthetic MMLU-like multiple-choice questions sourced from the Prompting subnet
      (Subnet 1) via WandB; also synthetic IFEval-style rule-following prompts.
    source_identifier: "SYNTHETIC_MMLU / SYNTHETIC_IF_EVAL (Subnet 1 Prompting, via WandB)"
    trust_model: trusted
  - kind: deterministic_dataset
    description: >-
      FineWeb-edu text sample for cross-entropy (TEXT_LOSS) and generated word-sorting
      task for REFERENCE_LOSS.
    source_identifier: "FINEWEB (HuggingFaceFW/fineweb-edu-score-2) / WORD_SORTING"
    trust_model: trusted
  - kind: deterministic_dataset
    description: >-
      Reasoning-trace datasets for the DISTILLED_REASONING_3B competition (math/code
      step-by-step reasoning), scored via REFERENCE_LOSS.
    source_identifier: "SYNTHETIC_1_SFT (PrimeIntellect/SYNTHETIC-1-SFT-Data) / CODEFORCES_COTS"
    trust_model: trusted

aggregation:
  method: winner_take_all
  normalization: other
  decay_rate: 0.90
  min_weight_floor: 0.18
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    notes: >-
      No deliberate burn/null-UID routing observed in the active validator. Per-competition
      weight goes entirely to the winning model(s); emission then split across competitions
      by reward_percentage.
  notes: >-
    Per competition, step_weights = 1 for the uid(s) with the highest epsilon-adjusted
    pairwise win rate and 0 for all others (winner-take-all), NOT the win-ratio/softmax
    described in the docs (see provenance.extractor_notes). These per-competition weight
    vectors are fed into a CompetitionTracker that maintains an exponential moving average
    with alpha=ALPHA=0.90, then merged across active competitions weighted by each
    competition's reward_percentage. Any merged competition weight below MIN_WEIGHT_THRESHOLD
    (0.18) is zeroed to aid vtrust. The pairwise win uses an epsilon (LinearDecay, e.g.
    0.05 -> 0.01) advantage favoring the model committed at the earlier block.
  extensions:
    epsilon_func: "LinearDecay(start=0.05, end=0.01, decay_blocks varies per competition, e.g. 7200*1..7200*5)"
    competition_reward_split: "Each Competition has a reward_percentage; schedule asserts they sum to 1.0."

weight_setting:
  cadence: per_epoch
  method: >-
    EMA (alpha 0.90) of per-competition winner-take-all weight vectors, merged across
    active competitions by reward_percentage, with a 0.18 min-weight threshold; committed
    on chain roughly once per hour by a dedicated set_weights thread.
  on_chain_call: set_weights
  tempo_or_interval: "~once per hour (set_weights loop sleeps 60*60s); SYNC_BLOCK_CADENCE=360 blocks; chain_update_cadence=20min"

anti_gaming:
  - kind: other
    kind_other: epsilon_earlier_block_advantage
    enforcement: barrier
    description: >-
      _is_win applies an epsilon (LinearDecay) discount to the earlier-committed model's
      loss, so a copied/newer model must beat the original by epsilon percent to win.
      This deters copying publicly available models without genuine improvement.
  - kind: deduplication
    enforcement: penalty
    description: >-
      IF_EVAL penalizes models that produce too-similar responses to different prompts:
      if >10% of samples have response similarity > 0.6, the task score is forced to 1
      (worst). TEXT_LOSS also returns inf if generated outputs overlap/repeat excessively.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Chain metadata may only be updated every ~20 minutes (chain_update_cadence);
      models have an eval_block_delay before being scored. One model per miner at a time.
  - kind: other
    kind_other: model_size_and_architecture_constraints
    enforcement: rejection
    description: >-
      Each competition enforces max (and sometimes min) parameter size, allowed
      architectures, sequence length, tokenizer, and a max HF repo byte size
      (MAX_HUGGING_FACE_BYTES ~15.1GB); non-conforming models are not valid entries.

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: "B7_MULTI_CHOICE"
      role: other
      advancement_rule: "highest epsilon-adjusted pairwise win rate wins the competition share"
      multipliers:
        reward_percentage_initial: 0.75
        status: "sunset at block 4675163"
    - name: "INSTRUCT_8B"
      role: main
      advancement_rule: "highest epsilon-adjusted pairwise win rate wins the competition share"
      multipliers:
        reward_percentage_initial: 0.25
        reward_percentage_after_b7_sunset: 1.0
        status: "scheduled to sunset at block 5158632"
    - name: "DISTILLED_REASONING_3B"
      role: main
      advancement_rule: "highest epsilon-adjusted pairwise win rate wins the competition share"
      multipliers:
        reward_percentage: 1.0
        param_range: "3.2B-3.4B"
  count: 3
  notes: >-
    Competitions are scheduled by block via COMPETITION_SCHEDULE_BY_BLOCK; multiple may
    be active simultaneously with reward_percentages summing to 1.0. Each competition has
    its own eval task set/weights and model constraints. Roles 'other'/'main' are
    approximations; the schema has no 'competition track' role.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, registration_age]
  status_values: []
  reset_policy: >-
    VALIDATOR_STATE_VERSION (currently 13) bump causes validators to start from fresh
    state. Competition weights carried as an EMA (alpha 0.90) in the CompetitionTracker.
  notes: >-
    The CompetitionTracker keeps a moving-average weight per uid per competition across
    eval loops; uid_to_block records the commit block used for the epsilon earlier-block
    advantage. No explicit status enum / debt ledger.

