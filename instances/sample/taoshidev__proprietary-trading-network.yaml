schema_version: "1.2.0"
instance_kind: extracted

subnet:
  name: "Vanta Network (Proprietary Trading Network / PTN)"
  owner_repo: "taoshidev__proprietary-trading-network"
  netuid: 8
  implementation_lang: python

task:
  summary: >-
    Miners submit LONG / SHORT / FLAT futures-style trading signals for forex, crypto and
    equities trade pairs into the network during market hours. Validators simulate the resulting
    positions (with leverage, carry/spread fees, and slippage) and score each miner on
    risk-adjusted trading performance. Miners are rewarded via a debt-based scoring system that
    pays proportionally to cumulative penalty-adjusted PnL, with weights set weekly targeting
    payout completion by midnight Sunday UTC. Miners that exceed a 10% max drawdown or are
    detected plagiarising other miners are eliminated.
  submission_format: [signals]

scoring_signals:
  - name: pnl
    metric_kind: pnl
    direction: higher_is_better
    weight: 1.0
    normalization: rank
    notes: >-
      Current production scoring: SCORING_PNL_WEIGHT = 1.0 and all other metric weights set to 0.0.
      In debt-based scoring, payout = HWM-gated cumulative realized PnL plus negative unrealized PnL,
      each multiplied by per-checkpoint total_penalty. In the legacy Scoring path, per-metric scores
      are converted to percentile ranks before weighting.
  - name: calmar
    metric_kind: other
    metric_kind_other: calmar_ratio
    direction: higher_is_better
    weight: 0.0
    normalization: rank
    notes: "Legacy/configurable metric; SCORING_CALMAR_WEIGHT = 0.0 in current config."
  - name: sharpe
    metric_kind: other
    metric_kind_other: sharpe_ratio
    direction: higher_is_better
    weight: 0.0
    normalization: rank
    notes: "Legacy/configurable metric; SCORING_SHARPE_WEIGHT = 0.0 in current config."
  - name: omega
    metric_kind: other
    metric_kind_other: omega_ratio
    direction: higher_is_better
    weight: 0.0
    normalization: rank
    notes: "Legacy/configurable metric; SCORING_OMEGA_WEIGHT = 0.0 in current config."
  - name: sortino
    metric_kind: other
    metric_kind_other: sortino_ratio
    direction: higher_is_better
    weight: 0.0
    normalization: rank
    notes: "Legacy/configurable metric; SCORING_SORTINO_WEIGHT = 0.0 in current config."
  - name: statistical_confidence
    metric_kind: other
    metric_kind_other: statistical_confidence
    direction: higher_is_better
    weight: 0.0
    normalization: rank
    notes: "Legacy/configurable metric; SCORING_STATISTICAL_CONFIDENCE_WEIGHT = 0.0 in current config."
  - name: max_drawdown_penalty
    metric_kind: other
    metric_kind_other: max_drawdown_penalty
    direction: lower_is_better
    weight: null
    normalization: none
    notes: >-
      Multiplicative penalty (not an additive scoring signal). max_drawdown_threshold_penalty is one of
      three penalties whose product multiplies the score; a penalty of 0 zeroes the miner's score.

ground_truth_sources:
  - kind: market_data
    description: >-
      Real-time price data used to validate signals and compute simulated position returns; sourced
      from multiple market data providers.
    source_identifier: "polygon, tiingo, binance, bybit, kraken (data_generator/); hyperliquid for HL universe"
    trust_model: trusted

aggregation:
  method: proportional
  normalization: sum_to_one
  decay_rate: 0.075
  min_weight_floor: 1.5e-05
  burn_allocation:
    enabled: true
    address_or_uid: "229"
    fraction: null
    notes: >-
      Excess weight is routed to a burn UID (229 mainnet / 220 testnet). If sum of miner weights < 1.0,
      the burn address receives (1.0 - sum); if sum >= 1.0, weights are normalized to 1.0 and burn gets 0.
      The burn fraction is dynamic (1.0 - sum of remaining-payout-proportional weights), not a fixed literal.
  notes: >-
    Debt-based scoring (DebtBasedScoring.compute_results): weights are proportional to each miner's
    remaining_payout_usd (needed cumulative penalty-adjusted PnL minus emissions already paid),
    spread over days_until_target and normalized against projected daily emissions. min_weight_floor is
    CHALLENGE_PERIOD_MIN_WEIGHT (static dust); decay_rate WEIGHTED_AVERAGE_DECAY_RATE=0.075 weights recent
    performance. method 'proportional' reflects payout-proportional weighting rather than pure softmax;
    the legacy Scoring path uses softmax (SOFTMAX_TEMPERATURE=0.15) over percentile scores per asset class.

weight_setting:
  cadence: weekly
  method: >-
    DebtBasedScoring.compute_results produces (hotkey, weight) pairs; weight_calculator_manager maps
    hotkeys to UIDs and calls set_weights_rpc -> subtensor.set_weights. Weight computation refreshes
    every ~5 minutes (SET_WEIGHT_REFRESH_TIME_MS = 60*5*1000), but the payout target is a weekly cadence
    ending midnight Sunday 00:00:00 UTC.
  on_chain_call: set_weights
  tempo_or_interval: "weekly payout period ending Sunday 00:00:00 UTC; weight refresh every 5 minutes"

anti_gaming:
  - kind: plagiarism_detection
    enforcement: elimination
    description: >-
      Cross-correlation / time-lag follower analysis of order similarity. Follower similarity threshold
      PLAGIARISM_FOLLOWER_SIMILARITY_THRESHOLD = 0.75 over a 10-day lookback (PLAGIARISM_LOOKBACK_RANGE_MS).
      MAX_MINER_PLAGIARISM_SCORE = 0.9. Detected miners are eliminated after a 2-week review period
      (PLAGIARISM_REVIEW_PERIOD_MS = 14 days).
  - kind: other
    kind_other: max_drawdown_elimination
    enforcement: elimination
    description: >-
      Miners exceeding 10% max total drawdown are eliminated (MAX_TOTAL_DRAWDOWN = 0.9, portfolio must
      not fall below 0.90x initial value). 5% daily drawdown limit (MAX_DAILY_DRAWDOWN = 0.95). Monitored
      continuously by the MDD checker (MDD_CHECK_REFRESH_TIME_MS = 60s).
  - kind: collateral
    enforcement: barrier
    description: >-
      Miners must post collateral; MIN_COLLATERAL_BALANCE_THETA = 300 theta (approx $150k). A
      min_collateral_penalty multiplies the score, and CHALLENGE miners with zero / below-minimum
      collateral are prioritized for 0 weight (dereg candidates).
  - kind: challenge_period
    enforcement: barrier
    description: >-
      New miners enter a 61-90 day challenge period (CHALLENGE_PERIOD_MINIMUM_DAYS=61,
      MAXIMUM_DAYS=90) and receive only minimal dust weights. They must reach the 75th percentile
      (CHALLENGE_PERIOD_PERCENTILE_THRESHOLD=0.75) to enter the main competition.
  - kind: rate_limit
    enforcement: penalty
    description: >-
      Order cooldown ORDER_COOLDOWN_MS = 5000 (5 seconds); MAX_ORDERS_PER_POSITION = 100. Risk-profile
      penalty (risk_profile_penalty) multiplies score to discourage high-leverage gaming.

sub_competitions:
  structure: multi_asset
  stages:
    - name: challenge
      role: challenge
      advancement_rule: "reach 75th percentile (CHALLENGE_PERIOD_PERCENTILE_THRESHOLD=0.75) within 61-90 days"
      multipliers: { dust_floor: 1 }
    - name: probation
      role: probation
      advancement_rule: "must outscore the 15th-ranked MAINCOMP miner in asset class within 60-day probation, else eliminated"
      multipliers: { dust_floor: 2 }
    - name: maincomp
      role: main
      advancement_rule: "top ~25 MAINCOMP miners per asset class (PROMOTION_THRESHOLD_RANK=25)"
      multipliers: { dust_floor: 3 }
  count: 3
  notes: >-
    Three asset classes carry separate emission weights (ASSET_CLASS_BREAKDOWN: crypto 0.334, forex 0.333,
    equities 0.333) and miners are scored/ranked within each asset class, so the structure is both
    multi_asset and a challenge->probation->maincomp status ladder. Dust-floor multipliers per bucket:
    CHALLENGE/PLAGIARISM=1x, PROBATION=2x, MAINCOMP=3x, ENTITY=4x, UNKNOWN=0x.

per_miner_state:
  tracked: true
  state_kinds:
    - debt_ledger
    - performance_ledger
    - status_enum
    - cumulative_score
  status_values:
    - "MAINCOMP"
    - "CHALLENGE"
    - "PROBATION"
    - "PLAGIARISM"
    - "unknown"
    - "ENTITY"
    - "SUBACCOUNT_CHALLENGE"
    - "SUBACCOUNT_FUNDED"
    - "SUBACCOUNT_ALPHA"
  reset_policy: >-
    Debt ledger accumulates from activation (2025-11-01) onward; cumulative needed_payout allows negative
    PnL to carry forward across weeks and offset future gains (cumulative tracking, no per-week reset).
    Eliminated/deregistered hotkeys are permanently blacklisted and cannot re-register.
  notes: >-
    Per-miner DebtLedger of 12-hour DebtCheckpoints (realized_pnl, unrealized_pnl, total_penalty,
    chunk_emissions_usd, challenge_period_status) plus a PerfLedger; bucket status from MinerBucket enum.
    Only MAINCOMP/PROBATION (and subaccount/entity) checkpoints count as earning periods.

