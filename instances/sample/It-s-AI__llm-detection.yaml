schema_version: "1.1.0"
instance_kind: extracted

subnet:
  name: "It's AI - Decentralized AI Detection"
  owner_repo: "It-s-AI__llm-detection"
  netuid: 32
  implementation_lang: python

task:
  summary: >-
    Miners receive a list of texts and return, per word, a predicted probability that
    the word is AI/LLM-generated (List[List[float]] of probabilities in [0,1]). Validators
    build a balanced mix of human-written texts (sampled from the Pile and Common Crawl)
    and AI-generated texts (completions/in-the-middle generations from 30+ open-source
    LLMs run via Ollama), apply augmentations/adversarial attacks, and score each miner's
    predictions against the per-word human/AI ground-truth labels using F1, a false-positive
    score, and average-precision. The per-step reward is the average of those three metrics,
    multiplied by a 0/1 penalty.
  submission_format: [signals]

scoring_signals:
  - name: f1_score
    metric_kind: accuracy
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      sklearn f1_score(y_true, round(y_pred)). One of three equally-weighted components
      averaged into the reward.
  - name: fp_score
    metric_kind: other
    metric_kind_other: false_positive_rate_complement
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      FP_score = 1 - FP / len(samples). Penalizes classifying human-written text as
      AI-generated; chosen because false positives are considered more costly.
  - name: ap_score
    metric_kind: accuracy
    metric_kind_other: ""
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      average_precision_score(y_true, y_pred) - area summarizing the precision-recall
      curve, evaluating the ranking quality of the predicted probabilities.
  - name: penalty
    metric_kind: other
    metric_kind_other: validity_penalty_multiplier
    direction: higher_is_better
    weight: 1.0
    normalization: none
    notes: >-
      count_penalty returns 0 if any prediction is <0 or >1, if check-id predictions
      don't match the full-set predictions, or if the miner answered a probe sent with a
      random (wrong) version; also forced to 0 if the miner's out-of-domain F1 < 0.9.
      miner_reward is multiplied by this penalty.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Human-written texts sampled from the Pile (monology/pile-uncopyrighted, streaming)
      and from Common Crawl 2023 dumps. Sampling is 80:40 Pile:CommonCrawl; Common-Crawl
      samples are treated as the out-of-domain validation set.
    source_identifier: "monology/pile-uncopyrighted ; Common Crawl 2023 dumps"
    trust_model: trusted
  - kind: reference_model
    description: >-
      AI-generated texts produced by 30+ open-source LLMs run through Ollama (llama2/3/3.x,
      qwen, command-r, gemma2, mistral, internlm2.5, deepseek, phi4, aya, yi, athene, etc.),
      using both full text-completion and in-the-middle regeneration, with randomized
      generation parameters. These provide the AI-labeled half of the balanced dataset.
    source_identifier: "Ollama models in neurons/validator.py / data_generator.py"
    trust_model: trusted

aggregation:
  method: exponential_decay_ema
  normalization: softmax
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    notes: ""
  notes: >-
    Two stages. Per forward step, raw rewards are passed through Softmax(rewards*100)
    over queried miners. Then update_scores applies a per-uid exponential moving average:
    scores = alpha*reward + (1-alpha)*scores, with alpha=moving_average_alpha (0.2) once a
    uid has counter>=counter_threshold (10) and alpha_early (0.3) before that. At weight
    time the EMA scores are L1-normalized (torch.nn.functional.normalize p=1) into raw
    weights. decay_rate/min_weight_floor not expressed as literal constants.

weight_setting:
  cadence: per_epoch
  method: >-
    set_weights L1-normalizes the EMA scores and emits them via
    process_weights_for_netuid / convert_weights_and_uids_for_emit. Weights are set when
    (block - metagraph.last_update[uid]) > neuron.epoch_length (default 100 blocks of ~12s).
  on_chain_call: set_weights
  tempo_or_interval: "100"

anti_gaming:
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      count_penalty: a random subset of challenges (check_ids, 1-10 items) is re-queried
      separately; if the miner's predictions for those ids differ (rounded to 2 dp) from
      the full-set predictions, or any prediction is outside [0,1], penalty=0 (reward
      zeroed for that step).
  - kind: deterministic_check
    enforcement: penalty
    description: >-
      Version probe: with probability 0.2 a synapse is sent with a random (in-range but
      wrong) version string; an honest miner running the real code returns empty
      predictions, so any non-empty version_response sets penalty=0.
  - kind: other
    kind_other: data_augmentation_adversarial
    enforcement: penalty
    description: >-
      Texts are augmented before being sent (random consecutive-sentence subsampling,
      char-level misspellings, adjective removal) to prevent miners precomputing hashes
      over the Pile and memorizing membership.
  - kind: other
    kind_other: out_of_domain_quality_gate
    enforcement: penalty
    description: >-
      Common-Crawl (out-of-domain) samples are scored separately; an EMA of each miner's
      out-of-domain F1 is kept (out_of_domain_alpha=0.2) and if it falls below
      neuron.out_of_domain_min_f1_score (default 0.9) the miner's penalty is set to 0.
  - kind: stake_weighting
    enforcement: rejection
    description: >-
      has_enough_stake gate: a miner whose coldkey alpha stake minus min_alpha_amount is
      negative gets reward 0 for the step (default min_alpha_amount=0).

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: >-
    Single classification task. Out-of-domain (Common Crawl) vs in-domain (Pile) scoring
    is a quality gate within the one mechanism, not a separate competition.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, performance_ledger]
  status_values: []
  reset_policy: >-
    On metagraph resync, if a uid's hotkey changed the score is reset to default_score_value
    (0) and its counter reset to 0; otherwise the counter is incremented each resync.
  notes: >-
    Persistent per-uid EMA scores (self.scores) and a counter (self.counter) controlling
    early vs steady alpha, plus a per-uid out-of-domain F1 EMA (self.out_of_domain_f1_scores).
    scores/counter/hotkeys are saved to state.pt and reloaded on restart.

