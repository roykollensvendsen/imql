schema_version: "1.0.0"
instance_kind: extracted

subnet:
  name: "CoinMetrics Precog"
  owner_repo: "coinmetrics__precog"
  netuid: 55
  implementation_lang: python

task:
  summary: >-
    Miners produce continuous high-frequency price forecasts for a fixed set of crypto
    assets (BTC, ETH, TAO). Every 5 minutes the validator queries each miner for, per
    asset, a point prediction of the price one hour into the future and an interval
    estimate (a [min, max] band) the asset is expected to trade in over that hour.
    One hour later the validator evaluates the point prediction against the CoinMetrics
    1-second reference rate and the interval against the observed price path, ranks
    miners per task, and converts ranks into rewards.
  submission_format: [signals]

scoring_signals:
  - name: point_error
    metric_kind: regression_error
    direction: lower_is_better
    weight: 0.166
    normalization: rank
    notes: >-
      Per-asset relative point error abs(prediction - actual)/actual, evaluated at
      eval_time against the CoinMetrics ReferenceRateUSD. Missing/absent predictions
      receive np.inf (worst). Errors are ranked ascending (lower error = better rank).
      The 0.166 weight is the per-asset 'point' weight from constants.TASK_WEIGHTS
      (same value for btc/eth/tao_bittensor).
  - name: interval_score
    metric_kind: regression_error
    direction: higher_is_better
    weight: 0.166
    normalization: rank
    notes: >-
      Per-asset interval score = inclusion_factor * width_factor, where
      inclusion_factor = fraction of observed 1s prices inside the predicted [min,max]
      band, and width_factor = (effective_top - effective_bottom)/(pred_max - pred_min).
      Higher is better; ranks are computed on negated scores. The 0.166 weight is the
      per-asset 'interval' weight from constants.TASK_WEIGHTS. metric_kind set to
      regression_error as the closest fit (it is a composite inclusion/width score over
      a forecast band, not classification accuracy or pnl).

ground_truth_sources:
  - kind: market_data
    description: >-
      CoinMetrics Reference Rate (ReferenceRateUSD) fetched at 1-second frequency via the
      coinmetrics-api-client for the predicted hour window [prediction_time, eval_time].
      Used both for the point-prediction actual price and for the observed price path that
      the interval is scored against.
    source_identifier: "coinmetrics_api"
    trust_model: oracle

aggregation:
  method: rank_based
  normalization: sum_to_one
  decay_rate: 0.8
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    notes: ""
  notes: >-
    Each of the 6 tasks (point + interval for each of 3 assets) is scored and ranked
    independently. Per task, ranks are converted to weights by get_average_weights_for_ties
    with base_weights = decay ** arange(n), decay = 0.8 (a hardcoded local in calc_rewards,
    NOT the EMA alpha) — i.e. a geometric rank-decay where rank 0 gets weight 1, rank 1
    gets 0.8, etc., with ties averaged. The 6 per-task weight vectors are combined into
    final_rewards by a weighted sum using constants.TASK_WEIGHTS (each 0.166, nominally
    summing to ~1.0 across the 6 tasks). final_rewards then feed the per-UID moving
    average (EMA) before weight-setting. normalization set to sum_to_one because the task
    weights are documented to "sum to 1.0 across all tasks".

weight_setting:
  cadence: continuous
  method: >-
    Validator runs an async loop. Every weights_rate_limit blocks (when
    blocks_since_last_update >= hyperparameters.weights_rate_limit), it emits the
    per-UID moving_average_scores as weights. The moving average is updated each query
    cycle (~every 5 minutes per prediction_interval) via the EMA:
    ma = (1 - moving_average_alpha)*ma + moving_average_alpha*reward, with
    moving_average_alpha default 0.05. If all weights are zero, a uniform vector
    ([1]*n) is emitted. Weights are converted via
    convert_weights_and_uids_for_emit and pushed with subtensor.set_weights using
    version_key = __spec_version__.
  on_chain_call: set_weights
  tempo_or_interval: "weights_rate_limit hyperparam (blocks_since_last_update >= weights_rate_limit)"

anti_gaming:
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Weight-setting is gated by the subnet's weights_rate_limit hyperparameter; the
      validator only calls set_weights once blocks_since_last_update >= weights_rate_limit.
      This is a chain-side cadence limit rather than an explicit anti-gaming control.
  - kind: stake_weighting
    enforcement: barrier
    description: >-
      Miner UIDs are filtered by check_uid_availability against neuron.vpermit_tao_limit
      (default 4096 TAO) when building available_uids; only available UIDs are queried and
      scored.

sub_competitions:
  structure: multi_asset
  stages: []
  count: 3
  notes: >-
    Three supported assets (tao_bittensor, btc, eth), each with two independent tasks
    (point + interval), for 6 ranked tasks total. Per-asset weights live in
    constants.TASK_WEIGHTS (each task 0.166). No ladder/tournament/probation structure.

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cumulative_score]
  status_values: []
  reset_policy: >-
    MinerHistory per UID stores recent predictions/intervals; clear_old_predictions drops
    entries older than 24h (run hourly). moving_average_scores is reset to 0 for a UID when
    its hotkey is replaced or on --reset_state. State persisted to state.pt via pickle.
  notes: >-
    Per-UID MinerHistory holds submitted predictions and intervals keyed by timestamp
    (used at eval time one hour later). Per-UID moving_average_scores is the EMA-smoothed
    cumulative reward that is emitted as weights.

