schema_version: "1.0.0"
instance_kind: extracted

subnet:
  name: "Bitcast — The Decentralized Creator Economy"
  owner_repo: "bitcast-network__bitcast"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners are YouTube content creators (or agencies running up to 5 accounts) who publish
    videos satisfying brand-defined "briefs". Validators obtain temporary OAuth tokens to read
    each account's YouTube Analytics. A video is eligible only if its transcript and description
    are LLM-judged to satisfy an active brief (plus a unique-identifier and publish-date check).
    Each eligible video's score is the curve-difference of its 7-day moving-average YouTube
    Premium revenue (estimatedRedPartnerRevenue; for non-YPP accounts, estimatedMinutesWatched
    converted to revenue via a fixed multiplier), capped at the channel's historical median,
    then multiplied by a per-format scaling factor and a per-brief boost. Per-account video
    limits apply per brief format (FIFO, oldest videos kept). Brief USD targets are converted
    to on-chain weights against the subnet's total daily USD miner emissions.
  submission_format: [content_link]

scoring_signals:
  - name: youtube_premium_revenue
    metric_kind: engagement
    direction: higher_is_better
    weight: 1.0
    normalization: other
    notes: >-
      Primary signal for YPP accounts: 7-day moving average of estimatedRedPartnerRevenue
      (YouTube Premium revenue), median-capped, fed through a diminishing-returns curve.
      normalization is custom (curve difference + median cap), not a listed enum.
  - name: estimated_minutes_watched
    metric_kind: engagement
    direction: higher_is_better
    weight: 1.0
    normalization: other
    notes: >-
      For non-YPP accounts (and YPP accounts with zero revenue and min_stake), revenue is
      estimated from estimatedMinutesWatched * YT_NON_YPP_REVENUE_MULTIPLIER (0.00005) before
      the curve is applied.
  - name: brief_content_match
    metric_kind: llm_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Gating (binary) signal, not a magnitude: an LLM judges whether a video's transcript +
      description satisfy an active brief. Only matching videos receive a revenue-based score.

ground_truth_sources:
  - kind: real_engagement
    description: >-
      YouTube Analytics API metrics (estimatedRedPartnerRevenue, estimatedMinutesWatched,
      averageViewPercentage, views) pulled per-video and per-channel via validator-held OAuth
      tokens. Revenue is the 7-day moving average with a 3-day reward delay.
    source_identifier: "YouTube Analytics API (estimatedRedPartnerRevenue, estimatedMinutesWatched)"
    trust_model: oracle
  - kind: llm_judgment
    description: >-
      An LLM (Chutes or OpenRouter provider) evaluates whether the video transcript and
      description satisfy each active brief's requirements; also screens for prompt injection.
    source_identifier: "LLM_PROVIDER (chutes|openrouter)"
    trust_model: oracle

aggregation:
  method: proportional
  normalization: sum_to_one
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: null
    notes: >-
      Unclaimed emissions accrue to UID 0 (burn). _sum_to_final_rewards sets
      rewards[uid 0] = max(1.0 - other_sum, 0.0) so any emissions not claimed by miners go to
      UID 0. A configurable SUBNET_TREASURY_PERCENTAGE (default 0) is then moved from UID 0 to
      the subnet treasury UID (default 106). No literal burn fraction exists; it is residual.
  notes: >-
    Per-video USD targets = adjusted_curve_difference * scaling_factor * boost_factor. Summed
    per brief across a miner's accounts, divided by total daily USD emissions to get raw
    weights, each brief capped at its 'cap' (default 1.0), then globally normalized so the total
    sums to <= 1.0. Final per-miner reward = sum across briefs.

weight_setting:
  cadence: other
  cadence_other: "every VALIDATOR_STEPS_INTERVAL (4 hours) forward pass"
  method: >-
    forward() runs only when step % VALIDATOR_STEPS_INTERVAL == 0 (240 = 4 hours); scores are
    L1-normalized (raw_weights = scores / ||scores||_1) then passed through
    process_weights_for_netuid and convert_weights_and_uids_for_emit before set_weights.
  on_chain_call: set_weights
  tempo_or_interval: "VALIDATOR_STEPS_INTERVAL = 240 (interpreted as 4 hours)"

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Channel vetting: channel must be YPP member OR meet min alpha-stake threshold
      (YT_MIN_ALPHA_STAKE_THRESHOLD=1000); channel age >= YT_MIN_CHANNEL_AGE (21 days);
      YT_MIN_SUBS (100) <= subs <= YT_MAX_SUBS (500000); averageViewPercentage >=
      YT_MIN_CHANNEL_RETENTION (10%); total minutes watched >= YT_MIN_MINS_WATCHED (1000) over
      YT_LOOKBACK (90) days. Failing channels score 0.
  - kind: rate_limit
    enforcement: penalty
    description: >-
      Per-account video limits per brief: dedicated briefs reward up to 2 videos/account,
      ad-read up to 5, integration per-brief via max_count. Excess videos zeroed via FIFO
      (oldest kept). YT_MAX_VIDEOS=75 overall cap. Each brief also has an emissions 'cap'
      (default 1.0); briefs exceeding cap are scaled down.
  - kind: other
    kind_other: "median revenue cap (anti fake-engagement lookback)"
    enforcement: penalty
    description: >-
      Each video's daily revenue/minutes is capped at the channel's median daily value over the
      T-60 to T-30 window (YT_SCORE_CAP_START_DAYS=60, YT_SCORE_CAP_END_DAYS=30). README: caps
      the 7-day average at the median daily revenue from the previous month so YouTube's ~1-month
      fake-engagement audit is factored in. A diminishing-returns curve
      (sqrt(v)/(1+0.1*sqrt(v))) further dampens linear-scaling exploitation.
  - kind: other
    kind_other: "llm-judged brief eligibility + unique-identifier + prompt-injection screen"
    enforcement: rejection
    description: >-
      Brief eligibility is LLM-judged on transcript + description; a unique-identifier string
      must appear in the description (check_brief_unique_identifier) and the publish date must
      fall in the brief's date range (with YT_VIDEO_RELEASE_BUFFER=3 day buffer). A separate
      prompt-injection check (check_prompt_injection) screens description/transcript.
  - kind: other
    kind_other: "lifetime deduction threshold"
    enforcement: penalty
    description: >-
      A per-format lifetime deduction (YT_LIFETIME_DEDUCTION=100 USD dedicated, 25 USD ad-read)
      is subtracted from the lifetime score total by shifting the curve down by
      (lifetime_deduction / scaling_factor) and clamping at zero before differencing.

sub_competitions:
  structure: multi_brief
  stages: []
  count: null
  notes: >-
    Multiple brand briefs run concurrently, each fetched from the briefs server
    (BITCAST_BRIEFS_ENDPOINT). Each brief has its own format (dedicated|ad-read|integration),
    scaling factor (YT_SCALING_FACTOR_DEDICATED=1800, YT_SCALING_FACTOR_AD_READ=400; integration
    uses the ad-read factor), boost multiplier, max_count, and emissions cap. A video matches at
    most one brief (highest priority selected). Brief count is dynamic from the server, not a
    literal constant.

per_miner_state:
  tracked: false
  state_kinds: []
  status_values: []
  reset_policy: ""
  notes: >-
    No persistent cross-cycle per-miner ledger is set in the reward path; each forward pass
    re-queries YouTube Analytics over rolling windows. The validator keeps an EMA-like
    self.scores via update_scores, but no debt/status/cooldown ledger was found in the
    scoring code.

