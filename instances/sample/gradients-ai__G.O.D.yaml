schema_version: "1.2.0"
instance_kind: extracted

subnet:
  name: "Gradients on Demand (G.O.D)"
  owner_repo: "gradients-ai__G.O.D"
  netuid: 56
  implementation_lang: python

task:
  summary: >-
    Miners submit open-source training repositories (Docker container + training scripts).
    Validators execute these on standardized cloud GPU infrastructure (H100/A100) for text
    (Instruct/DPO/GRPO), image (SDXL/Flux), and environment (RL) tasks. The subnet is 100%
    tournament-based: miners compete in weekly tournaments (group stage -> knockout -> boss
    round) and are scored on the quality of the model their training method produces
    (test loss for most tasks, GRPO/environment score where higher is better).
  submission_format: [source_code, compute_service]

scoring_signals:
  - name: test_loss
    metric_kind: loss
    direction: lower_is_better
    weight: null
    normalization: rank
    notes: >-
      Primary ranking signal for Instruct/DPO and image tasks. calculate_miner_ranking_and_scores
      sorts by test_loss (lower is better); top result gets FIRST_PLACE_SCORE=3, bottom 25%
      get SCORE_PENALTY=-1 when pool > MIN_IDEAL_NUM_MINERS_IN_POOL (8).
  - name: grpo_score
    metric_kind: other
    metric_kind_other: grpo_reward
    direction: higher_is_better
    weight: null
    normalization: rank
    notes: >-
      For GRPO tasks the test_loss field carries the GRPO reward and is sorted in reverse
      (higher is better) per is_grpo_task branch.
  - name: environment_score
    metric_kind: other
    metric_kind_other: rl_environment_reward
    direction: higher_is_better
    weight: null
    normalization: rank
    notes: >-
      Environment (RL) tasks scored higher-is-better; evaluation runs 250 episodes
      post-training to determine final scores.
  - name: image_eval_loss
    metric_kind: loss
    direction: lower_is_better
    weight: null
    normalization: rank
    notes: >-
      Image tasks use a weighted diffusion loss: DIFFUSION_TEXT_GUIDED_EVAL_WEIGHT (0.25) *
      text_guided_avg + 0.75 * no_text_avg.

ground_truth_sources:
  - kind: reference_model
    description: >-
      Validators evaluate the miner-trained model against a held-out test dataset on
      standardized hardware; submissions equal to the original base model_id are marked
      non-finetuned and scored 0.
    source_identifier: "held-out test_data split per task"
    trust_model: trusted
  - kind: deterministic_dataset
    description: >-
      Boss round uses proven historical tasks from the database with at least 2 successful
      quality scores (MIN_SUCCESSFUL_SCORES_FOR_HISTORICAL_TASK=2), comparing tournament
      miners against best historical scores from general miners.
    source_identifier: "historical tournament tasks (DB)"
    trust_model: trusted

aggregation:
  method: tournament_bracket
  normalization: sum_to_one
  decay_rate: 0.3
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "5GU4Xkd3dCGTU3s8VLcHGc5wsD5M8XyxDca5yDQhYm1mVXFu"
    fraction: null
    notes: >-
      Burn weight = 1.0 - text_tournament_weight - image_tournament_weight -
      environment_tournament_weight; all undistributed tournament weight is also routed to the
      EMISSION_BURN_HOTKEY. Base burn is 0.65 (1 - 0.15 - 0.10 - 0.10) and rises when champion
      performance is weak. No fixed fraction; computed dynamically.
  notes: >-
    decay_rate 0.3 is TOURNAMENT_SIMPLE_DECAY_BASE: within-tournament rank weights follow
    weight[rank]=0.3^(rank-1), normalized to sum to 1 via exponential_decline_mapping. Champion
    tournament-type weight = base (0.15 text / 0.10 image / 0.10 env) + emission boost, capped at
    MAX (0.48 text / 0.32 image / 0.20 env). Text/image/environment tournaments scored separately.

weight_setting:
  cadence: continuous
  method: >-
    get_node_weights_from_tournament_audit_data builds per-tournament-type weights with
    performance boost ((perf_diff-0.05)*2.0 above 0.05 threshold) minus time-based decay
    (0.0033/day since EMISSION_TIME_DECAY_START_DATE), capped at MAX weights; applies dual
    weight pools (champions vs non-champions) ranked by exponential decay; remainder to burn;
    0.0001 participation weight per active participant.
  on_chain_call: set_weights
  tempo_or_interval: "WeightsSetRateLimit hyperparam (loop sleeps until updated >= rate limit)"

anti_gaming:
  - kind: hardware_validation
    enforcement: barrier
    description: >-
      Validators execute miners' training in Docker containers on standardized infrastructure
      with --network none isolation, fixed memory (24g) and CPU (8 nano_cpus) limits, and
      dynamic GPU allocation via get_tournament_gpu_requirement (H100 1X/2X/4X/8X by model size).
  - kind: other
    kind_other: code_obfuscation_detection
    enforcement: rejection
    description: >-
      Training repositories are checked for obfuscation during tournament registration; the
      validator runs anti_obfuscation detection (OBFUSCATION_DETECTION_PATH). Obfuscated code is
      disallowed.
  - kind: collateral
    enforcement: barrier
    description: >-
      Participation requires sufficient tournament fee balance: text/env 0.20 TAO
      (200,000,000 RAO), image 0.15 TAO (150,000,000 RAO) per tournament.
  - kind: deduplication
    enforcement: rejection
    description: >-
      Duplicate submission repos are deduplicated before evaluation; repos matching the original
      base model_id are marked non-finetuned and scored 0.
  - kind: rate_limit
    enforcement: barrier
    description: >-
      Tournaments require minimums to proceed: MIN_MINERS_FOR_TOURN=8 (text/image),
      MIN_MINERS_FOR_ENV_TOURN=5 (environment). Failed training retried up to
      MAX_TRAINING_ATTEMPTS=2.

sub_competitions:
  structure: tournament
  count: 3
  stages:
    - name: "Text/Image group stage"
      role: group
      advancement_rule: "top_8_advance"
      multipliers:
        DPO_gpu: 3
        GRPO_gpu: 2
    - name: "Text/Image knockout stage"
      role: knockout
      advancement_rule: "single_elimination_top_8 (1 task per pair; Instruct/DPO/GRPO or SDXL/Flux)"
      multipliers:
        DPO_gpu: 3
        GRPO_gpu: 2
    - name: "Final / boss round"
      role: boss
      advancement_rule: >-
        challenger must win majority (4+ of 6 tasks) vs defending champion's best historical
        scores; champion retains title otherwise
      multipliers:
        DPO_gpu: 3
        GRPO_gpu: 2
    - name: "Environment group rounds (R1-R4)"
      role: group
      advancement_rule: >-
        R1 top8 -> R2 top2 -> R3 boss+2 -> R4 boss vs 1 contender; contender must win 4/6 tasks
        at progressive threshold to dethrone boss
      multipliers:
        env_gpu: 2
  notes: >-
    Three separate tournaments scored independently: Text (Thursday 14:00 UTC),
    Image (Thursday 14:00 UTC), Environment (Monday 14:00 UTC). Text/Image use group ->
    knockout -> boss; Environment uses 4 group rounds (no knockout). GPU multipliers
    (DPO 3x, GRPO 2x, env 2x) scale model-size-based GPU allocation, not score. Progressive
    championship threshold: base 0.10 (text/image) / 0.05 (env), exponential decay 0.8 per win,
    floor 0.03.

per_miner_state:
  tracked: true
  state_kinds: [status_enum, cumulative_score, reputation]
  status_values:
    - "PENDING"
    - "ACTIVE"
    - "COMPLETED"
    - "SUCCESS"
    - "FAILURE"
    - "ELIMINATED"
  reset_policy: >-
    Tournament participants are eliminated when they lose a round; defending champion carried
    as base contestant into next tournament. Champion reign accrues time-based emission decay
    (0.0033/day) from first_championship_time.
  notes: >-
    Per-tournament round/training statuses (TaskStatus, TrainingStatus). Defending champion
    tracked across tournaments via first_championship_time and consecutive_wins for decay and
    progressive threshold.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "docs/scoring_system.md"
    - "docs/tournament_overview.md"
    - "validator/core/constants.py"
    - "validator/core/weight_setting.py"
    - "validator/evaluation/scoring.py"
    - "validator/evaluation/tournament_scoring.py"
  completeness: high

