schema_version: "1.2.0"
instance_kind: extracted

subnet:
  name: "Bitsec Subnet"
  owner_repo: "Bitsec-AI__subnet"
  netuid: 60
  implementation_lang: python

task:
  summary: >-
    Miners receive a Solidity smart-contract code sample (a "challenge") and return a
    PredictionResponse: a boolean indicating whether vulnerabilities were found, plus a list of
    detected vulnerabilities each carrying a category, severity, line ranges, description, and
    fix/exploit code. Validators generate challenges that are either secure (clean code) or
    vulnerable (an LLM injects a labeled vulnerability into clean code). Miners are rewarded for
    correctly predicting the vulnerable/secure label and for matching the expected vulnerability
    categories.
  submission_format: [signals]

scoring_signals:
  - name: prediction_match
    metric_kind: accuracy
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      reward() returns 0.0 if the miner's boolean `prediction` does not equal the expected
      prediction; this gates all further scoring.
  - name: vulnerability_category_jaccard
    metric_kind: similarity
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Jaccard score (intersection over union) of the SET of vulnerability `category` values between
      the expected response and the miner response. Exact-equality of the full vulnerability lists
      returns 1.0; empty category union returns 1.0. Line ranges and descriptions are TODO/unused.

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Clean Solidity codebases (samples/clean-codebases/*.sol) and labeled vulnerability
      descriptions (samples/vulnerabilities/*.md) shipped in the repo. A challenge is built by
      randomly picking a clean .sol file and, with ~80% probability, using an LLM to inject a
      randomly chosen labeled vulnerability into it; the injected vulnerability's PredictionResponse
      is the ground-truth `expected_response`.
    source_identifier: "samples/clean-codebases/*.sol ; samples/vulnerabilities/*.md"
    trust_model: trusted
  - kind: llm_judgment
    description: >-
      The vulnerable challenge code and its expected vulnerability labels are produced by an LLM
      (chat_completion) that injects a vulnerability into clean code, returning NewlyVulnerableCode
      {code, vulnerability_info}. The LLM-generated vulnerability_info serves as ground truth.
    source_identifier: "bitsec/utils/data.py:create_challenge_with_inputs"
    trust_model: oracle

aggregation:
  method: exponential_decay_ema
  normalization: sum_to_one
  decay_rate: 0.1
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    notes: ""
  notes: >-
    Per-step rewards (np.array of reward() values) are folded into self.scores via EMA:
    scores = alpha*rewards + (1-alpha)*scores with alpha = moving_average_alpha (default 0.1).
    At weight-setting time scores are L1-normalized (raw_weights = scores / ||scores||_1) before
    process_weights_for_netuid and conversion to uint16.

weight_setting:
  cadence: per_epoch
  method: >-
    L1-normalize EMA scores, run process_weights_for_netuid, convert to uint16 uids/weights, then
    subtensor.set_weights with version_key=spec_version, wait_for_inclusion on first set.
  on_chain_call: set_weights
  tempo_or_interval: "neuron.epoch_length default 100 (12-second blocks); validator main loop sleeps 600s per step"

anti_gaming:
  - kind: deterministic_check
    enforcement: barrier
    description: >-
      Boolean prediction gate: reward() returns 0.0 whenever the miner's `prediction` flag does not
      match the expected vulnerable/secure label, so guessing categories without matching the label
      yields zero reward.
  - kind: other
    kind_other: data_augmentation_noise
    enforcement: barrier
    description: >-
      After LLM injection, challenge code is passed through add_comment_noise_simple, which prepends
      a misleading "// TODO: Fix security vulnerability" comment as noise to make the challenge
      harder. forward() docstring also references random data augmentation.

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    Per-uid EMA score (self.scores) persists across steps and is saved/loaded from state.npz. A
    uid's score is zeroed when its hotkey is replaced in the metagraph (resync_metagraph).
  notes: >-
    Validator also tracks a seen_miners set, but only for logging new-connection notices, not for
    scoring.

documentation:
  status: code_authoritative
  source_version: null
  primary_docs:
    - "README.md"
  completeness: low

provenance:
  confidence_overall: medium
  extracted_by: "im-extract (Claude Opus 4.8)"
  extractor_notes: >-
    reward.py contains an unreachable second block after the first `return score` (lines 92-132):
    a 1-5 integer LLM-judge scoring scheme and a more detailed tuple return. It is dead code in the
    current control flow — the live reward path is the Jaccard category score only. Recorded here
    because it documents intended (but inactive) LLM-judging plagiarism/similarity controls.
  evidence:
    - claim_field: "/subnet/netuid"
      source_path: "bitsec/utils/config.py"
      line_ref: "71"
      quote: 'parser.add_argument("--netuid", type=int, help="Subnet netuid", default=60)'
      confidence: high
    - claim_field: "/subnet/name"
