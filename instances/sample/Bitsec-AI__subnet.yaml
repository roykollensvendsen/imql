      line_ref: "38-47"
      quote: "Get a code sample. 50/50 chance of: A. SECURE (label = 0): No vulnerability injected. B. VULNERABLE (label = 1): Inject a vulnerability into the code."
      confidence: high
    - claim_field: "/task/submission_format"
      source_path: "bitsec/protocol.py"
      line_ref: "199-209"
