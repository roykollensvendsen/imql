schema_version: "1.2.0"
instance_kind: extracted

subnet:
  name: "Synth Subnet"
  owner_repo: "mode-network__synth-subnet"
  netuid: null
  implementation_lang: python

task:
  summary: >-
    Miners produce probabilistic forecasts of an asset's future price movements: for each checking
    prompt they generate multiple simulated Monte-Carlo price paths (1000 paths) for an asset over a
    fixed time increment and horizon (e.g. BTC/ETH/XAU/SOL/... at 5-minute steps for 24 hours, or a
    1-hour high-frequency variant at 1-minute steps). After the horizon elapses, validators score each
    miner's ensemble against the realized price path using the Continuous Ranked Probability Score
    (CRPS) computed on price changes (in basis points) over several time intervals; lower CRPS is
    better. Per-request scores are capped/shifted, rolled into a per-miner moving average over a
    multi-day window with per-asset weights, and converted to emission weights via softmax.
  submission_format: [signals]

scoring_signals:
  - name: crps_total
    metric_kind: other
    metric_kind_other: "probabilistic_forecast_crps"
    direction: lower_is_better
    weight: 1.0
    normalization: other
    notes: >-
      Normalization (no single enum fits): per-request CRPS sum is percentile-capped (worst 10% to
      90th pct) and best-score-subtracted, then a rolling per-asset-weighted average is softmaxed into
      reward weights. CRPS itself is the Continuous Ranked Probability Score computed per scoring
      interval on price changes in basis points (and absolute-price intervals scaled by
      1/last_price*10_000), summed over all intervals per prompt, via crps_ensemble from the
      `properscoring` package. Lower is better; a miner failing format/timeliness is assigned -1
      internally and later mapped to the 90th-percentile score.

ground_truth_sources:
  - kind: market_data
    description: >-
      Realized close prices fetched after the forecast horizon. Most assets come from the Pyth
      benchmarks TradingView history API; WTIOIL comes from the Hyperliquid candle snapshot API.
      Prices are aligned to the prompt's timestamp grid (start_time, time_length, time_increment).
    source_identifier: "https://benchmarks.pyth.network/v1/shims/tradingview/history ; https://api.hyperliquid.xyz/info"
    trust_model: oracle

aggregation:
  method: softmax
  normalization: softmax
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: false
    address_or_uid: null
    fraction: null
    notes: ""
  notes: >-
    Per request: order miners by CRPS sum, cap the worst 10% to the 90th percentile, subtract the
    lowest (best) score so the best miner scores 0; invalid/missing miners get the 90th-percentile
    score. Then a per-miner rolling average over a window (10 days low-frequency / 3 days high-
    frequency) weighted by per-asset coefficients (BTC=1.0, others fixed constants). Final reward
    weight = softmax(beta * rolling_avg) with beta = -0.1 (low-freq) / -0.2 (high-freq), each scaled
    by smoothed_score_coefficient = 0.5; low- and high-frequency reward weights for the same miner are
    summed (50%/50% emissions split). README states beta = 0.1 in the emission formula e^{-beta L}.
    decay_rate is null: README describes recent performance "weighted more heavily through an
    exponential decay function", but the extracted code implements a flat (uniform) rolling average
    over the window with no explicit per-sample decay constant or numeric decay_rate literal.

weight_setting:
  cadence: per_round
  method: >-
    update_scores() assigns the combined reward weights directly into self.scores (no on-neuron EMA
    despite the docstring); set_weights() L1-normalizes scores to raw_weights, runs
    process_weights_for_netuid and convert_weights_and_uids_for_emit, then calls subtensor.set_weights
    with version_key=self.spec_version. The validator loops "every hour" requesting predictions and
    scoring matured (>=24h-old) predictions.
  on_chain_call: set_weights
  tempo_or_interval: "total_cycle_minutes=60 (low-frequency) / 10 (high-frequency); scoring loop runs every hour"

anti_gaming:
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      validate_responses_v2 checks the response is a tuple/list, that the start-time timestamp and
      time_increment match the prompt, that the number of paths equals num_simulations, and that each
      path has the expected number of time points and well-formed prices (<=8 digits). Failing
      responses are marked not "CORRECT" and scored -1 (later mapped to the 90th-percentile penalty
      score). README: "If they fail to return predictions by the start_time or the predictions are in
      the wrong format, they will be scored 0 for that prompt."
  - kind: other
    kind_other: "worst-score penalty for missing/late/invalid responses"
    enforcement: penalty
    description: >-
      Miners that are invalid, late, or in the worst 10% are assigned the 90th-percentile CRPS score;
      new miners are backfilled with the worst score (percentile90 - lowest_score) for window
      timestamps before they joined so they are not advantaged by having fewer data points; miners
      with no valid scores in the window get an infinite rolling average (worst possible).

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: "low (24-hour horizon)"
      role: main
      advancement_rule: ""
      multipliers:
        emissions_share: 0.5
        softmax_beta: -0.1
        window_days: 10
    - name: "high (1-hour HFT horizon)"
      role: main
      advancement_rule: ""
      multipliers:
        emissions_share: 0.5
        softmax_beta: -0.2
        window_days: 3
  count: 2
  notes: >-
    Two parallel competitions (LOW_FREQUENCY and HIGH_FREQUENCY prompt configs) run simultaneously and
    each cover several assets; reward weights from both are summed per miner. README: "24-Hour
    Predictions: 50% of total emissions / 1-Hour HFT Predictions: 50% of total emissions".

per_miner_state:
  tracked: true
  state_kinds: [performance_ledger, cumulative_score]
  status_values: []
  reset_policy: >-
    Per-request scores are persisted and retained for data_retention_days (12 low / 4 high); the
    rolling average only includes requests within window_days (10 low / 3 high) of scored_time. On
    deregistration / hotkey replacement self.scores[uid] is zeroed in resync_metagraph.
  notes: >-
    The validator stores historic per-request CRPS scores per miner in a database
    (MinerDataHandler / SQL); leaderboard (rolling-average) score is recomputed each cycle from the
    stored per-request scores.

documentation:
  status: docs_and_code
  source_version: null
  primary_docs:
    - "README.md"
    - "docs/validator_guide.md"
    - "docs/miner_tutorial.md"
    - "docs/miner_reference.md"
    - "Synth Whitepaper v1.pdf"
  completeness: high

