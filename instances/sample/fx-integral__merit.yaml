schema_version: "1.0.0"
instance_kind: extracted

subnet:
  name: "Merit"
  owner_repo: "fx-integral__merit"
  netuid: 73
  implementation_lang: python

task:
  summary: >-
    Miners register a hotkey on Merit (netuid 73) and are rewarded for active
    participation across OTHER Bittensor subnets. A miner produces no artifact for
    Merit itself; instead it must (a) be registered and earning incentive on as many
    other subnets as possible under the same hotkey, and (b) keep a public IPv4 axon
    live that answers TOTP-secured liveness pings. The validator reads the on-chain
    metagraph of every other active subnet, looks up the miner's hotkey, averages its
    incentive across all those subnets, and scales it into a Bittensor Miner
    Participation Score (BMPS). A failed liveness ping zeroes the score.
  submission_format: [compute_service, other]
  submission_format_other: >-
    The scored "submission" is the miner's pre-existing on-chain incentive footprint
    across other subnets (cross-subnet participation), plus a live axon that answers
    PingSynapse with a valid TOTP token. Nothing is submitted to Merit directly.

scoring_signals:
  - name: cross_subnet_avg_incentive
    metric_kind: other
    metric_kind_other: >-
      Mean of the miner hotkey's on-chain incentive value across all other active
      subnets (netuid 0 and 73 excluded), scaled by 100000 to form the BMPS.
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      avg_incentive = sum(incentives across other subnets) / (num other subnets);
      bmps = avg_incentive * 100000. Missing hotkey entries count as incentive 0.0.
  - name: liveness_ping
    metric_kind: uptime
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Binary gate, not an additive signal. A miner that fails the TOTP-secured ping
      after retries (or has an invalid public IPv4 / port 0) has its BMPS set to 0.0.

ground_truth_sources:
  - kind: other
    kind_other: >-
      Cross-subnet on-chain reference: the incentive values in the live metagraphs of
      all OTHER active Bittensor subnets, fetched via
      subtensor.get_all_metagraphs_info().
    description: >-
      For each Merit hotkey, the validator looks up the same hotkey in every other
      active subnet's metagraph and reads its incentive; these are averaged. The
      "correct answer" is therefore the chain's own incentive state on other subnets.
    source_identifier: "subtensor.get_all_metagraphs_info()"
    trust_model: oracle
  - kind: hardware_probe
    description: >-
      TOTP-secured liveness probe: validator opens a TCP connection to the miner axon
      and sends PingSynapse; the miner replies with a TOTP token seeded from the
      sha256 of its hotkey, which the validator verifies (valid_window=1).
    source_identifier: "PingSynapse / pyotp TOTP"
    trust_model: adversarial

aggregation:
  method: rank_based
  normalization: sum_to_one
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "0"
    fraction: 0.75
    notes: >-
      UID 0 always receives burner_weight (default 0.75 = 75%). Only miners with
      score > 0.0 share the remaining 25%. burner_weight is a default argument to
      _calculate_normalized_weights, not a config constant.
  notes: >-
    Miners with BMPS > 0 are ranked descending; each rank r gets an S-curve reward
    (-1.038e-7*r^3 + 6.214e-5*r^2 - 0.0129*r - 0.0118 + 1), clamped at >= 0. Rewards
    are normalized over their sum and scaled to the 25% non-burner share. BMPS itself
    is used only to rank and gate (>0), not proportionally; the polynomial S-curve
    determines the actual weight per rank.

weight_setting:
  cadence: per_epoch
  method: >-
    Once blocks_since_last_update >= TEMPO-2, the validator builds (uid, score) pairs
    from the saved BMPS state, inserts burner UID 0, and calls
    _calculate_normalized_weights to produce a weight vector summing to ~1.0 (75% to
    UID 0, 25% S-curve-distributed across ranked positive-score miners), then submits.
  on_chain_call: set_weights
  tempo_or_interval: "360 blocks (TEMPO); weights set when blocks_since_last_update >= TEMPO-2"

anti_gaming:
  - kind: other
    kind_other: cross_subnet_incentive_averaging
    enforcement: penalty
    description: >-
      Reward is averaged across ALL other active subnets, so registering on a single
      subnet to maximize one incentive is diluted by the division over total active
      subnets. Rewards broad multi-subnet participation.
  - kind: other
    kind_other: totp_liveness_verification
    enforcement: rejection
    description: >-
      Miners reply to PingSynapse with a TOTP token seeded from sha256(hotkey),
      verified with pyotp valid_window=1. Invalid/missing token or non-PingSynapse
      response fails the ping; failure sets BMPS to 0.0. Requires accurate clocks
      (ntpsec recommended).
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Public IPv4 validation: miners whose axon IP is not a global public IPv4 or
      whose port is 0 are skipped and assigned BMPS 0.0
      (ipaddress.IPv4Address(...).is_global).

sub_competitions:
  structure: none
  stages: []
  count: null
  notes: ""

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score, status_enum]
  status_values: []
  reset_policy: >-
    BMPS state (.merit_state.json) is rebuilt each evaluation round and cleared after
    weights are set (_clear_state). A separate health file (.merit_health.json) and
    per-epoch result JSONs (capped at MAX_EPOCH_FILES=48) record ping success and
    last-ping timestamps over time.
  notes: >-
    state holds per-hotkey BMPS; latest_ping_success / latest_ping_times track
    liveness. valid_miners is the set of hotkeys that passed the latest ping round.

