  unresolved:
    - >-
      /scoring_signals/*/weight: BMPS has no per-signal numeric weight. The two signals
      (cross-subnet incentive, liveness) are not additively weighted — liveness is a
      binary gate that zeroes BMPS, while the incentive average is the sole positive
      magnitude. Left null.
    - >-
      /aggregation/decay_rate and /min_weight_floor: no temporal decay/EMA or weight
      floor exists in the code. The S-curve polynomial coefficients
      (-1.038e-7, 6.214e-5, -0.0129, -0.0118) are rank-reward shape constants, not a
      decay rate or floor, so they are documented in aggregation.notes rather than
      forced into those numeric fields.
    - >-
      Whitepaper "Max Validators 64" and per-signal "weight" balance between ping and
      incentive ("ping acts as a small fine-tuning adjustment") are descriptive only;
      in code the ping is a hard zero gate, not a fractional adjustment. No field
      captures the validator cap.
  extractor_notes: >-
    Unusual cross-subnet design: the ground truth is the chain's own incentive state on
    OTHER subnets, which fits neither dataset nor market and required
    ground_truth_sources[0].kind = other (cross-subnet reference, trust_model oracle).
    The reward shape is a fixed cubic S-curve over BMPS ranks plus a fixed 75% burn to
    UID 0; aggregation.method = rank_based is the closest enum but understates the
    polynomial weighting (captured in notes). submission_format also needed 'other'
    since miners submit nothing to Merit. test_bmps_calculation.py contains only a
    simplified proportional normalization (score/total) that does NOT match the
    validator's actual S-curve + burn logic; the validator code was treated as
    authoritative.
