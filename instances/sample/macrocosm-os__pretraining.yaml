schema_version: "1.0.0"
instance_kind: extracted
mechanism_status: full_burn
mechanism_status_notes: >-
  The archived validator (TempValidator) assigns 100% of weight to the subnet-owner burn UID; the
  documented loss/win-rate/softmax/EMA mechanism is present but commented out (dormant).

subnet:
  name: "Pretraining (SN9)"
  owner_repo: "macrocosm-os__pretraining"
  netuid: 9
  implementation_lang: python

task:
  summary: >-
    Miners train Foundation Models on the Falcon Refined Web dataset (and additional datasets per
    competition) and periodically publish model weights to Hugging Face, committing the model metadata
    to the Bittensor chain. Validators download each committed model and continuously evaluate its loss
    on randomly sampled pages; the designed incentive rewards the lowest loss across the most batches.
  submission_format: [model_weights, commitment_hash]

scoring_signals:
  - name: validation_loss
    metric_kind: loss
    direction: lower_is_better
    weight: 1.0
    normalization: none
    notes: >-
      Per-batch text loss on sampled dataset pages. Converted to pairwise wins via iswin(), where the
      earlier-committed model gets an epsilon advantage (epsilon decays linearly over time).

ground_truth_sources:
  - kind: deterministic_dataset
    description: >-
      Randomly sampled pages from large pretraining corpora; the network "acts like a continuous
      benchmark". Multiple datasets are weighted within a competition (e.g. Falcon, FineWeb, Stack v2,
      FineMath).
    source_identifier: "falcon_refined_web (+ fineweb, stack_v2, finemath per COMPETITION_SCHEDULE_BY_BLOCK)"
    trust_model: trusted

aggregation:
  method: other
  method_other: >-
    DESIGNED: epsilon-adjusted pairwise loss comparison -> per-uid win rate -> softmax over win rates
    with temperature, smoothed by an EMA. ACTIVE (archived snapshot): scoring is bypassed and 100% of
    weight is assigned to the subnet-owner burn UID.
  composition: rank
  normalization: softmax
  temperature: 0.01
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "subnet owner UID (SubnetOwnerHotkey -> get_burn_uid())"
    fraction: 1.0
    dynamic: false
    notes: >-
      The archived validator is a TempValidator whose run loop sets uids=[burn_uid], weights=[1.0],
      i.e. a full emission burn. The historical loss/win-rate/softmax mechanism remains in the file but
      is commented out.
  notes: >-
    DESIGNED aggregation: epsilon-adjusted pairwise win rate -> softmax(win_rate / temperature). EMA
    smoothing of the final reward (alpha 0.5) is recorded under weight_setting.smoothing.

weight_setting:
  cadence: continuous
  method: >-
    Designed: validators continuously re-evaluate models and set weights from smoothed win rates.
    Active: the TempValidator loops, computes the burn UID, and calls set_weights([burn_uid],[1.0])
    every set_weights_interval blocks.
  on_chain_call: set_weights
  tempo_or_interval: "set_weights_interval blocks (waits set_weights_interval * BLOCK_TIME between sets)"
  smoothing:
    kind: ema
    alpha: 0.5
    window: null
    notes: "Documented EMA over win-rate scores (constants.alpha = 0.5)."

anti_gaming:
  - kind: commit_reveal
    enforcement: barrier
    description: >-
      Models are committed to chain as metadata (hotkey + HF repo + block); only committed models are
      evaluated. Earlier commitment earns an epsilon loss advantage, discouraging copying a leader's
      weights (a copy commits later and is penalized).
  - kind: deterministic_check
    enforcement: rejection
    description: >-
      Model constraints enforced per competition (parameter-size band, sequence_length, max_bytes) via
      MODEL_CONSTRAINTS_BY_COMPETITION_ID; out-of-spec models are not valid.

sub_competitions:
  structure: multi_mechanism
  stages:
    - name: "B3_MODEL competition"
      role: main
      advancement_rule: "share of subnet weight set by COMPETITION_SCHEDULE_BY_BLOCK"
      multipliers: {}
    - name: "B14_MODEL competition"
      role: main
      advancement_rule: "share of subnet weight set by COMPETITION_SCHEDULE_BY_BLOCK"
      multipliers: {}
  count: null
  notes: >-
    Multiple model-size competitions run concurrently with per-dataset weights; subnet weights are the
    merged values across active competitions (per the commented competition_tracker logic).

per_miner_state:
  tracked: true
  state_kinds: [registration_age, cumulative_score]
  status_values: []
  reset_policy: "block-of-commitment recorded for epsilon advantage; EMA smooths scores over time"
  notes: "Softmax temperature = 0.01 (constants.temperature); EMA alpha = 0.5 (constants.alpha)."

documentation:
  status: docs_and_code
  source_version: null
  primary_docs: ["README.md", "docs/validator.md", "docs/miner.md"]
  completeness: high

