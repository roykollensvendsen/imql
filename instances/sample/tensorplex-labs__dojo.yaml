schema_version: "1.0.0"
instance_kind: extracted

subnet:
  name: "Dojo v2"
  owner_repo: "tensorplex-labs__dojo"
  netuid: 52
  implementation_lang: go

task:
  summary: >-
    Dojo v2 is a decentralized, competitive GAN. Bittensor miners act as both generators and
    discriminators. Generators produce code outputs (completions) for a task; discriminators vote
    for the completion they judge best (a "vote" is the unique ID of the selected code output).
    For a normal task, discriminators are scored by participation and generators are rewarded in
    proportion to the votes their output received; some tasks are "trap" tasks that penalise
    discriminators who vote for a designated inferior ("negative generator") output. Per-task scores
    are summed per miner UID and converted into on-chain weights.
  submission_format: [content_link, signals]

scoring_signals:
  - name: discriminator_vote
    metric_kind: human_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Each discriminator's vote is the unique ID of the code output it selects as best. In a normal
      PvP task every discriminator receives 1/totalDiscriminators regardless of vote; in a PvV task a
      discriminator scores 1/totalDiscriminators only if it voted for the validator's output, else 0.
  - name: generator_vote_share
    metric_kind: human_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Generators receive num_votes * (1/totalDiscriminators), i.e. their score scales with how many
      discriminators selected their output (CalcPvPScores / CalcPvVScores in scoring.go).
  - name: trap_penalty
    metric_kind: human_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      In a trap task, discriminators that vote for the designated 'negative generator' (trap) output
      receive a TrapPenalty of -0.4; all generators in a trap task receive 0.
  - name: no_vote_penalty
    metric_kind: human_judgment
    direction: higher_is_better
    weight: null
    normalization: none
    notes: >-
      Active miners assigned as voters to a task who did not vote split a total penalty of -4.0
      (NoVotePenaltyTotalDistribution / number of non-voters).

ground_truth_sources:
  - kind: real_engagement
    description: >-
      The "correct answer" is decided by the crowd of miner discriminators' votes; there is no
      external deterministic ground truth. Trap tasks inject a known-inferior output to test
      discriminator honesty, and PvV tasks use the validator's own output as a reference.
    source_identifier: "internal/scoring/scoring.go (CalcPvPScores/CalcPvVScores/CalcTrapScores)"
    trust_model: crowd

aggregation:
  method: proportional
  normalization: other
  decay_rate: null
  min_weight_floor: null
  burn_allocation:
    enabled: true
    address_or_uid: "158"
    fraction: 1.0
    notes: >-
      BurnUID = 158, BurnWeight = 100. Burn fraction is BurnWeight/100.0 = 1.0 (100%). Non-burn miners
      share (1 - BurnWeight/100.0). When BurnWeight is 100 the weight-setting step gate is skipped so
      burn weights are always set. If total non-burn weight is 0, weights are set entirely to the burn
      UID at round(0.01 * BurnWeight * 65535).
  notes: >-
    normalization=other: per-UID scores are summed across all scored tasks (AggregateTaskScoresByUID),
    negative totals are clamped to 0 (ClampNegativeWeights), then each non-burn weight is divided by the
    max weight and re-normalised to a proportional share that sums (across non-burn uids) to
    (1 - BurnWeight/100), finally scaled to uint16 (round(finalWeight * 65535)). Scores are computed per
    task then summed per UID. The burn fraction is a compile-time constant in
    internal/utils/chain_utils/weights_util.go.

weight_setting:
  cadence: other
  cadence_other: >-
    Driven by time tickers: scoring runs every ScoringInterval (15m in prod) and setWeights is invoked
    on the same tick, but only actually emits weights every WeightSettingInterval (1h in prod), i.e.
    once every WeightSettingInterval/ScoringInterval scoring steps (unless burn is 100%, which always sets).
  method: >-
    setWeightsOnChain converts uids/weights for emit, fetches subnet hyperparams; if
    CommitRevealWeightsEnabled it commits timelocked weights (commit-reveal v4), otherwise calls
    Kami.SetWeights with the version key.
  on_chain_call: set_weights
  tempo_or_interval: "WeightSettingInterval = 1h (prod); ScoringInterval = 15m (prod)"

anti_gaming:
  - kind: other
    kind_other: trap_task
    enforcement: penalty
    description: >-
      Trap tasks plant a known-inferior 'negative generator' output; discriminators that vote for the
      trap output are penalised (TrapPenalty = -0.4), testing whether discriminators vote honestly.
  - kind: other
    kind_other: non_voting_penalty
    enforcement: penalty
    description: >-
      Active miners assigned as voters who fail to vote on a task are penalised; a total of -4.0
      (NoVotePenaltyTotalDistribution) is split among all non-voters for that task.

sub_competitions:
  structure: other
  structure_other: >-
    Per-task type switch (Trap / PvP / PvV) rather than a staged ladder/tournament; the task type is
    determined per task by DetermineTaskType, and a different scoring function is applied.
  stages: []
  count: null
  notes: >-
    Trap = trap-detection scoring; PvP = generator-vs-generator vote tally; PvV = generators vs the
    validator's reference output.

per_miner_state:
  tracked: true
  state_kinds: [cumulative_score]
  status_values: []
  reset_policy: >-
    Per-task scores are summed into a per-UID cumulative score array persisted to scores.json and
    advanced by a Step counter; tasks are scored over a rolling window (ScoreResetInterval, 24h prod).
    No explicit periodic reset of the cumulative score array was found in the read code.
  notes: >-
    ScoresData holds Scores (per-UID floats), a Step counter, and Hotkeys; AggregateTaskScoresByUID
    sums task scores into the per-UID array each scoring step.

