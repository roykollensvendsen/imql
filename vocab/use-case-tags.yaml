# One PRIMARY use-case tag per corpus subnet. SEEDED by a keyword heuristic over
# task.summary and meant to be HUMAN-CURATED — correct any assignment freely; THIS
# file is the source of truth, not the heuristic. Governed like the rest of vocab/.
