name: commitlint

# Checks that the commits introduced by a push / PR follow Conventional Commits.
# Shares the exact validator the local commit-msg hook uses (tooling/lint-commit-msg.sh),
# so local and CI never drift. Only the *new* commits in the range are checked, so legacy
# pre-convention history is never retroactively failed.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint commit subjects
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
              range="HEAD~1..HEAD"   # new branch / first push: just the tip
            else
              range="${base}..${{ github.sha }}"
            fi
          fi
          echo "Linting commits in: $range"
          fail=0
          for sha in $(git rev-list --no-merges "$range"); do
            if ! git log -1 --format=%B "$sha" | ./tooling/lint-commit-msg.sh -; then
              echo "  ↳ offending commit: $(git log -1 --oneline "$sha")"
              fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "All commit subjects follow Conventional Commits."
          exit $fail
